<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>🌧️ 빗방울 피하기</title>
  <style>
    :root {
      --bg: #1a3a5c;
      --accent: #ffd700;
      --text: #ffffff;
      --rain: #7ec8e3;
      --sun: #ffd700;
      --danger: #ff6b6b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100vh; height: 100dvh;
      overflow: hidden;
      touch-action: manipulation;
      font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
      background: var(--bg);
    }
    .wrap {
      width: 100%; max-width: 480px;
      height: 100vh; height: 100dvh;
      display: flex; flex-direction: column;
      padding: 10px 12px 8px; gap: 6px;
      margin: 0 auto;
      position: relative;
    }
    h1 {
      font-size: clamp(18px, 5.5vw, 26px);
      color: var(--text);
      text-align: center;
      font-weight: 900;
      text-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }
    .hud {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 6px 14px;
      gap: 8px;
    }
    .hud-item {
      display: flex; flex-direction: column; align-items: center;
      font-size: 12px; color: rgba(255,255,255,0.7);
    }
    .hud-val {
      font-size: clamp(18px, 5vw, 24px);
      font-weight: 900; color: var(--text);
      line-height: 1.1;
    }
    .hud-val.gold { color: var(--accent); }
    #gameArea {
      flex: 1;
      position: relative;
      overflow: hidden;
      border-radius: 16px;
      background: linear-gradient(180deg, #0d2a45 0%, #1a5276 60%, #2e7d32 100%);
      cursor: none;
      touch-action: none;
    }
    #player {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      font-size: clamp(36px, 9vw, 52px);
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
      transition: left 0.05s linear;
      user-select: none;
      pointer-events: none;
      z-index: 10;
    }
    .drop {
      position: absolute;
      top: -40px;
      font-size: 22px;
      user-select: none;
      pointer-events: none;
      transition: none;
    }
    footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    footer small { color: rgba(255,255,255,0.5); font-size: 11px; }
    .home-link {
      color: rgba(255,255,255,0.6);
      font-size: 12px;
      text-decoration: none;
      padding: 4px 8px;
      border-radius: 8px;
      background: rgba(255,255,255,0.08);
    }
    .home-link:hover { background: rgba(255,255,255,0.15); }

    /* 오버레이 */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.75);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
    }
    .overlay.hidden { display: none; }
    .overlay-card {
      background: linear-gradient(135deg, #0d2a45, #1a5276);
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 24px;
      padding: 28px 24px;
      text-align: center;
      max-width: 320px; width: 90%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .overlay-card h2 { color: var(--text); font-size: 26px; margin-bottom: 10px; }
    .overlay-card p { color: rgba(255,255,255,0.75); font-size: 14px; line-height: 1.6; margin-bottom: 6px; }
    .overlay-card .sub { color: rgba(255,255,255,0.5); font-size: 12px; margin-bottom: 18px; }
    .btn-start {
      background: linear-gradient(135deg, #f6c90e, #f39c12);
      border: none; border-radius: 16px;
      padding: 14px 40px;
      font-size: 20px; font-weight: 900;
      color: #1a1a1a; cursor: pointer;
      box-shadow: 0 6px 20px rgba(246,201,14,0.4);
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .btn-start:active { transform: scale(0.95); box-shadow: 0 2px 10px rgba(246,201,14,0.3); }
    .result-score {
      font-size: 52px; font-weight: 900;
      color: var(--accent);
      margin: 12px 0 4px;
      text-shadow: 0 0 20px rgba(255,215,0,0.5);
    }
    #resultMsg { color: rgba(255,255,255,0.7); font-size: 14px; margin-bottom: 18px; }
    #bestDisplay { color: rgba(255,215,0,0.7); font-size: 13px; margin-bottom: 6px; }

    /* 콤보 팝업 */
    .combo-popup {
      position: absolute;
      font-size: 20px; font-weight: 900;
      color: var(--accent);
      text-shadow: 0 0 10px rgba(255,215,0,0.7);
      pointer-events: none;
      animation: popUp 0.6s ease-out forwards;
      z-index: 50;
    }
    @keyframes popUp {
      0% { transform: translateY(0) scale(1); opacity: 1; }
      100% { transform: translateY(-50px) scale(1.4); opacity: 0; }
    }
    /* 미스 플래시 */
    .miss-flash {
      position: absolute; inset: 0;
      background: rgba(255, 80, 80, 0.35);
      border-radius: 16px;
      pointer-events: none;
      animation: flashOut 0.3s ease-out forwards;
      z-index: 40;
    }
    @keyframes flashOut {
      0% { opacity: 1; }
      100% { opacity: 0; }
    }
    /* 햇살 잡기 반짝 */
    .sun-catch {
      position: absolute;
      font-size: 28px;
      pointer-events: none;
      animation: sparkle 0.5s ease-out forwards;
      z-index: 50;
    }
    @keyframes sparkle {
      0% { transform: scale(1); opacity: 1; }
      100% { transform: scale(2.5); opacity: 0; }
    }
    /* 하트 아이콘 */
    #livesDisplay { font-size: 20px; letter-spacing: 2px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>🌧️ 빗방울 피하기</h1>

    <div class="hud">
      <div class="hud-item">
        <span class="hud-val" id="scoreVal">0</span>
        <span>점수</span>
      </div>
      <div class="hud-item">
        <span class="hud-val gold" id="sunVal">0</span>
        <span>햇살☀️</span>
      </div>
      <div class="hud-item">
        <span class="hud-val" id="timerVal">40</span>
        <span>초</span>
      </div>
      <div class="hud-item">
        <span class="hud-val" id="livesDisplay">❤️❤️❤️</span>
        <span>목숨</span>
      </div>
    </div>

    <div id="gameArea" touch-action="none">
      <div id="player">☂️</div>
    </div>

    <footer>
      <small>우산으로 빗방울 피하고 ☀️ 잡기!</small>
      <a class="home-link" href="../index.html">← 홈으로</a>
    </footer>
  </div>

  <div class="overlay" id="startOverlay">
    <div class="overlay-card">
      <h2>🌧️ 빗방울 피하기</h2>
      <p>우산을 좌우로 드래그해서<br><strong style="color:#7ec8e3">💧 빗방울</strong>을 피하고<br><strong style="color:#ffd700">☀️ 햇살</strong>을 잡아요!</p>
      <p class="sub">☀️ 잡으면 +5점 보너스!<br>💧 맞으면 목숨 차감 — 40초 도전</p>
      <button class="btn-start" id="startBtn">시작!</button>
    </div>
  </div>

  <div class="overlay hidden" id="endOverlay">
    <div class="overlay-card">
      <h2>🎉 게임 종료!</h2>
      <div class="result-score" id="finalScore">0</div>
      <p id="bestDisplay">최고 기록: 0점</p>
      <p id="resultMsg"></p>
      <button class="btn-start" id="restartBtn">다시 하기</button>
    </div>
  </div>

  <script>
  (function () {
    'use strict';
    const CONFIG = {
      GAME_TIME: 40,
      LIVES: 3,
      DROP_INTERVAL_START: 900,
      DROP_INTERVAL_MIN: 400,
      DROP_SPEED_START: 2.5,
      DROP_SPEED_MAX: 6.0,
      SUN_CHANCE: 0.18,
      SUN_SCORE: 5,
      RAIN_SCORE: 1,
      BEST_KEY: 'rain-dodge_best',
      PLAYER_HALF_W: 30,
    };

    const gameArea = document.getElementById('gameArea');
    const player = document.getElementById('player');
    const scoreEl = document.getElementById('scoreVal');
    const sunEl = document.getElementById('sunVal');
    const timerEl = document.getElementById('timerVal');
    const livesEl = document.getElementById('livesDisplay');
    const startOverlay = document.getElementById('startOverlay');
    const endOverlay = document.getElementById('endOverlay');
    const finalScoreEl = document.getElementById('finalScore');
    const resultMsgEl = document.getElementById('resultMsg');
    const bestDisplayEl = document.getElementById('bestDisplay');
    document.getElementById('startBtn').addEventListener('click', startGame);
    document.getElementById('restartBtn').addEventListener('click', startGame);

    let state = {};
    let drops = [];
    let rafId = null;
    let spawnTimer = null;
    let countdownTimer = null;
    let lastTime = 0;
    let playerX = 0;
    let targetX = 0;
    let areaW = 0;
    let areaH = 0;
    let isDragging = false;
    let dragOffset = 0;

    function getBest() {
      return parseInt(localStorage.getItem(CONFIG.BEST_KEY) || '0', 10);
    }
    function saveBest(v) {
      if (v > getBest()) localStorage.setItem(CONFIG.BEST_KEY, String(v));
    }

    function initState() {
      state = {
        score: 0,
        sunCount: 0,
        lives: CONFIG.LIVES,
        timeLeft: CONFIG.GAME_TIME,
        running: false,
        elapsed: 0,
        dropInterval: CONFIG.DROP_INTERVAL_START,
        dropSpeed: CONFIG.DROP_SPEED_START,
      };
    }

    function updateHUD() {
      scoreEl.textContent = state.score;
      sunEl.textContent = state.sunCount;
      timerEl.textContent = state.timeLeft;
      const hearts = '❤️'.repeat(state.lives) + '🖤'.repeat(Math.max(0, CONFIG.LIVES - state.lives));
      livesEl.textContent = hearts;
    }

    function startGame() {
      startOverlay.classList.add('hidden');
      endOverlay.classList.add('hidden');
      clearDrops();
      initState();
      areaW = gameArea.offsetWidth;
      areaH = gameArea.offsetHeight;
      playerX = areaW / 2;
      targetX = playerX;
      updatePlayerPos();
      updateHUD();
      state.running = true;
      lastTime = performance.now();
      startCountdown();
      scheduleSpawn();
      if (rafId) cancelAnimationFrame(rafId);
      rafId = requestAnimationFrame(loop);
    }

    function startCountdown() {
      if (countdownTimer) clearInterval(countdownTimer);
      countdownTimer = setInterval(() => {
        if (!state.running) { clearInterval(countdownTimer); return; }
        state.timeLeft--;
        // 난이도 점진 증가
        const progress = 1 - (state.timeLeft / CONFIG.GAME_TIME);
        state.dropInterval = Math.max(
          CONFIG.DROP_INTERVAL_MIN,
          CONFIG.DROP_INTERVAL_START - progress * 500
        );
        state.dropSpeed = Math.min(
          CONFIG.DROP_SPEED_MAX,
          CONFIG.DROP_SPEED_START + progress * 3.5
        );
        timerEl.textContent = state.timeLeft;
        if (state.timeLeft <= 0) endGame();
      }, 1000);
    }

    function scheduleSpawn() {
      if (spawnTimer) clearTimeout(spawnTimer);
      if (!state.running) return;
      spawnDrop();
      spawnTimer = setTimeout(scheduleSpawn, state.dropInterval);
    }

    function spawnDrop() {
      const isSun = Math.random() < CONFIG.SUN_CHANCE;
      const el = document.createElement('div');
      el.className = 'drop';
      el.textContent = isSun ? '☀️' : (Math.random() < 0.3 ? '🌧️' : '💧');
      const x = Math.random() * (areaW - 36) + 4;
      el.style.left = x + 'px';
      el.dataset.isSun = isSun ? '1' : '0';
      el.dataset.x = x;
      el.dataset.y = -40;
      gameArea.appendChild(el);
      drops.push({ el, x, y: -40, isSun });
    }

    function clearDrops() {
      drops.forEach(d => d.el.remove());
      drops = [];
    }

    function loop(ts) {
      if (!state.running) return;
      const dt = ts - lastTime;
      lastTime = ts;

      // 플레이어 스무스 이동
      const dx = targetX - playerX;
      playerX += dx * Math.min(1, dt * 0.018);
      updatePlayerPos();

      // 낙하물 이동
      const spd = state.dropSpeed * (dt / 16);
      for (let i = drops.length - 1; i >= 0; i--) {
        const d = drops[i];
        d.y += spd;
        d.el.style.top = d.y + 'px';

        if (d.y > areaH - 60) {
          // 충돌 판정 (플레이어 위)
          const dx = Math.abs(d.x - playerX);
          if (dx < CONFIG.PLAYER_HALF_W + 12) {
            if (d.isSun) {
              catchSun(d.x, d.y);
            } else {
              hitRain();
            }
          } else if (!d.isSun) {
            // 피한 빗방울 — 점수
            state.score += CONFIG.RAIN_SCORE;
            scoreEl.textContent = state.score;
          }
          d.el.remove();
          drops.splice(i, 1);
        }
      }
      rafId = requestAnimationFrame(loop);
    }

    function updatePlayerPos() {
      const halfW = CONFIG.PLAYER_HALF_W;
      playerX = Math.max(halfW, Math.min(areaW - halfW, playerX));
      player.style.left = playerX + 'px';
    }

    function catchSun(x, y) {
      state.score += CONFIG.SUN_SCORE;
      state.sunCount++;
      scoreEl.textContent = state.score;
      sunEl.textContent = state.sunCount;
      showPopup(x, y - 10, '+5 ☀️');
    }

    function hitRain() {
      state.lives = Math.max(0, state.lives - 1);
      updateHUD();
      showMissFlash();
      if (state.lives <= 0) endGame();
    }

    function showPopup(x, y, text) {
      const el = document.createElement('div');
      el.className = 'combo-popup';
      el.textContent = text;
      el.style.left = (x - 20) + 'px';
      el.style.top = (Math.max(10, y)) + 'px';
      gameArea.appendChild(el);
      setTimeout(() => el.remove(), 600);
    }

    function showMissFlash() {
      const el = document.createElement('div');
      el.className = 'miss-flash';
      gameArea.appendChild(el);
      setTimeout(() => el.remove(), 300);
    }

    function endGame() {
      state.running = false;
      if (spawnTimer) clearTimeout(spawnTimer);
      if (countdownTimer) clearInterval(countdownTimer);
      clearDrops();
      const best = getBest();
      saveBest(state.score);
      finalScoreEl.textContent = state.score + '점';
      bestDisplayEl.textContent = '최고 기록: ' + Math.max(best, state.score) + '점';
      const msgs = [
        state.score >= 60 ? '🌈 비도 무섭지 않아요! 최강 우산 마스터!' :
        state.score >= 40 ? '⛅ 빗속에서도 잘 피했어요! 대단해요!' :
        state.score >= 20 ? '🌤️ 좋아요! 연습하면 더 잘할 수 있어요!' :
        '☁️ 괜찮아요! 다시 도전해 봐요!'
      ];
      resultMsgEl.textContent = msgs[0];
      endOverlay.classList.remove('hidden');
    }

    // 포인터 이벤트 통합 (터치/마우스)
    gameArea.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      isDragging = true;
      dragOffset = 0;
      targetX = e.clientX - gameArea.getBoundingClientRect().left;
      gameArea.setPointerCapture(e.pointerId);
    });
    gameArea.addEventListener('pointermove', (e) => {
      if (!isDragging || !state.running) return;
      e.preventDefault();
      targetX = e.clientX - gameArea.getBoundingClientRect().left;
    });
    gameArea.addEventListener('pointerup', (e) => {
      isDragging = false;
    });
    gameArea.addEventListener('pointercancel', (e) => {
      isDragging = false;
    });

  })();
  </script>
</body>
</html>
