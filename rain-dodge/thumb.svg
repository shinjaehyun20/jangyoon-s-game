<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d2a45"/>
      <stop offset="70%" stop-color="#1a5276"/>
      <stop offset="100%" stop-color="#2e7d32"/>
    </linearGradient>
    <linearGradient id="cloud" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a90d9"/>
      <stop offset="100%" stop-color="#2c5f8a"/>
    </linearGradient>
  </defs>
  <!-- 배경 -->
  <rect width="320" height="180" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="319" height="179" fill="none" stroke="rgba(255,255,255,0.08)"/>

  <!-- 구름 -->
  <ellipse cx="80" cy="38" rx="38" ry="20" fill="url(#cloud)" opacity="0.8"/>
  <ellipse cx="100" cy="30" rx="28" ry="18" fill="url(#cloud)" opacity="0.9"/>
  <ellipse cx="200" cy="28" rx="32" ry="16" fill="url(#cloud)" opacity="0.7"/>
  <ellipse cx="222" cy="22" rx="22" ry="14" fill="url(#cloud)" opacity="0.8"/>

  <!-- 빗방울들 -->
  <text x="55" y="75" font-size="20" text-anchor="middle">💧</text>
  <text x="130" y="90" font-size="18" text-anchor="middle">💧</text>
  <text x="185" y="65" font-size="22" text-anchor="middle">🌧️</text>
  <text x="240" y="80" font-size="18" text-anchor="middle">💧</text>
  <text x="90" y="110" font-size="16" text-anchor="middle">💧</text>
  <text x="270" y="55" font-size="16" text-anchor="middle">💧</text>

  <!-- 햇살 (노란색) -->
  <text x="155" y="72" font-size="24" text-anchor="middle">☀️</text>

  <!-- 빗방울 선들 -->
  <line x1="55" y1="60" x2="50" y2="80" stroke="#7ec8e3" stroke-width="2" opacity="0.5"/>
  <line x1="130" y1="72" x2="125" y2="95" stroke="#7ec8e3" stroke-width="2" opacity="0.5"/>
  <line x1="240" y1="62" x2="235" y2="85" stroke="#7ec8e3" stroke-width="2" opacity="0.5"/>
  <line x1="270" y1="38" x2="265" y2="60" stroke="#7ec8e3" stroke-width="2" opacity="0.4"/>

  <!-- 우산 캐릭터 -->
  <text x="160" y="155" font-size="38" text-anchor="middle">☂️</text>

  <!-- 잔디 -->
  <rect x="0" y="160" width="320" height="20" fill="#2e7d32" opacity="0.6"/>

  <!-- 제목 우하단 -->
  <g font-family="'Pretendard','Noto Sans KR',sans-serif">
    <text x="296" y="148" text-anchor="end" font-size="20" font-weight="900" fill="#ffd700">빗방울 피하기</text>
    <text x="296" y="164" text-anchor="end" font-size="10" font-weight="500" fill="rgba(255,255,255,0.5)" letter-spacing="2">RAIN DODGE</text>
  </g>
</svg>
