<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>🎵 비트 동물 탭!</title>
  <style>
    :root {
      --bg: #1a0a2e;
      --bg2: #2d1b4e;
      --accent: #ff6fd8;
      --accent2: #7c4dff;
      --accent3: #00e5ff;
      --text: #ffffff;
      --cell-size: min(22vw, 110px);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100vh; height: 100dvh;
      overflow: hidden;
      touch-action: manipulation;
      font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .wrap {
      width: 100%; max-width: 480px;
      height: 100vh; height: 100dvh;
      display: flex; flex-direction: column;
      padding: 10px 12px 8px; gap: 6px;
      margin: 0 auto;
    }

    /* ── 헤더 ── */
    h1 {
      font-size: clamp(18px, 5vw, 26px);
      font-weight: 900;
      text-align: center;
      background: linear-gradient(135deg, var(--accent), var(--accent3));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      flex-shrink: 0;
    }

    /* ── HUD ── */
    .hud {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 8px 16px;
      flex-shrink: 0;
    }
    .hud-item {
      display: flex; flex-direction: column; align-items: center; gap: 1px;
    }
    .hud-label { font-size: 10px; opacity: 0.6; letter-spacing: 0.5px; }
    .hud-val {
      font-size: clamp(18px, 5vw, 24px);
      font-weight: 900;
      line-height: 1;
    }
    #scoreVal { color: var(--accent); }
    #comboVal { color: #ffd700; }
    #timerVal { color: var(--accent3); }

    /* ── BPM 박자 바 ── */
    .beat-bar-wrap {
      display: flex; align-items: center; gap: 8px;
      flex-shrink: 0; padding: 0 4px;
    }
    .beat-label { font-size: 11px; opacity: 0.5; white-space: nowrap; }
    .beat-bar {
      flex: 1; height: 6px;
      background: rgba(255,255,255,0.1);
      border-radius: 3px; overflow: hidden;
    }
    .beat-fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, var(--accent2), var(--accent));
      border-radius: 3px;
      transition: none;
    }

    /* ── 게임 그리드 ── */
    #gameArea {
      flex: 1;
      display: flex; align-items: center; justify-content: center;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, var(--cell-size));
      grid-template-rows: repeat(3, var(--cell-size));
      gap: clamp(8px, 2.5vw, 14px);
    }
    .cell {
      width: var(--cell-size); height: var(--cell-size);
      border-radius: 20px;
      background: rgba(255,255,255,0.06);
      border: 2px solid rgba(255,255,255,0.1);
      display: flex; align-items: center; justify-content: center;
      font-size: calc(var(--cell-size) * 0.5);
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      transition: background 0.08s, transform 0.08s, border-color 0.08s;
      position: relative;
      overflow: hidden;
    }
    .cell.idle { opacity: 0.25; }
    .cell.active {
      opacity: 1;
      background: radial-gradient(circle at 50% 40%, rgba(255,255,255,0.25) 0%, rgba(255,255,255,0.05) 100%);
      border-color: var(--accent);
      box-shadow: 0 0 16px 2px var(--accent), inset 0 0 10px rgba(255,111,216,0.2);
      animation: pulse 0.18s ease-out;
    }
    .cell.miss {
      background: rgba(255,50,50,0.2) !important;
      border-color: #ff4444 !important;
      box-shadow: 0 0 12px rgba(255,68,68,0.5) !important;
      opacity: 1 !important;
    }
    .cell.hit {
      background: rgba(255,215,0,0.3) !important;
      border-color: #ffd700 !important;
      box-shadow: 0 0 20px rgba(255,215,0,0.7) !important;
      opacity: 1 !important;
    }
    @keyframes pulse {
      0%   { transform: scale(0.88); }
      60%  { transform: scale(1.06); }
      100% { transform: scale(1.0); }
    }

    /* 팡! 텍스트 */
    .pop-text {
      position: absolute;
      font-size: clamp(16px, 4vw, 22px);
      font-weight: 900;
      pointer-events: none;
      animation: pop-fly 0.55s ease-out forwards;
      z-index: 10;
    }
    @keyframes pop-fly {
      0%   { transform: translateY(0) scale(1); opacity: 1; }
      100% { transform: translateY(-60px) scale(1.4); opacity: 0; }
    }

    /* ── 풋터 ── */
    footer {
      display: flex; justify-content: space-between; align-items: center;
      flex-shrink: 0;
    }
    footer small { font-size: 11px; opacity: 0.4; }
    .home-link {
      font-size: 12px; color: rgba(255,255,255,0.5);
      text-decoration: none; padding: 6px 10px;
      border: 1px solid rgba(255,255,255,0.15); border-radius: 8px;
    }
    .home-link:hover { color: #fff; border-color: rgba(255,255,255,0.4); }

    /* ── 오버레이 ── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(10,5,20,0.88);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
      transition: opacity 0.25s;
    }
    .overlay.hidden { display: none; }
    .overlay-card {
      background: linear-gradient(160deg, var(--bg2), #1e0a3c);
      border: 1.5px solid rgba(255,111,216,0.3);
      border-radius: 24px;
      padding: 32px 28px;
      max-width: 340px; width: 90%;
      text-align: center;
      box-shadow: 0 8px 40px rgba(124,77,255,0.4);
    }
    .overlay-card h2 {
      font-size: clamp(22px, 6vw, 30px);
      font-weight: 900; margin-bottom: 12px;
    }
    .overlay-card p {
      font-size: 14px; line-height: 1.6;
      opacity: 0.8; margin-bottom: 16px;
    }
    .result-score {
      font-size: clamp(48px, 14vw, 72px);
      font-weight: 900;
      background: linear-gradient(135deg, #ffd700, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin: 8px 0;
    }
    .best-line { font-size: 13px; opacity: 0.6; margin-bottom: 4px; }
    #resultMsg { font-size: 15px; margin-bottom: 20px; opacity: 0.9; }
    .btn-start {
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      color: #fff; border: none; border-radius: 14px;
      padding: 14px 40px; font-size: 18px; font-weight: 900;
      cursor: pointer; min-height: 52px;
      box-shadow: 0 4px 20px rgba(255,111,216,0.5);
      transition: transform 0.1s;
    }
    .btn-start:active { transform: scale(0.95); }

    /* BPM 선택 버튼 */
    .bpm-row {
      display: flex; gap: 8px; justify-content: center; margin: 12px 0;
    }
    .bpm-btn {
      background: rgba(255,255,255,0.1);
      border: 1.5px solid rgba(255,255,255,0.2);
      color: #fff; border-radius: 10px;
      padding: 8px 14px; font-size: 13px; font-weight: 700;
      cursor: pointer; min-height: 38px;
      transition: background 0.15s, border-color 0.15s;
    }
    .bpm-btn.selected {
      background: rgba(255,111,216,0.3);
      border-color: var(--accent);
      color: var(--accent);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>🎵 비트 동물 탭!</h1>

    <div class="hud">
      <div class="hud-item">
        <span class="hud-label">점수</span>
        <span class="hud-val" id="scoreVal">0</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">콤보</span>
        <span class="hud-val" id="comboVal">0</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">남은시간</span>
        <span class="hud-val" id="timerVal">45</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">최고</span>
        <span class="hud-val" id="bestVal" style="color:#00e5ff">0</span>
      </div>
    </div>

    <div class="beat-bar-wrap">
      <span class="beat-label">박자</span>
      <div class="beat-bar"><div class="beat-fill" id="beatFill"></div></div>
    </div>

    <div id="gameArea">
      <div class="grid" id="grid"></div>
    </div>

    <footer>
      <small>🎵 반짝이면 바로 탭!</small>
      <a class="home-link" href="../index.html">← 홈으로</a>
    </footer>
  </div>

  <!-- 시작 오버레이 -->
  <div class="overlay" id="startOverlay">
    <div class="overlay-card">
      <h2>🎵 비트 동물 탭!</h2>
      <p>박자에 맞춰 반짝이는 동물을 빠르게 탭해요!<br>
         반짝일 때만 탭해야 점수가 올라요.<br>
         콤보를 이어가면 점수가 쑥쑥!</p>
      <div style="margin-bottom:12px">
        <div style="font-size:13px;opacity:0.7;margin-bottom:8px">빠르기를 골라요:</div>
        <div class="bpm-row">
          <button class="bpm-btn selected" data-bpm="70">🐢 느릿</button>
          <button class="bpm-btn" data-bpm="100">🐇 보통</button>
          <button class="bpm-btn" data-bpm="140">⚡ 빠름</button>
        </div>
      </div>
      <button class="btn-start" id="startBtn">시작!</button>
    </div>
  </div>

  <!-- 결과 오버레이 -->
  <div class="overlay hidden" id="endOverlay">
    <div class="overlay-card">
      <h2>🎉 게임 종료!</h2>
      <div class="result-score" id="finalScore">0</div>
      <div class="best-line" id="bestLine"></div>
      <p id="resultMsg"></p>
      <button class="btn-start" id="restartBtn">다시 하기</button>
    </div>
  </div>

  <script>
  (function () {
    'use strict';

    /* ── CONFIG ── */
    const CONFIG = {
      GAME_DURATION: 45,       // 초
      ANIMALS: ['🐶','🐱','🐭','🐹','🐰','🐸','🐨','🐯','🐻','🦊','🐧','🐸','🦁','🐮','🐷'],
      GRID_SIZE: 9,            // 3×3
      ACTIVE_COUNT_MIN: 1,     // 한 번에 최소 활성 칸 수
      ACTIVE_COUNT_MAX: 3,     // 한 번에 최대 활성 칸 수
      ACTIVE_BEATS: 1.8,       // 활성 상태 지속 비트 수
      STORAGE_KEY: 'beat-animals_best',
      COMBO_BONUS: [0, 0, 5, 10, 20, 30, 50],  // 콤보 보너스 (인덱스 = 콤보 수)
      BASE_SCORE: 10,
    };

    /* ── STATE ── */
    const state = {
      score: 0,
      combo: 0,
      timeLeft: CONFIG.GAME_DURATION,
      bpm: 70,
      running: false,
      beatMs: 0,           // BPM → ms per beat
      beatPhase: 0,        // 0~1 (0=beat 시작)
      lastBeatTime: 0,
      nextSpawnBeat: 0,    // 다음 동물 등장 박자 카운트
      beatCount: 0,        // 누적 박자 수
      cells: [],           // { el, emoji, active, activeUntilBeat, timerId }
      timerInterval: null,
      rafId: null,
      startTime: 0,
    };

    /* ── DOM ── */
    const gridEl   = document.getElementById('grid');
    const scoreEl  = document.getElementById('scoreVal');
    const comboEl  = document.getElementById('comboVal');
    const timerEl  = document.getElementById('timerVal');
    const bestEl   = document.getElementById('bestVal');
    const beatFill = document.getElementById('beatFill');
    const startOv  = document.getElementById('startOverlay');
    const endOv    = document.getElementById('endOverlay');
    const finalSc  = document.getElementById('finalScore');
    const bestLine = document.getElementById('bestLine');
    const resultMsg= document.getElementById('resultMsg');

    /* ── BEST SCORE ── */
    function loadBest() {
      return parseInt(localStorage.getItem(CONFIG.STORAGE_KEY) || '0', 10);
    }
    function saveBest(v) {
      localStorage.setItem(CONFIG.STORAGE_KEY, String(v));
    }
    bestEl.textContent = loadBest();

    /* ── BPM 선택 ── */
    document.querySelectorAll('.bpm-btn').forEach(btn => {
      btn.addEventListener('pointerdown', () => {
        document.querySelectorAll('.bpm-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        state.bpm = parseInt(btn.dataset.bpm, 10);
      });
    });

    /* ── 그리드 생성 ── */
    function buildGrid() {
      gridEl.innerHTML = '';
      state.cells = [];
      const baseEmojis = shuffle([...CONFIG.ANIMALS]).slice(0, CONFIG.GRID_SIZE);
      for (let i = 0; i < CONFIG.GRID_SIZE; i++) {
        const cell = document.createElement('div');
        cell.className = 'cell idle';
        cell.textContent = baseEmojis[i];
        cell.addEventListener('pointerdown', () => onCellTap(i));
        gridEl.appendChild(cell);
        state.cells.push({
          el: cell,
          emoji: baseEmojis[i],
          active: false,
          activeUntilBeat: 0,
        });
      }
    }

    /* ── 탭 핸들러 ── */
    function onCellTap(i) {
      if (!state.running) return;
      const cell = state.cells[i];
      if (cell.active) {
        // 정타
        cell.active = false;
        cell.el.className = 'cell hit';
        const bonus = CONFIG.COMBO_BONUS[Math.min(state.combo, CONFIG.COMBO_BONUS.length - 1)];
        const pts = CONFIG.BASE_SCORE + bonus;
        state.score += pts;
        state.combo++;
        updateHud();
        showPop(cell.el, `+${pts}${state.combo >= 3 ? ' 🔥' : ''}`);
        setTimeout(() => { if (!cell.active) cell.el.className = 'cell idle'; }, 200);
      } else {
        // 오탭 — 콤보 리셋
        state.combo = 0;
        updateHud();
        cell.el.className = 'cell miss';
        setTimeout(() => { if (!cell.active) cell.el.className = 'cell idle'; }, 250);
      }
    }

    /* ── 팝 텍스트 ── */
    function showPop(parentEl, text) {
      const el = document.createElement('div');
      el.className = 'pop-text';
      el.textContent = text;
      el.style.left = '50%';
      el.style.top = '30%';
      el.style.transform = 'translateX(-50%)';
      parentEl.appendChild(el);
      el.addEventListener('animationend', () => el.remove());
    }

    /* ── HUD 갱신 ── */
    function updateHud() {
      scoreEl.textContent = state.score;
      comboEl.textContent = state.combo;
      timerEl.textContent = state.timeLeft;
      bestEl.textContent  = loadBest();
    }

    /* ── 박자 루프 (RAF 기반) ── */
    function beatLoop(ts) {
      if (!state.running) return;
      state.rafId = requestAnimationFrame(beatLoop);

      const elapsed = ts - state.lastBeatTime;
      const phase   = Math.min(elapsed / state.beatMs, 1);
      state.beatPhase = phase;

      // 박자 바 진행
      beatFill.style.width = (phase * 100) + '%';

      // 비트 경계 도달
      if (phase >= 1) {
        state.lastBeatTime = ts;
        state.beatCount++;
        onBeat();
      }
    }

    function onBeat() {
      // 만료된 활성 칸 비활성화
      for (const cell of state.cells) {
        if (cell.active && state.beatCount >= cell.activeUntilBeat) {
          cell.active = false;
          cell.el.className = 'cell idle';
          // 못 탭하면 콤보 리셋
          state.combo = 0;
          updateHud();
        }
      }

      // 새 동물 등장
      if (state.beatCount >= state.nextSpawnBeat) {
        spawnAnimals();
        const interval = Math.round(1.5 + Math.random() * 1.5); // 1.5~3 박자마다
        state.nextSpawnBeat = state.beatCount + interval;
      }
    }

    function spawnAnimals() {
      // 현재 비활성 칸 목록
      const idle = state.cells
        .map((c, i) => ({ c, i }))
        .filter(({ c }) => !c.active);
      if (idle.length === 0) return;

      const count = Math.min(
        randInt(CONFIG.ACTIVE_COUNT_MIN, CONFIG.ACTIVE_COUNT_MAX),
        idle.length
      );
      const chosen = shuffle(idle).slice(0, count);

      for (const { c } of chosen) {
        c.active = true;
        c.activeUntilBeat = state.beatCount + CONFIG.ACTIVE_BEATS;
        c.el.className = 'cell active';
      }
    }

    /* ── 타이머 ── */
    function startTimer() {
      state.timerInterval = setInterval(() => {
        if (!state.running) return;
        state.timeLeft--;
        timerEl.textContent = state.timeLeft;
        if (state.timeLeft <= 0) endGame();
      }, 1000);
    }

    /* ── 게임 시작 ── */
    function startGame() {
      state.score     = 0;
      state.combo     = 0;
      state.timeLeft  = CONFIG.GAME_DURATION;
      state.beatMs    = 60000 / state.bpm;
      state.beatPhase = 0;
      state.beatCount = 0;
      state.nextSpawnBeat = 2; // 2박 후 첫 등장
      state.running   = true;

      buildGrid();
      updateHud();

      startOv.classList.add('hidden');
      endOv.classList.add('hidden');

      startTimer();
      state.lastBeatTime = performance.now();
      state.rafId = requestAnimationFrame(beatLoop);
    }

    /* ── 게임 종료 ── */
    function endGame() {
      state.running = false;
      clearInterval(state.timerInterval);
      cancelAnimationFrame(state.rafId);

      // 남은 활성 칸 클리어
      for (const c of state.cells) {
        c.active = false;
        c.el.className = 'cell idle';
      }
      beatFill.style.width = '0%';

      const best = loadBest();
      const isNew = state.score > best;
      if (isNew) saveBest(state.score);

      finalSc.textContent = state.score;
      bestLine.textContent = isNew
        ? '🏆 새 최고 기록!'
        : `최고 기록: ${Math.max(best, state.score)}점`;
      resultMsg.textContent = msgFor(state.score);

      endOv.classList.remove('hidden');
      bestEl.textContent = loadBest();
    }

    function msgFor(score) {
      if (score >= 500) return '🔥 리듬 천재! 박자 완벽!';
      if (score >= 300) return '⭐ 정말 잘 탭했어요!';
      if (score >= 150) return '👍 좋았어요! 한 번 더!';
      return '😊 박자에 맞춰 탭하면 점수 쑥쑥!';
    }

    /* ── 유틸 ── */
    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }
    function randInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    /* ── 이벤트 ── */
    document.getElementById('startBtn').addEventListener('pointerdown', startGame);
    document.getElementById('restartBtn').addEventListener('pointerdown', startGame);

  })();
  </script>
</body>
</html>
