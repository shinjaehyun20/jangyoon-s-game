<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#87ceeb"/>
      <stop offset="60%" stop-color="#b3e5fc"/>
      <stop offset="60%" stop-color="#1565c0"/>
      <stop offset="100%" stop-color="#0d47a1"/>
    </linearGradient>
    <linearGradient id="pad1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#66bb6a"/>
      <stop offset="100%" stop-color="#2e7d32"/>
    </linearGradient>
  </defs>
  <!-- 배경 -->
  <rect width="320" height="180" fill="url(#sky)"/>
  <!-- 내부 경계 -->
  <rect x="0.5" y="0.5" width="319" height="179" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <!-- 구름 -->
  <ellipse cx="50" cy="30" rx="35" ry="14" fill="rgba(255,255,255,0.75)"/>
  <ellipse cx="70" cy="25" rx="25" ry="12" fill="rgba(255,255,255,0.75)"/>
  <ellipse cx="200" cy="45" rx="28" ry="11" fill="rgba(255,255,255,0.6)"/>
  <ellipse cx="220" cy="40" rx="20" ry="9" fill="rgba(255,255,255,0.6)"/>
  <!-- 수련잎 3개 -->
  <ellipse cx="60"  cy="85" rx="32" ry="12" fill="url(#pad1)" stroke="#1b5e20" stroke-width="2"/>
  <ellipse cx="160" cy="65" rx="36" ry="13" fill="url(#pad1)" stroke="#1b5e20" stroke-width="2"/>
  <ellipse cx="265" cy="90" rx="30" ry="11" fill="url(#pad1)" stroke="#1b5e20" stroke-width="2"/>
  <!-- 꽃 on pad -->
  <text x="160" y="70" text-anchor="middle" font-size="12">🌸</text>
  <!-- 개구리 -->
  <text x="158" y="55" text-anchor="middle" font-size="32">🐸</text>
  <!-- 점프 곡선 화살표 -->
  <path d="M62 73 Q110 30 158 50" stroke="rgba(255,255,255,0.7)" stroke-width="2" fill="none" stroke-dasharray="5,4"/>
  <polygon points="155,44 165,48 157,54" fill="rgba(255,255,255,0.7)"/>
  <!-- 물결 -->
  <path d="M0,115 Q40,108 80,115 Q120,122 160,115 Q200,108 240,115 Q280,122 320,115 L320,180 L0,180 Z" fill="rgba(21,101,192,0.5)"/>
  <!-- 타이틀 -->
  <g font-family="'Pretendard','Noto Sans KR',sans-serif">
    <text x="296" y="148" text-anchor="end" font-size="22" font-weight="900" fill="#76c442">개구리 점프</text>
    <text x="296" y="166" text-anchor="end" font-size="10" font-weight="500" fill="rgba(255,255,255,0.5)" letter-spacing="2">FROG JUMP</text>
  </g>
</svg>
