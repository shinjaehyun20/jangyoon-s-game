<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#040418"/>
      <stop offset="60%" stop-color="#0a0a2e"/>
      <stop offset="100%" stop-color="#14143a"/>
    </linearGradient>
    <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fffde0" stop-opacity="1"/>
      <stop offset="60%" stop-color="#f5c842" stop-opacity="1"/>
      <stop offset="100%" stop-color="#f5c842" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lg1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff8c00" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ff6a00" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lg2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffb347" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ff8c00" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lg3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd700" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#ff9900" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 밤하늘 배경 -->
  <rect width="320" height="180" fill="url(#sky)"/>

  <!-- 별들 -->
  <circle cx="20" cy="18" r="1.2" fill="white" opacity="0.8"/>
  <circle cx="48" cy="9" r="0.9" fill="white" opacity="0.6"/>
  <circle cx="78" cy="22" r="1.4" fill="white" opacity="0.9"/>
  <circle cx="115" cy="11" r="0.8" fill="white" opacity="0.7"/>
  <circle cx="140" cy="25" r="1.1" fill="white" opacity="0.75"/>
  <circle cx="168" cy="8" r="1.3" fill="white" opacity="0.85"/>
  <circle cx="200" cy="30" r="0.7" fill="white" opacity="0.6"/>
  <circle cx="225" cy="12" r="1.0" fill="white" opacity="0.8"/>
  <circle cx="30" cy="55" r="0.9" fill="white" opacity="0.5"/>
  <circle cx="60" cy="42" r="1.1" fill="white" opacity="0.7"/>
  <circle cx="105" cy="38" r="0.8" fill="white" opacity="0.65"/>
  <circle cx="155" cy="45" r="1.2" fill="white" opacity="0.75"/>
  <circle cx="190" cy="18" r="0.9" fill="white" opacity="0.6"/>
  <circle cx="215" cy="50" r="1.0" fill="white" opacity="0.7"/>
  <circle cx="15" cy="80" r="0.8" fill="white" opacity="0.5"/>
  <circle cx="90" cy="65" r="1.1" fill="white" opacity="0.7"/>
  <circle cx="130" cy="72" r="0.7" fill="white" opacity="0.55"/>

  <!-- 달 -->
  <circle cx="270" cy="30" r="22" fill="url(#moonGlow)" opacity="0.25"/>
  <circle cx="270" cy="30" r="14" fill="#fffde0"/>
  <circle cx="270" cy="30" r="14" fill="url(#moonGlow)"/>
  <!-- 달 음영 -->
  <circle cx="274" cy="28" r="5" fill="#f0d060" opacity="0.3"/>
  <circle cx="266" cy="34" r="3" fill="#f0d060" opacity="0.25"/>

  <!-- 등불 1 (크고 밝음, 중앙 왼쪽, 낮은 위치) -->
  <!-- 글로우 -->
  <ellipse cx="95" cy="105" rx="28" ry="22" fill="url(#lg1)"/>
  <!-- 몸체 -->
  <path d="M84,88 C79,96 79,112 84,120 L106,120 C111,112 111,96 106,88 Z" fill="#ff6a00"/>
  <path d="M87,88 C83,96 83,112 87,120 L103,120 C107,112 107,96 103,88 Z" fill="#ffb347"/>
  <!-- 내부 빛 -->
  <ellipse cx="95" cy="108" rx="9" ry="12" fill="#ffe090" opacity="0.6"/>
  <!-- 상단 바 -->
  <rect x="87" y="86" width="16" height="3" rx="1.5" fill="#aa6600"/>
  <!-- 상단 줄 -->
  <line x1="95" y1="83" x2="95" y2="78" stroke="#cc8822" stroke-width="1.5" opacity="0.7"/>
  <!-- 하단 술 -->
  <line x1="88" y1="120" x2="87" y2="128" stroke="#ffaa44" stroke-width="1.5" opacity="0.6"/>
  <line x1="92" y1="120" x2="91" y2="129" stroke="#ffaa44" stroke-width="1.5" opacity="0.6"/>
  <line x1="95" y1="120" x2="95" y2="130" stroke="#ffaa44" stroke-width="1.5" opacity="0.6"/>
  <line x1="98" y1="120" x2="99" y2="129" stroke="#ffaa44" stroke-width="1.5" opacity="0.6"/>
  <line x1="102" y1="120" x2="103" y2="128" stroke="#ffaa44" stroke-width="1.5" opacity="0.6"/>

  <!-- 등불 2 (중간 크기, 오른쪽, 높은 위치) -->
  <ellipse cx="175" cy="70" rx="20" ry="16" fill="url(#lg2)"/>
  <path d="M166,57 C162,63 162,75 166,81 L184,81 C188,75 188,63 184,57 Z" fill="#ff7700"/>
  <path d="M168,57 C165,63 165,75 168,81 L182,81 C185,75 185,63 182,57 Z" fill="#ffcc66"/>
  <ellipse cx="175" cy="70" rx="7" ry="9" fill="#ffe090" opacity="0.55"/>
  <rect x="168" y="55" width="14" height="3" rx="1.5" fill="#aa6600"/>
  <line x1="175" y1="52" x2="175" y2="47" stroke="#cc8822" stroke-width="1.5" opacity="0.7"/>
  <line x1="169" y1="81" x2="168" y2="88" stroke="#ffaa44" stroke-width="1.3" opacity="0.6"/>
  <line x1="173" y1="81" x2="172" y2="89" stroke="#ffaa44" stroke-width="1.3" opacity="0.6"/>
  <line x1="175" y1="81" x2="175" y2="90" stroke="#ffaa44" stroke-width="1.3" opacity="0.6"/>
  <line x1="178" y1="81" x2="179" y2="89" stroke="#ffaa44" stroke-width="1.3" opacity="0.6"/>
  <line x1="181" y1="81" x2="182" y2="88" stroke="#ffaa44" stroke-width="1.3" opacity="0.6"/>

  <!-- 등불 3 (작고 멀리, 왼쪽 상단) -->
  <ellipse cx="50" cy="50" rx="13" ry="10" fill="url(#lg3)"/>
  <path d="M44,41 C41,46 41,55 44,59 L56,59 C59,55 59,46 56,41 Z" fill="#ff8800"/>
  <path d="M46,41 C43,46 43,55 46,59 L54,59 C57,55 57,46 54,41 Z" fill="#ffd066"/>
  <ellipse cx="50" cy="50" rx="5" ry="7" fill="#ffe090" opacity="0.5"/>
  <rect x="44" y="39" width="12" height="2.5" rx="1.2" fill="#aa6600"/>
  <line x1="50" y1="36" x2="50" y2="32" stroke="#cc8822" stroke-width="1.2" opacity="0.7"/>

  <!-- 별 이모지 (떠다니는 별) -->
  <text x="130" y="48" font-size="14" text-anchor="middle" opacity="0.9">⭐</text>
  <text x="215" y="95" font-size="11" text-anchor="middle" opacity="0.8">⭐</text>
  <text x="60" y="100" font-size="10" text-anchor="middle" opacity="0.75">⭐</text>

  <!-- 구름 (장애물 예시) -->
  <ellipse cx="230" cy="130" rx="28" ry="13" fill="#c0cce8" opacity="0.35"/>
  <ellipse cx="215" cy="133" rx="16" ry="11" fill="#c0cce8" opacity="0.35"/>
  <ellipse cx="245" cy="133" rx="16" ry="11" fill="#c0cce8" opacity="0.35"/>

  <!-- 새 이모지 -->
  <text x="148" y="120" font-size="13" text-anchor="middle" opacity="0.8">🐦</text>

  <!-- 경계선 -->
  <rect x="0.5" y="0.5" width="319" height="179" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- 우하단 타이틀 -->
  <g font-family="'Pretendard','Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif">
    <text x="296" y="150" text-anchor="end" font-size="20" font-weight="900" fill="#ffbb44">소원등 띄우기</text>
    <text x="296" y="167" text-anchor="end" font-size="9" font-weight="500" fill="rgba(255,255,255,0.5)" letter-spacing="2">LANTERN FLOAT</text>
  </g>
</svg>
