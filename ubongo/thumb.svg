<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
  
  <defs>
    
    <linearGradient id="amber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbbf24"/><stop offset="1" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="emerald" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#34d399"/><stop offset="1" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="pink" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f472b6"/><stop offset="1" stop-color="#db2777"/>
    </linearGradient>
  
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      
    <stop offset="0" stop-color="#1c1408"/>
    <stop offset="1" stop-color="#0a0604"/>
  
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.04"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="320" height="180" fill="url(#bg)"/>
  <rect width="320" height="180" fill="url(#sheen)"/>
  <rect x="0.5" y="0.5" width="319" height="179" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  
  <!-- 타겟 모양 (점선 아웃라인) -->
  <g transform="translate(30, 24)">
    <g stroke="rgba(234, 179, 8, 0.35)" stroke-width="1" stroke-dasharray="3 2" fill="rgba(255,255,255,0.04)">
      <rect x="26" y="0" width="26" height="26"/>
      <rect x="0" y="26" width="26" height="26"/>
      <rect x="26" y="26" width="26" height="26"/>
      <rect x="52" y="26" width="26" height="26"/>
      <rect x="78" y="26" width="26" height="26"/>
      <rect x="26" y="52" width="26" height="26"/>
      <rect x="52" y="52" width="26" height="26"/>
      <rect x="52" y="78" width="26" height="26"/>
      <rect x="78" y="78" width="26" height="26"/>
      <rect x="26" y="104" width="26" height="26"/>
      <rect x="52" y="104" width="26" height="26"/>
    </g>
  </g>
  <!-- 배치된 조각: L형 (앰버) -->
  <g transform="translate(30, 24)">
    <rect x="1" y="27" width="24" height="24" fill="url(#amber)" stroke="#92400e" stroke-width="0.5"/>
    <rect x="1" y="53" width="24" height="24" fill="url(#amber)" stroke="#92400e" stroke-width="0.5"/>
    <rect x="27" y="53" width="24" height="24" fill="url(#amber)" stroke="#92400e" stroke-width="0.5"/>
  </g>
  <!-- T형 (에메랄드) -->
  <g transform="translate(30, 24)">
    <rect x="79" y="27" width="24" height="24" fill="url(#emerald)" stroke="#065f46" stroke-width="0.5"/>
    <rect x="79" y="53" width="24" height="24" fill="url(#emerald)" stroke="#065f46" stroke-width="0.5"/>
    <rect x="79" y="79" width="24" height="24" fill="url(#emerald)" stroke="#065f46" stroke-width="0.5"/>
    <rect x="53" y="79" width="24" height="24" fill="url(#emerald)" stroke="#065f46" stroke-width="0.5"/>
  </g>
  
  <g font-family="'Pretendard', 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif">
    <text x="296" y="148" text-anchor="end" font-size="22" font-weight="900" fill="#fbbf24" letter-spacing="-0.5">우봉고</text>
    <text x="296" y="166" text-anchor="end" font-size="10" font-weight="500" fill="rgba(255,255,255,0.5)" letter-spacing="2">UBONGO</text>
  </g>
  
</svg>