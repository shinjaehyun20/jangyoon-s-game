<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1a1060"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 배경 -->
  <rect width="320" height="180" fill="url(#bg)"/>

  <!-- 배경 별들 -->
  <circle cx="15" cy="12" r="1" fill="white" opacity="0.5"/>
  <circle cx="45" cy="25" r="0.8" fill="white" opacity="0.4"/>
  <circle cx="80" cy="8" r="1.2" fill="white" opacity="0.6"/>
  <circle cx="110" cy="30" r="0.7" fill="white" opacity="0.3"/>
  <circle cx="150" cy="15" r="1" fill="white" opacity="0.5"/>
  <circle cx="250" cy="10" r="0.9" fill="white" opacity="0.4"/>
  <circle cx="290" cy="22" r="1.1" fill="white" opacity="0.6"/>
  <circle cx="10" cy="70" r="0.8" fill="white" opacity="0.3"/>
  <circle cx="30" cy="110" r="1" fill="white" opacity="0.5"/>
  <circle cx="5" cy="150" r="0.7" fill="white" opacity="0.4"/>
  <circle cx="280" cy="80" r="0.9" fill="white" opacity="0.3"/>
  <circle cx="300" cy="140" r="1.1" fill="white" opacity="0.5"/>
  <circle cx="260" cy="160" r="0.7" fill="white" opacity="0.4"/>

  <!-- 북두칠성 별자리 (메인 시각) -->
  <!-- 선들 -->
  <g stroke="#ffd700" stroke-width="2" opacity="0.7">
    <line x1="50" y1="90" x2="75" y2="72"/>
    <line x1="75" y1="72" x2="105" y2="65"/>
    <line x1="105" y1="65" x2="130" y2="75"/>
    <line x1="130" y1="75" x2="155" y2="95"/>
    <line x1="155" y1="95" x2="178" y2="82"/>
    <line x1="178" y1="82" x2="198" y2="62"/>
  </g>
  <!-- 선 글로우 -->
  <g stroke="#ffd700" stroke-width="6" opacity="0.15">
    <line x1="50" y1="90" x2="75" y2="72"/>
    <line x1="75" y1="72" x2="105" y2="65"/>
    <line x1="105" y1="65" x2="130" y2="75"/>
    <line x1="130" y1="75" x2="155" y2="95"/>
    <line x1="155" y1="95" x2="178" y2="82"/>
    <line x1="178" y1="82" x2="198" y2="62"/>
  </g>
  <!-- 별들 -->
  <g fill="#ffd700" filter="url(#glow)">
    <circle cx="50" cy="90" r="7"/>
    <circle cx="75" cy="72" r="7"/>
    <circle cx="105" cy="65" r="7"/>
    <circle cx="130" cy="75" r="7"/>
    <circle cx="155" cy="95" r="7"/>
    <circle cx="178" cy="82" r="7"/>
    <circle cx="198" cy="62" r="8"/>
  </g>
  <!-- 별 번호 -->
  <g fill="#0a0a1a" font-family="sans-serif" font-size="9" font-weight="bold" text-anchor="middle" dominant-baseline="middle">
    <text x="50" y="90">1</text>
    <text x="75" y="72">2</text>
    <text x="105" y="65">3</text>
    <text x="130" y="75">4</text>
    <text x="155" y="95">5</text>
    <text x="178" y="82">6</text>
    <text x="198" y="62">7</text>
  </g>

  <!-- 완성 sparkle -->
  <text x="220" y="100" font-size="16" opacity="0.9">✨</text>
  <text x="40" y="55" font-size="12" opacity="0.7">✨</text>

  <!-- 내부 경계선 -->
  <rect x="0.5" y="0.5" width="319" height="179" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- 타이틀 -->
  <g font-family="'Pretendard','Noto Sans KR',sans-serif">
    <text x="296" y="148" text-anchor="end" font-size="22" font-weight="900" fill="#ffd700">별자리 잇기</text>
    <text x="296" y="166" text-anchor="end" font-size="10" font-weight="500" fill="rgba(255,255,255,0.5)" letter-spacing="2">STAR CONNECT</text>
  </g>
</svg>
