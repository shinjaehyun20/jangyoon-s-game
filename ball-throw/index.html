<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>공 던지기</title>
  <style>
    :root {
      --bg: #E3F2FD;
      --accent: #1976D2;
      --btn: #1E88E5;
      --text: #1A237E;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100vh; height: 100dvh;
      overflow: hidden;
      touch-action: none;
      background: var(--bg);
      font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
      color: var(--text);
    }
    .wrap {
      width: 100%; max-width: 480px;
      height: 100vh; height: 100dvh;
      display: flex; flex-direction: column;
      padding: 8px 12px 6px; gap: 6px;
      margin: 0 auto;
    }
    h1 {
      font-size: clamp(18px, 5vw, 26px);
      font-weight: 900; text-align: center; flex-shrink: 0;
    }
    .hud {
      display: flex; gap: 8px;
      background: rgba(255,255,255,0.6);
      border-radius: 12px;
      padding: 6px 12px;
      align-items: center; flex-shrink: 0;
    }
    .hud-item {
      flex: 1; text-align: center;
      font-size: clamp(12px, 3.5vw, 16px); font-weight: 700;
    }
    .hud-item span {
      display: block;
      font-size: clamp(16px, 4.5vw, 22px); color: var(--accent);
    }
    canvas {
      flex: 1;
      border-radius: 16px;
      background: white;
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
      touch-action: none;
      display: block;
      width: 100%;
    }
    .aim-hint {
      font-size: clamp(11px, 3vw, 13px);
      color: #888; text-align: center;
      flex-shrink: 0;
    }
    footer {
      display: flex; justify-content: space-between;
      align-items: center; flex-shrink: 0;
    }
    footer small { font-size: clamp(11px, 3vw, 13px); color: #888; }
    .home-link {
      font-size: clamp(12px, 3.5vw, 14px);
      color: var(--accent); text-decoration: none; font-weight: 700;
    }
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.6);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
    }
    .overlay.hidden { display: none; }
    .overlay-card {
      background: white; border-radius: 24px;
      padding: 28px 24px; max-width: 320px;
      width: 90%; text-align: center;
    }
    .overlay-card h2 { font-size: clamp(20px, 6vw, 28px); margin-bottom: 10px; }
    .overlay-card p {
      font-size: clamp(13px, 3.5vw, 16px);
      color: #666; margin-bottom: 18px; line-height: 1.6;
    }
    .btn-start {
      background: var(--btn); color: white;
      border: none; border-radius: 50px;
      padding: 14px 36px;
      font-size: clamp(16px, 4.5vw, 20px);
      font-weight: 900; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.1s;
    }
    .btn-start:active { transform: scale(0.94); }
    .result-score {
      font-size: clamp(40px, 12vw, 60px);
      font-weight: 900; color: var(--accent); margin: 8px 0;
    }
    .star-burst {
      position: fixed; pointer-events: none;
      font-size: 30px;
      animation: burst 0.7s ease-out forwards;
      z-index: 200;
    }
    @keyframes burst {
      0% { transform: scale(0.3); opacity: 1; }
      100% { transform: scale(1.8); opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>🎯 공 던지기</h1>

    <div class="hud">
      <div class="hud-item">점수<span id="scoreVal">0</span></div>
      <div class="hud-item">남은 공<span id="ballsVal">5</span></div>
      <div class="hud-item">최고<span id="bestVal">0</span></div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div class="aim-hint" id="aimHint">화살표 방향으로 공을 던져요!</div>

    <footer>
      <small>드래그해서 방향 조준!</small>
      <a class="home-link" href="../index.html">← 홈으로</a>
    </footer>
  </div>

  <div class="overlay" id="startOverlay">
    <div class="overlay-card">
      <h2>🎯 공 던지기</h2>
      <p>화면을 드래그해서<br>공을 과녁에 던져요!<br>중앙에 맞힐수록 높은 점수!</p>
      <button class="btn-start" id="startBtn">시작!</button>
    </div>
  </div>

  <div class="overlay hidden" id="endOverlay">
    <div class="overlay-card">
      <h2>🎉 게임 종료!</h2>
      <div class="result-score" id="finalScore">0</div>
      <p id="resultMsg"></p>
      <button class="btn-start" id="restartBtn">다시 하기</button>
    </div>
  </div>

  <script>
  (function () {
    'use strict';

    const STORAGE_KEY = 'ball-throw_best';

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    let W, H;

    // 과녁 정의 (점수 높은 순)
    const TARGET_RINGS = [
      { ratio: 0.06, score: 100, color: '#F44336', label: '💥 100점!' },
      { ratio: 0.11, score: 50,  color: '#FF9800', label: '🔥 50점!' },
      { ratio: 0.17, score: 30,  color: '#FFEB3B', label: '⭐ 30점!' },
      { ratio: 0.24, score: 10,  color: '#4CAF50', label: '✅ 10점!' },
      { ratio: 0.32, score: 5,   color: '#2196F3', label: '💧 5점!' },
    ];

    // 과녁 이동 (단계별 속도)
    let target = { x: 0, y: 0, vx: 0, vy: 0 };
    let level = 1;

    // 공 (날아가는 상태)
    let flyingBall = null;

    // 조준 (드래그 상태)
    let aiming = { active: false, startX: 0, startY: 0, endX: 0, endY: 0 };

    let state = {
      score: 0,
      balls: 5,
      running: false,
      animId: null,
    };

    function $(id) { return document.getElementById(id); }

    function resize() {
      const wrap = canvas.parentElement;
      const rect = canvas.getBoundingClientRect();
      W = canvas.width = Math.round(rect.width * devicePixelRatio);
      H = canvas.height = Math.round(rect.height * devicePixelRatio);
      ctx.scale(devicePixelRatio, devicePixelRatio);
    }

    // CSS 픽셀 좌표 (devicePixelRatio 고려)
    function cssW() { return canvas.getBoundingClientRect().width; }
    function cssH() { return canvas.getBoundingClientRect().height; }

    function getCanvasPos(e) {
      const rect = canvas.getBoundingClientRect();
      const src = e.touches ? e.touches[0] : e;
      return { x: src.clientX - rect.left, y: src.clientY - rect.top };
    }

    function initTarget() {
      const cw = cssW(), ch = cssH();
      const margin = cw * 0.18;
      target.x = margin + Math.random() * (cw - margin * 2);
      target.y = ch * 0.3 + Math.random() * (ch * 0.3);
      const speed = 0.8 + level * 0.3;
      const angle = Math.random() * Math.PI * 2;
      target.vx = Math.cos(angle) * speed;
      target.vy = Math.sin(angle) * speed;
    }

    function updateTarget() {
      const cw = cssW(), ch = cssH();
      const r = cw * TARGET_RINGS[TARGET_RINGS.length - 1].ratio;
      target.x += target.vx;
      target.y += target.vy;
      if (target.x - r < 0) { target.x = r; target.vx = Math.abs(target.vx); }
      if (target.x + r > cw) { target.x = cw - r; target.vx = -Math.abs(target.vx); }
      if (target.y - r < 0) { target.y = r; target.vy = Math.abs(target.vy); }
      if (target.y + r > ch) { target.y = ch - r; target.vy = -Math.abs(target.vy); }
    }

    function drawTarget() {
      const cw = cssW();
      for (let i = TARGET_RINGS.length - 1; i >= 0; i--) {
        const ring = TARGET_RINGS[i];
        ctx.beginPath();
        ctx.arc(target.x, target.y, cw * ring.ratio, 0, Math.PI * 2);
        ctx.fillStyle = ring.color;
        ctx.fill();
        ctx.strokeStyle = 'white';
        ctx.lineWidth = 1.5;
        ctx.stroke();
      }
      // 중심 십자
      ctx.strokeStyle = 'white';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(target.x - 6, target.y);
      ctx.lineTo(target.x + 6, target.y);
      ctx.moveTo(target.x, target.y - 6);
      ctx.lineTo(target.x, target.y + 6);
      ctx.stroke();
    }

    // 발사체 공 위치 (포물선)
    function drawFlyingBall() {
      if (!flyingBall) return;
      flyingBall.t += 0.06;
      const t = flyingBall.t;
      if (t > 1) {
        checkHit(flyingBall.tx, flyingBall.ty);
        flyingBall = null;
        return;
      }
      // 포물선: 시작→목표, 위로 호
      const x = flyingBall.sx + (flyingBall.tx - flyingBall.sx) * t;
      const arcY = -Math.sin(Math.PI * t) * flyingBall.arc;
      const y = flyingBall.sy + (flyingBall.ty - flyingBall.sy) * t + arcY;
      flyingBall.cx = x;
      flyingBall.cy = y;
      // 크기 커짐 (가까워질수록 커짐)
      const radius = 8 + t * 8;
      ctx.beginPath();
      ctx.arc(x, y, radius, 0, Math.PI * 2);
      ctx.fillStyle = '#FF5722';
      ctx.fill();
      ctx.strokeStyle = '#BF360C';
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    function drawAimArrow() {
      if (!aiming.active || flyingBall) return;
      const dx = aiming.endX - aiming.startX;
      const dy = aiming.endY - aiming.startY;
      const len = Math.sqrt(dx * dx + dy * dy);
      if (len < 10) return;
      const nx = dx / len, ny = dy / len;
      // 화살표 반대 방향으로 궤적 표시
      const tx = aiming.startX - nx * Math.min(len, 80);
      const ty = aiming.startY - ny * Math.min(len, 80);

      // 점선
      ctx.save();
      ctx.setLineDash([6, 4]);
      ctx.strokeStyle = '#1976D2';
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.moveTo(aiming.startX, aiming.startY);
      ctx.lineTo(tx, ty);
      ctx.stroke();
      ctx.restore();

      // 화살촉
      const arrLen = 14;
      const angle = Math.atan2(ty - aiming.startY, tx - aiming.startX);
      ctx.save();
      ctx.translate(tx, ty);
      ctx.rotate(angle);
      ctx.fillStyle = '#1976D2';
      ctx.beginPath();
      ctx.moveTo(arrLen, 0);
      ctx.lineTo(-arrLen * 0.5, -6);
      ctx.lineTo(-arrLen * 0.5, 6);
      ctx.closePath();
      ctx.fill();
      ctx.restore();

      // 공 위치 표시
      ctx.beginPath();
      ctx.arc(aiming.startX, aiming.startY, 10, 0, Math.PI * 2);
      ctx.fillStyle = '#FF5722';
      ctx.fill();
      ctx.strokeStyle = '#BF360C';
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    function checkHit(bx, by) {
      const cw = cssW();
      const dx = bx - target.x;
      const dy = by - target.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      let scored = 0;
      for (let i = 0; i < TARGET_RINGS.length; i++) {
        if (dist <= cw * TARGET_RINGS[i].ratio) {
          scored = TARGET_RINGS[i].score;
          spawnBurst(bx, by, TARGET_RINGS[i].label);
          break;
        }
      }
      if (scored === 0) {
        spawnBurst(bx, by, '😅 빗나감!');
      }
      state.score += scored;
      $('scoreVal').textContent = state.score;
      state.balls--;
      $('ballsVal').textContent = state.balls;
      const best = parseInt(localStorage.getItem(STORAGE_KEY) || '0');
      if (state.score > best) localStorage.setItem(STORAGE_KEY, String(state.score));
      $('bestVal').textContent = Math.max(state.score, best);
      if (scored > 0) level = Math.min(level + 1, 8);
      initTarget();
      if (state.balls <= 0) {
        setTimeout(endGame, 600);
      }
    }

    function spawnBurst(x, y, label) {
      const rect = canvas.getBoundingClientRect();
      const el = document.createElement('div');
      el.className = 'star-burst';
      el.textContent = label;
      el.style.left = (rect.left + x - 40) + 'px';
      el.style.top = (rect.top + y - 20) + 'px';
      el.style.fontSize = '20px';
      document.body.appendChild(el);
      setTimeout(() => {
        if (el.parentNode) el.parentNode.removeChild(el);
      }, 800);
    }

    function throwBall() {
      const dx = aiming.endX - aiming.startX;
      const dy = aiming.endY - aiming.startY;
      const len = Math.sqrt(dx * dx + dy * dy);
      if (len < 15) return;
      // 반대 방향으로 던짐
      const power = Math.min(len, 120) / 120;
      const nx = -dx / len, ny = -dy / len;
      const range = cssW() * 0.5 + power * cssW() * 0.5;
      flyingBall = {
        sx: aiming.startX,
        sy: aiming.startY,
        tx: aiming.startX + nx * range,
        ty: aiming.startY + ny * range,
        arc: cssH() * 0.15 * power,
        t: 0,
        cx: aiming.startX,
        cy: aiming.startY,
      };
    }

    function gameLoop() {
      if (!state.running) return;
      const cw = cssW(), ch = cssH();
      ctx.clearRect(0, 0, cw, ch);

      // 배경 그라디언트
      const grad = ctx.createLinearGradient(0, 0, 0, ch);
      grad.addColorStop(0, '#E3F2FD');
      grad.addColorStop(1, '#BBDEFB');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, cw, ch);

      // 땅선
      ctx.strokeStyle = 'rgba(0,0,0,0.1)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(0, ch * 0.85);
      ctx.lineTo(cw, ch * 0.85);
      ctx.stroke();

      updateTarget();
      drawTarget();
      drawAimArrow();
      drawFlyingBall();

      // 발사 위치 표시 (공 없을 때)
      if (!flyingBall && !aiming.active) {
        ctx.beginPath();
        ctx.arc(cw / 2, ch * 0.78, 12, 0, Math.PI * 2);
        ctx.fillStyle = '#FF5722';
        ctx.fill();
        ctx.strokeStyle = '#BF360C';
        ctx.lineWidth = 2;
        ctx.stroke();
      }

      state.animId = requestAnimationFrame(gameLoop);
    }

    // 포인터 이벤트
    canvas.addEventListener('pointerdown', e => {
      if (!state.running || flyingBall) return;
      const pos = getCanvasPos(e);
      aiming.active = true;
      aiming.startX = pos.x;
      aiming.startY = pos.y;
      aiming.endX = pos.x;
      aiming.endY = pos.y;
    });

    canvas.addEventListener('pointermove', e => {
      if (!aiming.active) return;
      const pos = getCanvasPos(e);
      aiming.endX = pos.x;
      aiming.endY = pos.y;
    });

    canvas.addEventListener('pointerup', e => {
      if (!aiming.active) return;
      aiming.active = false;
      if (!flyingBall) throwBall();
    });

    canvas.addEventListener('pointercancel', () => {
      aiming.active = false;
    });

    function endGame() {
      state.running = false;
      cancelAnimationFrame(state.animId);
      const best = parseInt(localStorage.getItem(STORAGE_KEY) || '0');
      $('finalScore').textContent = state.score + '점';
      const msg = state.score >= 300 ? '🏆 슈퍼 스타!' :
                  state.score >= 150 ? '🎯 잘 했어요!' : '💪 다시 도전!';
      $('resultMsg').textContent = msg + ' 최고기록: ' + best + '점';
      $('endOverlay').classList.remove('hidden');
    }

    function startGame() {
      cancelAnimationFrame(state.animId);
      state.score = 0;
      state.balls = 5;
      state.running = true;
      flyingBall = null;
      aiming.active = false;
      level = 1;
      $('scoreVal').textContent = '0';
      $('ballsVal').textContent = '5';
      const best = parseInt(localStorage.getItem(STORAGE_KEY) || '0');
      $('bestVal').textContent = String(best);
      initTarget();
      gameLoop();
    }

    function init() {
      resize();
      window.addEventListener('resize', () => {
        resize();
        if (!state.running) {
          ctx.clearRect(0, 0, cssW(), cssH());
        }
      });
    }

    $('startBtn').addEventListener('pointerdown', () => {
      $('startOverlay').classList.add('hidden');
      init();
      startGame();
    });

    $('restartBtn').addEventListener('pointerdown', () => {
      $('endOverlay').classList.add('hidden');
      startGame();
    });
  })();
  </script>
</body>
</html>
