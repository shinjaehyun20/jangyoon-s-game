<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" width="320" height="180">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2c4470"/>
      <stop offset="1" stop-color="#1b2a4a"/>
    </linearGradient>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff7e6"/>
      <stop offset="1" stop-color="#ffe7a8"/>
    </linearGradient>
  </defs>
  <rect width="320" height="180" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="319" height="179" fill="none" stroke="rgba(255,255,255,0.08)"/>

  <!-- 3x3 슬라이딩 퍼즐 미니어처 (좌측) -->
  <g transform="translate(28,34)">
    <rect x="-8" y="-8" width="128" height="128" rx="14" fill="rgba(0,0,0,0.25)"/>
    <!-- 8 tiles + 1 empty (bottom-right) -->
    <g font-family="'Pretendard','Noto Sans KR',sans-serif" font-size="22" text-anchor="middle">
      <!-- row 1 -->
      <rect x="0"  y="0"  width="36" height="36" rx="8" fill="url(#tile)"/><text x="18"  y="26" >🦁</text>
      <rect x="40" y="0"  width="36" height="36" rx="8" fill="url(#tile)"/><text x="58"  y="26" >🐯</text>
      <rect x="80" y="0"  width="36" height="36" rx="8" fill="url(#tile)"/><text x="98"  y="26" >🐱</text>
      <!-- row 2 -->
      <rect x="0"  y="40" width="36" height="36" rx="8" fill="url(#tile)"/><text x="18"  y="66" >🦊</text>
      <rect x="40" y="40" width="36" height="36" rx="8" fill="url(#tile)"/><text x="58"  y="66" >🐶</text>
      <rect x="80" y="40" width="36" height="36" rx="8" fill="url(#tile)"/><text x="98"  y="66" >🐻</text>
      <!-- row 3 -->
      <rect x="0"  y="80" width="36" height="36" rx="8" fill="url(#tile)"/><text x="18"  y="106">🐼</text>
      <rect x="40" y="80" width="36" height="36" rx="8" fill="url(#tile)"/><text x="58"  y="106">🐨</text>
      <!-- empty slot -->
      <rect x="80" y="80" width="36" height="36" rx="8" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.18)" stroke-dasharray="4 3"/>
    </g>
    <!-- slide arrow hint -->
    <text x="98" y="103" font-size="20" fill="#4dd0e1" text-anchor="middle">←</text>
  </g>

  <!-- 타이틀 (우하단) -->
  <g font-family="'Pretendard','Noto Sans KR',sans-serif">
    <text x="296" y="148" text-anchor="end" font-size="22" font-weight="900" fill="#ffcc4d">그림 밀기 퍼즐</text>
    <text x="296" y="166" text-anchor="end" font-size="10" font-weight="500" fill="rgba(255,255,255,0.5)" letter-spacing="2">SLIDE PUZZLE</text>
  </g>
</svg>
