<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#aee0ff"/>
      <stop offset="100%" stop-color="#dff4ff"/>
    </linearGradient>
    <radialGradient id="fire" cx="50%" cy="65%" r="60%">
      <stop offset="0%"  stop-color="#fff3b0"/>
      <stop offset="45%" stop-color="#ff9b3d"/>
      <stop offset="100%" stop-color="#ff5a2c"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 배경 하늘 -->
  <rect width="320" height="180" fill="url(#sky)"/>
  <rect y="135" width="320" height="45" fill="#8fd17a"/>

  <!-- 불 -->
  <g transform="translate(225,70)">
    <ellipse cx="0" cy="0" rx="46" ry="46" fill="url(#glow)"/>
    <path d="M0,-34 C16,-16 24,-4 18,14 C14,26 -14,26 -18,14 C-24,-4 -14,-14 -6,-6 C-10,-20 -2,-28 0,-34 Z" fill="url(#fire)"/>
    <path d="M0,-14 C8,-4 10,4 6,12 C2,18 -8,18 -8,8 C-8,0 -4,-8 0,-14 Z" fill="#ffe27a"/>
  </g>

  <!-- 소방차 -->
  <g transform="translate(40,86)">
    <rect x="0" y="14" width="120" height="44" rx="8" fill="#e23b3b"/>
    <rect x="92" y="2" width="40" height="40" rx="6" fill="#e23b3b"/>
    <rect x="98" y="8" width="28" height="20" rx="3" fill="#bfe9ff"/>
    <rect x="0" y="30" width="120" height="10" fill="#fff" opacity="0.85"/>
    <circle cx="28" cy="64" r="13" fill="#2b2b2b"/>
    <circle cx="28" cy="64" r="5" fill="#cfcfcf"/>
    <circle cx="104" cy="64" r="13" fill="#2b2b2b"/>
    <circle cx="104" cy="64" r="5" fill="#cfcfcf"/>
    <rect x="50" y="-6" width="14" height="8" rx="2" fill="#3aa0ff"/>
    <!-- 물줄기 -->
    <path d="M132,18 q40,-6 70,18" stroke="#4ec3ff" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.9"/>
    <circle cx="196" cy="40" r="6" fill="#4ec3ff"/>
    <circle cx="180" cy="30" r="4" fill="#7fd6ff"/>
  </g>

  <!-- 제목 -->
  <text x="160" y="168" text-anchor="middle" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif" font-size="22" font-weight="800" fill="#1f5fa0">🚒 소방차 출동</text>
</svg>
