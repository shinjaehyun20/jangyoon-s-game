<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>그림자 맞추기</title>
  <style>
    :root {
      --bg: #1b2838;
      --bg2: #2a3a50;
      --card: #22304a;
      --accent: #f4a261;
      --accent2: #e76f51;
      --blue: #4db8ff;
      --green: #56d670;
      --text: #ffffff;
      --shadow-color: rgba(0,0,0,0.75);
      --btn-shadow: 0 4px 18px rgba(244,162,97,0.45);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100vh; height: 100dvh;
      overflow: hidden;
      touch-action: manipulation;
      font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .wrap {
      width: 100%; max-width: 480px;
      height: 100vh; height: 100dvh;
      display: flex; flex-direction: column;
      padding: 12px 16px 10px;
      gap: 8px;
      margin: 0 auto;
    }
    h1 {
      text-align: center;
      font-size: clamp(20px, 5.5vw, 27px);
      font-weight: 900;
    }
    /* HUD */
    .hud {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255,255,255,0.07);
      border-radius: 14px;
      padding: 8px 16px;
    }
    .hud-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }
    .hud-label { font-size: 10px; opacity: 0.55; letter-spacing: 1px; }
    .hud-value {
      font-size: clamp(18px, 4.5vw, 24px);
      font-weight: 900;
      color: var(--accent);
    }
    /* 진행 바 */
    .progress-bar {
      width: 100%; height: 6px;
      background: rgba(255,255,255,0.12);
      border-radius: 3px; overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 3px;
      transition: width 0.3s ease;
    }
    /* 게임 영역 */
    #gameArea {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
    }
    /* 피드백 */
    .feedback-area {
      min-height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .feedback-text {
      font-size: clamp(17px, 4.5vw, 24px);
      font-weight: 900;
      transition: opacity 0.2s;
    }
    .feedback-text.correct { color: var(--green); }
    .feedback-text.wrong { color: var(--accent2); }
    .feedback-text.hidden { opacity: 0; }
    /* 그림자 표시 영역 */
    .shadow-area {
      background: var(--card);
      border-radius: 20px;
      padding: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid rgba(255,255,255,0.07);
      width: 100%;
    }
    .shadow-display {
      width: 120px;
      height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .shadow-emoji {
      font-size: 88px;
      line-height: 1;
      filter: brightness(0) saturate(0) opacity(0.75);
      transform: scaleX(1.05);
      user-select: none;
    }
    /* 힌트 라벨 */
    .shadow-hint {
      font-size: 11px;
      opacity: 0.4;
      letter-spacing: 2px;
      margin-top: 6px;
      text-align: center;
    }
    /* 선택지 그리드 */
    .choices {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      width: 100%;
    }
    .choice-btn {
      background: var(--bg2);
      border: 2px solid rgba(255,255,255,0.1);
      border-radius: 18px;
      color: var(--text);
      font-size: clamp(36px, 9vw, 52px);
      min-height: 68px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.1s, background 0.15s, border-color 0.15s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .choice-btn:active { transform: scale(0.92); }
    .choice-btn.correct {
      background: rgba(86,214,112,0.25);
      border-color: var(--green);
    }
    .choice-btn.wrong {
      background: rgba(231,111,81,0.25);
      border-color: var(--accent2);
    }
    .choice-btn:disabled { pointer-events: none; }
    /* Footer */
    footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 4px;
    }
    footer small { font-size: 11px; opacity: 0.4; }
    .home-link {
      font-size: 13px;
      color: rgba(255,255,255,0.45);
      text-decoration: none;
      padding: 6px 10px;
    }
    /* 오버레이 */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 20px;
    }
    .overlay.hidden { display: none; }
    .overlay-card {
      background: var(--card);
      border-radius: 28px;
      padding: 32px 28px;
      text-align: center;
      max-width: 360px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.08);
    }
    .overlay-card h2 { font-size: clamp(22px, 6vw, 30px); font-weight: 900; margin-bottom: 10px; }
    .overlay-card p { font-size: clamp(13px, 3.5vw, 16px); opacity: 0.7; line-height: 1.6; margin-bottom: 8px; }
    .result-score { font-size: clamp(48px, 12vw, 72px); font-weight: 900; color: var(--accent); margin: 12px 0; line-height: 1; }
    .result-stars { font-size: 28px; margin-bottom: 8px; }
    .best-badge {
      background: var(--accent2);
      color: white;
      font-size: 12px; font-weight: 700;
      padding: 4px 12px;
      border-radius: 20px;
      display: inline-block;
      margin-bottom: 10px;
    }
    .btn-start {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 16px;
      font-size: clamp(16px, 4.5vw, 20px);
      font-weight: 900;
      padding: 14px 36px;
      cursor: pointer;
      min-height: 52px;
      min-width: 160px;
      box-shadow: var(--btn-shadow);
      transition: transform 0.1s;
      margin-top: 8px;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-start:active { transform: scale(0.95); }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>🌑 그림자 맞추기</h1>

    <div class="hud">
      <div class="hud-item">
        <span class="hud-label">점수</span>
        <span class="hud-value" id="score">0</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">문제</span>
        <span class="hud-value" id="questionNum">0/10</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">최고</span>
        <span class="hud-value" id="bestScore">0</span>
      </div>
    </div>

    <div id="gameArea">
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>

      <div class="shadow-area">
        <div>
          <div class="shadow-display">
            <span class="shadow-emoji" id="shadowEmoji">🐶</span>
          </div>
          <div class="shadow-hint">이 그림자의 정체는?</div>
        </div>
      </div>

      <div class="feedback-area">
        <div class="feedback-text hidden" id="feedbackText">✅ 맞았어요!</div>
      </div>

      <div class="choices" id="choicesArea"></div>
    </div>

    <footer>
      <small>그림자를 보고 맞는 그림을 골라요</small>
      <a class="home-link" href="../index.html">← 홈으로</a>
    </footer>
  </div>

  <!-- 시작 오버레이 -->
  <div class="overlay" id="startOverlay">
    <div class="overlay-card">
      <h2>🌑 그림자 맞추기</h2>
      <p>그림자를 보고 어떤 그림인지<br>맞혀봐요! 👀</p>
      <p style="font-size:28px; margin: 12px 0;">🐶 🐱 🐻 🐰</p>
      <button class="btn-start" id="startBtn">시작!</button>
    </div>
  </div>

  <!-- 결과 오버레이 -->
  <div class="overlay hidden" id="endOverlay">
    <div class="overlay-card">
      <h2>🎉 완료!</h2>
      <div class="result-stars" id="resultStars">⭐⭐⭐</div>
      <div class="result-score" id="finalScore">0</div>
      <p id="resultMsg">훌륭해요!</p>
      <div id="bestBadge"></div>
      <button class="btn-start" id="restartBtn">다시 하기</button>
    </div>
  </div>

  <script>
  (function () {
    'use strict';

    const CONFIG = {
      TOTAL_QUESTIONS: 10,
      CHOICE_COUNT: 4,
      NEXT_DELAY: 750,
      STORAGE_KEY: 'shadow-match_best',
    };

    // 동물, 탈것, 음식, 자연 카테고리별 이모지
    const EMOJI_POOL = [
      // 동물
      '🐶', '🐱', '🐻', '🐰', '🦊', '🐸', '🐧', '🦁',
      '🐼', '🐨', '🐯', '🦄', '🐮', '🐷', '🐔', '🦆',
      // 탈것
      '🚗', '🚀', '✈️', '🚂', '🚲', '🚁', '⛵', '🏎️',
      // 음식/과일
      '🍎', '🍌', '🍓', '🍕', '🎂', '🍦', '🍩', '🌽',
      // 자연/기타
      '⭐', '🌙', '☀️', '🌈', '⚽', '🎈', '🎀', '🏆',
    ];

    const state = {
      score: 0,
      questionIndex: 0,
      currentAnswer: '',
      answered: false,
      usedEmojis: [],
    };

    const $ = id => document.getElementById(id);

    function getBest() {
      return parseInt(localStorage.getItem(CONFIG.STORAGE_KEY) || '0', 10);
    }
    function saveBest(val) {
      if (val > getBest()) localStorage.setItem(CONFIG.STORAGE_KEY, String(val));
    }

    function updateHUD() {
      $('score').textContent = state.score;
      $('questionNum').textContent = `${state.questionIndex}/${CONFIG.TOTAL_QUESTIONS}`;
      $('bestScore').textContent = getBest();
      const pct = (state.questionIndex / CONFIG.TOTAL_QUESTIONS) * 100;
      $('progressFill').style.width = pct + '%';
    }

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function pickUniqueEmoji() {
      const available = EMOJI_POOL.filter(e => !state.usedEmojis.includes(e));
      if (available.length === 0) {
        state.usedEmojis = [];
        return EMOJI_POOL[Math.floor(Math.random() * EMOJI_POOL.length)];
      }
      const pick = available[Math.floor(Math.random() * available.length)];
      state.usedEmojis.push(pick);
      return pick;
    }

    function makeWrongChoices(correct) {
      const pool = EMOJI_POOL.filter(e => e !== correct);
      const shuffled = shuffle([...pool]);
      return shuffled.slice(0, CONFIG.CHOICE_COUNT - 1);
    }

    function showQuestion() {
      if (state.questionIndex >= CONFIG.TOTAL_QUESTIONS) {
        endGame();
        return;
      }
      state.answered = false;
      const answer = pickUniqueEmoji();
      state.currentAnswer = answer;

      $('shadowEmoji').textContent = answer;

      const feedbackEl = $('feedbackText');
      feedbackEl.classList.add('hidden');

      const wrongs = makeWrongChoices(answer);
      const choices = shuffle([answer, ...wrongs]);

      const area = $('choicesArea');
      area.innerHTML = '';
      choices.forEach(emoji => {
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.textContent = emoji;
        btn.addEventListener('pointerdown', () => handleChoice(btn, emoji));
        area.appendChild(btn);
      });

      updateHUD();
    }

    function handleChoice(btn, val) {
      if (state.answered) return;
      state.answered = true;

      const allBtns = document.querySelectorAll('.choice-btn');
      allBtns.forEach(b => b.disabled = true);

      const feedbackEl = $('feedbackText');
      feedbackEl.classList.remove('hidden', 'correct', 'wrong');

      if (val === state.currentAnswer) {
        state.score += 10;
        btn.classList.add('correct');
        feedbackEl.textContent = '✅ 맞았어요!';
        feedbackEl.classList.add('correct');
      } else {
        btn.classList.add('wrong');
        feedbackEl.textContent = `❌ 정답은 ${state.currentAnswer}!`;
        feedbackEl.classList.add('wrong');
        allBtns.forEach(b => {
          if (b.textContent === state.currentAnswer) b.classList.add('correct');
        });
      }

      state.questionIndex++;
      updateHUD();

      setTimeout(showQuestion, CONFIG.NEXT_DELAY);
    }

    function getStars(score) {
      if (score >= 90) return '⭐⭐⭐';
      if (score >= 60) return '⭐⭐';
      return '⭐';
    }

    function endGame() {
      saveBest(state.score);
      $('finalScore').textContent = state.score;
      $('resultStars').textContent = getStars(state.score);
      const msgs = [
        [100, '완벽해요! 그림자 탐정! 🕵️'],
        [80, '정말 잘했어요! 눈이 좋네요! 👀'],
        [60, '잘했어요! 더 잘 할 수 있어요! 😊'],
        [0, '괜찮아요! 다시 도전해봐요! 💪'],
      ];
      const msg = msgs.find(([min]) => state.score >= min);
      $('resultMsg').textContent = msg ? msg[1] : '';

      const best = getBest();
      const badgeEl = $('bestBadge');
      if (state.score >= best) {
        badgeEl.innerHTML = '<div class="best-badge">🏆 새 최고 기록!</div>';
      } else {
        badgeEl.innerHTML = `<p style="font-size:13px;opacity:0.5">최고: ${best}점</p>`;
      }

      $('endOverlay').classList.remove('hidden');
    }

    function startGame() {
      state.score = 0;
      state.questionIndex = 0;
      state.answered = false;
      state.usedEmojis = [];
      $('startOverlay').classList.add('hidden');
      $('endOverlay').classList.add('hidden');
      updateHUD();
      showQuestion();
    }

    $('startBtn').addEventListener('pointerdown', startGame);
    $('restartBtn').addEventListener('pointerdown', () => {
      $('endOverlay').classList.add('hidden');
      $('startOverlay').classList.remove('hidden');
    });

    $('bestScore').textContent = getBest();

  })();
  </script>
</body>
</html>
