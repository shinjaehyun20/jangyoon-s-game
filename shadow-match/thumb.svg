<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1b2838"/>
      <stop offset="100%" stop-color="#2a3a50"/>
    </linearGradient>
    <filter id="shadow">
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncR type="linear" slope="0"/>
        <feFuncG type="linear" slope="0"/>
        <feFuncB type="linear" slope="0"/>
        <feFuncA type="linear" slope="0.8"/>
      </feComponentTransfer>
    </filter>
  </defs>
  <!-- 배경 -->
  <rect width="320" height="180" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="319" height="179" fill="none" stroke="rgba(255,255,255,0.08)"/>

  <!-- 그림자 카드 (좌측) -->
  <rect x="18" y="24" width="120" height="120" rx="18" fill="rgba(34,48,74,0.9)"/>
  <!-- 그림자 이모지 (어둡게) -->
  <text x="78" y="92" text-anchor="middle" font-size="64" opacity="0.8" filter="url(#shadow)">🐶</text>
  <text x="78" y="126" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.35)" font-family="sans-serif" letter-spacing="1">그림자</text>

  <!-- 화살표 -->
  <text x="158" y="90" text-anchor="middle" font-size="22" fill="rgba(255,255,255,0.4)">→</text>

  <!-- 보기 그리드 (우측) -->
  <rect x="175" y="24" width="65" height="55" rx="12" fill="rgba(42,58,80,0.9)"/>
  <text x="207" y="62" text-anchor="middle" font-size="34">🐶</text>

  <rect x="248" y="24" width="55" height="55" rx="12" fill="rgba(42,58,80,0.9)"/>
  <text x="275" y="62" text-anchor="middle" font-size="34">🐱</text>

  <rect x="175" y="87" width="65" height="55" rx="12" fill="rgba(42,58,80,0.9)"/>
  <text x="207" y="125" text-anchor="middle" font-size="34">🦊</text>

  <rect x="248" y="87" width="55" height="55" rx="12" fill="rgba(42,58,80,0.9)"/>
  <text x="275" y="125" text-anchor="middle" font-size="34">🐻</text>

  <!-- 정답 표시 (첫 번째 버튼에 테두리) -->
  <rect x="175" y="24" width="65" height="55" rx="12" fill="none" stroke="#56d670" stroke-width="2.5"/>

  <!-- 우하단 타이틀 -->
  <g font-family="'Pretendard','Noto Sans KR',sans-serif">
    <text x="296" y="148" text-anchor="end" font-size="20" font-weight="900" fill="#f4a261">그림자 맞추기</text>
    <text x="296" y="166" text-anchor="end" font-size="10" font-weight="500" fill="rgba(255,255,255,0.5)" letter-spacing="2">SHADOW MATCH</text>
  </g>
</svg>
