<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>🐰 토끼의 당근 찾기 미로</title>
  <style>
    :root {
      --bg: #e8f5e9;
      --accent: #66bb6a;
      --accent2: #ef9a9a;
      --text: #2e7d32;
      --wall: #6d4c41;
      --path: #f1f8e9;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100vh; height: 100dvh;
      overflow: hidden;
      touch-action: manipulation;
      background: var(--bg);
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    }
    .wrap {
      width: 100%; max-width: 480px;
      height: 100vh; height: 100dvh;
      display: flex; flex-direction: column;
      padding: 8px 12px 6px; gap: 6px;
      margin: 0 auto;
    }
    h1 {
      text-align: center;
      font-size: clamp(17px, 4.8vw, 24px);
      color: var(--text);
      font-weight: 900;
    }
    .hud {
      display: flex;
      justify-content: space-between;
      background: rgba(255,255,255,0.7);
      border-radius: 12px;
      padding: 5px 14px;
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
    }
    .hud span { color: var(--accent); }
    /* 미로 캔버스 */
    #mazeWrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 0;
    }
    #mazeCanvas {
      border-radius: 16px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
      background: var(--path);
      touch-action: none;
      display: block;
      max-width: 100%;
      max-height: 100%;
    }
    /* 방향 패드 */
    #dpad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 4px;
      width: 150px;
      height: 110px;
      margin: 0 auto;
    }
    .dpad-btn {
      border: none;
      border-radius: 12px;
      background: rgba(255,255,255,0.8);
      font-size: 20px;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.12);
      transition: transform 0.1s, background 0.1s;
      touch-action: manipulation;
    }
    .dpad-btn:active { transform: scale(0.88); background: #c8e6c9; }
    .dpad-center { background: #f1f8e9; font-size: 14px; color: var(--text); font-weight: 700; }
    footer {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: #888;
    }
    footer a { color: var(--accent); text-decoration: none; }
    /* 오버레이 */
    .overlay {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.6);
      z-index: 50;
    }
    .overlay.hidden { display: none; }
    .overlay-card {
      background: #f9fbe7;
      border-radius: 24px;
      padding: 28px 24px;
      text-align: center;
      max-width: 300px; width: 90%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    .overlay-card h2 { font-size: 26px; margin-bottom: 10px; color: var(--text); }
    .overlay-card p  { font-size: 14px; color: #555; margin-bottom: 16px; line-height: 1.6; }
    .result-score { font-size: 42px; font-weight: 900; color: var(--accent); margin: 8px 0; }
    .btn-start {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 20px;
      padding: 12px 36px;
      font-size: 18px;
      font-weight: 900;
      cursor: pointer;
    }
    #levelBtns { display: flex; gap: 8px; margin-bottom: 16px; }
    .lvl-btn {
      flex: 1;
      padding: 8px 0;
      border: none; border-radius: 14px;
      font-size: 13px; font-weight: 700; cursor: pointer;
      background: #dcedc8; color: var(--text);
    }
    .lvl-btn.sel { background: var(--accent); color: white; }
    /* 축하 파티클 */
    #celebrate {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 100; overflow: hidden;
    }
    .cp {
      position: absolute;
      animation: cpFly 1.2s ease-out forwards;
    }
    @keyframes cpFly {
      0%   { transform: translateY(0) scale(1); opacity: 1; }
      100% { transform: translateY(-260px) scale(0.2) rotate(720deg); opacity: 0; }
    }
    .btn-home {
      display: block; margin-top: 10px;
      background: #374151;
      color: #fff;
      border: none; border-radius: 14px;
      font-size: 17px; font-weight: 700;
      padding: 14px 20px;
      cursor: pointer;
      min-height: 56px;
      width: 100%;
      text-decoration: none;
      text-align: center;
      box-sizing: border-box;
    }
    .btn-home:active { transform: scale(0.97); }
  </style>
</head>
<body>
<div class="wrap">
  <h1>🐰 토끼의 당근 찾기 미로</h1>

  <div class="hud">
    <div>이동 <span id="moves">0</span>칸</div>
    <div>레벨 <span id="levelDisp">1</span></div>
    <div>최고 <span id="best">-</span>칸</div>
  </div>

  <div id="mazeWrap">
    <canvas id="mazeCanvas"></canvas>
  </div>

  <!-- 방향 패드 -->
  <div id="dpad">
    <div></div>
    <button class="dpad-btn" id="btnUp">⬆</button>
    <div></div>
    <button class="dpad-btn" id="btnLeft">⬅</button>
    <button class="dpad-btn dpad-center" id="btnReset">↺</button>
    <button class="dpad-btn" id="btnRight">➡</button>
    <div></div>
    <button class="dpad-btn" id="btnDown">⬇</button>
    <div></div>
  </div>

  <footer>
    <small>토끼를 당근까지 안내해줘요! 🥕</small>
    <a href="../index.html">🏠 게임 목록으로</a>
  </footer>
</div>

<div id="celebrate"></div>

<!-- 시작 오버레이 -->
<div class="overlay" id="startOverlay">
  <div class="overlay-card">
    <h2>🐰 미로 탈출</h2>
    <p>토끼가 당근🥕을 찾아가도록<br>화살표 버튼으로 이동해줘요!<br>벽을 피해 지나가봐요 🌿</p>
    <div id="levelBtns">
      <button class="lvl-btn sel" data-lv="1">쉬움</button>
      <button class="lvl-btn" data-lv="2">보통</button>
      <button class="lvl-btn" data-lv="3">어려움</button>
    </div>
    <button class="btn-start" id="startBtn">시작!</button>
  </div>
</div>

<!-- 완료 오버레이 -->
<div class="overlay hidden" id="endOverlay">
  <div class="overlay-card">
    <h2>🥕 당근 발견!</h2>
    <div class="result-score" id="finalMoves"></div>
    <p id="resultMsg"></p>
    <button class="btn-start" id="restartBtn">다시 하기</button>
    <a class="btn-home" href="../index.html">🏠 게임 목록으로</a>
  </div>
</div>

<script>
(function () {
  'use strict';

  // ── 미로 데이터 ─────────────────────────────────────────────────────────
  // 각 셀: 비트마스크 N=1 E=2 S=4 W=8 (열린 방향)
  // 미로는 재귀 백트래킹으로 런타임 생성

  const LEVEL_SIZE = [
    null,        // 인덱스 0 unused
    { cols: 7,  rows: 7  },   // 레벨 1 (쉬움)
    { cols: 9,  rows: 11 },   // 레벨 2 (보통)
    { cols: 13, rows: 15 }    // 레벨 3 (어려움)
  ];

  const DIR = {
    N: { dx: 0,  dy: -1, bit: 1,  opp: 4 },
    E: { dx: 1,  dy: 0,  bit: 2,  opp: 8 },
    S: { dx: 0,  dy: 1,  bit: 4,  opp: 1 },
    W: { dx: -1, dy: 0,  bit: 8,  opp: 2 }
  };
  const DIR_KEYS = ['N','E','S','W'];

  // ── 상태 ──────────────────────────────────────────────────────────────────
  const state = {
    level: 1,
    moves: 0,
    rabbit: { x: 0, y: 0 },
    goal: { x: 0, y: 0 },
    maze: null,
    cols: 0, rows: 0,
    trail: [],   // 지나온 경로
    best: {}     // 레벨별 최고 (최소 이동 수)
  };

  // 저장된 최고 기록 로드
  [1,2,3].forEach(lv => {
    const v = localStorage.getItem('maze_best_lv' + lv);
    state.best[lv] = v ? parseInt(v) : null;
  });

  // ── DOM ───────────────────────────────────────────────────────────────────
  const canvas   = document.getElementById('mazeCanvas');
  const ctx      = canvas.getContext('2d');
  const mazeWrap = document.getElementById('mazeWrap');
  const movesEl  = document.getElementById('moves');
  const levelEl  = document.getElementById('levelDisp');
  const bestEl   = document.getElementById('best');
  const celebDiv = document.getElementById('celebrate');

  const startOverlay = document.getElementById('startOverlay');
  const endOverlay   = document.getElementById('endOverlay');
  const finalMovesEl = document.getElementById('finalMoves');
  const resultMsgEl  = document.getElementById('resultMsg');

  // ── 오버레이 버튼 ─────────────────────────────────────────────────────────
  document.querySelectorAll('.lvl-btn').forEach(btn => {
    btn.addEventListener('pointerdown', () => {
      document.querySelectorAll('.lvl-btn').forEach(b => b.classList.remove('sel'));
      btn.classList.add('sel');
      state.level = parseInt(btn.dataset.lv);
    });
  });

  document.getElementById('startBtn').addEventListener('pointerdown', startGame);
  document.getElementById('restartBtn').addEventListener('pointerdown', () => {
    endOverlay.classList.add('hidden');
    startGame();
  });
  document.getElementById('btnReset').addEventListener('pointerdown', resetPosition);

  // 방향 패드
  document.getElementById('btnUp').addEventListener('pointerdown', () => move('N'));
  document.getElementById('btnDown').addEventListener('pointerdown', () => move('S'));
  document.getElementById('btnLeft').addEventListener('pointerdown', () => move('W'));
  document.getElementById('btnRight').addEventListener('pointerdown', () => move('E'));

  // ── 스와이프 감지 ────────────────────────────────────────────────────────
  let touchStartX = 0, touchStartY = 0;
  canvas.addEventListener('pointerdown', (e) => {
    touchStartX = e.clientX;
    touchStartY = e.clientY;
  });
  canvas.addEventListener('pointerup', (e) => {
    const dx = e.clientX - touchStartX;
    const dy = e.clientY - touchStartY;
    const absDx = Math.abs(dx), absDy = Math.abs(dy);
    if (Math.max(absDx, absDy) < 15) return;
    if (absDx > absDy) {
      move(dx > 0 ? 'E' : 'W');
    } else {
      move(dy > 0 ? 'S' : 'N');
    }
  });

  // ── 미로 생성 (재귀 백트래킹) ────────────────────────────────────────────
  function generateMaze(cols, rows) {
    const grid = Array.from({ length: rows }, () => new Array(cols).fill(0));
    const visited = Array.from({ length: rows }, () => new Array(cols).fill(false));

    function inBounds(x, y) { return x >= 0 && x < cols && y >= 0 && y < rows; }

    function carve(x, y) {
      visited[y][x] = true;
      const dirs = shuffle(DIR_KEYS.slice());
      dirs.forEach(dk => {
        const d = DIR[dk];
        const nx = x + d.dx, ny = y + d.dy;
        if (inBounds(nx, ny) && !visited[ny][nx]) {
          grid[y][x] |= d.bit;
          grid[ny][nx] |= d.opp;
          carve(nx, ny);
        }
      });
    }

    carve(0, 0);
    return grid;
  }

  // ── 게임 시작 ─────────────────────────────────────────────────────────────
  function startGame() {
    startOverlay.classList.add('hidden');
    endOverlay.classList.add('hidden');

    const sz = LEVEL_SIZE[state.level];
    state.cols = sz.cols;
    state.rows = sz.rows;
    state.maze = generateMaze(state.cols, state.rows);
    state.rabbit = { x: 0, y: 0 };
    state.goal   = { x: state.cols - 1, y: state.rows - 1 };
    state.moves  = 0;
    state.trail  = [{ x: 0, y: 0 }];

    levelEl.textContent = state.level;
    updateHUD();
    resizeCanvas();
  }

  function resetPosition() {
    if (!state.maze) return;
    state.rabbit = { x: 0, y: 0 };
    state.moves = 0;
    state.trail = [{ x: 0, y: 0 }];
    updateHUD();
    draw();
  }

  // ── 이동 ─────────────────────────────────────────────────────────────────
  function move(dk) {
    if (!state.maze) return;
    const d = DIR[dk];
    const { x, y } = state.rabbit;
    // 해당 방향으로 벽이 없으면(통로 있으면) 이동
    if (state.maze[y][x] & d.bit) {
      state.rabbit.x = x + d.dx;
      state.rabbit.y = y + d.dy;
      state.moves++;
      state.trail.push({ ...state.rabbit });
      updateHUD();
      draw();
      // 도착 체크
      if (state.rabbit.x === state.goal.x && state.rabbit.y === state.goal.y) {
        setTimeout(showResult, 400);
      }
    } else {
      // 벽 충돌 — 흔들림 효과
      canvas.style.transition = 'transform 0.08s';
      canvas.style.transform = 'translateX(4px)';
      setTimeout(() => {
        canvas.style.transform = 'translateX(-4px)';
        setTimeout(() => { canvas.style.transform = ''; }, 80);
      }, 80);
    }
  }

  // ── 캔버스 크기 ──────────────────────────────────────────────────────────
  function resizeCanvas() {
    if (!state.maze) return;
    const rect = mazeWrap.getBoundingClientRect();
    const maxW = rect.width;
    const maxH = rect.height;
    const cellW = Math.floor(maxW / state.cols);
    const cellH = Math.floor(maxH / state.rows);
    const cell  = Math.max(Math.min(cellW, cellH), 16);
    canvas.width  = cell * state.cols;
    canvas.height = cell * state.rows;
    draw();
  }

  window.addEventListener('resize', () => { if (state.maze) resizeCanvas(); });

  // ── 그리기 ───────────────────────────────────────────────────────────────
  function draw() {
    if (!state.maze) return;
    const W = canvas.width, H = canvas.height;
    const cellW = W / state.cols, cellH = H / state.rows;
    ctx.clearRect(0, 0, W, H);

    // 배경
    ctx.fillStyle = '#f9fbe7';
    ctx.fillRect(0, 0, W, H);

    // 지나온 길 흔적
    ctx.fillStyle = 'rgba(165, 214, 167, 0.4)';
    state.trail.forEach(p => {
      ctx.fillRect(
        p.x * cellW + 2, p.y * cellH + 2,
        cellW - 4, cellH - 4
      );
    });

    // 목표 (당근)
    drawCell(state.goal.x, state.goal.y, cellW, cellH, '#fff3e0');
    ctx.font = `${Math.min(cellW, cellH) * 0.65}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('🥕',
      state.goal.x * cellW + cellW / 2,
      state.goal.y * cellH + cellH / 2
    );

    // 출발점
    drawCell(0, 0, cellW, cellH, '#e8f5e9');

    // 벽 그리기
    ctx.strokeStyle = '#6d4c41';
    ctx.lineWidth = Math.max(1.5, Math.min(cellW, cellH) * 0.07);
    ctx.lineCap = 'square';

    for (let y = 0; y < state.rows; y++) {
      for (let x = 0; x < state.cols; x++) {
        const cx = x * cellW, cy = y * cellH;
        const cell = state.maze[y][x];
        // 북쪽 벽
        if (!(cell & 1)) {
          ctx.beginPath();
          ctx.moveTo(cx, cy);
          ctx.lineTo(cx + cellW, cy);
          ctx.stroke();
        }
        // 동쪽 벽
        if (!(cell & 2)) {
          ctx.beginPath();
          ctx.moveTo(cx + cellW, cy);
          ctx.lineTo(cx + cellW, cy + cellH);
          ctx.stroke();
        }
        // 남쪽 벽
        if (!(cell & 4)) {
          ctx.beginPath();
          ctx.moveTo(cx, cy + cellH);
          ctx.lineTo(cx + cellW, cy + cellH);
          ctx.stroke();
        }
        // 서쪽 벽
        if (!(cell & 8)) {
          ctx.beginPath();
          ctx.moveTo(cx, cy);
          ctx.lineTo(cx, cy + cellH);
          ctx.stroke();
        }
      }
    }

    // 테두리
    ctx.strokeStyle = '#4e342e';
    ctx.lineWidth = 2.5;
    ctx.strokeRect(0, 0, W, H);

    // 토끼
    ctx.font = `${Math.min(cellW, cellH) * 0.72}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('🐰',
      state.rabbit.x * cellW + cellW / 2,
      state.rabbit.y * cellH + cellH / 2
    );
  }

  function drawCell(x, y, cellW, cellH, color) {
    ctx.fillStyle = color;
    ctx.fillRect(x * cellW + 1, y * cellH + 1, cellW - 2, cellH - 2);
  }

  // ── HUD 업데이트 ──────────────────────────────────────────────────────────
  function updateHUD() {
    movesEl.textContent = state.moves;
    const b = state.best[state.level];
    bestEl.textContent = b !== null ? b + '칸' : '-';
  }

  // ── 결과 ─────────────────────────────────────────────────────────────────
  function showResult() {
    const m = state.moves;
    const prev = state.best[state.level];
    if (prev === null || m < prev) {
      state.best[state.level] = m;
      localStorage.setItem('maze_best_lv' + state.level, m);
    }

    finalMovesEl.textContent = m + '칸';
    const msgs = [
      m <= 20 ? '천재 토끼! 최단 경로를 찾았어요! 🌟' :
      m <= 40 ? '잘했어요! 당근 맛있겠다! 🥕' :
               '드디어 찾았다! 당근 파티! 🎉'
    ];
    resultMsgEl.textContent = msgs[0];
    updateHUD();
    spawnCelebration(40);
    setTimeout(() => endOverlay.classList.remove('hidden'), 600);
  }

  function spawnCelebration(count) {
    const emojis = ['🥕','🐰','🌟','⭐','🎉','✨','🌿','💚','🌈'];
    for (let i = 0; i < count; i++) {
      setTimeout(() => {
        const el = document.createElement('span');
        el.className = 'cp';
        el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        el.style.left = (Math.random() * window.innerWidth) + 'px';
        el.style.top  = (window.innerHeight * 0.65 + Math.random() * 50) + 'px';
        el.style.fontSize = (16 + Math.random() * 16) + 'px';
        el.style.animationDuration = (1.0 + Math.random() * 0.7) + 's';
        celebDiv.appendChild(el);
        el.addEventListener('animationend', () => el.remove());
      }, i * 35);
    }
  }

  // ── 유틸 ──────────────────────────────────────────────────────────────────
  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }
})();
</script>
</body>
</html>
