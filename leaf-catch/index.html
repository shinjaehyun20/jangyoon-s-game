<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>🍂 낙엽 잡기</title>
  <style>
    :root {
      --bg-top:    #1a0a00;
      --bg-bot:    #3d1a00;
      --accent:    #ff8c00;
      --gold:      #ffd700;
      --text:      #fff8ee;
      --hud-bg:    rgba(255,255,255,0.08);
      --btn:       #e05c00;
      --btn-hover: #ff7a1a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100vh; height: 100dvh;
      overflow: hidden;
      touch-action: manipulation;
      font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
      background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bot) 100%);
      color: var(--text);
      user-select: none;
    }
    .wrap {
      width: 100%; max-width: 480px;
      height: 100vh; height: 100dvh;
      display: flex; flex-direction: column;
      padding: 10px 12px 8px; gap: 8px;
      margin: 0 auto;
      position: relative;
    }
    h1 {
      text-align: center;
      font-size: clamp(18px, 5.5vw, 26px);
      font-weight: 900;
      color: var(--accent);
      line-height: 1.2;
      flex-shrink: 0;
    }
    .hud {
      display: flex; flex-direction: row;
      align-items: center; justify-content: space-around;
      background: var(--hud-bg);
      border-radius: 12px;
      padding: 6px 10px;
      font-size: clamp(13px, 3.5vw, 17px);
      font-weight: 700;
      flex-shrink: 0;
      gap: 8px;
    }
    .hud span { display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .hud .lbl { font-size: 10px; font-weight: 500; opacity: 0.7; }
    #gameArea {
      flex: 1;
      position: relative;
      overflow: hidden;
      border-radius: 14px;
      background: rgba(0,0,0,0.25);
      cursor: none;
      touch-action: none;
    }
    /* basket */
    #basket {
      position: absolute;
      bottom: 8px;
      width: 80px; height: 40px;
      transform: translateX(-50%);
      display: flex; align-items: center; justify-content: center;
      font-size: 36px;
      transition: left 0.05s linear;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.5));
      pointer-events: none;
      z-index: 10;
    }
    /* leaf */
    .leaf {
      position: absolute;
      font-size: 26px;
      pointer-events: none;
      z-index: 5;
      transform-origin: center center;
      will-change: transform;
    }
    /* score pop */
    .score-pop {
      position: absolute;
      font-size: 20px;
      font-weight: 900;
      pointer-events: none;
      z-index: 20;
      animation: popUp 0.7s ease-out forwards;
    }
    @keyframes popUp {
      0%   { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-50px) scale(1.4); }
    }
    footer {
      display: flex; flex-direction: row;
      justify-content: space-between; align-items: center;
      flex-shrink: 0;
      font-size: 12px;
      opacity: 0.75;
    }
    .home-link {
      color: var(--accent);
      text-decoration: none;
      font-size: 12px;
      font-weight: 700;
      padding: 4px 8px;
      border-radius: 8px;
      background: rgba(255,255,255,0.08);
    }
    /* overlay */
    .overlay {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.75);
      z-index: 100;
      padding: 16px;
    }
    .overlay.hidden { display: none; }
    .overlay-card {
      background: linear-gradient(145deg, #3d1a00, #5c2800);
      border-radius: 20px;
      padding: 28px 24px;
      text-align: center;
      max-width: 340px; width: 100%;
      border: 2px solid var(--accent);
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      display: flex; flex-direction: column; gap: 14px;
    }
    .overlay-card h2 { font-size: clamp(22px, 6vw, 30px); color: var(--accent); }
    .overlay-card p  { font-size: 14px; line-height: 1.6; opacity: 0.9; }
    .result-score    { font-size: clamp(36px, 12vw, 54px); font-weight: 900; color: var(--gold); }
    .best-label      { font-size: 13px; opacity: 0.8; }
    .btn-start {
      background: var(--btn);
      color: #fff;
      border: none; border-radius: 14px;
      padding: 14px 0; width: 100%;
      font-size: 18px; font-weight: 900;
      cursor: pointer;
      min-height: 52px;
      transition: background 0.15s;
    }
    .btn-start:active { background: var(--btn-hover); transform: scale(0.97); }
    /* wind bar */
    #windBar {
      position: absolute; top: 6px; right: 10px;
      font-size: 11px; opacity: 0.6;
      z-index: 15;
    }
    /* trees decoration */
    .tree-deco {
      position: absolute; bottom: 0;
      font-size: 48px; opacity: 0.18;
      pointer-events: none;
    }
  </style>
</head>
<body>
<div class="wrap">
  <h1>🍂 낙엽 잡기</h1>
  <div class="hud">
    <span><span class="lbl">점수</span><span id="scoreDisplay">0</span></span>
    <span><span class="lbl">남은 시간</span><span id="timerDisplay">45</span></span>
    <span><span class="lbl">최고 기록</span><span id="bestDisplay">0</span></span>
  </div>
  <div id="gameArea">
    <div id="windBar">바람 ···</div>
    <span class="tree-deco" style="left:2px">🌳</span>
    <span class="tree-deco" style="right:2px">🌲</span>
    <div id="basket">🧺</div>
  </div>
  <footer>
    <small>🍁 황금잎 = +5점!</small>
    <a class="home-link" href="../index.html">← 홈으로</a>
  </footer>
</div>

<!-- 시작 오버레이 -->
<div class="overlay" id="startOverlay">
  <div class="overlay-card">
    <h2>🍂 낙엽 잡기</h2>
    <p>바람에 흔들리며 떨어지는 낙엽을<br>🧺 바구니로 받아요!<br><br>
       ✨ <strong>황금잎</strong>을 잡으면 <strong>+5점!</strong><br>
       화면을 밀어서 바구니를 움직여요.</p>
    <button class="btn-start" id="startBtn">시작!</button>
  </div>
</div>

<!-- 종료 오버레이 -->
<div class="overlay hidden" id="endOverlay">
  <div class="overlay-card">
    <h2>🎉 게임 끝!</h2>
    <div class="result-score" id="finalScore">0</div>
    <p class="best-label" id="bestMsg"></p>
    <p id="resultMsg"></p>
    <button class="btn-start" id="restartBtn">다시 하기 🍂</button>
  </div>
</div>

<script>
(function () {
  'use strict';

  /* ── CONFIG ── */
  const CFG = {
    GAME_TIME:       45,      // seconds
    LEAF_INTERVAL:   900,     // ms between spawns (start)
    LEAF_INTERVAL_MIN: 400,   // fastest spawn
    FALL_SPEED_BASE: 1.6,     // px per frame base
    FALL_SPEED_MAX:  4.5,
    WIND_CHANGE_SEC: 3,       // how often wind direction changes
    WIND_MAX:        2.2,     // max px/frame horizontal wind
    BASKET_WIDTH:    80,
    BASKET_HALF:     40,
    GOLD_CHANCE:     0.12,    // 12% chance golden leaf
    NORMAL_SCORE:    1,
    GOLD_SCORE:      5,
    LEAVES: ['🍁','🍂','🍃','🍁','🍂'],   // weighted toward autumn
    GOLD_LEAF: '✨',
    STORAGE_KEY: 'leaf-catch_best',
  };

  /* ── STATE ── */
  let score = 0;
  let timeLeft = CFG.GAME_TIME;
  let running = false;
  let basketX = 0;          // center x
  let wind = 0;             // current wind force
  let windTarget = 0;
  let leaves = [];          // [{el, x, y, vx, vy, isGold, angle, spin}]
  let spawnInterval = null;
  let rafId = null;
  let timerInterval = null;
  let lastTime = 0;
  let frameCount = 0;

  /* ── DOM ── */
  const gameArea    = document.getElementById('gameArea');
  const basket      = document.getElementById('basket');
  const scoreEl     = document.getElementById('scoreDisplay');
  const timerEl     = document.getElementById('timerDisplay');
  const bestEl      = document.getElementById('bestDisplay');
  const windBarEl   = document.getElementById('windBar');
  const startOverlay = document.getElementById('startOverlay');
  const endOverlay   = document.getElementById('endOverlay');
  const finalScoreEl = document.getElementById('finalScore');
  const bestMsgEl   = document.getElementById('bestMsg');
  const resultMsgEl = document.getElementById('resultMsg');
  const startBtn    = document.getElementById('startBtn');
  const restartBtn  = document.getElementById('restartBtn');

  /* ── BEST SCORE ── */
  function getBest() {
    return parseInt(localStorage.getItem(CFG.STORAGE_KEY) || '0', 10);
  }
  function saveBest(s) {
    localStorage.setItem(CFG.STORAGE_KEY, String(s));
  }
  bestEl.textContent = getBest();

  /* ── BASKET MOVE ── */
  function updateBasket(clientX) {
    const rect = gameArea.getBoundingClientRect();
    let x = clientX - rect.left;
    x = Math.max(CFG.BASKET_HALF, Math.min(rect.width - CFG.BASKET_HALF, x));
    basketX = x;
    basket.style.left = x + 'px';
  }

  gameArea.addEventListener('pointerdown', (e) => {
    if (!running) return;
    gameArea.setPointerCapture(e.pointerId);
    updateBasket(e.clientX);
  });
  gameArea.addEventListener('pointermove', (e) => {
    if (!running || e.buttons === 0) return;
    updateBasket(e.clientX);
  });
  gameArea.addEventListener('pointerup', () => {});

  /* ── WIND ── */
  function updateWind() {
    windTarget = (Math.random() * 2 - 1) * CFG.WIND_MAX;
    const arrows = windTarget > 0.5 ? '→→→' : windTarget < -0.5 ? '←←←' : '↕ 잔잔';
    windBarEl.textContent = '바람 ' + arrows;
  }

  /* ── LEAF SPAWN ── */
  function spawnLeaf() {
    const rect = gameArea.getBoundingClientRect();
    const isGold = Math.random() < CFG.GOLD_CHANCE;
    const emoji = isGold ? CFG.GOLD_LEAF : CFG.LEAVES[Math.floor(Math.random() * CFG.LEAVES.length)];
    const el = document.createElement('span');
    el.className = 'leaf';
    el.textContent = emoji;
    const x = Math.random() * (rect.width - 40) + 20;
    const vy = CFG.FALL_SPEED_BASE + Math.random() * (CFG.FALL_SPEED_MAX - CFG.FALL_SPEED_BASE);
    const vx = (Math.random() - 0.5) * 1.2;
    const spin = (Math.random() - 0.5) * 4;
    gameArea.appendChild(el);
    leaves.push({ el, x, y: -30, vx, vy, isGold, angle: 0, spin });
  }

  function startSpawn() {
    const elapsed = CFG.GAME_TIME - timeLeft;
    const t = Math.min(elapsed / CFG.GAME_TIME, 1);
    const interval = CFG.LEAF_INTERVAL - t * (CFG.LEAF_INTERVAL - CFG.LEAF_INTERVAL_MIN);
    if (spawnInterval) clearInterval(spawnInterval);
    spawnInterval = setInterval(spawnLeaf, interval);
  }

  /* ── SCORE POP ── */
  function scorePop(x, y, text, color) {
    const pop = document.createElement('span');
    pop.className = 'score-pop';
    pop.textContent = text;
    pop.style.left = (x - 20) + 'px';
    pop.style.top  = (y - 20) + 'px';
    pop.style.color = color || '#fff';
    gameArea.appendChild(pop);
    setTimeout(() => pop.remove(), 700);
  }

  /* ── COLLISION CHECK ── */
  function checkCatch(leaf) {
    const rect = gameArea.getBoundingClientRect();
    const basketY = rect.height - 48;  // basket center Y
    if (leaf.y >= basketY - 20 && leaf.y <= basketY + 30) {
      const dist = Math.abs(leaf.x - basketX);
      if (dist < CFG.BASKET_HALF + 10) {
        return true;
      }
    }
    return false;
  }

  /* ── GAME LOOP ── */
  function loop(ts) {
    if (!running) return;

    frameCount++;
    // adjust wind smoothly
    wind += (windTarget - wind) * 0.02;

    const rect = gameArea.getBoundingClientRect();
    const toRemove = [];

    for (let i = 0; i < leaves.length; i++) {
      const lf = leaves[i];
      // wind effect: vx drifts toward wind
      lf.vx += (wind - lf.vx) * 0.04;
      lf.x += lf.vx;
      lf.y += lf.vy;
      lf.angle += lf.spin;

      // wall bounce
      if (lf.x < 16)  { lf.x = 16;  lf.vx = Math.abs(lf.vx) * 0.6; }
      if (lf.x > rect.width - 16) { lf.x = rect.width - 16; lf.vx = -Math.abs(lf.vx) * 0.6; }

      lf.el.style.transform = `translate(${lf.x - 13}px, ${lf.y}px) rotate(${lf.angle}deg)`;

      // catch check
      if (checkCatch(lf)) {
        const pts = lf.isGold ? CFG.GOLD_SCORE : CFG.NORMAL_SCORE;
        score += pts;
        scoreEl.textContent = score;
        scorePop(lf.x, lf.y, lf.isGold ? '+5 ✨' : '+1', lf.isGold ? CFG.GOLD_LEAF + '#ffd700' : '#ffffff');
        if (lf.isGold) scorePop(lf.x, lf.y, '+5', '#ffd700');
        else            scorePop(lf.x, lf.y, '+1', '#ffe8cc');
        lf.el.remove();
        toRemove.push(i);
        continue;
      }

      // out of bounds (fell past basket)
      if (lf.y > rect.height + 20) {
        lf.el.remove();
        toRemove.push(i);
      }
    }

    // remove in reverse order
    for (let i = toRemove.length - 1; i >= 0; i--) {
      leaves.splice(toRemove[i], 1);
    }

    // periodically rebalance spawn speed
    if (frameCount % 180 === 0) startSpawn();

    rafId = requestAnimationFrame(loop);
  }

  /* ── TIMER ── */
  function startTimer() {
    timerEl.textContent = timeLeft;
    timerInterval = setInterval(() => {
      timeLeft--;
      timerEl.textContent = timeLeft;
      if (timeLeft <= 0) endGame();
    }, 1000);
  }

  /* ── START ── */
  function startGame() {
    score = 0; timeLeft = CFG.GAME_TIME;
    running = true;
    leaves.forEach(l => l.el.remove());
    leaves = [];
    scoreEl.textContent = 0;
    timerEl.textContent = CFG.GAME_TIME;

    const rect = gameArea.getBoundingClientRect();
    basketX = rect.width / 2;
    basket.style.left = basketX + 'px';

    startOverlay.classList.add('hidden');
    endOverlay.classList.add('hidden');

    updateWind();
    setInterval(updateWind, CFG.WIND_CHANGE_SEC * 1000);
    startSpawn();
    startTimer();
    lastTime = performance.now();
    rafId = requestAnimationFrame(loop);
  }

  /* ── END ── */
  function endGame() {
    running = false;
    clearInterval(spawnInterval);
    clearInterval(timerInterval);
    cancelAnimationFrame(rafId);
    leaves.forEach(l => l.el.remove());
    leaves = [];

    const best = getBest();
    const newBest = score > best;
    if (newBest) saveBest(score);

    finalScoreEl.textContent = score;
    bestMsgEl.textContent = newBest
      ? '🏆 새 최고 기록!'
      : '최고 기록: ' + Math.max(score, best) + '점';
    bestEl.textContent = Math.max(score, best);

    if (score >= 40)      resultMsgEl.textContent = '🌟 대단해! 낙엽 달인!';
    else if (score >= 20) resultMsgEl.textContent = '👍 잘 잡았어! 멋진데?';
    else if (score >= 10) resultMsgEl.textContent = '🍂 조금 더 연습해봐!';
    else                  resultMsgEl.textContent = '😊 다시 해봐!';

    endOverlay.classList.remove('hidden');
  }

  /* ── BUTTONS ── */
  startBtn.addEventListener('pointerdown', (e) => { e.preventDefault(); startGame(); });
  restartBtn.addEventListener('pointerdown', (e) => { e.preventDefault(); startGame(); });

  /* ── INIT ── */
  const rect = gameArea.getBoundingClientRect();
  basketX = (rect.width || 200) / 2;
  basket.style.left = basketX + 'px';

})();
</script>
</body>
</html>
