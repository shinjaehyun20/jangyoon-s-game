<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
  <!-- background gradient: autumn dark -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0a00"/>
      <stop offset="100%" stop-color="#4a1f00"/>
    </linearGradient>
    <linearGradient id="treeTrunk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5c3300"/>
      <stop offset="100%" stop-color="#3d2000"/>
    </linearGradient>
  </defs>

  <!-- bg -->
  <rect width="320" height="180" fill="url(#bg)"/>

  <!-- ground -->
  <rect x="0" y="145" width="320" height="35" fill="#2a0f00" opacity="0.6"/>

  <!-- tree left -->
  <rect x="12" y="90" width="14" height="60" fill="url(#treeTrunk)" rx="4"/>
  <ellipse cx="20" cy="78" rx="28" ry="36" fill="#b84400" opacity="0.85"/>
  <ellipse cx="20" cy="68" rx="20" ry="26" fill="#d45a00" opacity="0.7"/>

  <!-- tree right -->
  <rect x="278" y="95" width="12" height="55" fill="url(#treeTrunk)" rx="3"/>
  <ellipse cx="285" cy="82" rx="24" ry="30" fill="#8b2500" opacity="0.85"/>
  <ellipse cx="285" cy="73" rx="17" ry="22" fill="#c04000" opacity="0.7"/>

  <!-- basket center-bottom -->
  <path d="M118 148 L202 148 L196 170 L124 170 Z" fill="#7a4a00" stroke="#a06400" stroke-width="2"/>
  <path d="M116 140 Q160 136 204 140 L202 150 Q160 146 118 150 Z" fill="#9b5e00"/>
  <!-- weave lines -->
  <line x1="138" y1="150" x2="134" y2="170" stroke="#5a3400" stroke-width="1.5" opacity="0.7"/>
  <line x1="158" y1="148" x2="156" y2="170" stroke="#5a3400" stroke-width="1.5" opacity="0.7"/>
  <line x1="178" y1="150" x2="178" y2="170" stroke="#5a3400" stroke-width="1.5" opacity="0.7"/>

  <!-- falling leaves -->
  <!-- leaf 1: orange-red top-center -->
  <text x="130" y="42" font-size="28" transform="rotate(-15,130,42)">🍁</text>
  <!-- leaf 2: golden left -->
  <text x="68" y="75" font-size="22" transform="rotate(20,68,75)">✨</text>
  <!-- leaf 3: brown right -->
  <text x="190" y="60" font-size="24" transform="rotate(-25,190,60)">🍂</text>
  <!-- leaf 4: small green -->
  <text x="95" y="110" font-size="18" transform="rotate(10,95,110)">🍃</text>
  <!-- leaf 5: right falling -->
  <text x="218" y="100" font-size="20" transform="rotate(-10,218,100)">🍁</text>
  <!-- leaf on ground -->
  <text x="146" y="162" font-size="16" transform="rotate(15,146,162)">🍂</text>
  <text x="172" y="160" font-size="14" transform="rotate(-8,172,160)">🍁</text>

  <!-- wind lines suggestion -->
  <path d="M55 55 Q85 50 100 58" stroke="#ff8c00" stroke-width="1.5" fill="none" opacity="0.3" stroke-dasharray="4 3"/>
  <path d="M220 45 Q250 42 265 52" stroke="#ff8c00" stroke-width="1.5" fill="none" opacity="0.3" stroke-dasharray="4 3"/>

  <!-- border -->
  <rect x="0.5" y="0.5" width="319" height="179" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- title lower-right -->
  <g font-family="'Pretendard','Noto Sans KR',sans-serif">
    <text x="296" y="148" text-anchor="end" font-size="22" font-weight="900" fill="#ff8c00">낙엽 잡기</text>
    <text x="296" y="166" text-anchor="end" font-size="10" font-weight="500" fill="rgba(255,255,255,0.5)" letter-spacing="2">LEAF CATCH</text>
  </g>
</svg>
