<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a237e"/>
      <stop offset="100%" stop-color="#303f9f"/>
    </linearGradient>
    <linearGradient id="shaft" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#263238"/>
      <stop offset="100%" stop-color="#37474f"/>
    </linearGradient>
    <linearGradient id="car" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF9C4"/>
      <stop offset="100%" stop-color="#FFEE58"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="320" height="180" fill="url(#bg)" rx="0"/>
  <rect x="0.5" y="0.5" width="319" height="179" fill="none" stroke="rgba(255,255,255,0.08)"/>

  <!-- 장식 원 -->
  <circle cx="260" cy="30" r="55" fill="rgba(255,255,255,0.04)"/>
  <circle cx="260" cy="30" r="35" fill="rgba(255,255,255,0.04)"/>

  <!-- 샤프트(엘리베이터 통) -->
  <rect x="24" y="20" width="70" height="140" rx="10" fill="url(#shaft)" opacity="0.9"/>

  <!-- 층 구분선 -->
  <line x1="24" y1="48" x2="94" y2="48" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <line x1="24" y1="76" x2="94" y2="76" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <line x1="24" y1="104" x2="94" y2="104" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <line x1="24" y1="132" x2="94" y2="132" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

  <!-- 층 레이블 -->
  <text x="59" y="40" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.3)" font-weight="600">5층</text>
  <text x="59" y="68" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.3)" font-weight="600">4층</text>
  <text x="59" y="96" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.3)" font-weight="600">3층</text>
  <text x="59" y="124" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.3)" font-weight="600">2층</text>
  <text x="59" y="152" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.3)" font-weight="600">1층</text>

  <!-- 엘리베이터 카 (3층에 위치) -->
  <rect x="30" y="86" width="58" height="36" rx="8" fill="url(#car)"/>
  <rect x="36" y="91" width="46" height="5" rx="3" fill="rgba(255,255,255,0.55)"/>
  <text x="59" y="113" text-anchor="middle" font-size="18">🛗</text>

  <!-- 우측 버튼 패널 -->
  <rect x="108" y="20" width="78" height="140" rx="10" fill="rgba(255,255,255,0.08)"/>

  <!-- 버튼들 (5~1층) -->
  <rect x="114" y="27" width="66" height="22" rx="8" fill="#43A047" opacity="0.9"/>
  <text x="147" y="43" text-anchor="middle" font-size="13" font-weight="900" fill="#fff">3층</text>

  <rect x="114" y="54" width="66" height="22" rx="8" fill="rgba(255,255,255,0.15)"/>
  <text x="147" y="70" text-anchor="middle" font-size="13" font-weight="900" fill="rgba(255,255,255,0.7)">4층</text>

  <rect x="114" y="81" width="66" height="22" rx="8" fill="rgba(255,255,255,0.15)"/>
  <text x="147" y="97" text-anchor="middle" font-size="13" font-weight="900" fill="rgba(255,255,255,0.7)">2층</text>

  <rect x="114" y="108" width="66" height="22" rx="8" fill="rgba(255,255,255,0.15)"/>
  <text x="147" y="124" text-anchor="middle" font-size="13" font-weight="900" fill="rgba(255,255,255,0.7)">5층</text>

  <rect x="114" y="135" width="66" height="22" rx="8" fill="rgba(255,255,255,0.15)"/>
  <text x="147" y="151" text-anchor="middle" font-size="13" font-weight="900" fill="rgba(255,255,255,0.7)">1층</text>

  <!-- 손님(동물) + 말풍선 -->
  <text x="220" y="75" text-anchor="middle" font-size="34">🐶</text>

  <!-- 말풍선 -->
  <rect x="188" y="28" width="64" height="34" rx="10" fill="#fff"/>
  <polygon points="214,62 220,74 226,62" fill="#fff"/>
  <text x="220" y="51" text-anchor="middle" font-size="16" font-weight="900" fill="#1a237e">3층</text>

  <!-- 정답 표시 -->
  <text x="220" y="110" text-anchor="middle" font-size="22">✅</text>

  <!-- 별 장식 -->
  <text x="265" y="100" font-size="18" opacity="0.7">⭐</text>
  <text x="280" y="70" font-size="12" opacity="0.5">✨</text>
  <text x="255" y="130" font-size="11" opacity="0.4">🌟</text>

  <!-- 타이틀 우하단 -->
  <g font-family="'Pretendard','Noto Sans KR',sans-serif">
    <text x="296" y="148" text-anchor="end" font-size="20" font-weight="900" fill="#FFD54F">엘리베이터</text>
    <text x="296" y="166" text-anchor="end" font-size="9" font-weight="500" fill="rgba(255,255,255,0.5)" letter-spacing="2">ELEVATOR FLOOR</text>
  </g>
</svg>
