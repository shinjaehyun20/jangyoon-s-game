<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>🐸 개구리 파리 잡기</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --bg1: #0f3d2e;
      --bg2: #1c6b4a;
      --accent: #ffe14d;
      --text: #ffffff;
    }
    html, body {
      height: 100vh; height: 100dvh;
      overflow: hidden;
      touch-action: manipulation;
      user-select: none;
      font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
      background: var(--bg1);
    }
    .wrap {
      position: relative;
      width: 100%; max-width: 480px;
      height: 100vh; height: 100dvh;
      display: flex; flex-direction: column;
      padding: 10px 12px 8px; gap: 8px;
      margin: 0 auto;
    }
    h1 {
      color: var(--text);
      font-size: clamp(20px, 5.5vw, 28px);
      text-align: center;
      text-shadow: 0 2px 6px rgba(0,0,0,0.4);
    }
    .hud {
      display: flex; justify-content: space-between; align-items: center;
      background: rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 8px 14px;
      color: var(--text);
      font-weight: 700;
      font-size: 16px;
    }
    .hud .val { color: var(--accent); }
    #gameArea {
      position: relative;
      flex: 1;
      border-radius: 16px;
      overflow: hidden;
      background:
        radial-gradient(120% 80% at 50% 0%, #2a8f63 0%, var(--bg2) 55%, var(--bg1) 100%);
      box-shadow: inset 0 0 40px rgba(0,0,0,0.35);
      touch-action: none;
    }
    /* pond ground */
    #ground {
      position: absolute;
      left: 0; right: 0; bottom: 0;
      height: 26%;
      background: linear-gradient(180deg, #14513a 0%, #0c3728 100%);
      border-top: 4px solid rgba(255,255,255,0.15);
    }
    .lily {
      position: absolute;
      bottom: 6%;
      font-size: 34px;
      filter: drop-shadow(0 3px 3px rgba(0,0,0,0.4));
    }
    /* frog */
    #frog {
      position: absolute;
      left: 50%;
      bottom: 4%;
      transform: translateX(-50%);
      font-size: 56px;
      z-index: 5;
      filter: drop-shadow(0 4px 4px rgba(0,0,0,0.4));
      transition: transform 0.08s ease;
    }
    #frog.chomp { transform: translateX(-50%) scale(1.18); }
    /* tongue */
    #tongue {
      position: absolute;
      width: 8px;
      background: #ff6f8f;
      border-radius: 4px;
      transform-origin: bottom center;
      z-index: 4;
      display: none;
      box-shadow: 0 0 6px rgba(255,111,143,0.6);
    }
    #tongue::before {
      content: '';
      position: absolute;
      top: -8px; left: -4px;
      width: 16px; height: 16px;
      background: #ff6f8f;
      border-radius: 50%;
    }
    /* bugs */
    .bug {
      position: absolute;
      font-size: 30px;
      z-index: 3;
      will-change: transform;
      filter: drop-shadow(0 2px 2px rgba(0,0,0,0.3));
    }
    .bug.pop {
      animation: pop 0.3s ease forwards;
    }
    @keyframes pop {
      0% { transform: scale(1); opacity: 1; }
      100% { transform: scale(1.8); opacity: 0; }
    }
    .float {
      position: absolute;
      color: var(--accent);
      font-weight: 900;
      font-size: 20px;
      z-index: 6;
      pointer-events: none;
      text-shadow: 0 1px 3px rgba(0,0,0,0.5);
      animation: rise 0.7s ease forwards;
    }
    @keyframes rise {
      0% { transform: translateY(0); opacity: 1; }
      100% { transform: translateY(-40px); opacity: 0; }
    }
    footer {
      display: flex; justify-content: space-between; align-items: center;
      color: rgba(255,255,255,0.85);
      font-size: 13px;
    }
    .home-link {
      color: var(--accent);
      text-decoration: none;
      font-weight: 700;
      background: rgba(0,0,0,0.25);
      padding: 8px 12px;
      border-radius: 10px;
      min-height: 44px;
      display: inline-flex;
      align-items: center;
    }
    /* overlays */
    .overlay {
      position: absolute; inset: 0;
      background: rgba(6,30,22,0.82);
      display: flex; align-items: center; justify-content: center;
      z-index: 20;
      padding: 20px;
    }
    .overlay.hidden { display: none; }
    .overlay-card {
      background: linear-gradient(160deg, #1c6b4a, #0f3d2e);
      border: 2px solid rgba(255,225,77,0.4);
      border-radius: 20px;
      padding: 26px 22px;
      text-align: center;
      color: var(--text);
      max-width: 340px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.4);
    }
    .overlay-card h2 { font-size: 26px; margin-bottom: 12px; }
    .overlay-card p { font-size: 15px; line-height: 1.6; margin-bottom: 18px; color: rgba(255,255,255,0.9); }
    .result-score { font-size: 46px; font-weight: 900; color: var(--accent); margin: 6px 0; }
    .btn-start {
      background: var(--accent);
      color: #123; border: none;
      font-size: 20px; font-weight: 900;
      padding: 14px 34px;
      border-radius: 30px;
      min-height: 44px;
      cursor: pointer;
      box-shadow: 0 6px 0 #c9a800;
    }
    .btn-start:active { transform: translateY(3px); box-shadow: 0 3px 0 #c9a800; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>🐸 개구리 파리 잡기</h1>

    <div class="hud">
      <div>점수 <span class="val" id="scoreVal">0</span></div>
      <div>시간 <span class="val" id="timeVal">40</span></div>
      <div>최고 <span class="val" id="bestVal">0</span></div>
    </div>

    <div id="gameArea">
      <div id="ground"></div>
      <div class="lily" style="left:8%;">🪷</div>
      <div class="lily" style="left:74%;">🪷</div>
      <div id="tongue"></div>
      <div id="frog">🐸</div>
    </div>

    <footer>
      <small>날아다니는 벌레를 탭해서 혀로 잡아요! 🐝벌은 피해요</small>
      <a class="home-link" href="../index.html">← 홈으로</a>
    </footer>
  </div>

  <!-- 시작 오버레이 -->
  <div class="overlay" id="startOverlay">
    <div class="overlay-card">
      <h2>🐸 개구리 파리 잡기</h2>
      <p>화면에 날아다니는 곤충을 탭하면<br>개구리가 혀를 쭉 뻗어 잡아먹어요!<br>🐝 벌을 잡으면 점수가 깎여요.<br>40초 안에 최대한 많이 잡아요!</p>
      <button class="btn-start" id="startBtn">시작!</button>
    </div>
  </div>

  <!-- 결과 오버레이 -->
  <div class="overlay hidden" id="endOverlay">
    <div class="overlay-card">
      <h2>🎉 잘했어요!</h2>
      <div class="result-score" id="finalScore">0</div>
      <p id="resultMsg"></p>
      <button class="btn-start" id="restartBtn">다시 하기</button>
    </div>
  </div>

  <script>
  (function () {
    'use strict';

    const CONFIG = {
      GAME_TIME: 40,
      SPAWN_MIN: 620,      // ms between spawns (fast)
      SPAWN_MAX: 1100,     // ms between spawns (slow, at start)
      BUG_LIFETIME: 3200,  // how long a bug stays before flying off
      MAX_BUGS: 5,
      GOOD_BUGS: ['🪰','🦟','🐞','🦋','🐛'],
      BAD_BUG: '🐝',
      BAD_CHANCE: 0.22,
      POINT_GOOD: 10,
      POINT_BAD: -8,
      TONGUE_MS: 160,
      BEST_KEY: 'frog-tongue-catch_best'
    };

    const gameArea = document.getElementById('gameArea');
    const frog = document.getElementById('frog');
    const tongue = document.getElementById('tongue');
    const scoreVal = document.getElementById('scoreVal');
    const timeVal = document.getElementById('timeVal');
    const bestVal = document.getElementById('bestVal');
    const startOverlay = document.getElementById('startOverlay');
    const endOverlay = document.getElementById('endOverlay');
    const startBtn = document.getElementById('startBtn');
    const restartBtn = document.getElementById('restartBtn');
    const finalScore = document.getElementById('finalScore');
    const resultMsg = document.getElementById('resultMsg');

    const state = {
      running: false,
      score: 0,
      timeLeft: CONFIG.GAME_TIME,
      best: 0,
      bugs: [],
      spawnTimer: null,
      tickTimer: null,
      raf: null,
      lastTs: 0
    };

    function loadBest() {
      const v = parseInt(localStorage.getItem(CONFIG.BEST_KEY) || '0', 10);
      state.best = isNaN(v) ? 0 : v;
      bestVal.textContent = state.best;
    }

    function saveBest() {
      if (state.score > state.best) {
        state.best = state.score;
        localStorage.setItem(CONFIG.BEST_KEY, String(state.best));
      }
    }

    function rand(min, max) { return Math.random() * (max - min) + min; }

    function areaSize() {
      return { w: gameArea.clientWidth, h: gameArea.clientHeight };
    }

    function spawnBug() {
      if (!state.running) return;
      if (state.bugs.length >= CONFIG.MAX_BUGS) { scheduleSpawn(); return; }

      const { w, h } = areaSize();
      const isBad = Math.random() < CONFIG.BAD_CHANCE;
      const emoji = isBad ? CONFIG.BAD_BUG
        : CONFIG.GOOD_BUGS[Math.floor(Math.random() * CONFIG.GOOD_BUGS.length)];

      const el = document.createElement('div');
      el.className = 'bug';
      el.textContent = emoji;

      // flight area: top 70% of the pond (above ground/frog)
      const bug = {
        el,
        bad: isBad,
        x: rand(30, w - 60),
        y: rand(30, h * 0.62),
        vx: rand(-0.06, 0.06) * (Math.random() < 0.5 ? 1 : 1),
        vy: rand(-0.035, 0.035),
        born: performance.now(),
        alive: true
      };
      // ensure some horizontal drift
      if (Math.abs(bug.vx) < 0.02) bug.vx = (Math.random() < 0.5 ? -1 : 1) * 0.035;

      el.style.transform = `translate(${bug.x}px, ${bug.y}px)`;
      el.addEventListener('pointerdown', function (ev) {
        ev.preventDefault();
        catchBug(bug);
      });

      gameArea.appendChild(el);
      state.bugs.push(bug);
      scheduleSpawn();
    }

    function scheduleSpawn() {
      if (!state.running) return;
      // spawn speeds up as time runs out
      const progress = 1 - (state.timeLeft / CONFIG.GAME_TIME); // 0..1
      const min = CONFIG.SPAWN_MIN;
      const max = CONFIG.SPAWN_MAX - (CONFIG.SPAWN_MAX - CONFIG.SPAWN_MIN) * progress;
      const delay = rand(min, Math.max(min + 60, max));
      clearTimeout(state.spawnTimer);
      state.spawnTimer = setTimeout(spawnBug, delay);
    }

    function shootTongue(targetX, targetY) {
      const { w, h } = areaSize();
      // frog mouth is horizontally centered, near bottom
      const mouthX = w / 2;
      const mouthY = h * 0.90;
      const dx = targetX - mouthX;
      const dy = targetY - mouthY;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const angleDeg = Math.atan2(dx, -dy) * 180 / Math.PI; // 0 = straight up

      tongue.style.display = 'block';
      tongue.style.left = (mouthX - 4) + 'px';
      tongue.style.bottom = (h - mouthY) + 'px';
      tongue.style.height = dist + 'px';
      tongue.style.transform = `rotate(${angleDeg}deg)`;

      frog.classList.add('chomp');
      setTimeout(function () {
        tongue.style.display = 'none';
        frog.classList.remove('chomp');
      }, CONFIG.TONGUE_MS);
    }

    function floatText(x, y, txt, good) {
      const f = document.createElement('div');
      f.className = 'float';
      f.textContent = txt;
      f.style.left = x + 'px';
      f.style.top = y + 'px';
      f.style.color = good ? 'var(--accent)' : '#ff8a8a';
      gameArea.appendChild(f);
      setTimeout(function () { f.remove(); }, 700);
    }

    function catchBug(bug) {
      if (!bug.alive || !state.running) return;
      bug.alive = false;

      const rect = bug.el.getBoundingClientRect();
      const areaRect = gameArea.getBoundingClientRect();
      const cx = rect.left - areaRect.left + rect.width / 2;
      const cy = rect.top - areaRect.top + rect.height / 2;

      shootTongue(cx, cy);

      if (bug.bad) {
        state.score = Math.max(0, state.score + CONFIG.POINT_BAD);
        floatText(cx - 10, cy, CONFIG.POINT_BAD, false);
      } else {
        state.score += CONFIG.POINT_GOOD;
        floatText(cx - 6, cy, '+' + CONFIG.POINT_GOOD, true);
      }
      scoreVal.textContent = state.score;

      bug.el.classList.add('pop');
      setTimeout(function () { removeBug(bug); }, 260);
    }

    function removeBug(bug) {
      const i = state.bugs.indexOf(bug);
      if (i >= 0) state.bugs.splice(i, 1);
      if (bug.el && bug.el.parentNode) bug.el.parentNode.removeChild(bug.el);
    }

    function loop(ts) {
      if (!state.running) return;
      const dt = state.lastTs ? (ts - state.lastTs) : 16;
      state.lastTs = ts;
      const { w, h } = areaSize();

      for (let i = state.bugs.length - 1; i >= 0; i--) {
        const bug = state.bugs[i];
        if (!bug.alive) continue;

        bug.x += bug.vx * dt;
        bug.y += bug.vy * dt;

        // bounce inside flight box
        if (bug.x < 10) { bug.x = 10; bug.vx = Math.abs(bug.vx); }
        if (bug.x > w - 42) { bug.x = w - 42; bug.vx = -Math.abs(bug.vx); }
        if (bug.y < 10) { bug.y = 10; bug.vy = Math.abs(bug.vy); }
        if (bug.y > h * 0.64) { bug.y = h * 0.64; bug.vy = -Math.abs(bug.vy); }

        bug.el.style.transform = `translate(${bug.x}px, ${bug.y}px)`;

        // lifetime expiry: bug flies away
        if (ts - bug.born > CONFIG.BUG_LIFETIME) {
          bug.alive = false;
          bug.el.classList.add('pop');
          setTimeout((function (b) { return function () { removeBug(b); }; })(bug), 260);
        }
      }

      state.raf = requestAnimationFrame(loop);
    }

    function tick() {
      if (!state.running) return;
      state.timeLeft--;
      timeVal.textContent = state.timeLeft;
      if (state.timeLeft <= 0) {
        endGame();
      }
    }

    function clearBugs() {
      state.bugs.forEach(function (b) {
        if (b.el && b.el.parentNode) b.el.parentNode.removeChild(b.el);
      });
      state.bugs = [];
    }

    function startGame() {
      clearBugs();
      state.running = true;
      state.score = 0;
      state.timeLeft = CONFIG.GAME_TIME;
      state.lastTs = 0;
      scoreVal.textContent = '0';
      timeVal.textContent = state.timeLeft;
      startOverlay.classList.add('hidden');
      endOverlay.classList.add('hidden');

      scheduleSpawn();
      clearInterval(state.tickTimer);
      state.tickTimer = setInterval(tick, 1000);
      cancelAnimationFrame(state.raf);
      state.raf = requestAnimationFrame(loop);
    }

    function endGame() {
      state.running = false;
      clearTimeout(state.spawnTimer);
      clearInterval(state.tickTimer);
      cancelAnimationFrame(state.raf);
      clearBugs();
      tongue.style.display = 'none';

      saveBest();
      bestVal.textContent = state.best;
      finalScore.textContent = state.score;

      let msg;
      if (state.score >= 200) msg = '🏆 최고의 개구리예요!';
      else if (state.score >= 120) msg = '👍 아주 잘 잡았어요!';
      else if (state.score >= 60) msg = '😊 좋아요, 더 도전!';
      else msg = '🐸 다시 해볼까요?';
      resultMsg.textContent = msg;

      endOverlay.classList.remove('hidden');
    }

    startBtn.addEventListener('click', startGame);
    restartBtn.addEventListener('click', startGame);

    loadBest();
  })();
  </script>
</body>
</html>
