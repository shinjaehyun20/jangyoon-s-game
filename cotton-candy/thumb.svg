<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#3a0a4e"/>
    </linearGradient>
    <radialGradient id="pinkBlob" cx="40%" cy="35%">
      <stop offset="0%" stop-color="#ffb3e6"/>
      <stop offset="100%" stop-color="#d45fa0"/>
    </radialGradient>
    <radialGradient id="blueBlob" cx="40%" cy="35%">
      <stop offset="0%" stop-color="#a0d8ff"/>
      <stop offset="100%" stop-color="#3b82c4"/>
    </radialGradient>
    <radialGradient id="yellowBlob" cx="40%" cy="35%">
      <stop offset="0%" stop-color="#fff0a0"/>
      <stop offset="100%" stop-color="#c4a830"/>
    </radialGradient>
  </defs>

  <!-- background -->
  <rect width="320" height="180" fill="url(#bg)"/>
  <!-- border -->
  <rect x="0.5" y="0.5" width="319" height="179" fill="none" stroke="rgba(255,255,255,0.08)"/>

  <!-- candy blobs cluster -->
  <circle cx="100" cy="70"  r="34" fill="url(#pinkBlob)"   opacity="0.9"/>
  <circle cx="128" cy="52"  r="26" fill="url(#blueBlob)"   opacity="0.85"/>
  <circle cx="75"  cy="48"  r="22" fill="url(#yellowBlob)" opacity="0.85"/>
  <circle cx="118" cy="85"  r="20" fill="url(#pinkBlob)"   opacity="0.8"/>
  <circle cx="82"  cy="84"  r="18" fill="url(#blueBlob)"   opacity="0.75"/>
  <circle cx="105" cy="38"  r="16" fill="url(#pinkBlob)"   opacity="0.7"/>
  <circle cx="58"  cy="68"  r="16" fill="url(#yellowBlob)" opacity="0.7"/>

  <!-- stick -->
  <rect x="96" y="98" width="10" height="58" rx="5"
        fill="url(#stickGrad)" opacity="0.95"/>
  <defs>
    <linearGradient id="stickGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e8c89a"/>
      <stop offset="100%" stop-color="#c4934f"/>
    </linearGradient>
  </defs>

  <!-- stars decoration -->
  <text x="175" y="42"  font-size="18" opacity="0.6">⭐</text>
  <text x="200" y="75"  font-size="14" opacity="0.5">✨</text>
  <text x="162" y="90"  font-size="12" opacity="0.45">🌟</text>

  <!-- title -->
  <g font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif">
    <text x="296" y="148" text-anchor="end" font-size="22" font-weight="900"
          fill="#ff6eb4">솜사탕 만들기</text>
    <text x="296" y="166" text-anchor="end" font-size="10" font-weight="500"
          fill="rgba(255,255,255,0.5)" letter-spacing="2">COTTON CANDY</text>
  </g>
</svg>
