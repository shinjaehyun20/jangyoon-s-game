    </linearGradient>
  </defs>
  <rect width="320" height="180" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="319" height="179" fill="none" stroke="rgba(255,255,255,0.08)"/>

  <!-- 바닥 -->
  <rect x="20" y="138" width="200" height="10" rx="5" fill="#6b5b95"/>

  <!-- 기둥 3개 -->
  <rect x="48" y="78" width="9" height="62" rx="4" fill="#6b5b95"/>
  <rect x="116" y="78" width="9" height="62" rx="4" fill="#6b5b95"/>
  <rect x="184" y="78" width="9" height="62" rx="4" fill="#ffcd3c"/>

  <!-- 왼쪽 기둥: 도넛 3개 (아래 큰 것) -->
  <rect x="30" y="128" width="45" height="11" rx="5.5" fill="#ffd166"/>
  <rect x="36" y="115" width="33" height="11" rx="5.5" fill="#4ecdc4"/>
  <rect x="41" y="102" width="23" height="11" rx="5.5" fill="#ff6b6b"/>

