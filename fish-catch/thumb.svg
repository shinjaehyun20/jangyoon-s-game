<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a2463"/>
      <stop offset="100%" stop-color="#1565c0"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a7abf" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0d47a1" stop-opacity="0.3"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="320" height="180" fill="url(#bg)"/>

  <!-- 물 레이어 -->
  <rect x="0" y="100" width="320" height="80" fill="url(#water)" rx="0"/>

  <!-- 물결 -->
  <path d="M0 100 Q40 94 80 100 Q120 106 160 100 Q200 94 240 100 Q280 106 320 100" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <path d="M0 112 Q40 106 80 112 Q120 118 160 112 Q200 106 240 112 Q280 118 320 112" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>

  <!-- 거품 -->
  <circle cx="60" cy="130" r="5" fill="rgba(255,255,255,0.2)"/>
  <circle cx="80" cy="150" r="3" fill="rgba(255,255,255,0.15)"/>
  <circle cx="200" cy="140" r="4" fill="rgba(255,255,255,0.2)"/>
  <circle cx="240" cy="125" r="3" fill="rgba(255,255,255,0.15)"/>

  <!-- 물고기들 -->
  <text x="30"  y="155" font-size="32">🐠</text>
  <text x="110" y="165" font-size="28">🐡</text>
  <text x="185" y="148" font-size="30">🐟</text>
  <text x="255" y="160" font-size="26">🦐</text>

  <!-- 폭탄 -->
  <text x="155" y="90" font-size="26">💣</text>

  <!-- 잠자리채 -->
  <text x="60" y="88" font-size="30">🥅</text>

  <!-- 테두리 -->
  <rect x="0.5" y="0.5" width="319" height="179" fill="none" stroke="rgba(255,255,255,0.08)"/>

  <!-- 우하단 타이틀 -->
  <g font-family="'Pretendard','Noto Sans KR',sans-serif">
    <text x="296" y="148" text-anchor="end" font-size="22" font-weight="900" fill="#f9c74f">물고기 잡기</text>
    <text x="296" y="166" text-anchor="end" font-size="10" font-weight="500" fill="rgba(255,255,255,0.5)" letter-spacing="2">FISH CATCH</text>
  </g>
</svg>
