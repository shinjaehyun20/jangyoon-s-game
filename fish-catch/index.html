<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>🐟 물고기 잡기</title>
  <style>
    :root {
      --bg-top: #0a2463;
      --bg-bot: #1e5f8e;
      --water: #1a7abf;
      --accent: #f9c74f;
      --text: #ffffff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100vh; height: 100dvh;
      overflow: hidden;
      touch-action: manipulation;
      font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bot) 100%);
      color: var(--text);
      user-select: none;
    }
    .wrap {
      width: 100%; max-width: 480px;
      height: 100vh; height: 100dvh;
      display: flex; flex-direction: column;
      padding: 10px 12px 8px; gap: 6px;
      margin: 0 auto;
      position: relative;
    }
    h1 {
      font-size: clamp(18px, 5vw, 26px);
      text-align: center;
      text-shadow: 0 2px 8px rgba(0,0,0,0.4);
      flex-shrink: 0;
    }
    .hud {
      display: flex; justify-content: space-between; align-items: center;
      background: rgba(255,255,255,0.12); border-radius: 12px;
      padding: 6px 14px; flex-shrink: 0;
      font-size: clamp(13px, 3.5vw, 16px);
    }
    .hud span { font-weight: 700; color: var(--accent); }
    #gameArea {
      flex: 1;
      position: relative;
      overflow: hidden;
      border-radius: 16px;
      background: linear-gradient(180deg, #1565c0 0%, #0d47a1 60%, #01579b 100%);
      border: 2px solid rgba(255,255,255,0.2);
      cursor: none;
    }
    /* 물결 장식 */
    #gameArea::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 18px;
      background: repeating-linear-gradient(
        90deg,
        rgba(255,255,255,0.1) 0px, rgba(255,255,255,0.1) 30px,
        transparent 30px, transparent 60px
      );
      animation: wave 2s linear infinite;
    }
    @keyframes wave { from { background-position: 0 0; } to { background-position: 60px 0; } }

    .fish {
      position: absolute;
      font-size: clamp(24px, 7vw, 36px);
      cursor: pointer;
      transition: transform 0.1s;
      line-height: 1;
      will-change: transform;
    }
    .fish.caught {
      animation: pop 0.35s ease-out forwards;
      pointer-events: none;
    }
    @keyframes pop {
      0%   { transform: scale(1.4); opacity: 1; }
      60%  { transform: scale(2); opacity: 0.6; }
      100% { transform: scale(0); opacity: 0; }
    }
    .bomb {
      position: absolute;
      font-size: clamp(24px, 7vw, 36px);
      line-height: 1;
      cursor: pointer;
      will-change: transform;
    }
    /* 잠자리채 */
    #net {
      position: absolute;
      bottom: 10px;
      transform: translateX(-50%);
      font-size: clamp(32px, 9vw, 48px);
      pointer-events: none;
      transition: left 0.05s linear;
      filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5));
      z-index: 10;
    }
    /* 점수 팝업 */
    .score-pop {
      position: absolute;
      font-size: 20px; font-weight: 900;
      color: var(--accent);
      pointer-events: none;
      animation: floatUp 0.8s ease-out forwards;
      z-index: 20;
      text-shadow: 0 2px 4px rgba(0,0,0,0.5);
    }
    @keyframes floatUp {
      0%   { transform: translateY(0); opacity: 1; }
      100% { transform: translateY(-60px); opacity: 0; }
    }
    footer {
      display: flex; justify-content: space-between; align-items: center;
      flex-shrink: 0; font-size: 12px; opacity: 0.7;
    }
    .home-link {
      color: var(--text); text-decoration: none;
      background: rgba(255,255,255,0.15); border-radius: 8px;
      padding: 4px 10px; font-size: 12px;
    }
    /* 오버레이 */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(10, 36, 99, 0.88);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
    }
    .overlay.hidden { display: none; }
    .overlay-card {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 20px;
      padding: 28px 24px;
      text-align: center;
      max-width: 320px; width: 90%;
    }
    .overlay-card h2 { font-size: clamp(22px,6vw,30px); margin-bottom: 12px; }
    .overlay-card p { font-size: 14px; line-height: 1.6; opacity: 0.9; margin-bottom: 20px; }
    .result-score {
      font-size: 52px; font-weight: 900;
      color: var(--accent); margin: 8px 0;
    }
    .btn-start {
      background: var(--accent); color: #0a2463;
      border: none; border-radius: 14px;
      padding: 14px 36px; font-size: 18px; font-weight: 900;
      cursor: pointer; min-height: 52px;
      box-shadow: 0 4px 16px rgba(249,199,79,0.5);
    }
    .btn-start:active { transform: scale(0.95); }
    .best-label { font-size: 12px; opacity: 0.7; margin-top: 6px; }
    .lives { font-size: 18px; letter-spacing: 2px; }
  </style>
</head>
<body>
<div class="wrap">
  <h1>🐟 물고기 잡기</h1>
  <div class="hud">
    <div>점수: <span id="scoreDisplay">0</span></div>
    <div class="lives" id="livesDisplay">❤️❤️❤️</div>
    <div>⏱ <span id="timerDisplay">30</span></div>
  </div>
  <div id="gameArea">
    <div id="net">🥅</div>
  </div>
  <footer>
    <small>화면을 좌우로 드래그해 물고기를 잡아요!</small>
    <a class="home-link" href="../index.html">← 홈으로</a>
  </footer>
</div>

<!-- 시작 오버레이 -->
<div class="overlay" id="startOverlay">
  <div class="overlay-card">
    <h2>🐟 물고기 잡기</h2>
    <p>화면을 드래그해 잠자리채를 움직이고<br>물고기를 잡아요!<br>💣 폭탄은 피하세요 — 목숨이 줄어요</p>
    <button class="btn-start" id="startBtn">시작!</button>
    <div class="best-label" id="startBest"></div>
  </div>
</div>

<!-- 결과 오버레이 -->
<div class="overlay hidden" id="endOverlay">
  <div class="overlay-card">
    <h2>🎉 게임 종료!</h2>
    <div class="result-score" id="finalScore">0</div>
    <p id="resultMsg"></p>
    <button class="btn-start" id="restartBtn">다시 하기</button>
  </div>
</div>

<script>
(function () {
  'use strict';

  const CONFIG = {
    gameDuration: 30,       // 초
    spawnInterval: 1000,    // ms — 물고기 생성 주기
    bombRatio: 0.22,        // 폭탄 등장 확률
    fishSpeed: { min: 2, max: 5 },  // px/frame
    netSize: 56,            // 잠자리채 충돌 반경(px)
    storageKey: 'fish-catch_best',
    FISH_EMOJI: ['🐟','🐠','🐡','🦈','🦑','🦐','🦞','🐙','🦀'],
  };

  let state = {};
  let animId = null;
  let spawnTimer = null;

  const $area   = document.getElementById('gameArea');
  const $net    = document.getElementById('net');
  const $score  = document.getElementById('scoreDisplay');
  const $lives  = document.getElementById('livesDisplay');
  const $timer  = document.getElementById('timerDisplay');
  const $start  = document.getElementById('startOverlay');
  const $end    = document.getElementById('endOverlay');
  const $final  = document.getElementById('finalScore');
  const $msg    = document.getElementById('resultMsg');

  function getBest() { return parseInt(localStorage.getItem(CONFIG.storageKey) || '0', 10); }
  function saveBest(v) { localStorage.setItem(CONFIG.storageKey, v); }

  // 시작화면 최고기록 표시
  const $startBest = document.getElementById('startBest');
  function updateStartBest() {
    const b = getBest();
    $startBest.textContent = b > 0 ? `최고 기록: ${b}점` : '';
  }
  updateStartBest();

  /* ── 잠자리채 위치 (포인터 이벤트) ── */
  let netX = 50; // % of gameArea width

  function getAreaRect() { return $area.getBoundingClientRect(); }

  function moveNet(clientX) {
    const rect = getAreaRect();
    let x = clientX - rect.left;
    x = Math.max(20, Math.min(rect.width - 20, x));
    netX = x;
    $net.style.left = x + 'px';
  }

  $area.addEventListener('pointermove', e => {
    if (state.running) moveNet(e.clientX);
  });
  $area.addEventListener('pointerdown', e => {
    e.preventDefault();
    if (state.running) moveNet(e.clientX);
  });

  /* ── 초기화 ── */
  function init() {
    state = {
      running: false,
      score: 0,
      lives: 3,
      timeLeft: CONFIG.gameDuration,
      objects: [],   // { el, x, y, vy, type('fish'|'bomb'), id }
      nextId: 0,
    };
    $score.textContent = '0';
    $timer.textContent = CONFIG.gameDuration;
    renderLives();
    // 기존 오브젝트 제거
    $area.querySelectorAll('.fish, .bomb').forEach(el => el.remove());
    $area.querySelectorAll('.score-pop').forEach(el => el.remove());

    // 잠자리채 초기 위치
    const rect = getAreaRect();
    netX = rect.width / 2;
    $net.style.left = netX + 'px';
  }

  function renderLives() {
    $lives.textContent = '❤️'.repeat(Math.max(0, state.lives));
  }

  /* ── 오브젝트 생성 ── */
  function spawnObject() {
    if (!state.running) return;
    const rect = getAreaRect();
    const isBomb = Math.random() < CONFIG.bombRatio;
    const type = isBomb ? 'bomb' : 'fish';

    const el = document.createElement('div');
    el.className = type;
    const emoji = isBomb
      ? '💣'
      : CONFIG.FISH_EMOJI[Math.floor(Math.random() * CONFIG.FISH_EMOJI.length)];
    el.textContent = emoji;

    const x = 24 + Math.random() * (rect.width - 48);
    const vy = CONFIG.fishSpeed.min + Math.random() * (CONFIG.fishSpeed.max - CONFIG.fishSpeed.min);

    el.style.left = x + 'px';
    el.style.top = '-40px';
    $area.appendChild(el);

    const id = state.nextId++;
    state.objects.push({ el, x, y: -40, vy, type, id, active: true });
  }

  /* ── 충돌 감지 ── */
  function checkCollisions() {
    const rect = getAreaRect();
    const netBottom = rect.height - 22;
    const threshold = CONFIG.netSize;

    for (let i = state.objects.length - 1; i >= 0; i--) {
      const obj = state.objects[i];
      if (!obj.active) continue;

      const dx = Math.abs(obj.x - netX);
      const dy = Math.abs(obj.y - netBottom);

      if (dx < threshold && dy < 30) {
        obj.active = false;
        obj.el.classList.add('caught');
        setTimeout(() => obj.el.remove(), 400);
        state.objects.splice(i, 1);

        if (obj.type === 'fish') {
          state.score++;
          $score.textContent = state.score;
          showScorePop(obj.x, netBottom - 30, '+1');
        } else {
          state.lives = Math.max(0, state.lives - 1);
          renderLives();
          showScorePop(obj.x, netBottom - 30, '💥');
          if (state.lives <= 0) endGame();
        }
      } else if (obj.y > rect.height + 10) {
        // 화면 밖으로 벗어남
        obj.el.remove();
        state.objects.splice(i, 1);
      }
    }
  }

  function showScorePop(x, y, text) {
    const el = document.createElement('div');
    el.className = 'score-pop';
    el.textContent = text;
    el.style.left = x + 'px';
    el.style.top  = y + 'px';
    $area.appendChild(el);
    setTimeout(() => el.remove(), 800);
  }

  /* ── 메인 루프 ── */
  let lastTime = 0;

  function loop(ts) {
    if (!state.running) return;
    const dt = Math.min((ts - lastTime) / 16.67, 3); // normalize to 60fps
    lastTime = ts;

    const rect = getAreaRect();

    for (const obj of state.objects) {
      if (!obj.active) continue;
      obj.y += obj.vy * dt;
      obj.el.style.top = obj.y + 'px';
      // 물고기 좌우 흔들 (fish only)
      if (obj.type === 'fish') {
        const wobble = Math.sin(ts / 400 + obj.id) * 6;
        obj.el.style.left = (obj.x + wobble) + 'px';
      }
    }

    checkCollisions();
    animId = requestAnimationFrame(loop);
  }

  /* ── 타이머 ── */
  let timerInterval = null;

  function startTimer() {
    timerInterval = setInterval(() => {
      if (!state.running) return;
      state.timeLeft--;
      $timer.textContent = state.timeLeft;
      if (state.timeLeft <= 0) endGame();
    }, 1000);
  }

  /* ── 게임 시작 / 종료 ── */
  function startGame() {
    init();
    $start.classList.add('hidden');
    $end.classList.add('hidden');
    state.running = true;

    lastTime = performance.now();
    animId = requestAnimationFrame(loop);
    startTimer();
    spawnTimer = setInterval(spawnObject, CONFIG.spawnInterval);
  }

  function endGame() {
    state.running = false;
    cancelAnimationFrame(animId);
    clearInterval(timerInterval);
    clearInterval(spawnTimer);

    const best = getBest();
    if (state.score > best) saveBest(state.score);
    const newBest = getBest();

    $final.textContent = state.score + '점';
    const msgs = [
      [15, '대단해요! 물고기 왕이에요! 🏆'],
      [10, '잘했어요! 아주 훌륭해요! 🎉'],
      [5,  '조금 더 연습하면 만점! 💪'],
      [0,  '다음엔 더 잘 할 수 있어요! 🐟'],
    ];
    $msg.textContent = (msgs.find(([min]) => state.score >= min) || msgs[3])[1]
      + (state.score > best ? ' 🌟 최고 기록!' : ` (최고: ${newBest}점)`);

    $end.classList.remove('hidden');
    updateStartBest();
  }

  /* ── 버튼 ── */
  document.getElementById('startBtn').addEventListener('pointerdown', e => {
    e.stopPropagation(); startGame();
  });
  document.getElementById('restartBtn').addEventListener('pointerdown', e => {
    e.stopPropagation(); startGame();
  });

  /* ── 초기 표시 ── */
  init();
})();
</script>
</body>
</html>
