<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f2027"/>
      <stop offset="50%" stop-color="#203a43"/>
      <stop offset="100%" stop-color="#2c5364"/>
    </linearGradient>
  </defs>

  <rect width="320" height="180" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="319" height="179" fill="none" stroke="rgba(255,255,255,0.08)"/>

  <!-- 별 배경 -->
  <circle cx="12"  cy="12" r="1.5" fill="rgba(255,255,255,0.5)"/>
  <circle cx="40"  cy="6"  r="1"   fill="rgba(255,255,255,0.4)"/>
  <circle cx="290" cy="10" r="1.5" fill="rgba(255,255,255,0.4)"/>
  <circle cx="310" cy="35" r="1"   fill="rgba(255,255,255,0.35)"/>

  <!-- 메인 큰 표정 (목표) -->
  <rect x="90" y="10" width="140" height="70" rx="16" fill="rgba(249,199,79,0.12)" stroke="rgba(249,199,79,0.4)" stroke-width="1.5"/>
  <text x="105" y="30" font-family="sans-serif" font-size="11" fill="rgba(255,255,255,0.65)">이 표정을 찾아봐요!</text>
  <text x="160" y="68" font-family="sans-serif" font-size="48" text-anchor="middle">😊</text>
  <text x="160" y="90" font-family="sans-serif" font-size="12" fill="#f9c74f" text-anchor="middle" font-weight="700">행복해요</text>

  <!-- 4보기 그리드 -->
  <rect x="10"  y="105" width="67" height="60" rx="10" fill="rgba(59,203,110,0.18)" stroke="rgba(59,203,110,0.5)" stroke-width="1.5"/>
  <text x="43"  y="143" font-family="sans-serif" font-size="30" text-anchor="middle">😊</text>

  <rect x="84"  y="105" width="67" height="60" rx="10" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="117" y="143" font-family="sans-serif" font-size="30" text-anchor="middle">😢</text>

  <rect x="158" y="105" width="67" height="60" rx="10" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="191" y="143" font-family="sans-serif" font-size="30" text-anchor="middle">😡</text>

  <rect x="232" y="105" width="67" height="60" rx="10" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="265" y="143" font-family="sans-serif" font-size="30" text-anchor="middle">😱</text>

  <!-- 정답 체크 -->
  <text x="20" y="102" font-family="sans-serif" font-size="12">✅</text>

  <!-- 타이틀 -->
  <g font-family="'Pretendard','Noto Sans KR',sans-serif">
    <text x="296" y="170" text-anchor="end" font-size="20" font-weight="900" fill="#f9c74f">표정 맞추기</text>
    <text x="296" y="180" text-anchor="end" font-size="0">FACE MATCH</text>
  </g>
  <g font-family="'Pretendard','Noto Sans KR',sans-serif">
    <text x="300" y="169" text-anchor="end" font-size="19" font-weight="900" fill="#f9c74f">표정 맞추기</text>
    <text x="300" y="178" text-anchor="end" font-size="9"  font-weight="500" fill="rgba(255,255,255,0.5)" letter-spacing="2">FACE MATCH</text>
  </g>
</svg>
