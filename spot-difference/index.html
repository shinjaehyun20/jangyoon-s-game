<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>🔍 다른 그림 찾기</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d1b2a;
      --accent: #4ecdc4;
      --text: #ffffff;
    }
    html, body {
      height: 100vh; height: 100dvh;
      overflow: hidden;
      touch-action: manipulation;
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .wrap {
      width: 100%; max-width: 480px;
      height: 100vh; height: 100dvh;
      display: flex; flex-direction: column;
      padding: 10px 12px 8px; gap: 6px;
      margin: 0 auto;
    }
    h1 {
      font-size: clamp(18px, 5vw, 24px);
      text-align: center; font-weight: 900;
      text-shadow: 0 2px 8px rgba(78,205,196,0.5);
      flex-shrink: 0;
    }
    .hud {
      display: flex; flex-direction: row;
      justify-content: space-between; align-items: center;
      background: rgba(255,255,255,0.08);
      border-radius: 14px; padding: 8px 16px;
      flex-shrink: 0;
    }
    .hud-item { text-align: center; }
    .hud-label { font-size: 11px; opacity: 0.7; }
    .hud-val { font-size: 20px; font-weight: 900; }
    .hud-val.timer { color: #f7c948; }
    #gameArea {
      flex: 1;
      display: flex; flex-direction: column;
      gap: 6px;
      overflow: hidden;
    }
    .level-info {
      text-align: center; font-size: 14px;
      opacity: 0.8; font-weight: 700;
      flex-shrink: 0;
      color: #4ecdc4;
    }
    .panels {
      flex: 1;
      display: flex; flex-direction: row; gap: 8px;
      min-height: 0;
    }
    .panel {
      flex: 1;
      background: linear-gradient(160deg, #1b2838 0%, #243447 100%);
      border-radius: 14px;
      border: 2px solid rgba(78,205,196,0.2);
      position: relative;
      overflow: hidden;
      cursor: pointer;
    }
    .panel-label {
      position: absolute; top: 6px; left: 8px;
      font-size: 11px; font-weight: 700;
      background: rgba(0,0,0,0.5);
      padding: 2px 8px; border-radius: 6px;
      opacity: 0.8; z-index: 2;
    }
    .emoji-grid {
      position: absolute; inset: 28px 6px 6px;
      display: grid;
      gap: 2px;
      align-items: center; justify-items: center;
    }
    .cell {
      font-size: clamp(20px, 5vw, 32px);
      line-height: 1;
      user-select: none;
      display: flex; align-items: center; justify-content: center;
      width: 100%; height: 100%;
      border-radius: 6px;
      transition: transform 0.15s;
    }
    .cell.different {
      /* 다른 칸 — 시각적 마커 없음 (유저가 찾아야 함) */
    }
    .cell.found {
      background: rgba(78,205,196,0.3);
      transform: scale(1.15);
      box-shadow: 0 0 12px rgba(78,205,196,0.6);
    }
    .cell.wrong-flash {
      animation: wrongFlash 0.4s ease-out;
    }
    @keyframes wrongFlash {
      0%,100% { background: transparent; }
      50% { background: rgba(233,69,96,0.4); }
    }
    /* 찾은 표시 원 */
    .found-circle {
      position: absolute;
      border: 3px solid #4ecdc4;
      border-radius: 50%;
      pointer-events: none;
      animation: foundCircle 0.4s ease-out forwards;
    }
    @keyframes foundCircle {
      0%   { opacity: 0; transform: scale(0.5); }
      60%  { opacity: 1; transform: scale(1.2); }
      100% { opacity: 1; transform: scale(1); }
    }
    .score-pop {
      position: absolute;
      font-size: 24px; font-weight: 900;
      color: #f7c948;
      pointer-events: none;
      text-shadow: 0 2px 6px rgba(0,0,0,0.6);
      animation: scorePop 0.7s ease-out forwards;
      z-index: 10;
    }
    @keyframes scorePop {
      0%   { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-40px) scale(1.3); }
    }
    /* 힌트 버튼 */
    .hint-btn {
      position: absolute; bottom: 6px; right: 6px;
      background: rgba(247,201,72,0.2);
      border: 1px solid rgba(247,201,72,0.5);
      border-radius: 8px; padding: 4px 10px;
      color: #f7c948; font-size: 12px; font-weight: 700;
      cursor: pointer; z-index: 5;
      min-height: 32px;
    }
    footer {
      display: flex; justify-content: space-between; align-items: center;
      flex-shrink: 0;
    }
    footer small { font-size: 12px; opacity: 0.6; }
    .home-link {
      font-size: 13px; color: rgba(255,255,255,0.7);
      text-decoration: none;
      background: rgba(255,255,255,0.1);
      padding: 6px 12px; border-radius: 8px;
      min-height: 44px; display: flex; align-items: center;
    }
    /* overlays */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.82);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
    }
    .overlay.hidden { display: none; }
    .overlay-card {
      background: linear-gradient(135deg, #0d1b2a, #1b2838);
      border: 2px solid rgba(78,205,196,0.4);
      border-radius: 24px; padding: 32px 28px;
      text-align: center; max-width: 340px; width: 90%;
      box-shadow: 0 8px 32px rgba(78,205,196,0.15);
    }
    .overlay-card h2 { font-size: 28px; margin-bottom: 12px; }
    .overlay-card p  { font-size: 15px; opacity: 0.85; line-height: 1.7; margin-bottom: 20px; }
    .result-score { font-size: 52px; font-weight: 900; color: #f7c948; margin: 12px 0; }
    .result-best  { font-size: 14px; opacity: 0.7; margin-bottom: 16px; }
    .btn-start {
      background: linear-gradient(135deg, #4ecdc4, #2bb5ac);
      border: none; color: #fff;
      font-size: 20px; font-weight: 900;
      padding: 14px 40px; border-radius: 14px;
      min-height: 52px; cursor: pointer;
      box-shadow: 0 4px 16px rgba(78,205,196,0.4);
      width: 100%;
    }
    .btn-start:active { transform: scale(0.96); }
    /* 레벨 클리어 플래시 */
    .level-clear-overlay {
      position: absolute; inset: 0;
      background: rgba(78,205,196,0.15);
      display: flex; align-items: center; justify-content: center;
      border-radius: 12px;
      animation: levelClearAnim 0.8s ease-out forwards;
      pointer-events: none; z-index: 50;
    }
    @keyframes levelClearAnim {
      0%  { opacity: 0; }
      30% { opacity: 1; }
      100%{ opacity: 0; }
    }
    .level-clear-text {
      font-size: 32px; font-weight: 900;
      color: #4ecdc4; text-shadow: 0 2px 12px rgba(78,205,196,0.8);
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>🔍 다른 그림 찾기</h1>

    <div class="hud">
      <div class="hud-item">
        <div class="hud-label">점수</div>
        <div class="hud-val" id="scoreVal">0</div>
      </div>
      <div class="hud-item">
        <div class="hud-label">레벨</div>
        <div class="hud-val" id="levelVal">1</div>
      </div>
      <div class="hud-item">
        <div class="hud-label">남은 힌트</div>
        <div class="hud-val" id="hintVal">💡💡💡</div>
      </div>
      <div class="hud-item">
        <div class="hud-label">시간</div>
        <div class="hud-val timer" id="timerVal">45</div>
      </div>
    </div>

    <div id="gameArea">
      <div class="level-info" id="levelInfo">다른 곳을 찾아 탭해요!</div>
      <div class="panels">
        <div class="panel" id="panelA">
          <div class="panel-label">그림 A</div>
          <div class="emoji-grid" id="gridA"></div>
        </div>
        <div class="panel" id="panelB">
          <div class="panel-label">그림 B</div>
          <div class="emoji-grid" id="gridB"></div>
        </div>
      </div>
    </div>

    <footer>
      <small>두 그림에서 다른 곳을 찾아요!</small>
      <a class="home-link" href="../index.html">← 홈으로</a>
    </footer>
  </div>

  <!-- 시작 오버레이 -->
  <div class="overlay" id="startOverlay">
    <div class="overlay-card">
      <h2>🔍 다른 그림 찾기</h2>
      <p>두 그림을 비교해서<br><strong>다른 이모지</strong>를 탭해요!<br>레벨마다 다른 칸 수가 늘어나요.</p>
      <button class="btn-start" id="startBtn">시작!</button>
    </div>
  </div>

  <!-- 종료 오버레이 -->
  <div class="overlay hidden" id="endOverlay">
    <div class="overlay-card">
      <h2>🎉 게임 종료!</h2>
      <div class="result-score" id="finalScore">0</div>
      <div class="result-best" id="bestMsg"></div>
      <p id="resultMsg"></p>
      <button class="btn-start" id="restartBtn">다시 하기</button>
    </div>
  </div>

  <script>
  (function () {
    'use strict';

    // 레벨 설정: { rows, cols, diffs (다른 칸 수), time }
    const LEVELS = [
      { rows: 2, cols: 3, diffs: 1, time: 45 },
      { rows: 2, cols: 3, diffs: 2, time: 40 },
      { rows: 3, cols: 3, diffs: 2, time: 38 },
      { rows: 3, cols: 3, diffs: 3, time: 35 },
      { rows: 3, cols: 4, diffs: 3, time: 32 },
      { rows: 3, cols: 4, diffs: 4, time: 30 },
      { rows: 4, cols: 4, diffs: 4, time: 28 },
      { rows: 4, cols: 4, diffs: 5, time: 26 },
    ];

    // 테마별 이모지 풀
    const THEMES = [
      ['🐶','🐱','🐭','🐹','🐰','🦊','🐻','🐼','🐨','🐯','🦁','🐮','🐷','🐸','🐵'],
      ['🍎','🍊','🍋','🍇','🍓','🍑','🍒','🥭','🍍','🫐','🍈','🍏','🥝','🍌','🍉'],
      ['🚗','🚕','🚌','🚎','🏎️','🚓','🚑','🚒','🚐','🛻','🚚','🚛','🛺','🚲','🛵'],
      ['⚽','🏀','🏈','⚾','🎾','🏐','🏉','🎱','🏓','🏸','🥊','🥋','🎯','⛸️','🏹'],
      ['🌸','🌼','🌻','🌺','🌷','💐','🌹','🪷','🌝','🌞','⭐','🌟','💫','✨','🌈'],
    ];

    const state = {
      running: false,
      score: 0,
      level: 1,
      timeLeft: 45,
      hints: 3,
      gridData: [],      // [{emoji, isDiff}]
      diffIndexes: [],   // 다른 칸들의 index
      foundDiffs: [],    // 찾은 index
      timerInterval: null,
      theme: 0,
    };

    const scoreEl    = document.getElementById('scoreVal');
    const levelEl    = document.getElementById('levelVal');
    const hintEl     = document.getElementById('hintVal');
    const timerEl    = document.getElementById('timerVal');
    const levelInfo  = document.getElementById('levelInfo');
    const gridA      = document.getElementById('gridA');
    const gridB      = document.getElementById('gridB');
    const panelA     = document.getElementById('panelA');
    const panelB     = document.getElementById('panelB');
    const startOv    = document.getElementById('startOverlay');
    const endOv      = document.getElementById('endOverlay');

    document.getElementById('startBtn').addEventListener('click', startGame);
    document.getElementById('restartBtn').addEventListener('click', () => {
      endOv.classList.add('hidden');
      startOv.classList.remove('hidden');
    });

    function startGame() {
      startOv.classList.add('hidden');
      endOv.classList.add('hidden');
      Object.assign(state, { running: true, score: 0, level: 1, hints: 3, theme: 0 });
      scoreEl.textContent = state.score;
      levelEl.textContent = state.level;
      updateHintUI();
      buildLevel();
    }

    function buildLevel() {
      const cfg = LEVELS[Math.min(state.level - 1, LEVELS.length - 1)];
      state.timeLeft = cfg.time;
      timerEl.textContent = state.timeLeft;

      // 테마 순환
      state.theme = (state.level - 1) % THEMES.length;
      const pool = [...THEMES[state.theme]];
      shuffle(pool);

      const total = cfg.rows * cfg.cols;
      const base = pool.slice(0, total);

      // 다른 칸 인덱스 선정
      const diffIdx = [];
      const idxPool = Array.from({length: total}, (_, i) => i);
      shuffle(idxPool);
      for (let i = 0; i < cfg.diffs; i++) diffIdx.push(idxPool[i]);

      // B grid: diff 칸만 다른 이모지로 교체
      const altPool = pool.slice(total);
      // alt 부족하면 다른 테마에서 보충
      const extra = THEMES[(state.theme + 1) % THEMES.length];
      const altAll = [...altPool, ...extra];

      const bGrid = [...base];
      let altIdx = 0;
      diffIdx.forEach(idx => {
        let alt = altAll[altIdx % altAll.length];
        // base에 없는 emoji 고르기
        while (base.includes(alt) || (altIdx > 0 && bGrid.includes(alt))) {
          altIdx++;
          alt = altAll[altIdx % altAll.length];
        }
        bGrid[idx] = alt;
        altIdx++;
      });

      state.gridData = base;
      state.bGridData = bGrid;
      state.diffIndexes = diffIdx;
      state.foundDiffs  = [];
      state.cfg = cfg;

      renderGrids(cfg, base, bGrid);
      levelEl.textContent = state.level;
      levelInfo.textContent = `다른 곳 ${cfg.diffs}개를 찾아요!`;

      clearInterval(state.timerInterval);
      state.timerInterval = setInterval(tick, 1000);
    }

    function renderGrids(cfg, aData, bData) {
      gridA.style.gridTemplateColumns = `repeat(${cfg.cols}, 1fr)`;
      gridA.style.gridTemplateRows    = `repeat(${cfg.rows}, 1fr)`;
      gridB.style.gridTemplateColumns = `repeat(${cfg.cols}, 1fr)`;
      gridB.style.gridTemplateRows    = `repeat(${cfg.rows}, 1fr)`;

      gridA.innerHTML = '';
      gridB.innerHTML = '';

      aData.forEach((emoji, i) => {
        const cell = makeCell(emoji, i, 'A');
        gridA.appendChild(cell);
      });
      bData.forEach((emoji, i) => {
        const cell = makeCell(emoji, i, 'B');
        if (state.diffIndexes.includes(i)) cell.classList.add('different');
        gridB.appendChild(cell);
      });
    }

    function makeCell(emoji, idx, side) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.textContent = emoji;
      cell.dataset.idx  = idx;
      cell.dataset.side = side;
      cell.addEventListener('pointerdown', onCellTap);
      return cell;
    }

    function onCellTap(e) {
      if (!state.running) return;
      const cell = e.currentTarget;
      const idx  = parseInt(cell.dataset.idx);
      const side = cell.dataset.side;

      if (state.foundDiffs.includes(idx)) return; // 이미 찾음

      if (state.diffIndexes.includes(idx)) {
        // 정답!
        state.foundDiffs.push(idx);
        markFound(idx);
        const pts = 50 + (state.level - 1) * 10;
        state.score += pts;
        scoreEl.textContent = state.score;

        showScorePop(cell, '+' + pts);

        if (state.foundDiffs.length >= state.cfg.diffs) {
          // 레벨 클리어
          clearInterval(state.timerInterval);
          setTimeout(nextLevel, 1000);
        }
      } else {
        // 오답
        cell.classList.add('wrong-flash');
        setTimeout(() => cell.classList.remove('wrong-flash'), 400);
        state.score = Math.max(0, state.score - 5);
        scoreEl.textContent = state.score;
      }
    }

    function markFound(idx) {
      // A, B 모두 표시
      const cellsA = gridA.querySelectorAll('.cell');
      const cellsB = gridB.querySelectorAll('.cell');
      if (cellsA[idx]) cellsA[idx].classList.add('found');
      if (cellsB[idx]) cellsB[idx].classList.add('found');
    }

    function showScorePop(cell, text) {
      const rect = cell.getBoundingClientRect();
      const panelRect = cell.closest('.panel').getBoundingClientRect();
      const el = document.createElement('div');
      el.className = 'score-pop';
      el.textContent = text;
      el.style.left = (rect.left - panelRect.left + rect.width/2 - 16) + 'px';
      el.style.top  = (rect.top - panelRect.top - 10) + 'px';
      cell.closest('.panel').appendChild(el);
      setTimeout(() => el.remove(), 700);
    }

    function nextLevel() {
      state.level++;
      // 레벨 클리어 이펙트
      showLevelClear();
      setTimeout(() => {
        if (state.level > 10) {
          endGame(true);
        } else {
          buildLevel();
        }
      }, 900);
    }

    function showLevelClear() {
      [panelA, panelB].forEach(p => {
        const el = document.createElement('div');
        el.className = 'level-clear-overlay';
        el.innerHTML = `<div class="level-clear-text">레벨 ${state.level - 1} 클리어!<br>⭐ 다음 레벨로!</div>`;
        p.appendChild(el);
        setTimeout(() => el.remove(), 900);
      });
    }

    function tick() {
      if (!state.running) return;
      state.timeLeft--;
      timerEl.textContent = state.timeLeft;
      if (state.timeLeft <= 10) timerEl.style.color = '#e94560';
      else timerEl.style.color = '#f7c948';
      if (state.timeLeft <= 0) {
        clearInterval(state.timerInterval);
        // 힌트로 자동 보여주기
        revealRemaining();
        setTimeout(endGame, 1200);
      }
    }

    function revealRemaining() {
      state.diffIndexes.forEach(idx => {
        if (!state.foundDiffs.includes(idx)) {
          markFound(idx);
        }
      });
    }

    // 힌트: 패널B의 다른 칸 하나를 깜빡임으로 표시
    panelB.addEventListener('pointerdown', e => {
      // 힌트 버튼은 grid 아닌 panel 직접 탭 시 (그냥 무시)
    });

    // 힌트 발동 — HUD 힌트 탭
    hintEl.addEventListener('pointerdown', useHint);

    function useHint() {
      if (!state.running || state.hints <= 0) return;
      const remaining = state.diffIndexes.filter(i => !state.foundDiffs.includes(i));
      if (remaining.length === 0) return;
      state.hints--;
      updateHintUI();

      const idx = remaining[Math.floor(Math.random() * remaining.length)];
      const cellsB = gridB.querySelectorAll('.cell');
      const cell = cellsB[idx];
      if (cell) {
        cell.style.animation = 'none';
        cell.style.boxShadow = '0 0 16px 4px rgba(247,201,72,0.8)';
        setTimeout(() => { cell.style.boxShadow = ''; }, 1400);
      }
    }

    function updateHintUI() {
      hintEl.textContent = '💡'.repeat(state.hints) + (state.hints < 3 ? '⬜'.repeat(3 - state.hints) : '');
    }

    function endGame(cleared = false) {
      state.running = false;
      clearInterval(state.timerInterval);

      const best = parseInt(localStorage.getItem('spot-difference_best') || '0');
      const newBest = state.score > best;
      if (newBest) localStorage.setItem('spot-difference_best', state.score);
      const curBest = newBest ? state.score : best;

      document.getElementById('finalScore').textContent = state.score;
      document.getElementById('bestMsg').textContent = newBest ? '🏆 최고 기록 갱신!' : `최고 기록: ${curBest}점`;
      document.getElementById('resultMsg').textContent =
        state.score >= 300 ? '🔍 숨은 그림 탐정 마스터!' :
        state.score >= 150 ? '👀 눈이 정말 밝네요!' : '🔎 더 집중해봐요!';

      endOv.classList.remove('hidden');
    }

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

  })();
  </script>
</body>
</html>
