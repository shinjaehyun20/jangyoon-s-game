<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>달 로켓 연료 계산</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0} html,body{height:100vh;height:100dvh;overflow:hidden;touch-action:manipulation;font-family:'Noto Sans KR','Apple SD Gothic Neo',sans-serif;background:linear-gradient(180deg,#151943 0%,#332061 54%,#f6a855 100%);color:#fff}.wrap{width:100%;max-width:480px;height:100vh;height:100dvh;margin:0 auto;padding:10px 12px 8px;display:flex;flex-direction:column;gap:8px}h1{font-size:clamp(20px,5.5vw,28px);text-align:center;text-shadow:0 3px 0 rgba(0,0,0,.18)}.hud{display:flex;gap:8px;justify-content:space-between}.pill{flex:1;text-align:center;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.22);border-radius:14px;padding:8px 6px;font-weight:900}.stage{position:relative;flex:1;min-height:0;border-radius:22px;background:radial-gradient(circle at 50% 15%,rgba(255,255,255,.22),transparent 26%),rgba(6,10,36,.55);border:1px solid rgba(255,255,255,.22);overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:space-around;padding:16px}.stars{position:absolute;inset:0;pointer-events:none;background-image:radial-gradient(#fff 1px,transparent 1px);background-size:34px 34px;opacity:.35}.rocket{font-size:64px;filter:drop-shadow(0 10px 10px rgba(0,0,0,.25));transition:transform .25s}.problem{position:relative;z-index:1;font-size:clamp(34px,11vw,58px);font-weight:1000;letter-spacing:1px;background:rgba(255,255,255,.13);border-radius:20px;padding:10px 20px}.answers{position:relative;z-index:1;width:100%;display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.ans{min-height:58px;border:0;border-radius:18px;background:linear-gradient(180deg,#fff,#ffe4a3);color:#3d2350;font-size:clamp(24px,8vw,38px);font-weight:1000;box-shadow:0 7px 0 #d88a2a}.ans:active{transform:translateY(4px);box-shadow:0 3px 0 #d88a2a}.feedback{position:relative;z-index:1;min-height:28px;font-size:20px;font-weight:900}.shake{animation:shake .25s}.boost{transform:translateY(-28px) scale(1.08)}@keyframes shake{25%{transform:translateX(-7px)}50%{transform:translateX(7px)}75%{transform:translateX(-4px)}}footer{display:flex;justify-content:space-between;align-items:center;font-size:12px;opacity:.95}.home-link{color:#fff;font-weight:900;text-decoration:none;background:rgba(0,0,0,.22);padding:7px 10px;border-radius:10px}.overlay{position:fixed;inset:0;background:rgba(7,8,22,.72);display:flex;align-items:center;justify-content:center;padding:18px;z-index:5}.overlay.hidden{display:none}.overlay-card{width:min(420px,100%);background:linear-gradient(180deg,#fff,#fff0c8);color:#2f2355;border-radius:24px;padding:22px;text-align:center;box-shadow:0 18px 0 rgba(0,0,0,.18)}.overlay-card h2{font-size:28px;margin-bottom:10px}.overlay-card p{line-height:1.55;font-weight:800}.btn-start{margin-top:16px;min-height:52px;border:0;border-radius:18px;padding:0 24px;background:#6c5ce7;color:white;font-size:22px;font-weight:1000;box-shadow:0 7px 0 #40359b}.result-score{font-size:44px;font-weight:1000;color:#e17055;margin:10px 0}
  </style>
</head>
<body>
  <div class="wrap"><h1>🌙 달 로켓 연료 계산</h1><div class="hud"><div class="pill">점수 <span id="score">0</span></div><div class="pill">시간 <span id="time">45</span></div><div class="pill">최고 <span id="best">0</span></div></div><div class="stage" id="stage"><div class="stars"></div><div class="rocket" id="rocket">🚀</div><div class="problem" id="problem">1+1=?</div><div class="answers" id="answers"></div><div class="feedback" id="feedback">정답 연료를 골라요!</div></div><footer><small>덧셈·뺄셈 연료를 맞히면 로켓이 달까지 슝!</small><a class="home-link" href="../index.html">← 홈으로</a></footer></div>
  <div class="overlay" id="startOverlay"><div class="overlay-card"><h2>🌙 달 로켓 연료 계산</h2><p>문제를 보고 맞는 숫자를 탭해요.<br>정답이면 로켓 연료가 차고 점수가 올라가요!</p><button class="btn-start" id="startBtn">발사 준비!</button></div></div>
  <div class="overlay hidden" id="endOverlay"><div class="overlay-card"><h2>🎉 임무 완료!</h2><div class="result-score" id="finalScore">0</div><p id="resultMsg"></p><button class="btn-start" id="restartBtn">다시 발사!</button></div></div>
<script>
(function(){'use strict';const CONFIG={duration:45,key:'moon-rocket-math_best'};const el={score:document.getElementById('score'),time:document.getElementById('time'),best:document.getElementById('best'),problem:document.getElementById('problem'),answers:document.getElementById('answers'),feedback:document.getElementById('feedback'),rocket:document.getElementById('rocket'),stage:document.getElementById('stage'),start:document.getElementById('startOverlay'),end:document.getElementById('endOverlay'),final:document.getElementById('finalScore'),msg:document.getElementById('resultMsg')};let state={score:0,time:CONFIG.duration,answer:0,timer:null,running:false};function best(){return Number(localStorage.getItem(CONFIG.key)||0)}function setBest(v){localStorage.setItem(CONFIG.key,String(v));el.best.textContent=v}function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a}function makeProblem(){let a=rnd(1,9),b=rnd(1,9),op=Math.random()<.72?'+':'-';if(op==='-'&&b>a){const t=a;a=b;b=t}state.answer=op==='+'?a+b:a-b;el.problem.textContent=`${a} ${op} ${b} = ?`;const opts=new Set([state.answer]);while(opts.size<3)opts.add(Math.max(0,state.answer+rnd(-4,4)));const arr=[...opts].sort(()=>Math.random()-.5);el.answers.innerHTML='';arr.forEach(n=>{const btn=document.createElement('button');btn.className='ans';btn.textContent=n;btn.addEventListener('pointerdown',()=>choose(n));el.answers.appendChild(btn)})}function choose(n){if(!state.running)return;if(n===state.answer){state.score+=10;el.score.textContent=state.score;el.feedback.textContent='정답! 연료 충전 🔥';el.rocket.classList.add('boost');setTimeout(()=>el.rocket.classList.remove('boost'),240);makeProblem()}else{state.score=Math.max(0,state.score-3);el.score.textContent=state.score;el.feedback.textContent='아깝다! 다시 계산해봐 💪';el.stage.classList.add('shake');setTimeout(()=>el.stage.classList.remove('shake'),260)}}function tick(){state.time-=1;el.time.textContent=state.time;if(state.time<=0)finish()}function start(){clearInterval(state.timer);state={score:0,time:CONFIG.duration,answer:0,timer:null,running:true};el.score.textContent=0;el.time.textContent=CONFIG.duration;el.best.textContent=best();el.start.classList.add('hidden');el.end.classList.add('hidden');makeProblem();state.timer=setInterval(tick,1000)}function finish(){state.running=false;clearInterval(state.timer);const old=best();if(state.score>old)setBest(state.score);el.final.textContent=`${state.score}점`;el.msg.textContent=state.score>=120?'달 착륙 성공! 최고의 연료 박사야 🌕':'좋았어! 한 번 더 하면 달에 더 가까워져 🚀';el.end.classList.remove('hidden')}document.getElementById('startBtn').addEventListener('pointerdown',start);document.getElementById('restartBtn').addEventListener('pointerdown',start);el.best.textContent=best();})();
</script></body></html>
