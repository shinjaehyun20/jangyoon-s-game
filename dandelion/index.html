<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>민들레 홀씨 날리기</title>
  <style>
    :root {
      --bg-top: #87CEEB;
      --bg-bottom: #c8f0c8;
      --accent: #FFD700;
      --green: #4CAF50;
      --text: #fff;
      --shadow: rgba(0,0,0,0.15);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100vh; height: 100dvh;
      overflow: hidden;
      touch-action: manipulation;
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
      user-select: none;
    }
    .wrap {
      width: 100%; max-width: 480px;
      height: 100vh; height: 100dvh;
      display: flex; flex-direction: column;
      padding: 10px 12px 8px; gap: 6px;
      margin: 0 auto;
      position: relative;
    }
    h1 {
      text-align: center;
      font-size: clamp(18px, 5.5vw, 26px);
      font-weight: 900;
      color: #fff;
      text-shadow: 0 2px 6px var(--shadow);
    }
    .hud {
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(255,255,255,0.25);
      border-radius: 14px; padding: 6px 14px;
      font-size: clamp(13px, 4vw, 17px);
      font-weight: 700; color: #3a5a00;
    }
    .hud-item { display: flex; flex-direction: column; align-items: center; }
    .hud-label { font-size: 10px; color: rgba(0,0,0,0.4); font-weight: 500; }
    .hud-val { font-size: clamp(16px, 5vw, 22px); font-weight: 900; }
    #gameArea {
      flex: 1;
      position: relative;
      overflow: hidden;
      border-radius: 18px;
      background: transparent;
    }
    /* 민들레 줄기+꽃 */
    .dandelion-wrap {
      position: absolute;
      bottom: 0; left: 50%; transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center;
      pointer-events: none;
    }
    .stem {
      width: 4px;
      background: linear-gradient(to top, #3a7d2a, #6abf55);
      border-radius: 2px;
    }
    .flower-head {
      position: relative;
      display: flex; align-items: center; justify-content: center;
      filter: drop-shadow(0 3px 6px rgba(0,0,0,0.12));
    }
    .flower-center {
      width: 34px; height: 34px;
      background: radial-gradient(circle, #ffe066 60%, #ffc300 100%);
      border-radius: 50%;
      position: relative; z-index: 2;
    }
    /* 홀씨들은 JS가 캔버스로 그림 */
    canvas {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      touch-action: none;
    }
    footer {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0 2px;
    }
    footer small { font-size: 11px; color: rgba(0,0,0,0.35); }
    .home-link {
      font-size: 12px; color: rgba(0,0,0,0.4);
      text-decoration: none; font-weight: 600;
    }
    /* 오버레이 공통 */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.38);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
    }
    .overlay.hidden { display: none; }
    .overlay-card {
      background: #fff;
      border-radius: 24px;
      padding: 28px 28px 22px;
      text-align: center;
      max-width: 320px; width: 88%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    }
    .overlay-card h2 {
      font-size: 26px; font-weight: 900; color: #3a5a00; margin-bottom: 10px;
    }
    .overlay-card p {
      font-size: 14px; color: #555; line-height: 1.6; margin-bottom: 18px;
    }
    .result-score {
      font-size: 56px; font-weight: 900;
      color: #FFD700; text-shadow: 0 2px 8px rgba(200,150,0,0.25);
      margin: 10px 0;
      line-height: 1;
    }
    .result-label { font-size: 13px; color: #888; margin-bottom: 6px; }
    .result-msg { font-size: 16px; font-weight: 700; color: #3a5a00; margin-bottom: 16px; }
    .btn-start {
      background: linear-gradient(135deg, #6abf55, #3a7d2a);
      color: #fff; border: none; border-radius: 50px;
      padding: 0 32px; min-height: 52px;
      font-size: 18px; font-weight: 900; cursor: pointer;
      box-shadow: 0 4px 12px rgba(58,125,42,0.3);
      transition: transform 0.1s;
      width: 100%;
    }
    .btn-start:active { transform: scale(0.96); }
    /* 칭찬 팝업 */
    .praise {
      position: absolute;
      font-size: clamp(22px, 6vw, 34px);
      font-weight: 900;
      color: #FFD700;
      text-shadow: 0 2px 8px rgba(0,0,0,0.18);
      pointer-events: none;
      animation: praiseAnim 1.1s ease-out forwards;
      white-space: nowrap;
      z-index: 50;
    }
    @keyframes praiseAnim {
      0%   { opacity: 1; transform: scale(0.7) translateY(0); }
      60%  { opacity: 1; transform: scale(1.15) translateY(-28px); }
      100% { opacity: 0; transform: scale(1.0) translateY(-60px); }
    }
    /* 구름 배경 */
    .cloud {
      position: absolute;
      background: rgba(255,255,255,0.7);
      border-radius: 50%;
      pointer-events: none;
      animation: cloudDrift linear infinite;
    }
    @keyframes cloudDrift {
      from { transform: translateX(-20%); }
      to   { transform: translateX(110vw); }
    }
    /* 날아가는 완료 연출 */
    @keyframes seedFly {
      0%   { opacity: 1; transform: translate(0,0) scale(1); }
      100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(0.5); }
    }
  </style>
</head>
<body>
<div class="wrap">
  <h1>🌼 민들레 홀씨 날리기</h1>

  <div class="hud">
    <div class="hud-item">
      <span class="hud-label">날린 홀씨</span>
      <span class="hud-val" id="scoreVal">0</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">민들레</span>
      <span class="hud-val" id="roundVal">1 / 5</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">최고기록</span>
      <span class="hud-val" id="bestVal">0</span>
    </div>
  </div>

  <div id="gameArea">
    <canvas id="gc"></canvas>
    <div class="dandelion-wrap" id="dandelionWrap">
      <div class="flower-head" id="flowerHead">
        <div class="flower-center" id="flowerCenter"></div>
      </div>
      <div class="stem" id="stem"></div>
    </div>
  </div>

  <footer>
    <small>탭하거나 쓸어서 홀씨를 날려요! 🌬️</small>
    <a class="home-link" href="../index.html">← 홈으로</a>
  </footer>
</div>

<!-- 시작 오버레이 -->
<div class="overlay" id="startOverlay">
  <div class="overlay-card">
    <h2>🌼 민들레</h2>
    <p>민들레를 탭하거나 쓸면<br>홀씨가 바람에 날아가요!<br>5개의 민들레를 모두 날려봐요 🌬️</p>
    <button class="btn-start" id="startBtn">시작!</button>
  </div>
</div>

<!-- 종료 오버레이 -->
<div class="overlay hidden" id="endOverlay">
  <div class="overlay-card">
    <h2>🎉 완성!</h2>
    <div class="result-label">날린 홀씨 수</div>
    <div class="result-score" id="finalScore">0</div>
    <div class="result-msg" id="resultMsg">잘했어요!</div>
    <button class="btn-start" id="restartBtn">다시 하기</button>
  </div>
</div>

<script>
(function () {
  'use strict';

  /* ── CONFIG ── */
  const CONFIG = {
    ROUNDS: 5,
    SEEDS_PER_ROUND: 12,   // 민들레 1개당 홀씨 수
    SEED_RADIUS: 7,
    STEM_MIN: 80,
    STEM_MAX: 130,
    SWIPE_DIST_MIN: 18,    // px — 이 이상 움직이면 쓸기로 인정
    FLY_DURATION: 1400,    // ms — 홀씨 날아가는 시간
    BEST_KEY: 'dandelion_best',
    PRAISE_LIST: [
      '잘했어요! 🌟', '훌륭해요! ⭐', '최고야! 🎉',
      '대단해요! 💛', '멋져요! 🌈', '완벽해! ✨',
    ],
  };

  /* ── STATE ── */
  let state = {
    phase: 'idle',        // idle | playing | end
    round: 0,
    totalSeeds: 0,
    seeds: [],            // { x,y, angle, alive, flyProg }
    flownCount: 0,        // 이번 라운드 날린 홀씨
    activePointer: null,  // { id, startX, startY }
    animId: null,
    stemH: 100,
    flowerCX: 0, flowerCY: 0,  // 꽃 중심 좌표 (게임 영역 기준)
  };

  /* ── DOM ── */
  const canvas     = document.getElementById('gc');
  const ctx        = canvas.getContext('2d');
  const gameArea   = document.getElementById('gameArea');
  const dWrap      = document.getElementById('dandelionWrap');
  const stem       = document.getElementById('stem');
  const flowerHead = document.getElementById('flowerHead');
  const startOverlay = document.getElementById('startOverlay');
  const endOverlay   = document.getElementById('endOverlay');
  const startBtn   = document.getElementById('startBtn');
  const restartBtn = document.getElementById('restartBtn');
  const scoreEl    = document.getElementById('scoreVal');
  const roundEl    = document.getElementById('roundVal');
  const bestEl     = document.getElementById('bestVal');
  const finalScore = document.getElementById('finalScore');
  const resultMsg  = document.getElementById('resultMsg');

  /* ── BEST SCORE ── */
  function getBest () { return parseInt(localStorage.getItem(CONFIG.BEST_KEY) || '0', 10); }
  function saveBest (v) { localStorage.setItem(CONFIG.BEST_KEY, String(v)); }

  /* ── CLOUDS (배경 구름) ── */
  function spawnCloud () {
    const c = document.createElement('div');
    c.className = 'cloud';
    const size = 40 + Math.random() * 80;
    const top  = 5 + Math.random() * 35;
    const dur  = 18 + Math.random() * 22;
    c.style.cssText = `
      width:${size}px; height:${size*0.55}px;
      top:${top}%;left:-${size+20}px;
      animation-duration:${dur}s;
      opacity:${0.5+Math.random()*0.35};
    `;
    gameArea.appendChild(c);
    setTimeout(() => c.remove(), dur * 1000 + 500);
  }
  setInterval(spawnCloud, 4000);
  spawnCloud();

  /* ── CANVAS RESIZE ── */
  function resizeCanvas () {
    canvas.width  = gameArea.clientWidth;
    canvas.height = gameArea.clientHeight;
    if (state.phase === 'playing') updateFlowerPos();
  }
  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();

  /* ── 꽃 위치 계산 ── */
  function updateFlowerPos () {
    const aH = gameArea.clientHeight;
    const stemH = CONFIG.STEM_MIN + Math.random() * (CONFIG.STEM_MAX - CONFIG.STEM_MIN);
    state.stemH = Math.min(stemH, aH * 0.45);
    stem.style.height = state.stemH + 'px';

    const headH = flowerHead.offsetHeight || 34;
    const rect  = gameArea.getBoundingClientRect();
    const wRect = dWrap.getBoundingClientRect();
    state.flowerCX = wRect.left + wRect.width / 2 - rect.left;
    state.flowerCY = wRect.top  + headH / 2       - rect.top;
  }

  /* ── 씨앗 배치 ── */
  function placeSeedsOnFlower () {
    state.seeds = [];
    const N = CONFIG.SEEDS_PER_ROUND;
    const r = 28 + Math.random() * 12;   // 꽃 반경 약간 랜덤
    for (let i = 0; i < N; i++) {
      const angle = (2 * Math.PI * i / N) + (Math.random() * 0.18 - 0.09);
      state.seeds.push({
        x: state.flowerCX + Math.cos(angle) * r,
        y: state.flowerCY + Math.sin(angle) * r,
        angle,
        alive: true,
        flyProg: -1,   // -1 = 아직 안 날음
        flyDX: 0, flyDY: 0,
        startX: 0, startY: 0,
      });
    }
    state.flownCount = 0;
  }

  /* ── 홀씨 날리기 ── */
  function blowSeed (seed, dirX, dirY) {
    if (!seed.alive) return;
    seed.alive = false;
    seed.startX = seed.x;
    seed.startY = seed.y;
    const speed = 120 + Math.random() * 180;
    const scatter = (Math.random() - 0.5) * 1.2;
    seed.flyDX = (dirX + scatter) * speed;
    seed.flyDY = (dirY + scatter * 0.5) * speed - 80;
    seed.flyProg = 0;
    state.flownCount++;
    state.totalSeeds++;
    scoreEl.textContent = state.totalSeeds;

    // 전부 날아갔으면 다음 라운드
    if (state.flownCount === CONFIG.SEEDS_PER_ROUND) {
      showPraise();
      setTimeout(() => nextRound(), 1000);
    }
  }

  /* ── 범위 내 씨앗 날리기 (탭·쓸기) ── */
  function blowNearSeeds (cx, cy, dirX, dirY, radius) {
    let blown = false;
    state.seeds.forEach(s => {
      if (!s.alive) return;
      const dx = s.x - cx, dy = s.y - cy;
      if (Math.hypot(dx, dy) < radius) {
        blowSeed(s, dirX, dirY);
        blown = true;
      }
    });
    return blown;
  }

  /* ── 탭: 모든 살아있는 씨앗 방사형 날리기 (꽃 중심 근처 탭) ── */
  function blowAllFromTap (tapX, tapY) {
    // 꽃 중심과의 거리
    const dist = Math.hypot(tapX - state.flowerCX, tapY - state.flowerCY);
    const radius = state.stemH * 0.6;   // 꽃 영역 반경
    if (dist > radius) return false;

    // 탭 위치에서 꽃 바깥쪽으로 날리기
    state.seeds.forEach(s => {
      if (!s.alive) return;
      const dx = s.x - state.flowerCX;
      const dy = s.y - state.flowerCY;
      const len = Math.hypot(dx, dy) || 1;
      blowSeed(s, dx / len, dy / len);
    });
    return true;
  }

  /* ── 칭찬 팝업 ── */
  function showPraise () {
    const el = document.createElement('div');
    el.className = 'praise';
    el.textContent = CONFIG.PRAISE_LIST[Math.floor(Math.random() * CONFIG.PRAISE_LIST.length)];
    el.style.left = (20 + Math.random() * 50) + '%';
    el.style.top  = (30 + Math.random() * 30) + '%';
    el.style.transform = 'translateX(-50%)';
    gameArea.appendChild(el);
    setTimeout(() => el.remove(), 1200);
  }

  /* ── 라운드 전환 ── */
  function nextRound () {
    state.round++;
    if (state.round > CONFIG.ROUNDS) {
      endGame();
      return;
    }
    roundEl.textContent = `${state.round} / ${CONFIG.ROUNDS}`;
    // 새 민들레 위치 재계산
    setTimeout(() => {
      updateFlowerPos();
      placeSeedsOnFlower();
    }, 200);
  }

  /* ── 게임 종료 ── */
  function endGame () {
    state.phase = 'end';
    cancelAnimationFrame(state.animId);
    const best = getBest();
    if (state.totalSeeds > best) saveBest(state.totalSeeds);
    bestEl.textContent = Math.max(best, state.totalSeeds);
    finalScore.textContent = state.totalSeeds;
    const maxPossible = CONFIG.ROUNDS * CONFIG.SEEDS_PER_ROUND;
    const ratio = state.totalSeeds / maxPossible;
    resultMsg.textContent =
      ratio >= 0.9 ? '🌟 완벽해요! 모든 홀씨를 날렸어요!' :
      ratio >= 0.7 ? '💛 정말 잘했어요! 거의 다 날렸어요!' :
      ratio >= 0.4 ? '😊 잘했어요! 바람이 세게 불었네요!' :
                     '🌼 재미있었나요? 다시 해봐요!';
    endOverlay.classList.remove('hidden');
    ctx.clearRect(0, 0, canvas.width, canvas.height);
  }

  /* ── 게임 시작 ── */
  function startGame () {
    startOverlay.classList.add('hidden');
    endOverlay.classList.add('hidden');
    state.phase   = 'playing';
    state.round   = 1;
    state.totalSeeds = 0;
    scoreEl.textContent = '0';
    roundEl.textContent = `1 / ${CONFIG.ROUNDS}`;
    bestEl.textContent  = getBest();
    setTimeout(() => {
      resizeCanvas();
      updateFlowerPos();
      placeSeedsOnFlower();
      loop();
    }, 60);
  }

  /* ── 렌더 루프 ── */
  function loop () {
    if (state.phase !== 'playing') return;
    state.animId = requestAnimationFrame(loop);
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawSeeds();
  }

  /* ── 홀씨 그리기 ── */
  function drawSeeds () {
    const now = performance.now();
    state.seeds.forEach(s => {
      if (s.flyProg < 0) {
        // 살아있는 홀씨 — 꽃 위에 고정
        drawOneSeed(s.x, s.y, 1);
      } else {
        // 날아가는 홀씨
        s.flyProg += 16 / CONFIG.FLY_DURATION;
        if (s.flyProg >= 1) { s.flyProg = 1; }
        const t   = easeOut(s.flyProg);
        const x   = s.startX + s.flyDX * t;
        const y   = s.startY + s.flyDY * t + 80 * t * t;  // 약간 중력
        const alpha = 1 - t * 0.9;
        drawOneSeed(x, y, alpha);
      }
    });
  }

  function drawOneSeed (x, y, alpha) {
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(x, y);

    // 씨앗 줄기 (짧은 선)
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(0, -10);
    ctx.strokeStyle = '#8BC34A';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // 홀씨 모양 (작은 원 + 방사선)
    const r = CONFIG.SEED_RADIUS;
    for (let i = 0; i < 6; i++) {
      const a = (Math.PI * 2 * i / 6) - Math.PI / 2;
      ctx.beginPath();
      ctx.moveTo(0, -10);
      ctx.lineTo(Math.cos(a) * r, -10 + Math.sin(a) * r);
      ctx.strokeStyle = 'rgba(255,255,255,0.9)';
      ctx.lineWidth = 1;
      ctx.stroke();
    }
    ctx.beginPath();
    ctx.arc(0, -10, 3, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.95)';
    ctx.fill();

    ctx.restore();
  }

  function easeOut (t) { return 1 - Math.pow(1 - t, 2.5); }

  /* ── 포인터 이벤트 ── */
  let pointerStart = null;

  canvas.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    if (state.phase !== 'playing') return;
    const rect = canvas.getBoundingClientRect();
    pointerStart = { x: e.clientX - rect.left, y: e.clientY - rect.top, t: Date.now() };
  });

  window.addEventListener('pointermove', (e) => {
    if (!pointerStart || state.phase !== 'playing') return;
    const rect = canvas.getBoundingClientRect();
    const cx = e.clientX - rect.left;
    const cy = e.clientY - rect.top;
    const dx = cx - pointerStart.x;
    const dy = cy - pointerStart.y;
    const dist = Math.hypot(dx, dy);
    if (dist > CONFIG.SWIPE_DIST_MIN) {
      // 쓸기 제스처 — 방향으로 근처 씨앗 날리기
      const len = dist;
      blowNearSeeds(cx, cy, dx / len, dy / len, 80);
      pointerStart = { x: cx, y: cy, t: Date.now() };
    }
  });

  window.addEventListener('pointerup', (e) => {
    if (!pointerStart || state.phase !== 'playing') {
      pointerStart = null;
      return;
    }
    const rect = canvas.getBoundingClientRect();
    const upX = e.clientX - rect.left;
    const upY = e.clientY - rect.top;
    const dx = upX - pointerStart.x;
    const dy = upY - pointerStart.y;
    const dist = Math.hypot(dx, dy);

    if (dist < CONFIG.SWIPE_DIST_MIN) {
      // 탭 — 꽃 근처면 전체 날리기
      blowAllFromTap(upX, upY);
    }
    pointerStart = null;
  });

  /* ── 버튼 ── */
  startBtn.addEventListener('pointerdown', (e) => {
    e.stopPropagation();
    startGame();
  });
  restartBtn.addEventListener('pointerdown', (e) => {
    e.stopPropagation();
    startGame();
  });

  /* ── 초기화 ── */
  bestEl.textContent = getBest();

})();
</script>
</body>
</html>
