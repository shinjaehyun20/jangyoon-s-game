<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#87CEEB"/>
      <stop offset="100%" stop-color="#c8f0c8"/>
    </linearGradient>
    <linearGradient id="stem-g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6abf55"/>
      <stop offset="100%" stop-color="#3a7d2a"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="320" height="180" fill="url(#sky)"/>
  <rect x="0.5" y="0.5" width="319" height="179" fill="none" stroke="rgba(255,255,255,0.08)"/>

  <!-- 구름 -->
  <ellipse cx="60"  cy="38" rx="38" ry="18" fill="rgba(255,255,255,0.6)"/>
  <ellipse cx="85"  cy="30" rx="28" ry="16" fill="rgba(255,255,255,0.6)"/>
  <ellipse cx="40"  cy="32" rx="22" ry="13" fill="rgba(255,255,255,0.6)"/>
  <ellipse cx="230" cy="28" rx="30" ry="14" fill="rgba(255,255,255,0.5)"/>
  <ellipse cx="255" cy="22" rx="22" ry="12" fill="rgba(255,255,255,0.5)"/>

  <!-- 줄기 -->
  <rect x="132" y="100" width="5" height="70" rx="2" fill="url(#stem-g)"/>

  <!-- 꽃 중심 -->
  <circle cx="134" cy="95" r="18" fill="#FFE066"/>
  <circle cx="134" cy="95" r="12" fill="#FFD700"/>

  <!-- 홀씨 (방사형) -->
  <g stroke="rgba(255,255,255,0.95)" stroke-width="1.3" stroke-linecap="round">
    <!-- 위 -->
    <line x1="134" y1="83" x2="134" y2="65"/>
    <circle cx="134" cy="63" r="4" fill="white" stroke="none"/>
    <!-- 오른위 -->
    <line x1="142" y1="87" x2="155" y2="73"/>
    <circle cx="157" cy="71" r="4" fill="white" stroke="none"/>
    <!-- 오른 -->
    <line x1="146" y1="95" x2="165" y2="95"/>
    <circle cx="167" cy="95" r="4" fill="white" stroke="none"/>
    <!-- 오른아래 -->
    <line x1="142" y1="103" x2="155" y2="117"/>
    <circle cx="157" cy="119" r="4" fill="white" stroke="none"/>
    <!-- 왼위 -->
    <line x1="126" y1="87" x2="113" y2="73"/>
    <circle cx="111" cy="71" r="4" fill="white" stroke="none"/>
    <!-- 왼 -->
    <line x1="122" y1="95" x2="103" y2="95"/>
    <circle cx="101" cy="95" r="4" fill="white" stroke="none"/>
    <!-- 왼아래 -->
    <line x1="126" y1="103" x2="113" y2="117"/>
    <circle cx="111" cy="119" r="4" fill="white" stroke="none"/>
    <!-- 아래 -->
    <line x1="134" y1="107" x2="134" y2="125"/>
    <circle cx="134" cy="127" r="4" fill="white" stroke="none"/>
  </g>

  <!-- 날아가는 홀씨들 -->
  <g opacity="0.7">
    <line x1="200" y1="60" x2="200" y2="48" stroke="white" stroke-width="1.2"/>
    <circle cx="200" cy="46" r="3" fill="white"/>
    <line x1="230" y1="75" x2="230" y2="63" stroke="white" stroke-width="1.2"/>
    <circle cx="230" cy="61" r="3" fill="white"/>
    <line x1="185" y1="45" x2="185" y2="33" stroke="white" stroke-width="1.2"/>
    <circle cx="185" cy="31" r="3" fill="white"/>
    <line x1="255" y1="55" x2="255" y2="43" stroke="white" stroke-width="1.2"/>
    <circle cx="255" cy="41" r="3" fill="white"/>
    <line x1="210" y1="90" x2="220" y2="78" stroke="white" stroke-width="1.2"/>
    <circle cx="221" cy="76" r="3" fill="white"/>
  </g>

  <!-- 타이틀 -->
  <g font-family="'Pretendard','Noto Sans KR',sans-serif">
    <text x="296" y="148" text-anchor="end" font-size="22" font-weight="900" fill="#FFD700">민들레 홀씨</text>
    <text x="296" y="166" text-anchor="end" font-size="10" font-weight="500" fill="rgba(255,255,255,0.5)" letter-spacing="2">DANDELION</text>
  </g>
</svg>
