<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>장윤 한글 타이핑 게임</title>
<link rel="stylesheet" href="style.css" />
<style>
  .mobile-home-link {
    display: none;
    width: min(100%, 24rem);
    margin: 1rem auto 0;
    padding: 0.95rem 1rem;
    border-radius: 14px;
    background: #1f2937;
    color: #fff;
    text-align: center;
    text-decoration: none;
    font-weight: 700;
    box-sizing: border-box;
  }
  @media (pointer: coarse), (max-width: 820px) {
    .mobile-home-link { display: block; }
  }
</style>
</head>
<body>
  <div class="game-container">
    <div class="stage-info">스테이지 1 - 단어 1 / 10</div>
    <div class="elephant" title="코끼리 장윤"></div>
    <div class="mission" id="missionText">한글을 입력해 보세요: 코끼리</div>
    <input type="text" id="userInput" placeholder="여기에 입력" autocomplete="off" />
    <div class="message" id="message"></div>
    <button class="next-btn" id="nextBtn">다음 스테이지</button>
    <a class="mobile-home-link" href="../index.html">홈으로</a>
  </div>

<script src="script.js"></script>
</body>
</html>
