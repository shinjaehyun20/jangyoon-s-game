<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
  <defs>
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d2b5e"/>
      <stop offset="50%" stop-color="#0a4a7c"/>
      <stop offset="100%" stop-color="#0d6e9e"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="320" height="180" fill="url(#sea)"/>

  <!-- Glow effect -->
  <ellipse cx="130" cy="90" rx="80" ry="50" fill="url(#glow)"/>

  <!-- Bubbles -->
  <circle cx="60" cy="40" r="4" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.2"/>
  <circle cx="75" cy="20" r="2.5" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
  <circle cx="180" cy="30" r="3" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <circle cx="200" cy="55" r="5" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.2"/>
  <circle cx="90" cy="60" r="3.5" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>

  <!-- Sea floor -->
  <rect x="0" y="166" width="320" height="14" fill="rgba(0,80,40,0.4)" rx="4"/>

  <!-- Rock obstacle -->
  <polygon points="230,90 245,65 260,62 275,68 280,90 268,100 240,100" fill="#4a7a4a" stroke="#2a5a2a" stroke-width="2"/>
  <line x1="242" y1="72" x2="255" y2="64" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>

  <!-- Fish obstacle -->
  <ellipse cx="250" cy="130" rx="22" ry="12" fill="#ff6b6b" stroke="#cc3333" stroke-width="1.5"/>
  <polygon points="270,130 282,120 282,140" fill="#ff6b6b"/>
  <circle cx="232" cy="126" r="5" fill="white"/>
  <circle cx="233" cy="126" r="2.5" fill="#333"/>

  <!-- Submarine body -->
  <g transform="translate(120,90)">
    <!-- Body -->
    <ellipse cx="0" cy="0" rx="36" ry="17" fill="#f5c842" stroke="#e0a800" stroke-width="2"/>
    <!-- Conning tower -->
    <rect x="-8" y="-28" width="16" height="13" rx="3" fill="#f5c842" stroke="#e0a800" stroke-width="2"/>
    <!-- Window -->
    <circle cx="6" cy="0" r="8" fill="#aef4ff" stroke="#00d4ff" stroke-width="2"/>
    <circle cx="7" cy="-1" r="3" fill="rgba(0,0,0,0.2)"/>
    <!-- Propeller -->
    <rect x="-44" y="-10" width="10" height="20" rx="3" fill="#c0a020"/>
    <!-- Sub trail bubbles -->
    <circle cx="40" cy="-5" r="3" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
    <circle cx="48" cy="-10" r="2" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>
  </g>

  <!-- Water line highlight -->
  <rect x="0" y="0" width="320" height="3" fill="rgba(0,212,255,0.1)" rx="0"/>

  <!-- Border -->
  <rect x="0.5" y="0.5" width="319" height="179" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Title -->
  <g font-family="'Pretendard','Noto Sans KR',sans-serif">
    <text x="296" y="148" text-anchor="end" font-size="22" font-weight="900" fill="#00d4ff">잠수함 피하기</text>
    <text x="296" y="166" text-anchor="end" font-size="10" font-weight="500" fill="rgba(255,255,255,0.5)" letter-spacing="2">SUBMARINE DODGE</text>
  </g>
</svg>
