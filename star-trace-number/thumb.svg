<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
  <defs>
    <linearGradient id="night" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#2a2a6e"/>
      <stop offset="55%" stop-color="#3b3b8f"/>
      <stop offset="100%" stop-color="#5a4ea8"/>
    </linearGradient>
    <radialGradient id="starGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#fff6c2"/>
      <stop offset="100%" stop-color="#ffe27a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#9fe0ff"/>
      <stop offset="100%" stop-color="#ffd166"/>
    </linearGradient>
  </defs>

  <rect width="320" height="180" fill="url(#night)"/>

  <!-- 배경 작은 별 -->
  <g fill="#fff" opacity="0.5">
    <circle cx="30" cy="28" r="1.6"/><circle cx="80" cy="18" r="1.2"/>
    <circle cx="150" cy="24" r="1.8"/><circle cx="250" cy="20" r="1.3"/>
    <circle cx="300" cy="50" r="1.5"/><circle cx="20" cy="90" r="1.2"/>
    <circle cx="290" cy="110" r="1.6"/><circle cx="60" cy="140" r="1.3"/>
  </g>

  <!-- 잇는 선 -->
  <polyline points="70,120 120,60 175,95 235,55"
    fill="none" stroke="url(#line)" stroke-width="4" stroke-linecap="round" opacity="0.9"/>

  <!-- 번호 별들 -->
  <g font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif" font-weight="800" text-anchor="middle">
    <g transform="translate(70,120)">
      <circle r="22" fill="url(#starGlow)"/>
      <path d="M0,-16 4.7,-5 16,-5 6.6,2 10,13 0,6 -10,13 -6.6,2 -16,-5 -4.7,-5 Z" fill="#ffe27a"/>
      <text y="5" font-size="13" fill="#5a3d00">1</text>
    </g>
    <g transform="translate(120,60)">
      <circle r="22" fill="url(#starGlow)"/>
      <path d="M0,-16 4.7,-5 16,-5 6.6,2 10,13 0,6 -10,13 -6.6,2 -16,-5 -4.7,-5 Z" fill="#ffe27a"/>
      <text y="5" font-size="13" fill="#5a3d00">2</text>
    </g>
    <g transform="translate(175,95)">
      <circle r="22" fill="url(#starGlow)"/>
      <path d="M0,-16 4.7,-5 16,-5 6.6,2 10,13 0,6 -10,13 -6.6,2 -16,-5 -4.7,-5 Z" fill="#ffe27a"/>
      <text y="5" font-size="13" fill="#5a3d00">3</text>
    </g>
    <g transform="translate(235,55)">
      <circle r="22" fill="url(#starGlow)"/>
      <path d="M0,-16 4.7,-5 16,-5 6.6,2 10,13 0,6 -10,13 -6.6,2 -16,-5 -4.7,-5 Z" fill="#9fe0ff"/>
      <text y="5" font-size="13" fill="#073a52">4</text>
    </g>
  </g>

  <text x="160" y="168" text-anchor="middle" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif" font-size="22" font-weight="800" fill="#fff">⭐ 별 잇기 숫자놀이</text>
</svg>
