<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f3460;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#16213e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a3a12;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="groundGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2d5a27;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a3a12;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="320" height="180" fill="url(#bgGrad)"/>

  <!-- 별 배경 -->
  <circle cx="20" cy="15" r="1.2" fill="white" opacity="0.6"/>
  <circle cx="55" cy="28" r="1" fill="white" opacity="0.4"/>
  <circle cx="90" cy="10" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="130" cy="22" r="1" fill="white" opacity="0.5"/>
  <circle cx="160" cy="8" r="1.2" fill="white" opacity="0.6"/>
  <circle cx="200" cy="18" r="1" fill="white" opacity="0.4"/>
  <circle cx="240" cy="30" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="270" cy="12" r="1" fill="white" opacity="0.5"/>
  <circle cx="35" cy="45" r="1" fill="white" opacity="0.3"/>
  <circle cx="75" cy="55" r="1.2" fill="white" opacity="0.5"/>
  <circle cx="110" cy="40" r="1" fill="white" opacity="0.4"/>
  <circle cx="190" cy="50" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="230" cy="42" r="1" fill="white" opacity="0.3"/>
  <circle cx="300" cy="35" r="1.2" fill="white" opacity="0.5"/>
  <circle cx="10" cy="70" r="1" fill="white" opacity="0.4"/>
  <circle cx="310" cy="65" r="1" fill="white" opacity="0.3"/>

  <!-- 땅 -->
  <rect x="0" y="155" width="320" height="25" fill="url(#groundGrad)"/>

  <!-- 몬스터들 (위에서 날아오는) -->
  <!-- 몬스터1 - 좌상단 -->
  <text x="30" y="50" font-size="32" font-family="serif" text-anchor="middle">👾</text>
  <!-- 몬스터2 - 가운데 위 -->
  <text x="130" y="35" font-size="28" font-family="serif" text-anchor="middle">👻</text>
  <!-- 몬스터3 - 우상단 -->
  <text x="210" y="55" font-size="26" font-family="serif" text-anchor="middle">🤖</text>
  <!-- 몬스터4 - 작은것들 -->
  <text x="70" y="80" font-size="22" font-family="serif" text-anchor="middle" opacity="0.7">💀</text>
  <text x="170" y="70" font-size="20" font-family="serif" text-anchor="middle" opacity="0.8">🦎</text>

  <!-- 폭발 효과 (히트 표시) -->
  <text x="95" y="105" font-size="30" font-family="serif" text-anchor="middle">💥</text>
  <!-- 별 파티클 -->
  <text x="115" y="88" font-size="16" font-family="serif" text-anchor="middle">✨</text>
  <text x="78" y="90" font-size="14" font-family="serif" text-anchor="middle">⭐</text>

  <!-- 대포/성 (하단 중앙) -->
  <text x="155" y="148" font-size="36" font-family="serif" text-anchor="middle">🏰</text>

  <!-- 경계선 -->
  <rect x="0.5" y="0.5" width="319" height="179" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- 우하단 타이틀 -->
  <g font-family="'Pretendard','Noto Sans KR',sans-serif">
    <text x="296" y="148" text-anchor="end" font-size="22" font-weight="900" fill="#f5a623">대포 쏘기</text>
    <text x="296" y="166" text-anchor="end" font-size="10" font-weight="500" fill="rgba(255,255,255,0.5)" letter-spacing="2">CANNON BALL</text>
  </g>
</svg>
