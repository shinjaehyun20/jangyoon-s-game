<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1035"/>
      <stop offset="100%" stop-color="#0c0820"/>
    </linearGradient>
  </defs>
  <rect width="320" height="180" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="319" height="179" fill="none" stroke="rgba(255,255,255,0.08)"/>
  <!-- Circus tent triangles top -->
  <polygon points="0,0 26,16 52,0" fill="rgba(255,111,216,0.3)"/>
  <polygon points="52,0 78,16 104,0" fill="rgba(79,195,247,0.3)"/>
  <polygon points="104,0 130,16 156,0" fill="rgba(255,111,216,0.3)"/>
  <polygon points="156,0 182,16 208,0" fill="rgba(79,195,247,0.3)"/>
  <!-- Ground -->
  <rect x="0" y="156" width="320" height="24" fill="rgba(255,204,2,0.12)"/>
  <!-- Pole 1 -->
  <line x1="80" y1="156" x2="80" y2="76" stroke="#ffcc02" stroke-width="7" stroke-linecap="round"/>
  <rect x="62" y="152" width="36" height="8" rx="2" fill="#cc9900"/>
  <text x="80" y="68" text-anchor="middle" font-size="14">⭐</text>
  <!-- Pole 2 -->
  <line x1="160" y1="156" x2="160" y2="60" stroke="#ffcc02" stroke-width="7" stroke-linecap="round"/>
  <rect x="142" y="152" width="36" height="8" rx="2" fill="#cc9900"/>
  <text x="160" y="52" text-anchor="middle" font-size="14">⭐</text>
  <!-- Pole 3 -->
  <line x1="240" y1="156" x2="240" y2="72" stroke="#ffcc02" stroke-width="7" stroke-linecap="round"/>
  <rect x="222" y="152" width="36" height="8" rx="2" fill="#cc9900"/>
  <text x="240" y="64" text-anchor="middle" font-size="14">⭐</text>
  <!-- Rings on pole 2 (success) -->
  <ellipse cx="160" cy="142" rx="22" ry="7" fill="none" stroke="#ff6fd8" stroke-width="5"/>
  <ellipse cx="160" cy="128" rx="22" ry="7" fill="none" stroke="#56c870" stroke-width="5"/>
  <!-- Flying ring -->
  <ellipse cx="110" cy="100" rx="22" ry="8" fill="none" stroke="#f5a623" stroke-width="5" opacity="0.85"/>
  <!-- Sparkles -->
  <text x="180" y="110" font-size="16">✨</text>
  <text x="58" y="130" font-size="12">🎪</text>
  <!-- Title -->
  <g font-family="'Pretendard','Noto Sans KR',sans-serif">
    <text x="296" y="148" text-anchor="end" font-size="20" font-weight="900" fill="#ff6fd8">고리 던지기</text>
    <text x="296" y="166" text-anchor="end" font-size="10" font-weight="500" fill="rgba(255,255,255,0.5)" letter-spacing="2">RING TOSS</text>
  </g>
</svg>
