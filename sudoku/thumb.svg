<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
  
  <defs>
    
    <linearGradient id="cellGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="rgba(255,255,255,0.06)"/>
      <stop offset="1" stop-color="rgba(255,255,255,0.02)"/>
    </linearGradient>
  
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      
    <stop offset="0" stop-color="#1e293b"/>
    <stop offset="1" stop-color="#0f172a"/>
  
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.04"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="320" height="180" fill="url(#bg)"/>
  <rect width="320" height="180" fill="url(#sheen)"/>
  <rect x="0.5" y="0.5" width="319" height="179" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  
  <!-- 9x9 스도쿠 그리드 (좌측) -->
  <g transform="translate(24, 24)" font-family="'Pretendard', sans-serif" font-weight="700">
    <!-- 배경 -->
    <rect width="132" height="132" fill="url(#cellGrad)" rx="4"/>
    <!-- 얇은 셀 라인 -->
    <g stroke="rgba(148, 163, 184, 0.3)" stroke-width="0.5">
      <line x1="0" y1="0" x2="0" y2="132"/><line x1="0" y1="0" x2="132" y2="0"/><line x1="14.67" y1="0" x2="14.67" y2="132"/><line x1="0" y1="14.67" x2="132" y2="14.67"/><line x1="29.34" y1="0" x2="29.34" y2="132"/><line x1="0" y1="29.34" x2="132" y2="29.34"/><line x1="44.01" y1="0" x2="44.01" y2="132"/><line x1="0" y1="44.01" x2="132" y2="44.01"/><line x1="58.68" y1="0" x2="58.68" y2="132"/><line x1="0" y1="58.68" x2="132" y2="58.68"/><line x1="73.35" y1="0" x2="73.35" y2="132"/><line x1="0" y1="73.35" x2="132" y2="73.35"/><line x1="88.02" y1="0" x2="88.02" y2="132"/><line x1="0" y1="88.02" x2="132" y2="88.02"/><line x1="102.69" y1="0" x2="102.69" y2="132"/><line x1="0" y1="102.69" x2="132" y2="102.69"/><line x1="117.36" y1="0" x2="117.36" y2="132"/><line x1="0" y1="117.36" x2="132" y2="117.36"/><line x1="132.03" y1="0" x2="132.03" y2="132"/><line x1="0" y1="132.03" x2="132" y2="132.03"/>
    </g>
    <!-- 굵은 3x3 박스 라인 -->
    <g stroke="rgba(168, 85, 247, 0.6)" stroke-width="1.5" fill="none">
      <rect x="0" y="0" width="132" height="132"/>
      <line x1="44" y1="0" x2="44" y2="132"/>
      <line x1="88" y1="0" x2="88" y2="132"/>
      <line x1="0" y1="44" x2="132" y2="44"/>
      <line x1="0" y1="88" x2="132" y2="88"/>
    </g>
    <!-- 샘플 숫자 (일부만) -->
    <g fill="#e2e8f0" font-size="11" text-anchor="middle">
      <text x="7" y="12">5</text>
      <text x="36" y="12">3</text>
      <text x="95" y="12">7</text>
      <text x="21" y="26">6</text>
      <text x="51" y="26">1</text>
      <text x="65" y="26">9</text>
      <text x="80" y="26">5</text>
      <text x="22" y="41">9</text>
      <text x="36" y="41">8</text>
      <text x="117" y="41">6</text>
    </g>
