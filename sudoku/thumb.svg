    <rect x="58.5" y="58.5" width="14" height="14" fill="rgba(168, 85, 247, 0.3)" stroke="#a855f7" stroke-width="1"/>
    <text x="66" y="70" text-anchor="middle" font-size="11" font-weight="900" fill="#a855f7" font-family="'Pretendard', sans-serif">?</text>
  </g>
  
  <g font-family="'Pretendard', 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif">
    <text x="296" y="148" text-anchor="end" font-size="22" font-weight="900" fill="#a855f7" letter-spacing="-0.5">스도쿠</text>
    <text x="296" y="166" text-anchor="end" font-size="10" font-weight="500" fill="rgba(255,255,255,0.5)" letter-spacing="2">SUDOKU</text>
