<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a3a2a"/>
      <stop offset="100%" stop-color="#0f2214"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5a623" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#f5a623" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="320" height="180" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="319" height="179" fill="none" stroke="rgba(255,255,255,0.08)"/>
  <!-- Decorative circles -->
  <circle cx="60" cy="90" r="50" fill="url(#glow)" opacity="0.6"/>
  <!-- Doors -->
  <rect x="20" y="60" width="52" height="68" rx="8" fill="rgba(255,255,255,0.08)" stroke="#f5a623" stroke-width="2"/>
  <rect x="80" y="60" width="52" height="68" rx="8" fill="rgba(86,200,112,0.25)" stroke="#56c870" stroke-width="2.5"/>
  <rect x="140" y="60" width="52" height="68" rx="8" fill="rgba(255,255,255,0.08)" stroke="#f5a623" stroke-width="2"/>
  <!-- Key on middle door -->
  <text x="106" y="52" text-anchor="middle" font-size="16">🗝️</text>
  <!-- Door circles (handles) -->
  <circle cx="46" cy="97" r="4" fill="rgba(255,255,255,0.3)"/>
  <circle cx="106" cy="97" r="4" fill="#56c870"/>
  <circle cx="166" cy="97" r="4" fill="rgba(255,255,255,0.3)"/>
  <!-- Animal -->
  <text x="226" y="108" text-anchor="middle" font-size="56">🦁</text>
  <!-- Sparkles -->
  <text x="200" y="60" font-size="14">✨</text>
  <text x="248" y="140" font-size="10">⭐</text>
  <!-- Title -->
  <g font-family="'Pretendard','Noto Sans KR',sans-serif">
    <text x="296" y="148" text-anchor="end" font-size="20" font-weight="900" fill="#f5a623">동물원 탈출</text>
    <text x="296" y="166" text-anchor="end" font-size="10" font-weight="500" fill="rgba(255,255,255,0.5)" letter-spacing="2">ZOO ESCAPE</text>
  </g>
</svg>
