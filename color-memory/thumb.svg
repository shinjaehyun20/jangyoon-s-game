<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
  <defs>
    <radialGradient id="glow-r" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ef5350" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#b71c1c" stop-opacity="0.6"/>
    </radialGradient>
    <radialGradient id="glow-g" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#66bb6a" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#1b5e20" stop-opacity="0.6"/>
    </radialGradient>
    <radialGradient id="glow-b" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#42a5f5" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0d47a1" stop-opacity="0.6"/>
    </radialGradient>
    <radialGradient id="glow-y" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd54f" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#e65100" stop-opacity="0.6"/>
    </radialGradient>
  </defs>
  <!-- 배경 -->
  <rect width="320" height="180" fill="#1a1a2e"/>
  <!-- 내부 경계 -->
  <rect x="0.5" y="0.5" width="319" height="179" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <!-- 별빛 장식 -->
  <circle cx="20"  cy="15"  r="1.5" fill="rgba(255,255,255,0.6)"/>
  <circle cx="45"  cy="40"  r="1"   fill="rgba(255,255,255,0.4)"/>
  <circle cx="10"  cy="55"  r="1"   fill="rgba(255,255,255,0.5)"/>
  <circle cx="305" cy="20"  r="1.5" fill="rgba(255,255,255,0.6)"/>
  <circle cx="290" cy="50"  r="1"   fill="rgba(255,255,255,0.4)"/>
  <!-- 4색 버튼 그리드 (중앙) -->
  <!-- Red (top-left) — lit -->
  <rect x="80" y="25" width="62" height="62" rx="14" fill="url(#glow-r)" filter="url(#shadow)"/>
  <rect x="80" y="25" width="62" height="62" rx="14" fill="#e53935" opacity="0.95"/>
  <ellipse cx="111" cy="56" rx="30" ry="12" fill="rgba(255,255,255,0.15)" transform="rotate(-20,111,56)"/>
  <text x="111" y="64" text-anchor="middle" font-size="26">🔴</text>
  <!-- Green (top-right) -->
  <rect x="152" y="25" width="62" height="62" rx="14" fill="#43a047" opacity="0.4"/>
  <text x="183" y="64" text-anchor="middle" font-size="26" opacity="0.4">🟢</text>
  <!-- Blue (bottom-left) -->
  <rect x="80" y="97" width="62" height="62" rx="14" fill="#1e88e5" opacity="0.4"/>
  <text x="111" y="136" text-anchor="middle" font-size="26" opacity="0.4">🔵</text>
  <!-- Yellow (bottom-right) — lit -->
  <rect x="152" y="97" width="62" height="62" rx="14" fill="url(#glow-y)" filter="url(#shadow)"/>
  <rect x="152" y="97" width="62" height="62" rx="14" fill="#f9a825" opacity="0.95"/>
  <ellipse cx="183" cy="128" rx="30" ry="12" fill="rgba(255,255,255,0.2)" transform="rotate(-20,183,128)"/>
  <text x="183" y="136" text-anchor="middle" font-size="26">🟡</text>
  <!-- 순서 화살표 1→2 -->
  <circle cx="111" cy="56" r="14" fill="rgba(255,255,255,0.18)"/>
  <text x="111" y="61" text-anchor="middle" font-size="13" font-weight="900" fill="white">1</text>
  <circle cx="183" cy="128" r="14" fill="rgba(255,255,255,0.18)"/>
  <text x="183" y="133" text-anchor="middle" font-size="13" font-weight="900" fill="white">2</text>
  <path d="M125 70 Q150 90 165 112" stroke="rgba(255,255,255,0.6)" stroke-width="2" fill="none" stroke-dasharray="4,3"/>
  <polygon points="162,109 170,116 163,118" fill="rgba(255,255,255,0.6)"/>
  <!-- 진행 도트 -->
  <circle cx="224" cy="55" r="5" fill="#e94560"/>
  <circle cx="238" cy="55" r="5" fill="#e94560"/>
  <circle cx="252" cy="55" r="5" fill="rgba(255,255,255,0.2)"/>
  <circle cx="266" cy="55" r="5" fill="rgba(255,255,255,0.2)"/>
  <!-- 타이틀 -->
  <g font-family="'Pretendard','Noto Sans KR',sans-serif">
    <text x="296" y="148" text-anchor="end" font-size="18" font-weight="900" fill="#e94560">색깔 기억 패턴</text>
    <text x="296" y="166" text-anchor="end" font-size="10" font-weight="500" fill="rgba(255,255,255,0.5)" letter-spacing="2">COLOR MEMORY</text>
  </g>
</svg>
