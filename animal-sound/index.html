<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>🐾 동물 소리 맞추기</title>
  <style>
    :root {
      --bg: #1a2a1a;
      --bg2: #2d4a2d;
      --accent: #66dd66;
      --accent2: #44bb44;
      --text: #ffffff;
      --card: rgba(255,255,255,0.12);
      --correct: #44ee44;
      --wrong: #ee4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100vh; height: 100dvh;
      overflow: hidden;
      touch-action: manipulation;
      font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .wrap {
      width: 100%; max-width: 480px;
      height: 100vh; height: 100dvh;
      display: flex; flex-direction: column;
      padding: 10px 14px 8px; gap: 8px;
      margin: 0 auto;
    }
    h1 {
      font-size: clamp(18px, 5vw, 26px);
      font-weight: 900;
      text-align: center;
      color: var(--accent);
      flex-shrink: 0;
    }
    .hud {
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(255,255,255,0.1);
      border-radius: 14px;
      padding: 8px 14px;
      flex-shrink: 0;
    }
    .hud-item { text-align: center; }
    .hud-label { font-size: 10px; opacity: 0.65; }
    .hud-value { font-size: 20px; font-weight: 700; color: var(--accent); }
    .progress-bar {
      height: 6px; border-radius: 3px;
      background: rgba(255,255,255,0.15);
      flex: 1; margin: 0 10px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%; border-radius: 3px;
      background: var(--accent);
      transition: width 0.4s ease;
    }
    .animal-display {
      flex: 0 0 auto;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: var(--bg2);
      border-radius: 20px;
      padding: 14px;
      gap: 6px;
    }
    .animal-emoji {
      font-size: clamp(60px, 18vw, 90px);
      line-height: 1;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.4));
    }
    .animal-question {
      font-size: clamp(14px, 4vw, 18px);
      opacity: 0.8;
      text-align: center;
    }
    .choices {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      align-content: center;
    }
    .choice-btn {
      background: var(--card);
      border: 2px solid transparent;
      border-radius: 16px;
      padding: 12px 10px;
      font-size: clamp(14px, 4vw, 18px);
      font-weight: 700;
      color: var(--text);
      cursor: pointer;
      min-height: 64px;
      transition: background 0.15s, transform 0.1s, border-color 0.2s;
      text-align: center;
      line-height: 1.3;
    }
    .choice-btn:active { transform: scale(0.95); }
    .choice-btn.correct {
      background: rgba(68, 238, 68, 0.3);
      border-color: var(--correct);
    }
    .choice-btn.wrong {
      background: rgba(238, 68, 68, 0.3);
      border-color: var(--wrong);
    }
    .choice-btn:disabled { cursor: not-allowed; }
    .streak-feedback {
      text-align: center;
      font-size: 16px;
      font-weight: 700;
      min-height: 22px;
      color: var(--accent);
      flex-shrink: 0;
    }
    footer {
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    footer small { font-size: 11px; opacity: 0.5; }
    .home-link {
      font-size: 13px; color: var(--accent);
      text-decoration: none;
      padding: 6px 10px;
      border-radius: 8px;
      background: rgba(102,221,102,0.12);
    }
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.82);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
    }
    .overlay.hidden { display: none; }
    .overlay-card {
      background: var(--bg2);
      border-radius: 24px;
      padding: 30px 24px;
      max-width: 340px; width: 90%;
      text-align: center;
      display: flex; flex-direction: column; gap: 14px;
    }
    .overlay-card h2 { font-size: 26px; }
    .overlay-card p { font-size: 14px; opacity: 0.8; line-height: 1.6; }
    .result-score { font-size: 52px; font-weight: 900; color: var(--accent); }
    .result-sub { font-size: 14px; opacity: 0.7; }
    .btn-start {
      background: var(--accent2);
      color: #fff;
      border: none; border-radius: 14px;
      padding: 14px 28px;
      font-size: 18px; font-weight: 700;
      cursor: pointer;
      min-height: 52px;
      transition: opacity 0.15s;
    }
    .btn-start:active { opacity: 0.8; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>🐾 동물 소리 맞추기</h1>

    <div class="hud">
      <div class="hud-item">
        <div class="hud-label">점수</div>
        <div class="hud-value" id="score">0</div>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
      <div class="hud-item">
        <div class="hud-label">문제</div>
        <div class="hud-value" id="qNum">0/10</div>
      </div>
    </div>

    <div class="animal-display">
      <div class="animal-emoji" id="animalEmoji">🐶</div>
      <div class="animal-question">이 동물은 어떻게 울까요?</div>
    </div>

    <div class="streak-feedback" id="streakFeedback">&nbsp;</div>

    <div class="choices" id="choicesGrid">
      <button class="choice-btn" id="c0"></button>
      <button class="choice-btn" id="c1"></button>
      <button class="choice-btn" id="c2"></button>
      <button class="choice-btn" id="c3"></button>
    </div>

    <footer>
      <small>동물의 울음소리를 골라보세요!</small>
      <a class="home-link" href="../index.html">&#8592; 홈으로</a>
    </footer>
  </div>

  <div class="overlay" id="startOverlay">
    <div class="overlay-card">
      <h2>🐾 동물 소리 맞추기</h2>
      <p>그림에 나오는 동물이<br>어떻게 우는지 맞춰보세요!<br>10문제 도전!</p>
      <button class="btn-start" id="startBtn">시작!</button>
    </div>
  </div>

  <div class="overlay hidden" id="endOverlay">
    <div class="overlay-card">
      <h2>🎉 게임 종료!</h2>
      <div class="result-score" id="finalScore">0</div>
      <p id="resultMsg"></p>
      <p class="result-sub" id="bestMsg"></p>
      <button class="btn-start" id="restartBtn">다시 하기</button>
      <a class="home-link" href="../index.html" style="display:block;margin-top:4px;">🏠 게임 목록으로</a>
    </div>
  </div>

  <script>
  (function () {
    'use strict';

    var CONFIG = {
      TOTAL_Q: 10,
      CHOICES: 4,
      BASE_SCORE: 10,
      STREAK_BONUS: 5,
      FEEDBACK_DURATION: 900
    };

    var ANIMALS = [
      { emoji: '🐶', name: '강아지', sound: '멍멍!' },
      { emoji: '🐱', name: '고양이', sound: '야옹~' },
      { emoji: '🐮', name: '소', sound: '음메~' },
      { emoji: '🐷', name: '돼지', sound: '꿀꿀!' },
      { emoji: '🐔', name: '닭', sound: '꼬끼오!' },
      { emoji: '🐑', name: '양', sound: '매애~' },
      { emoji: '🐴', name: '말', sound: '히히힝!' },
      { emoji: '🦆', name: '오리', sound: '꽥꽥!' },
      { emoji: '🐸', name: '개구리', sound: '개굴개굴!' },
      { emoji: '🦁', name: '사자', sound: '어흥!' },
      { emoji: '🐻', name: '곰', sound: '으르렁!' },
      { emoji: '🐧', name: '펭귄', sound: '빽빽!' },
      { emoji: '🐦', name: '새', sound: '짹짹!' },
      { emoji: '🦉', name: '부엉이', sound: '부엉부엉!' },
      { emoji: '🐝', name: '꿀벌', sound: '윙윙~' },
      { emoji: '🦊', name: '여우', sound: '낑낑!' },
      { emoji: '🐺', name: '늑대', sound: '아우우~' },
      { emoji: '🐘', name: '코끼리', sound: '뿌우우~' },
      { emoji: '🐒', name: '원숭이', sound: '끽끽!' },
      { emoji: '🦀', name: '게', sound: '집게집게!' }
    ];

    var state = {
      score: 0,
      streak: 0,
      best: parseInt(localStorage.getItem('animal_sound_best') || '0', 10),
      qIndex: 0,
      questions: [],
      answered: false
    };

    var $score = document.getElementById('score');
    var $qNum = document.getElementById('qNum');
    var $progressFill = document.getElementById('progressFill');
    var $animalEmoji = document.getElementById('animalEmoji');
    var $streakFeedback = document.getElementById('streakFeedback');
    var $startOverlay = document.getElementById('startOverlay');
    var $endOverlay = document.getElementById('endOverlay');
    var $finalScore = document.getElementById('finalScore');
    var $resultMsg = document.getElementById('resultMsg');
    var $bestMsg = document.getElementById('bestMsg');
    var choiceBtns = [0,1,2,3].map(function(i) { return document.getElementById('c'+i); });

    function shuffle(arr) {
      var a = arr.slice();
      for (var i = a.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
      }
      return a;
    }

    function generateQuestions() {
      var pool = shuffle(ANIMALS).slice(0, CONFIG.TOTAL_Q);
      return pool.map(function(animal) {
        var wrongs = shuffle(ANIMALS.filter(function(a) { return a !== animal; })).slice(0, CONFIG.CHOICES - 1);
        var choices = shuffle([animal].concat(wrongs));
        return { animal: animal, choices: choices };
      });
    }

    function renderQuestion() {
      var q = state.questions[state.qIndex];
      $animalEmoji.textContent = q.animal.emoji;
      $qNum.textContent = (state.qIndex + 1) + '/' + CONFIG.TOTAL_Q;
      $progressFill.style.width = ((state.qIndex / CONFIG.TOTAL_Q) * 100) + '%';
      $streakFeedback.innerHTML = '&nbsp;';

      choiceBtns.forEach(function(btn, i) {
        btn.textContent = q.choices[i].sound;
        btn.className = 'choice-btn';
        btn.disabled = false;
      });
      state.answered = false;
    }

    function onChoiceClick(idx) {
      if (state.answered) return;
      state.answered = true;

      var q = state.questions[state.qIndex];
      var chosen = q.choices[idx];
      var isCorrect = chosen === q.animal;

      choiceBtns.forEach(function(btn, i) {
        btn.disabled = true;
        if (q.choices[i] === q.animal) {
          btn.classList.add('correct');
        }
      });
      if (!isCorrect) {
        choiceBtns[idx].classList.add('wrong');
      }

      if (isCorrect) {
        state.streak++;
        var bonus = Math.max(0, state.streak - 1) * CONFIG.STREAK_BONUS;
        state.score += CONFIG.BASE_SCORE + bonus;
        $score.textContent = state.score;
        if (state.streak >= 3) {
          $streakFeedback.textContent = '🔥 ' + state.streak + '연속 정답! +' + bonus + '점 보너스!';
        } else {
          $streakFeedback.textContent = '정답!';
        }
      } else {
        state.streak = 0;
        $streakFeedback.textContent = '❌ ' + q.animal.name + '는 "' + q.animal.sound + '" 이에요';
      }

      setTimeout(function() {
        state.qIndex++;
        if (state.qIndex >= CONFIG.TOTAL_Q) {
          showEnd();
        } else {
          renderQuestion();
        }
      }, CONFIG.FEEDBACK_DURATION);
    }

    function showEnd() {
      $progressFill.style.width = '100%';
      $finalScore.textContent = state.score + '점';

      var maxScore = CONFIG.TOTAL_Q * CONFIG.BASE_SCORE;
      var ratio = state.score / maxScore;
      if (ratio >= 1.0) $resultMsg.textContent = '완벽해요! 동물 박사!';
      else if (ratio >= 0.8) $resultMsg.textContent = '잘했어요!';
      else if (ratio >= 0.6) $resultMsg.textContent = '조금 더 연습해요!';
      else $resultMsg.textContent = '💪 다시 도전해봐요!';

      if (state.score > state.best) {
        state.best = state.score;
        localStorage.setItem('animal_sound_best', state.best);
        $bestMsg.textContent = '최고 기록 갱신! ' + state.best + '점';
      } else {
        $bestMsg.textContent = '최고 기록: ' + state.best + '점';
      }
      $endOverlay.classList.remove('hidden');
    }

    function startGame() {
      state.score = 0;
      state.streak = 0;
      state.qIndex = 0;
      state.questions = generateQuestions();
      $score.textContent = '0';
      $startOverlay.classList.add('hidden');
      $endOverlay.classList.add('hidden');
      renderQuestion();
    }

    document.getElementById('startBtn').addEventListener('pointerdown', startGame);
    document.getElementById('restartBtn').addEventListener('pointerdown', startGame);
    choiceBtns.forEach(function(btn, i) {
      btn.addEventListener('pointerdown', function() { onChoiceClick(i); });
    });
  })();
  </script>
</body>
</html>
