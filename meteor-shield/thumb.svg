  <!-- 우상 -->
  <text x="218" y="42"  font-size="28" text-anchor="middle" dominant-baseline="middle">🛡️</text>
  <!-- 우 -->
  <text x="248" y="100" font-size="28" text-anchor="middle" dominant-baseline="middle">🛡️</text>
  <!-- 우하 -->
  <text x="218" y="158" font-size="28" text-anchor="middle" dominant-baseline="middle">🛡️</text>
  <!-- 하 -->
  <text x="160" y="174" font-size="28" text-anchor="middle" dominant-baseline="middle">🛡️</text>
  <!-- 좌하 -->
  <text x="102" y="158" font-size="28" text-anchor="middle" dominant-baseline="middle">🛡️</text>
  <!-- 좌 -->
  <text x="72"  y="100" font-size="28" text-anchor="middle" dominant-baseline="middle">🛡️</text>
  <!-- 좌상 -->
  <text x="102" y="42"  font-size="28" text-anchor="middle" dominant-baseline="middle">🛡️</text>

