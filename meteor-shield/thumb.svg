    </radialGradient>
  </defs>

  <!-- 내부 경계선 -->
  <rect x="0.5" y="0.5" width="319" height="179" fill="none" stroke="rgba(255,255,255,0.08)"/>

  <!-- 배경 -->
  <rect width="320" height="180" fill="url(#spaceBg)"/>

  <!-- 별들 -->
  <circle cx="20"  cy="15"  r="1.5" fill="white" opacity="0.8"/>
  <circle cx="60"  cy="40"  r="1"   fill="white" opacity="0.6"/>
  <circle cx="100" cy="20"  r="2"   fill="white" opacity="0.9"/>
  <circle cx="150" cy="10"  r="1.5" fill="white" opacity="0.7"/>
  <circle cx="200" cy="30"  r="1"   fill="white" opacity="0.6"/>
  <circle cx="260" cy="12"  r="2"   fill="white" opacity="0.8"/>
  <circle cx="300" cy="45"  r="1.5" fill="white" opacity="0.7"/>
  <circle cx="280" cy="80"  r="1"   fill="white" opacity="0.5"/>
  <circle cx="30"  cy="80"  r="1.5" fill="white" opacity="0.6"/>
  <circle cx="310" cy="140" r="1"   fill="white" opacity="0.5"/>

