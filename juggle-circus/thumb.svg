<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0533"/>
      <stop offset="60%" stop-color="#7b1fa2"/>
      <stop offset="100%" stop-color="#c62828"/>
    </linearGradient>
  </defs>
  <rect width="320" height="180" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="319" height="179" fill="none" stroke="rgba(255,255,255,0.08)"/>
  <!-- spotlight -->
  <ellipse cx="160" cy="90" rx="100" ry="80" fill="rgba(255,215,0,0.07)"/>
  <!-- balls arc -->
  <text x="72"  y="52"  font-size="36">⚽</text>
  <text x="148" y="32"  font-size="36">🏀</text>
  <text x="224" y="52"  font-size="36">🎾</text>
  <!-- arc path dashed -->
  <path d="M 90 55 Q 160 10 230 55" stroke="rgba(255,215,0,0.4)" stroke-width="2" stroke-dasharray="5 4" fill="none"/>
  <!-- clown -->
  <text x="160" y="148" font-size="52" text-anchor="middle">🤡</text>
  <!-- stars -->
  <text x="104" y="96" font-size="18">⭐</text>
  <text x="200" y="90" font-size="14">✨</text>
  <!-- title -->
  <g font-family="'Pretendard','Noto Sans KR',sans-serif">
    <text x="296" y="152" text-anchor="end" font-size="22" font-weight="900" fill="#FFD700">서커스 저글링</text>
    <text x="296" y="168" text-anchor="end" font-size="10" font-weight="500" fill="rgba(255,215,0,0.5)" letter-spacing="2">JUGGLE CIRCUS</text>
  </g>
</svg>
