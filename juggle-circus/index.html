<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>서커스 저글링</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100vh; height: 100dvh;
      overflow: hidden;
      touch-action: manipulation;
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: linear-gradient(160deg, #1a0533 0%, #3d1466 40%, #7b1fa2 80%, #c62828 100%);
      user-select: none;
    }
    .wrap {
      width: 100%; max-width: 480px;
      height: 100vh; height: 100dvh;
      display: flex; flex-direction: column;
      margin: 0 auto;
      padding: 10px 12px 8px;
      gap: 8px;
    }
    h1 {
      font-size: clamp(18px, 5vw, 26px);
      color: #FFD700;
      text-align: center;
      text-shadow: 0 0 12px rgba(255,215,0,0.7);
      flex-shrink: 0;
    }
    .hud {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 6px 14px;
      flex-shrink: 0;
    }
    .hud-item { display: flex; flex-direction: column; align-items: center; }
    .hud-label { font-size: 11px; color: rgba(255,255,255,0.7); }
    .hud-val   { font-size: 22px; font-weight: 900; color: #FFD700; }
    #gameArea {
      flex: 1;
      position: relative;
      overflow: hidden;
      border-radius: 16px;
      background: rgba(0,0,0,0.3);
      cursor: pointer;
    }
    /* 광대 -->  하단 고정 */
    #clown {
      position: absolute;
      bottom: 0; left: 50%;
      transform: translateX(-50%);
      font-size: 52px;
      line-height: 1;
      pointer-events: none;
      transition: left 0.12s ease;
      z-index: 5;
    }
    /* 공 */
    .ball {
      position: absolute;
      font-size: 36px;
      pointer-events: none;
      z-index: 10;
      transition: none;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
    }
    /* 별 파티클 */
    .star-particle {
      position: absolute;
      font-size: 20px;
      pointer-events: none;
      animation: starBurst 0.7s ease-out forwards;
      z-index: 20;
    }
    @keyframes starBurst {
      0%   { transform: scale(1) translateY(0);   opacity: 1; }
      100% { transform: scale(0.3) translateY(-50px); opacity: 0; }
    }
    /* 충돌 플래시 */
    #flashOverlay {
      position: absolute; inset: 0;
      background: rgba(255,0,0,0.35);
      pointer-events: none;
      opacity: 0;
      border-radius: 16px;
      transition: opacity 0.15s;
      z-index: 15;
    }
    /* 생명 표시 */
    #livesRow {
      display: flex; gap: 4px;
      justify-content: center;
      flex-shrink: 0;
    }
    .life-dot {
      width: 18px; height: 18px;
      border-radius: 50%;
      background: #e74c3c;
      box-shadow: 0 0 6px rgba(231,76,60,0.8);
      transition: background 0.3s;
    }
    .life-dot.lost { background: rgba(255,255,255,0.15); box-shadow: none; }
    footer {
      display: flex; justify-content: space-between; align-items: center;
      flex-shrink: 0;
    }
    footer small { font-size: 11px; color: rgba(255,255,255,0.4); }
    .home-link {
      font-size: 13px; color: #FFD700; text-decoration: none;
      background: rgba(255,255,255,0.1);
      padding: 4px 10px; border-radius: 20px;
    }
    /* 오버레이 */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.72);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
    }
    .overlay.hidden { display: none; }
    .overlay-card {
      background: linear-gradient(135deg,#2d004f,#7b1fa2);
      border: 2px solid #FFD700;
      border-radius: 22px;
      padding: 28px 30px;
      text-align: center;
      max-width: 320px; width: 90%;
    }
    .overlay-card h2 { font-size: 26px; color: #FFD700; margin-bottom: 10px; }
    .overlay-card p  { color: rgba(255,255,255,0.85); font-size: 14px; margin-bottom: 18px; line-height: 1.6; }
    .result-score { font-size: 54px; font-weight: 900; color: #FFD700; margin: 6px 0; }
    .result-msg   { font-size: 15px; color: rgba(255,255,255,0.8); margin-bottom: 18px; }
    .btn-start {
      background: #FFD700; color: #3d1466;
      border: none; border-radius: 14px;
      font-size: 18px; font-weight: 900;
      padding: 12px 0; width: 100%;
      cursor: pointer; min-height: 44px;
    }
    .btn-start:active { background: #f0c000; }
    .best-note { font-size: 12px; color: rgba(255,215,0,0.6); margin-top: 8px; }
  </style>
</head>
<body>
<div class="wrap">
  <h1>서커스 저글링</h1>
  <div class="hud">
    <div class="hud-item">
      <span class="hud-label">점수</span>
      <span class="hud-val" id="scoreVal">0</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">콤보</span>
      <span class="hud-val" id="comboVal">x1</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">최고</span>
      <span class="hud-val" id="bestVal">0</span>
    </div>
  </div>
  <div id="gameArea">
    <div id="clown">🤡</div>
    <div id="flashOverlay"></div>
  </div>
  <div id="livesRow"></div>
  <footer>
    <small>화면을 탭해서 공을 튀겨요!</small>
    <a class="home-link" href="../index.html">홈으로</a>
  </footer>
</div>

<div class="overlay" id="startOverlay">
  <div class="overlay-card">
    <h2>서커스 저글링</h2>
    <p>화면 아무 곳이나 탭하면<br>광대가 공을 튕겨요!<br>공이 바닥에 닿으면 생명이 줄어요<br>목숨 3개 모두 잃으면 게임 오버!</p>
    <button class="btn-start" id="startBtn">시작!</button>
    <div class="best-note" id="startBest"></div>
  </div>
</div>

<div class="overlay hidden" id="endOverlay">
  <div class="overlay-card">
    <h2>게임 오버!</h2>
    <div class="result-score" id="finalScore">0</div>
    <div class="result-msg" id="resultMsg"></div>
    <button class="btn-start" id="restartBtn">다시 하기</button>
    <div class="best-note" id="endBest"></div>
  </div>
</div>

<script>
(function () {
  'use strict';

  var CFG = {
    LIVES: 3,
    BALL_EMOJIS: ['⚽','🏀','🎾','🏐','🎱','🪀'],
    GRAVITY: 0.35,
    BOUNCE_VY: -14,
    INIT_VX_MAX: 2.8,
    SPEED_INC: 0.04,    // 공 속도 점진적 증가
    BALL_SIZE: 36,
    CLOWN_W: 52,
    CATCH_RANGE: 70,    // 광대 머리 기준 충돌 범위 (px)
    BEST_KEY: 'juggle_circus_best',
    MAX_BALLS: 3
  };

  var state = {
    running: false,
    score: 0,
    combo: 1,
    lives: CFG.LIVES,
    balls: [],
    rafId: null,
    tapCount: 0
  };

  var $area    = document.getElementById('gameArea');
  var $clown   = document.getElementById('clown');
  var $score   = document.getElementById('scoreVal');
  var $combo   = document.getElementById('comboVal');
  var $best    = document.getElementById('bestVal');
  var $lives   = document.getElementById('livesRow');
  var $flash   = document.getElementById('flashOverlay');
  var $start   = document.getElementById('startOverlay');
  var $end     = document.getElementById('endOverlay');
  var $final   = document.getElementById('finalScore');
  var $msg     = document.getElementById('resultMsg');
  var $sb      = document.getElementById('startBest');
  var $eb      = document.getElementById('endBest');

  function getBest() { return parseInt(localStorage.getItem(CFG.BEST_KEY)||'0',10); }
  function saveBest(s) { if(s>getBest()) localStorage.setItem(CFG.BEST_KEY,String(s)); }

  function makeLifeDots() {
    $lives.innerHTML = '';
    for (var i=0; i<CFG.LIVES; i++) {
      var d = document.createElement('div');
      d.className = 'life-dot' + (i >= state.lives ? ' lost' : '');
      $lives.appendChild(d);
    }
  }

  function spawnBall() {
    var aw = $area.offsetWidth;
    var emoji = CFG.BALL_EMOJIS[Math.floor(Math.random()*CFG.BALL_EMOJIS.length)];
    var el = document.createElement('div');
    el.className = 'ball';
    el.textContent = emoji;
    var x = Math.random() * (aw - CFG.BALL_SIZE);
    var y = 30;
    var vx = (Math.random()*2 - 1) * CFG.INIT_VX_MAX;
    var vy = Math.abs(CFG.BOUNCE_VY) * 0.5;
    el.style.left = x + 'px';
    el.style.top  = y + 'px';
    $area.appendChild(el);
    state.balls.push({ el: el, x: x, y: y, vx: vx, vy: vy, bounces: 0 });
  }

  function removeBall(i) {
    var b = state.balls[i];
    if (b.el) b.el.remove();
    state.balls.splice(i, 1);
  }

  function mkStar(x, y) {
    var p = document.createElement('div');
    p.className = 'star-particle';
    p.textContent = '⭐';
    p.style.left = (x-10)+'px';
    p.style.top  = (y-10)+'px';
    $area.appendChild(p);
    setTimeout(function(){ p.remove(); }, 750);
  }

  function flashRed() {
    $flash.style.opacity = '1';
    setTimeout(function(){ $flash.style.opacity = '0'; }, 180);
  }

  function loop() {
    if (!state.running) return;
    var aw = $area.offsetWidth;
    var ah = $area.offsetHeight;
    var clownBottom = ah - CFG.BALL_SIZE - 4; // 광대 발 위치 (bottom=0)
    var clownX = parseFloat($clown.style.left||((aw/2)-(CFG.CLOWN_W/2)));

    for (var i = state.balls.length-1; i >= 0; i--) {
      var b = state.balls[i];
      // 속도 증가
      var speed = 1 + state.tapCount * CFG.SPEED_INC;
      b.vy += CFG.GRAVITY;
      b.x  += b.vx * speed;
      b.y  += b.vy;

      // 좌우 벽 반사
      if (b.x < 0)         { b.x = 0;        b.vx = Math.abs(b.vx); }
      if (b.x > aw-CFG.BALL_SIZE) { b.x = aw-CFG.BALL_SIZE; b.vx = -Math.abs(b.vx); }

      // 천장 반사
      if (b.y < 0) { b.y = 0; b.vy = Math.abs(b.vy)*0.7; }

      // 광대와 충돌 (공이 광대 머리 위에 닿았을 때)
      var ballCx = b.x + CFG.BALL_SIZE/2;
      var clownCx = clownX + CFG.CLOWN_W/2;
      if (b.vy > 0 && b.y > clownBottom - CFG.CATCH_RANGE && b.y < clownBottom) {
        if (Math.abs(ballCx - clownCx) < CFG.CATCH_RANGE) {
          b.vy = CFG.BOUNCE_VY;
          b.y  = clownBottom - CFG.CATCH_RANGE;
          b.bounces++;
          state.score += state.combo;
          $score.textContent = state.score;
          mkStar(ballCx, clownBottom - 10);
        }
      }

      // 바닥 닿음 = 생명 차감
      if (b.y >= ah) {
        removeBall(i);
        state.lives--;
        state.combo = Math.max(1, state.combo - 1);
        $combo.textContent = 'x' + state.combo;
        makeLifeDots();
        flashRed();
        if (state.lives <= 0) { endGame(); return; }
        // 잠깐 후 새 공 소환
        setTimeout(function(){ if(state.running) spawnBall(); }, 600);
        continue;
      }

      b.el.style.left = b.x + 'px';
      b.el.style.top  = b.y + 'px';
    }

    state.rafId = requestAnimationFrame(loop);
  }

  // 탭: 광대를 탭 위치로 이동 + 콤보 증가
  $area.addEventListener('pointerdown', function(e) {
    if (!state.running) return;
    var ar = $area.getBoundingClientRect();
    var tx = e.clientX - ar.left;
    var aw = $area.offsetWidth;
    var nx = Math.max(0, Math.min(aw - CFG.CLOWN_W, tx - CFG.CLOWN_W/2));
    $clown.style.left = nx + 'px';
    state.tapCount++;
    // 다음 공 추가 (최대 MAX_BALLS까지)
    if (state.balls.length < CFG.MAX_BALLS && state.tapCount % 8 === 0) {
      spawnBall();
    }
    // 콤보: 10탭마다 1 증가 (최대 5)
    state.combo = Math.min(5, 1 + Math.floor(state.tapCount / 10));
    $combo.textContent = 'x' + state.combo;
  });

  function startGame() {
    // 기존 공 제거
    state.balls.forEach(function(b){ if(b.el) b.el.remove(); });
    state.balls = [];
    if (state.rafId) cancelAnimationFrame(state.rafId);
    state.score = 0; state.combo = 1; state.lives = CFG.LIVES; state.tapCount = 0;
    state.running = true;
    $score.textContent = '0';
    $combo.textContent = 'x1';
    $best.textContent  = getBest();
    var aw = $area.offsetWidth;
    $clown.style.left = (aw/2 - CFG.CLOWN_W/2) + 'px';
    makeLifeDots();
    $start.classList.add('hidden');
    $end.classList.add('hidden');
    spawnBall();
    state.rafId = requestAnimationFrame(loop);
  }

  function endGame() {
    state.running = false;
    if (state.rafId) cancelAnimationFrame(state.rafId);
    saveBest(state.score);
    var best = getBest();
    $final.textContent = state.score;
    $msg.textContent = state.score >= 200 ? '저글링 천재! 정말 대단해요!' :
                       state.score >= 100 ? '서커스 스타! 멋지게 했어요!' :
                       state.score >= 50  ? '공 잘 튕겼어요! 더 해봐요!' :
                                            '연습하면 저글링 달인이 될 수 있어요!';
    if (state.score > 0 && state.score >= best) $msg.textContent = '새 최고 기록! ' + $msg.textContent;
    $eb.textContent = '최고 기록: ' + best + '점';
    $end.classList.remove('hidden');
  }

  document.getElementById('startBtn').addEventListener('pointerdown', startGame);
  document.getElementById('restartBtn').addEventListener('pointerdown', startGame);
  var b = getBest();
  $sb.textContent = b > 0 ? '최고 기록: '+b+'점' : '';
  $best.textContent = b;
})();
</script>
</body>
</html>
