<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#090618"/>
      <stop offset="100%" stop-color="#0d1f3c"/>
    </linearGradient>
  </defs>

  <rect width="320" height="180" fill="url(#sky)"/>
  <rect x="0.5" y="0.5" width="319" height="179" fill="none" stroke="rgba(255,255,255,0.08)"/>

  <!-- 작은 별들 -->
  <circle cx="30"  cy="18"  r="1.2" fill="rgba(255,255,255,0.7)"/>
  <circle cx="80"  cy="10"  r="1"   fill="rgba(255,255,255,0.6)"/>
  <circle cx="130" cy="22"  r="1.5" fill="rgba(255,255,255,0.8)"/>
  <circle cx="195" cy="8"   r="1.2" fill="rgba(255,255,255,0.6)"/>
  <circle cx="240" cy="28"  r="1"   fill="rgba(255,255,255,0.5)"/>
  <circle cx="50"  cy="40"  r="1"   fill="rgba(255,255,255,0.4)"/>

  <!-- 지면 -->
  <rect x="0" y="145" width="320" height="35" fill="#1a3a1a"/>
  <rect x="0" y="145" width="320" height="8"  fill="#27ae60"/>

  <!-- 플랫폼들 -->
  <rect x="60"  y="110" width="78" height="10" rx="5" fill="#2980b9"/>
  <rect x="170" y="80"  width="70" height="10" rx="5" fill="#8e44ad"/>
  <rect x="260" y="50"  width="50" height="10" rx="5" fill="#e67e22"/>

  <!-- 별 (플랫폼 위) -->
  <text x="99"  y="104" font-size="18" text-anchor="middle" dominant-baseline="middle">⭐</text>
  <text x="205" y="74"  font-size="16" text-anchor="middle" dominant-baseline="middle">⭐</text>

  <!-- 가시 -->
  <polygon points="30,145 40,126 50,145" fill="#e74c3c"/>
  <polygon points="115,145 125,126 135,145" fill="#e74c3c"/>

  <!-- 캥거루 (점프 중) -->
  <ellipse cx="75" cy="116" rx="18" ry="15" fill="#d4890a"/>
  <ellipse cx="80" cy="103" rx="11" ry="9"  fill="#e8a020"/>
  <ellipse cx="87" cy="97"  rx="4"  ry="7"  fill="#d4890a" transform="rotate(15,87,97)"/>
  <ellipse cx="75" cy="96"  rx="3"  ry="6"  fill="#d4890a" transform="rotate(-10,75,96)"/>
  <circle  cx="83" cy="102" r="2.5" fill="#222"/>
  <!-- 꼬리 -->
  <ellipse cx="58" cy="124" rx="4" ry="10" fill="#d4890a" transform="rotate(-30,58,124)"/>

  <!-- 파워 게이지 힌트 -->
  <rect x="18" y="160" width="100" height="12" rx="6" fill="rgba(255,255,255,0.1)"/>
  <rect x="18" y="160" width="70"  height="12" rx="6" fill="rgba(46,204,113,0.7)"/>
  <text x="124" y="170" font-size="9" fill="rgba(255,255,255,0.4)">꾹 누를수록 높이!</text>

  <!-- 타이틀 -->
  <g font-family="'Pretendard','Noto Sans KR',sans-serif">
    <text x="296" y="148" text-anchor="end" font-size="22" font-weight="900" fill="#ff9f43">캥거루 점프</text>
    <text x="296" y="166" text-anchor="end" font-size="10" font-weight="500" fill="rgba(255,255,255,0.45)" letter-spacing="2">KANGAROO JUMP</text>
  </g>
</svg>
