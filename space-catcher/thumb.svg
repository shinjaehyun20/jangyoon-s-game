<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
  
  <defs>
    
    <radialGradient id="glow" cx="0.3" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#f59e0b" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="star" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#d97706"/>
    </linearGradient>
  
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      
    <stop offset="0" stop-color="#0f1a3a"/>
    <stop offset="1" stop-color="#060a1a"/>
  
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.04"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="320" height="180" fill="url(#bg)"/>
  <rect width="320" height="180" fill="url(#sheen)"/>
  <rect x="0.5" y="0.5" width="319" height="179" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  
  <!-- 글로우 -->
  <ellipse cx="96" cy="72" rx="100" ry="70" fill="url(#glow)"/>
  <!-- 별들 (배경) -->
  <g fill="rgba(255,255,255,0.6)">
    <circle cx="42" cy="32" r="1"/>
    <circle cx="78" cy="18" r="0.8"/>
    <circle cx="128" cy="42" r="1.2"/>
    <circle cx="168" cy="22" r="0.8"/>
    <circle cx="210" cy="38" r="1"/>
    <circle cx="248" cy="18" r="0.9"/>
    <circle cx="58" cy="98" r="0.8"/>
    <circle cx="148" cy="112" r="1"/>
  </g>
  <!-- 중앙 별 아이콘 (큰 별 = 잡아야 할 오브젝트) -->
  <g transform="translate(80, 60)">
    <path d="M 24 0 L 30 16 L 48 16 L 33 27 L 39 44 L 24 33 L 9 44 L 15 27 L 0 16 L 18 16 Z" fill="url(#star)" stroke="#92400e" stroke-width="0.5"/>
    <circle cx="24" cy="22" r="4" fill="#fff" opacity="0.8"/>
  </g>
  <!-- 플레이어 (우측 하단, 캐릭터 트레이) -->
  <g transform="translate(32, 132)">
    <rect x="0" y="0" width="28" height="28" rx="6" fill="url(#star)" stroke="#92400e" stroke-width="1"/>
    <circle cx="14" cy="14" r="4" fill="#fff"/>
  </g>
  
  <g font-family="'Pretendard', 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif">
    <text x="296" y="148" text-anchor="end" font-size="22" font-weight="900" fill="#fbbf24" letter-spacing="-0.5">장윤이 잡기</text>
    <text x="296" y="166" text-anchor="end" font-size="10" font-weight="500" fill="rgba(255,255,255,0.5)" letter-spacing="2">SPACE CATCHER</text>
  </g>
  
</svg>