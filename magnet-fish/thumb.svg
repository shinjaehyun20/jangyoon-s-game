<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#0e3460"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(14,52,96,0.6)"/>
      <stop offset="100%" stop-color="rgba(14,52,96,0.9)"/>
    </linearGradient>
  </defs>
  <rect width="320" height="180" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="319" height="179" fill="none" stroke="rgba(255,255,255,0.08)"/>

  <!-- 물 -->
  <rect x="0" y="55" width="320" height="125" fill="url(#water)"/>
  <line x1="0" y1="55" x2="320" y2="55" stroke="rgba(56,189,248,0.4)" stroke-width="2"/>

  <!-- 자기장 원 -->
  <circle cx="110" cy="42" r="52" fill="none" stroke="rgba(56,189,248,0.2)" stroke-width="2" stroke-dasharray="6 4"/>
  <!-- 자석 -->
  <text x="110" y="55" font-size="40" text-anchor="middle">🧲</text>

  <!-- 물고기들 -->
  <text x="72"  y="105" font-size="26" text-anchor="middle">🐟</text>
  <text x="140" y="130" font-size="28" text-anchor="middle">🐠</text>
  <text x="76"  y="155" font-size="22" text-anchor="middle">🐡</text>
  <!-- 폭탄 -->
  <text x="168" y="100" font-size="22" text-anchor="middle">💣</text>

  <!-- 인력 선 (물고기→자석) -->
  <line x1="72" y1="90" x2="110" y2="60" stroke="rgba(56,189,248,0.35)" stroke-width="1.5" stroke-dasharray="3 3"/>
  <line x1="140" y1="115" x2="118" y2="62" stroke="rgba(56,189,248,0.25)" stroke-width="1.5" stroke-dasharray="3 3"/>

  <!-- 타이틀 -->
  <g font-family="'Pretendard','Noto Sans KR',sans-serif">
    <text x="296" y="148" text-anchor="end" font-size="22" font-weight="900" fill="#38bdf8">자석 낚시</text>
    <text x="296" y="166" text-anchor="end" font-size="10" font-weight="500" fill="rgba(255,255,255,0.5)" letter-spacing="2">MAGNET FISH</text>
  </g>
</svg>
