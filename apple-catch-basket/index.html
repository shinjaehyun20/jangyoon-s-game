<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>🍎 사과 받기</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100vh; height: 100dvh;
      overflow: hidden;
      touch-action: none;
      user-select: none;
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: #87CEEB;
    }

    /* ── 게임 래퍼 ── */
    #wrap {
      width: 100%; max-width: 480px;
      height: 100vh; height: 100dvh;
      margin: 0 auto;
      position: relative;
      overflow: hidden;
      background: linear-gradient(180deg, #87CEEB 0%, #B0E0FF 55%, #5A8A3C 55%, #3E6B26 100%);
    }

    /* ── 구름 배경 ── */
    .cloud {
      position: absolute;
      border-radius: 50px;
      background: rgba(255,255,255,0.75);
      animation: cloudMove linear infinite;
    }
    @keyframes cloudMove {
      from { transform: translateX(110%); }
      to   { transform: translateX(-160%); }
    }

    /* ── HUD ── */
    #hud {
      position: absolute; top: 0; left: 0; right: 0;
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 16px;
      pointer-events: none;
      z-index: 20;
    }
    .hud-box {
      background: rgba(255,255,255,0.85);
      border-radius: 16px;
      padding: 6px 14px;
      font-size: 22px;
      font-weight: 800;
      color: #2d2d2d;
      min-width: 72px;
      text-align: center;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }
    .hud-label {
      font-size: 11px;
      font-weight: 600;
      color: #666;
      display: block;
      margin-bottom: 1px;
    }
    #life-display { font-size: 20px; letter-spacing: 4px; }

    /* ── 나무 장식 (CSS only) ── */
    .tree {
      position: absolute;
      bottom: 0;
      pointer-events: none;
      z-index: 2;
    }
    .tree-trunk {
      width: 14px; height: 30px;
      background: #7B4F2E;
      margin: 0 auto;
      border-radius: 3px;
    }
    .tree-top {
      width: 50px; height: 50px;
      background: #3E8A2A;
      border-radius: 50%;
      margin: 0 auto -10px;
      box-shadow: inset -4px -4px 0 rgba(0,0,0,0.1);
    }
    .tree-top::before {
      content: '';
      display: block;
      width: 36px; height: 36px;
      background: #4EA832;
      border-radius: 50%;
      margin: 4px auto 0;
    }

    /* ── 캔버스 ── */
    #gameCanvas {
      position: absolute;
      top: 0; left: 0;
      z-index: 10;
    }

    /* ── 팝업 공통 ── */
    .overlay {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      gap: 20px;
      z-index: 100;
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(4px);
    }
    .popup-card {
      background: #fff;
      border-radius: 28px;
      padding: 32px 40px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.25);
      min-width: 260px;
    }
    .popup-title {
      font-size: 36px;
      font-weight: 900;
      color: #2d2d2d;
      margin-bottom: 8px;
    }
    .popup-emoji { font-size: 56px; display: block; margin-bottom: 8px; }
    .popup-sub {
      font-size: 18px;
      color: #555;
      margin-bottom: 4px;
    }
    .popup-score {
      font-size: 48px;
      font-weight: 900;
      color: #E84343;
    }
    .btn {
      background: linear-gradient(135deg, #FF6B6B, #FF4444);
      color: #fff;
      border: none;
      border-radius: 50px;
      padding: 16px 48px;
      font-size: 22px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(255,68,68,0.4);
      transition: transform 0.1s;
      letter-spacing: 1px;
    }
    .btn:active { transform: scale(0.95); }
    .btn-start {
      background: linear-gradient(135deg, #4CAF50, #2E7D32);
      box-shadow: 0 4px 12px rgba(76,175,80,0.4);
    }

    /* ── 파티클 레이어 ── */
    .particle {
      position: absolute;
      pointer-events: none;
      z-index: 50;
      border-radius: 50%;
      animation: particleFly 0.6s ease-out forwards;
    }
    @keyframes particleFly {
      0%   { transform: translate(0,0) scale(1); opacity: 1; }
      100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
    }

    /* ── 점수 팝 텍스트 ── */
    .score-pop {
      position: absolute;
      pointer-events: none;
      z-index: 55;
      font-size: 28px;
      font-weight: 900;
      color: #FFF;
      text-shadow: 0 2px 6px rgba(0,0,0,0.5);
      animation: scorePop 0.8s ease-out forwards;
    }
    @keyframes scorePop {
      0%   { transform: translateY(0) scale(1); opacity: 1; }
      100% { transform: translateY(-60px) scale(1.4); opacity: 0; }
    }

    /* ── 미스 플래시 ── */
    #missFlash {
      position: absolute; inset: 0;
      background: rgba(255,0,0,0);
      pointer-events: none;
      z-index: 90;
      transition: background 0.15s;
    }
    #missFlash.active { background: rgba(255,0,0,0.3); }

    #startScreen, #gameoverScreen { display: flex; }
    #pauseScreen { display: none; }
  </style>
</head>
<body>
<div id="wrap">
  <!-- 구름들 (JS로 추가) -->

  <!-- 나무 장식 -->
  <div class="tree" style="left:6%; bottom:0;">
    <div class="tree-top"></div>
    <div class="tree-trunk"></div>
  </div>
  <div class="tree" style="right:8%; bottom:0; transform:scaleX(-1);">
    <div class="tree-top"></div>
    <div class="tree-trunk"></div>
  </div>

  <!-- HUD -->
  <div id="hud">
    <div class="hud-box">
      <span class="hud-label">점수</span>
      <span id="scoreDisplay">0</span>
    </div>
    <div class="hud-box">
      <span class="hud-label">목숨</span>
      <span id="life-display">❤️❤️❤️</span>
    </div>
  </div>

  <!-- 게임 캔버스 -->
  <canvas id="gameCanvas"></canvas>

  <!-- 미스 플래시 -->
  <div id="missFlash"></div>

  <!-- 시작 화면 -->
  <div id="startScreen" class="overlay">
    <div class="popup-card">
      <span class="popup-emoji">🍎</span>
      <div class="popup-title">사과 받기!</div>
      <div class="popup-sub" style="margin-top:8px;">떨어지는 사과를<br>바구니로 받아요!</div>
    </div>
    <button class="btn btn-start" id="startBtn">시작!</button>
  </div>

  <!-- 게임 오버 화면 -->
  <div id="gameoverScreen" class="overlay" style="display:none;">
    <div class="popup-card">
      <span class="popup-emoji">😢</span>
      <div class="popup-title">게임 끝!</div>
      <div class="popup-sub">점수</div>
      <div class="popup-score" id="finalScore">0</div>
    </div>
    <button class="btn" id="restartBtn">다시하기 🔄</button>
  </div>
</div>

<script>
(function () {
  'use strict';

  /* ── 유틸 ── */
  const $ = id => document.getElementById(id);
  const wrap = $('wrap');
  const canvas = $('gameCanvas');
  const ctx = canvas.getContext('2d');

  /* ── 상태 ── */
  let W, H;
  let apples = [];
  let score = 0;
  let lives = 3;
  let gameRunning = false;
  let animId = null;
  let lastTime = 0;
  let spawnTimer = 0;
  let spawnInterval = 2000; // ms

  /* ── 바구니 ── */
  const BASKET_W_RATIO = 0.22;  // 화면 너비 대비
  const BASKET_H = 44;
  const BASKET_Y_RATIO = 0.82;  // 화면 높이 대비

  let basket = { x: 0, y: 0, w: 0, h: BASKET_H, vx: 0 };
  let dragging = false;
  let dragOffX = 0;

  /* ── 구름 ── */
  const NUM_CLOUDS = 4;
  let clouds = [];

  /* ── 크기 설정 ── */
  function resize() {
    const rect = wrap.getBoundingClientRect();
    W = rect.width;
    H = rect.height;
    canvas.width = W;
    canvas.height = H;
    basket.w = W * BASKET_W_RATIO;
    if (basket.x === 0) basket.x = (W - basket.w) / 2;
    basket.y = H * BASKET_Y_RATIO;
  }

  /* ── 구름 초기화 ── */
  function initClouds() {
    clouds = [];
    for (let i = 0; i < NUM_CLOUDS; i++) {
      clouds.push(makeCoud(i / NUM_CLOUDS));
    }
  }

  function makeCoud(progress) {
    const w = 80 + Math.random() * 70;
    const h = w * 0.5;
    return {
      x: W * (1 - progress) - w,
      y: 20 + Math.random() * 80,
      w, h,
      speed: 18 + Math.random() * 14
    };
  }

  /* ── 사과 생성 ── */
  function spawnApple() {
    const r = 22 + Math.random() * 10;
    const x = r + Math.random() * (W - r * 2);
    // 속도: 점수 올라갈수록 최대 1.8배
    const speedMult = 1 + Math.min(score / 25, 0.8);
    const vy = (120 + Math.random() * 60) * speedMult;
    apples.push({ x, y: -r, r, vy, caught: false, missed: false, bounceAnim: 0 });
  }

  /* ── 충돌 판정 ── */
  function checkCatch(apple) {
    const bx = basket.x;
    const by = basket.y;
    const bw = basket.w;
    // 사과 바닥이 바구니 위쪽 근처에 닿았을 때
    if (apple.y + apple.r >= by + 4 &&
        apple.y + apple.r <= by + BASKET_H / 2 + apple.r &&
        apple.x > bx - apple.r * 0.4 &&
        apple.x < bx + bw + apple.r * 0.4) {
      return true;
    }
    return false;
  }

  /* ── 파티클 효과 ── */
  function spawnParticles(cx, cy) {
    const colors = ['#FF4444', '#FF9800', '#FFEB3B', '#4CAF50', '#2196F3'];
    for (let i = 0; i < 10; i++) {
      const el = document.createElement('div');
      el.className = 'particle';
      const size = 8 + Math.random() * 10;
      const angle = Math.random() * Math.PI * 2;
      const dist = 30 + Math.random() * 50;
      el.style.cssText = `
        left:${cx - size/2}px; top:${cy - size/2}px;
        width:${size}px; height:${size}px;
        background:${colors[Math.floor(Math.random()*colors.length)]};
        --tx:${Math.cos(angle)*dist}px; --ty:${Math.sin(angle)*dist}px;
      `;
      wrap.appendChild(el);
      setTimeout(() => el.remove(), 650);
    }
  }

  /* ── 점수 팝업 텍스트 ── */
  function spawnScorePop(cx, cy) {
    const el = document.createElement('div');
    el.className = 'score-pop';
    el.textContent = '+1';
    el.style.cssText = `left:${cx - 20}px; top:${cy - 20}px;`;
    wrap.appendChild(el);
    setTimeout(() => el.remove(), 820);
  }

  /* ── 미스 플래시 ── */
  function showMissFlash() {
    const f = $('missFlash');
    f.classList.add('active');
    setTimeout(() => f.classList.remove('active'), 200);
  }

  /* ── HUD 갱신 ── */
  function updateHUD() {
    $('scoreDisplay').textContent = score;
    const hearts = ['', '❤️', '❤️❤️', '❤️❤️❤️'];
    $('life-display').textContent = lives >= 0 ? (hearts[lives] || '') : '';
  }

  /* ── 사과 그리기 ── */
  function drawApple(a) {
    ctx.save();

    // 바운스 애니메이션 (catch 직후 통통 효과)
    let scaleX = 1, scaleY = 1;
    if (a.bounceAnim > 0) {
      const t = 1 - a.bounceAnim;
      scaleX = 1 + Math.sin(t * Math.PI) * 0.25;
      scaleY = 1 - Math.sin(t * Math.PI) * 0.15;
    }

    ctx.translate(a.x, a.y);
    ctx.scale(scaleX, scaleY);

    // 사과 몸통
    const r = a.r;
    const grad = ctx.createRadialGradient(-r*0.3, -r*0.3, r*0.1, 0, 0, r);
    grad.addColorStop(0, '#FF7070');
    grad.addColorStop(0.5, '#E82020');
    grad.addColorStop(1, '#A01010');
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();

    // 하이라이트
    ctx.beginPath();
    ctx.arc(-r*0.28, -r*0.28, r*0.22, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,255,255,0.45)';
    ctx.fill();

    // 꼭지
    ctx.beginPath();
    ctx.moveTo(0, -r);
    ctx.bezierCurveTo(4, -r - 12, 14, -r - 8, 10, -r - 2);
    ctx.strokeStyle = '#5A3010';
    ctx.lineWidth = 2.5;
    ctx.lineCap = 'round';
    ctx.stroke();

    // 잎사귀
    ctx.beginPath();
    ctx.ellipse(8, -r - 4, 8, 4, -0.5, 0, Math.PI * 2);
    ctx.fillStyle = '#4CAF50';
    ctx.fill();

    ctx.restore();
  }

  /* ── 바구니 그리기 ── */
  function drawBasket() {
    const x = basket.x, y = basket.y, w = basket.w, h = BASKET_H;
    ctx.save();

    // 바구니 몸통 (사다리꼴)
    const inset = 10;
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(x + w, y);
    ctx.lineTo(x + w - inset, y + h);
    ctx.lineTo(x + inset, y + h);
    ctx.closePath();

    // 갈색 그라데이션
    const grad = ctx.createLinearGradient(x, y, x, y + h);
    grad.addColorStop(0, '#C68642');
    grad.addColorStop(1, '#8B5E2A');
    ctx.fillStyle = grad;
    ctx.fill();

    // 바구니 테두리
    ctx.strokeStyle = '#5A3A10';
    ctx.lineWidth = 2.5;
    ctx.stroke();

    // 격자 무늬 (수평선 2개)
    ctx.strokeStyle = 'rgba(90,58,16,0.4)';
    ctx.lineWidth = 1.5;
    for (let i = 1; i < 3; i++) {
      const ratio = i / 3;
      const lx = x + inset * ratio;
      const rx = x + w - inset * ratio;
      const ly = y + h * ratio;
      ctx.beginPath();
      ctx.moveTo(lx, ly);
      ctx.lineTo(rx, ly);
      ctx.stroke();
    }

    // 격자 (수직선 4개)
    for (let i = 1; i < 5; i++) {
      const ratio = i / 5;
      const lerpInset = inset * ratio; // 아래로 갈수록 안쪽으로
      const tx = x + w * ratio;
      const bx = x + inset + (w - inset * 2) * ratio;
      ctx.beginPath();
      ctx.moveTo(tx, y);
      ctx.lineTo(bx, y + h);
      ctx.stroke();
    }

    // 상단 림 (테두리 원통)
    ctx.beginPath();
    ctx.ellipse(x + w/2, y + 4, w/2, 8, 0, 0, Math.PI*2);
    const rimGrad = ctx.createLinearGradient(x, y, x, y + 8);
    rimGrad.addColorStop(0, '#DCA060');
    rimGrad.addColorStop(1, '#A06830');
    ctx.fillStyle = rimGrad;
    ctx.fill();
    ctx.strokeStyle = '#5A3A10';
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.restore();
  }

  /* ── 잔디 줄 ── */
  function drawGrass() {
    const groundY = H * 0.88;
    ctx.save();
    ctx.fillStyle = '#4A8A30';
    const bladeCount = Math.floor(W / 10);
    for (let i = 0; i < bladeCount; i++) {
      const bx = i * 10 + Math.sin(i * 1.3) * 4;
      const bh = 8 + Math.sin(i * 2.1) * 4;
      ctx.beginPath();
      ctx.moveTo(bx, groundY);
      ctx.quadraticCurveTo(bx + 2, groundY - bh, bx + 4, groundY - bh + 2);
      ctx.quadraticCurveTo(bx + 6, groundY - bh, bx + 8, groundY);
      ctx.fill();
    }
    ctx.restore();
  }

  /* ── 구름 그리기 ── */
  function drawCloud(c) {
    ctx.save();
    ctx.fillStyle = 'rgba(255,255,255,0.78)';
    const cx = c.x + c.w / 2;
    const cy = c.y + c.h / 2;
    ctx.beginPath();
    ctx.ellipse(cx, cy, c.w / 2, c.h / 2, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(cx - c.w * 0.2, cy + c.h * 0.1, c.w * 0.35, c.h * 0.55, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(cx + c.w * 0.2, cy + c.h * 0.1, c.w * 0.35, c.h * 0.55, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  /* ── 메인 루프 ── */
  function loop(ts) {
    if (!gameRunning) return;
    const dt = Math.min(ts - lastTime, 100); // ms, 최대 100ms cap
    lastTime = ts;

    // 구름 이동
    clouds.forEach(c => {
      c.x -= c.speed * dt / 1000;
      if (c.x + c.w < 0) {
        c.x = W;
        c.y = 20 + Math.random() * 80;
        c.speed = 18 + Math.random() * 14;
      }
    });

    // 사과 스폰
    spawnTimer += dt;
    if (spawnTimer >= spawnInterval) {
      spawnApple();
      spawnTimer = 0;
      // 점수 오를수록 스폰 빨라짐 (최소 800ms)
      spawnInterval = Math.max(800, 2000 - score * 25);
    }

    // 사과 이동
    apples.forEach(a => {
      if (a.caught) {
        a.bounceAnim = Math.max(0, a.bounceAnim - dt / 300);
        return;
      }
      a.y += a.vy * dt / 1000;

      // 잡기 판정
      if (!a.missed && checkCatch(a)) {
        a.caught = true;
        a.bounceAnim = 1;
        score++;
        updateHUD();
        spawnParticles(a.x, a.y);
        spawnScorePop(a.x, basket.y - 10);
        playSound('catch');
      }
      // 바닥 벗어남
      if (!a.caught && a.y - a.r > H) {
        a.missed = true;
        lives--;
        updateHUD();
        showMissFlash();
        playSound('miss');
        if (lives <= 0) {
          gameOver();
          return;
        }
      }
    });

    // 화면 밖 + caught 사과 제거
    apples = apples.filter(a => {
      if (a.caught && a.bounceAnim <= 0) return false;
      if (a.missed) return false;
      return true;
    });

    // 그리기
    ctx.clearRect(0, 0, W, H);
    drawGrass();
    clouds.forEach(drawCloud);
    apples.forEach(drawApple);
    drawBasket();

    animId = requestAnimationFrame(loop);
  }

  /* ── 효과음 (Web Audio API) ── */
  let audioCtx = null;
  function getAudioCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }

  function playSound(type) {
    try {
      const ac = getAudioCtx();
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.connect(gain);
      gain.connect(ac.destination);
      if (type === 'catch') {
        // 밝고 통통 튀는 소리
        osc.type = 'sine';
        osc.frequency.setValueAtTime(600, ac.currentTime);
        osc.frequency.exponentialRampToValueAtTime(900, ac.currentTime + 0.08);
        osc.frequency.exponentialRampToValueAtTime(700, ac.currentTime + 0.15);
        gain.gain.setValueAtTime(0.25, ac.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.2);
        osc.start(ac.currentTime);
        osc.stop(ac.currentTime + 0.2);
      } else if (type === 'miss') {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(250, ac.currentTime);
        osc.frequency.exponentialRampToValueAtTime(100, ac.currentTime + 0.2);
        gain.gain.setValueAtTime(0.2, ac.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.25);
        osc.start(ac.currentTime);
        osc.stop(ac.currentTime + 0.25);
      }
    } catch (e) { /* 사운드 실패는 무시 */ }
  }

  /* ── 터치/마우스 입력 ── */
  function getEventX(e) {
    if (e.touches) return e.touches[0].clientX - wrap.getBoundingClientRect().left;
    return e.clientX - wrap.getBoundingClientRect().left;
  }

  function onPointerDown(e) {
    if (!gameRunning) return;
    e.preventDefault();
    const ex = getEventX(e);
    if (ex >= basket.x - 20 && ex <= basket.x + basket.w + 20) {
      dragging = true;
      dragOffX = ex - (basket.x + basket.w / 2);
    }
  }

  function onPointerMove(e) {
    if (!dragging || !gameRunning) return;
    e.preventDefault();
    const ex = getEventX(e);
    basket.x = ex - dragOffX - basket.w / 2;
    basket.x = Math.max(0, Math.min(W - basket.w, basket.x));
  }

  function onPointerUp(e) {
    dragging = false;
  }

  canvas.addEventListener('touchstart', onPointerDown, { passive: false });
  canvas.addEventListener('touchmove', onPointerMove, { passive: false });
  canvas.addEventListener('touchend', onPointerUp, { passive: false });
  canvas.addEventListener('mousedown', onPointerDown);
  canvas.addEventListener('mousemove', onPointerMove);
  canvas.addEventListener('mouseup', onPointerUp);

  /* ── 게임 상태 전환 ── */
  function startGame() {
    score = 0;
    lives = 3;
    apples = [];
    spawnTimer = 0;
    spawnInterval = 2000;
    basket.x = (W - basket.w) / 2;
    dragging = false;
    updateHUD();
    $('startScreen').style.display = 'none';
    $('gameoverScreen').style.display = 'none';
    gameRunning = true;
    lastTime = performance.now();
    initClouds();
    animId = requestAnimationFrame(loop);
  }

  function gameOver() {
    gameRunning = false;
    cancelAnimationFrame(animId);
    $('finalScore').textContent = score;
    $('gameoverScreen').style.display = 'flex';
  }

  /* ── 버튼 ── */
  $('startBtn').addEventListener('click', startGame);
  $('restartBtn').addEventListener('click', startGame);

  /* ── 초기화 ── */
  resize();
  window.addEventListener('resize', resize);

  // 첫 렌더: 빈 캔버스에 바구니만 그려둠
  initClouds();
  ctx.clearRect(0, 0, W, H);
  drawGrass();
  clouds.forEach(drawCloud);
  drawBasket();
})();
</script>
</body>
</html>
