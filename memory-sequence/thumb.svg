<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0a3d"/>
      <stop offset="100%" stop-color="#2a1060"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c97dff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#c97dff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="320" height="180" fill="url(#bg)"/>
  <ellipse cx="130" cy="90" rx="100" ry="70" fill="url(#glow)"/>

  <!-- Grid of 4 color squares (mini game preview) -->
  <!-- Top-left: Red/Heart -->
  <rect x="42" y="38" width="64" height="64" rx="14" fill="#ff4d6d" opacity="1"/>
  <text x="74" y="80" text-anchor="middle" font-size="28">❤️</text>

  <!-- Top-right: Blue -->
  <rect x="116" y="38" width="64" height="64" rx="14" fill="#4dbbff" opacity="0.45"/>
  <text x="148" y="80" text-anchor="middle" font-size="28">💙</text>

  <!-- Bottom-left: Green -->
  <rect x="42" y="112" width="64" height="64" rx="14" fill="#4dff88" opacity="1"/>
  <text x="74" y="154" text-anchor="middle" font-size="28">💚</text>

  <!-- Bottom-right: Yellow -->
  <rect x="116" y="112" width="64" height="64" rx="14" fill="#ffd94d" opacity="0.45"/>
  <text x="148" y="154" text-anchor="middle" font-size="28">💛</text>

  <!-- Arrow sequence indicator: 1→3→2 -->
  <g fill="none" stroke="#c97dff" stroke-width="2.5" stroke-linecap="round">
    <line x1="200" y1="68" x2="230" y2="68"/>
    <polygon points="230,63 240,68 230,73" fill="#c97dff" stroke="none"/>
  </g>
  <circle cx="195" cy="68" r="12" fill="#ff4d6d" opacity="0.9"/>
  <text x="195" y="73" text-anchor="middle" font-size="13" font-weight="900" fill="white">1</text>
  <circle cx="250" cy="68" r="12" fill="#4dff88" opacity="0.9"/>
  <text x="250" y="73" text-anchor="middle" font-size="13" font-weight="900" fill="white">2</text>

  <g fill="none" stroke="#c97dff" stroke-width="2.5" stroke-linecap="round">
    <line x1="200" y1="108" x2="230" y2="108"/>
    <polygon points="230,103 240,108 230,113" fill="#c97dff" stroke="none"/>
  </g>
  <circle cx="195" cy="108" r="12" fill="#4dbbff" opacity="0.9"/>
  <text x="195" y="113" text-anchor="middle" font-size="13" font-weight="900" fill="white">3</text>
  <circle cx="250" cy="108" r="12" fill="#ffd94d" opacity="0.9"/>
  <text x="250" y="113" text-anchor="middle" font-size="13" font-weight="900" fill="white">4</text>

  <!-- Brain emoji top right -->
  <text x="282" y="42" text-anchor="middle" font-size="28">🧠</text>

  <!-- Border -->
  <rect x="0.5" y="0.5" width="319" height="179" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Title -->
  <g font-family="'Pretendard','Noto Sans KR',sans-serif">
    <text x="296" y="148" text-anchor="end" font-size="22" font-weight="900" fill="#c97dff">순서 기억하기</text>
    <text x="296" y="166" text-anchor="end" font-size="10" font-weight="500" fill="rgba(255,255,255,0.5)" letter-spacing="2">MEMORY SEQUENCE</text>
  </g>
</svg>
