<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>🍎 과일 짝 맞추기</title>
  <style>
    :root {
      --bg: #1a2a1a;
      --card-back: #2d5a27;
      --card-front: #f9f4e8;
      --accent: #ff6b35;
      --accent2: #ffd23f;
      --text: #ffffff;
      --success: #4caf50;
      --shadow: rgba(0,0,0,0.4);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      touch-action: manipulation;
      background: var(--bg);
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
      color: var(--text);
      user-select: none;
      -webkit-user-select: none;
    }

    .wrap {
      width: 100%;
      max-width: 480px;
      height: 100vh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      padding: 10px 12px 8px;
      gap: 8px;
      margin: 0 auto;
    }

    h1 {
      font-size: clamp(18px, 5vw, 26px);
      font-weight: 900;
      text-align: center;
      letter-spacing: -0.5px;
      line-height: 1.2;
      flex-shrink: 0;
    }

    .hud {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 8px 14px;
      gap: 6px;
      flex-shrink: 0;
    }

    .hud-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      flex: 1;
    }

    .hud-label {
      font-size: 10px;
      opacity: 0.7;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .hud-value {
      font-size: clamp(18px, 5vw, 26px);
      font-weight: 900;
      line-height: 1;
    }

    .hud-value.timer-warn { color: #ff6b6b; animation: pulse 0.6s infinite alternate; }

    @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.1); } }

    .level-badge {
      background: var(--accent);
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 12px;
      font-weight: 800;
      flex-shrink: 0;
    }

    /* 게임 영역 */
    #gameArea {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .card-grid {
      display: grid;
      gap: 8px;
      width: 100%;
      height: 100%;
      align-content: center;
      justify-content: center;
    }

    /* 4쌍(8장): 4x2, 6쌍(12장): 4x3, 8쌍(16장): 4x4, 10쌍(20장): 4x5 */
    .card-grid.cols-4 { grid-template-columns: repeat(4, 1fr); }

    .card {
      aspect-ratio: 1;
      border-radius: 12px;
      cursor: pointer;
      perspective: 600px;
      min-width: 52px;
      max-width: 90px;
    }

    .card-inner {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      border-radius: 12px;
    }

    .card.flipped .card-inner,
    .card.matched .card-inner {
      transform: rotateY(180deg);
    }

    .card-face {
      position: absolute;
      inset: 0;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }

    .card-back {
      background: linear-gradient(135deg, var(--card-back), #1e3d1a);
      border: 2px solid rgba(255,255,255,0.15);
      font-size: clamp(20px, 6vw, 36px);
    }

    .card-back::before {
      content: '🌿';
      opacity: 0.4;
      font-size: clamp(16px, 4vw, 28px);
    }

    .card-front {
      background: var(--card-front);
      border: 2px solid rgba(255,255,255,0.5);
      transform: rotateY(180deg);
      font-size: clamp(22px, 7vw, 44px);
    }

    .card.matched .card-front {
      background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
      border-color: var(--success);
      animation: matchPop 0.4s ease forwards;
    }

    @keyframes matchPop {
      0% { transform: rotateY(180deg) scale(1); }
      40% { transform: rotateY(180deg) scale(1.18); }
      70% { transform: rotateY(180deg) scale(0.95); }
      100% { transform: rotateY(180deg) scale(1); }
    }

    .card:active .card-inner { transform: scale(0.93); }
    .card.flipped:active .card-inner,
    .card.matched:active .card-inner { transform: rotateY(180deg) scale(1); }

    /* 콤보 표시 */
    #comboDisplay {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: clamp(28px, 8vw, 48px);
      font-weight: 900;
      color: var(--accent2);
      text-shadow: 0 2px 8px rgba(0,0,0,0.6);
      pointer-events: none;
      opacity: 0;
      z-index: 20;
    }

    .combo-anim {
      animation: comboFly 0.9s ease forwards;
    }

    @keyframes comboFly {
      0% { opacity: 1; transform: translate(-50%, -50%) scale(0.7); }
      30% { opacity: 1; transform: translate(-50%, -60%) scale(1.2); }
      70% { opacity: 0.8; transform: translate(-50%, -70%) scale(1); }
      100% { opacity: 0; transform: translate(-50%, -80%) scale(0.9); }
    }

    /* Footer */
    footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }

    footer small {
      font-size: 11px;
      opacity: 0.5;
    }

    .home-link {
      font-size: 12px;
      color: rgba(255,255,255,0.6);
      text-decoration: none;
      padding: 6px 10px;
      border-radius: 8px;
      background: rgba(255,255,255,0.08);
      transition: background 0.2s;
    }

    .home-link:active { background: rgba(255,255,255,0.2); }

    /* 오버레이 */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(20,30,20,0.92);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 50;
      padding: 20px;
    }

    .overlay.hidden { display: none; }

    .overlay-card {
      background: linear-gradient(160deg, #2d5a27, #1a3a16);
      border: 2px solid rgba(255,255,255,0.15);
      border-radius: 24px;
      padding: 28px 24px;
      text-align: center;
      max-width: 340px;
      width: 100%;
    }

    .overlay-card h2 {
      font-size: clamp(22px, 6vw, 32px);
      font-weight: 900;
      margin-bottom: 10px;
    }

    .overlay-card p {
      font-size: 14px;
      opacity: 0.85;
      line-height: 1.6;
      margin-bottom: 18px;
    }

    .level-select {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-bottom: 16px;
    }

    .lv-btn {
      flex: 1;
      padding: 10px 4px;
      border: 2px solid rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.08);
      border-radius: 12px;
      color: var(--text);
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      touch-action: manipulation;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .lv-btn .lv-emoji { font-size: 20px; }
    .lv-btn .lv-name { font-size: 11px; }
    .lv-btn .lv-desc { font-size: 10px; opacity: 0.6; }
    .lv-btn.selected { border-color: var(--accent2); background: rgba(255,210,63,0.2); }
    .lv-btn:active { transform: scale(0.96); }

    .btn-start {
      background: linear-gradient(135deg, var(--accent), #ff4500);
      color: white;
      border: none;
      border-radius: 16px;
      padding: 14px 32px;
      font-size: 18px;
      font-weight: 900;
      cursor: pointer;
      width: 100%;
      min-height: 52px;
      touch-action: manipulation;
      transition: transform 0.1s, box-shadow 0.1s;
      box-shadow: 0 4px 16px rgba(255,107,53,0.4);
    }

    .btn-start:active { transform: scale(0.97); box-shadow: 0 2px 8px rgba(255,107,53,0.3); }

    .result-score {
      font-size: clamp(40px, 12vw, 64px);
      font-weight: 900;
      color: var(--accent2);
      line-height: 1;
      margin: 8px 0;
    }

    .result-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin: 12px 0;
    }

    .stat-box {
      background: rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 8px;
      font-size: 12px;
    }

    .stat-box .stat-val {
      font-size: 18px;
      font-weight: 800;
      color: var(--accent2);
      display: block;
    }

    #newBestBadge {
      display: inline-block;
      background: var(--accent);
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 13px;
      font-weight: 800;
      margin-bottom: 10px;
    }

    #newBestBadge.hidden { display: none; }

    .btn-row {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    .btn-secondary {
      background: rgba(255,255,255,0.12);
      color: white;
      border: none;
      border-radius: 14px;
      padding: 12px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      flex: 1;
      min-height: 48px;
      touch-action: manipulation;
    }

    .btn-secondary:active { background: rgba(255,255,255,0.22); }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>🍎 과일 짝 맞추기</h1>

    <div class="hud">
      <div class="hud-item">
        <span class="hud-label">점수</span>
        <span class="hud-value" id="scoreDisplay">0</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">남은 짝</span>
        <span class="hud-value" id="pairsLeft">-</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">시간</span>
        <span class="hud-value" id="timerDisplay">60</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">연속</span>
        <span class="hud-value" id="comboCount">0</span>
      </div>
    </div>

    <div id="gameArea">
      <div class="card-grid cols-4" id="cardGrid"></div>
    </div>

    <footer>
      <small>같은 과일 찾기!</small>
      <a class="home-link" href="../index.html">← 홈으로</a>
    </footer>
  </div>

  <div id="comboDisplay"></div>

  <!-- 시작 오버레이 -->
  <div class="overlay" id="startOverlay">
    <div class="overlay-card">
      <h2>🍎 과일 짝 맞추기</h2>
      <p>같은 과일 카드 두 장을 찾아요!<br>시간 안에 모두 맞추면 완료!<br>연속 맞추기로 보너스 점수!</p>
      <div class="level-select" id="levelSelect">
        <button class="lv-btn selected" data-level="1">
          <span class="lv-emoji">🌱</span>
          <span class="lv-name">쉬움</span>
          <span class="lv-desc">8장·60초</span>
        </button>
        <button class="lv-btn" data-level="2">
          <span class="lv-emoji">🌿</span>
          <span class="lv-name">보통</span>
          <span class="lv-desc">12장·50초</span>
        </button>
        <button class="lv-btn" data-level="3">
          <span class="lv-emoji">🌳</span>
          <span class="lv-name">어려움</span>
          <span class="lv-desc">16장·40초</span>
        </button>
        <button class="lv-btn" data-level="4">
          <span class="lv-emoji">🔥</span>
          <span class="lv-name">도전</span>
          <span class="lv-desc">20장·35초</span>
        </button>
      </div>
      <button class="btn-start" id="startBtn">시작! 🍊</button>
    </div>
  </div>

  <!-- 결과 오버레이 -->
  <div class="overlay hidden" id="endOverlay">
    <div class="overlay-card">
      <div id="newBestBadge" class="hidden">🏆 최고 기록!</div>
      <h2 id="endTitle">🎉 완료!</h2>
      <div class="result-score" id="finalScore">0</div>
      <div class="result-stats">
        <div class="stat-box">
          <span class="stat-val" id="statTime">-</span>
          남은 시간
        </div>
        <div class="stat-box">
          <span class="stat-val" id="statCombo">-</span>
          최대 콤보
        </div>
        <div class="stat-box">
          <span class="stat-val" id="statBest">-</span>
          최고 기록
        </div>
        <div class="stat-box">
          <span class="stat-val" id="statLevel">-</span>
          레벨
        </div>
      </div>
      <p id="resultMsg"></p>
      <div class="btn-row">
        <button class="btn-secondary" id="changeLevelBtn">레벨 변경</button>
        <button class="btn-start" id="restartBtn" style="flex:2">다시 하기 🍎</button>
      </div>
    </div>
  </div>

  <script>
  (function () {
    'use strict';

    const CONFIG = {
      FRUITS: [
        '🍎','🍊','🍋','🍇','🍓','🍑','🍒','🍍',
        '🥝','🍌','🍈','🫐','🍉','🥭','🍏','🍐',
        '🫒','🥑','🍅','🫑'
      ],
      LEVELS: {
        1: { pairs: 4,  time: 60, label: '쉬움',  cols: 4, rows: 2 },
        2: { pairs: 6,  time: 50, label: '보통',  cols: 4, rows: 3 },
        3: { pairs: 8,  time: 40, label: '어려움', cols: 4, rows: 4 },
        4: { pairs: 10, time: 35, label: '도전',  cols: 4, rows: 5 },
      },
      SCORE_BASE: 100,
      SCORE_TIME_BONUS: 5,
      COMBO_BONUS: [0, 0, 50, 100, 150, 200],
      FLIP_DELAY: 1000,
      LS_KEY_PREFIX: 'fruit-pair_best_lv',
    };

    const state = {
      level: 1,
      cards: [],
      flipped: [],
      matched: 0,
      score: 0,
      combo: 0,
      maxCombo: 0,
      timer: 0,
      timerInterval: null,
      lockInput: false,
      running: false,
      startTime: 0,
      timeLeft: 60,
    };

    const $ = (id) => document.getElementById(id);

    const els = {
      startOverlay: $('startOverlay'),
      endOverlay: $('endOverlay'),
      cardGrid: $('cardGrid'),
      scoreDisplay: $('scoreDisplay'),
      pairsLeft: $('pairsLeft'),
      timerDisplay: $('timerDisplay'),
      comboCount: $('comboCount'),
      comboDisplay: $('comboDisplay'),
      startBtn: $('startBtn'),
      restartBtn: $('restartBtn'),
      changeLevelBtn: $('changeLevelBtn'),
      finalScore: $('finalScore'),
      endTitle: $('endTitle'),
      resultMsg: $('resultMsg'),
      statTime: $('statTime'),
      statCombo: $('statCombo'),
      statBest: $('statBest'),
      statLevel: $('statLevel'),
      newBestBadge: $('newBestBadge'),
      levelSelect: $('levelSelect'),
    };

    // 레벨 선택
    els.levelSelect.addEventListener('pointerdown', (e) => {
      const btn = e.target.closest('[data-level]');
      if (!btn) return;
      state.level = parseInt(btn.dataset.level, 10);
      els.levelSelect.querySelectorAll('.lv-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
    });

    els.startBtn.addEventListener('pointerdown', startGame);
    els.restartBtn.addEventListener('pointerdown', () => startGame(true));
    els.changeLevelBtn.addEventListener('pointerdown', showStart);

    function showStart() {
      els.endOverlay.classList.add('hidden');
      els.startOverlay.classList.remove('hidden');
    }

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function getBestScore() {
      const v = localStorage.getItem(CONFIG.LS_KEY_PREFIX + state.level);
      return v ? parseInt(v, 10) : 0;
    }

    function saveBestScore(score) {
      const best = getBestScore();
      if (score > best) {
        localStorage.setItem(CONFIG.LS_KEY_PREFIX + state.level, score);
        return true;
      }
      return false;
    }

    function startGame(sameLevel) {
      els.startOverlay.classList.add('hidden');
      els.endOverlay.classList.add('hidden');

      const lvCfg = CONFIG.LEVELS[state.level];

      // state 초기화
      state.cards = [];
      state.flipped = [];
      state.matched = 0;
      state.score = 0;
      state.combo = 0;
      state.maxCombo = 0;
      state.lockInput = false;
      state.running = true;
      state.timeLeft = lvCfg.time;

      updateHUD();

      buildGrid(lvCfg);
      startTimer();
    }

    function buildGrid(lvCfg) {
      const fruits = shuffle(CONFIG.FRUITS).slice(0, lvCfg.pairs);
      const cards = shuffle([...fruits, ...fruits]);

      // 그리드 크기 설정
      const grid = els.cardGrid;
      grid.style.gridTemplateColumns = `repeat(${lvCfg.cols}, 1fr)`;

      // 카드 최대 크기 계산
      const gridRect = grid.parentElement.getBoundingClientRect();
      const maxCardW = Math.floor((gridRect.width - (lvCfg.cols - 1) * 8 - 4) / lvCfg.cols);
      const maxCardH = Math.floor((gridRect.height - (lvCfg.rows - 1) * 8 - 4) / lvCfg.rows);
      const cardSize = Math.min(maxCardW, maxCardH, 90);
      grid.style.setProperty('--card-size', cardSize + 'px');
      grid.style.gap = '8px';

      grid.innerHTML = '';
      state.cards = [];

      cards.forEach((emoji, i) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.style.width = cardSize + 'px';
        card.style.height = cardSize + 'px';
        card.dataset.index = i;
        card.dataset.emoji = emoji;

        card.innerHTML = `
          <div class="card-inner">
            <div class="card-face card-back"></div>
            <div class="card-face card-front">${emoji}</div>
          </div>`;

        card.addEventListener('pointerdown', onCardClick);
        grid.appendChild(card);
        state.cards.push(card);
      });

      els.pairsLeft.textContent = lvCfg.pairs;
    }

    function onCardClick(e) {
      e.preventDefault();
      if (!state.running || state.lockInput) return;
      const card = e.currentTarget;
      if (card.classList.contains('flipped') || card.classList.contains('matched')) return;
      if (state.flipped.length >= 2) return;

      card.classList.add('flipped');
      state.flipped.push(card);

      if (state.flipped.length === 2) {
        checkMatch();
      }
    }

    function checkMatch() {
      state.lockInput = true;
      const [a, b] = state.flipped;

      if (a.dataset.emoji === b.dataset.emoji) {
        // 매칭 성공
        state.combo++;
        if (state.combo > state.maxCombo) state.maxCombo = state.combo;

        setTimeout(() => {
          a.classList.add('matched');
          b.classList.add('matched');
          state.flipped = [];
          state.matched++;
          state.lockInput = false;

          // 점수 계산
          const comboBonus = CONFIG.COMBO_BONUS[Math.min(state.combo, CONFIG.COMBO_BONUS.length - 1)];
          const timeBonus = Math.floor(state.timeLeft * CONFIG.SCORE_TIME_BONUS);
          const gained = CONFIG.SCORE_BASE + comboBonus + timeBonus;
          state.score += gained;

          updateHUD();
          showCombo(state.combo, gained);

          const lvCfg = CONFIG.LEVELS[state.level];
          els.pairsLeft.textContent = lvCfg.pairs - state.matched;

          if (state.matched >= lvCfg.pairs) {
            endGame(true);
          }
        }, 200);
      } else {
        // 매칭 실패
        state.combo = 0;
        els.comboCount.textContent = '0';
        setTimeout(() => {
          a.classList.remove('flipped');
          b.classList.remove('flipped');
          state.flipped = [];
          state.lockInput = false;
          updateHUD();
        }, CONFIG.FLIP_DELAY);
      }
    }

    function showCombo(combo, gained) {
      const el = els.comboDisplay;
      el.classList.remove('combo-anim');
      void el.offsetWidth; // reflow

      if (combo >= 2) {
        el.textContent = `${combo}콤보! +${gained}`;
      } else {
        el.textContent = `+${gained}`;
      }
      el.classList.add('combo-anim');
    }

    function startTimer() {
      clearInterval(state.timerInterval);
      state.timerInterval = setInterval(() => {
        if (!state.running) { clearInterval(state.timerInterval); return; }
        state.timeLeft--;
        updateHUD();
        if (state.timeLeft <= 0) {
          state.timeLeft = 0;
          updateHUD();
          endGame(false);
        }
      }, 1000);
    }

    function updateHUD() {
      els.scoreDisplay.textContent = state.score;
      els.timerDisplay.textContent = state.timeLeft;
      els.comboCount.textContent = state.combo;

      if (state.timeLeft <= 10) {
        els.timerDisplay.classList.add('timer-warn');
      } else {
        els.timerDisplay.classList.remove('timer-warn');
      }
    }

    function endGame(success) {
      clearInterval(state.timerInterval);
      state.running = false;

      const lvCfg = CONFIG.LEVELS[state.level];
      const finalScore = state.score + (success ? state.timeLeft * 10 : 0);
      const isNewBest = saveBestScore(finalScore);
      const best = getBestScore();

      els.finalScore.textContent = finalScore;
      els.endTitle.textContent = success ? '🎉 완료!' : '⏰ 시간 종료!';

      els.statTime.textContent = success ? state.timeLeft + '초' : '-';
      els.statCombo.textContent = state.maxCombo + '연속';
      els.statBest.textContent = best;
      els.statLevel.textContent = lvCfg.label;

      if (isNewBest) {
        els.newBestBadge.classList.remove('hidden');
      } else {
        els.newBestBadge.classList.add('hidden');
      }

      const pairsFound = state.matched;
      const totalPairs = lvCfg.pairs;
      if (success) {
        els.resultMsg.textContent = `모든 ${totalPairs}쌍을 찾았어요! 대단해요! 🌟`;
      } else {
        els.resultMsg.textContent = `${pairsFound}/${totalPairs}쌍을 찾았어요. 다시 도전해봐요!`;
      }

      setTimeout(() => {
        els.endOverlay.classList.remove('hidden');
      }, 600);
    }

    // 초기 상태
    els.pairsLeft.textContent = '-';

  })();
  </script>
</body>
</html>
