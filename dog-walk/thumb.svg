<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4fc3f7"/>
      <stop offset="65%" stop-color="#87ceeb"/>
      <stop offset="65%" stop-color="#6abf5e"/>
      <stop offset="100%" stop-color="#5aaf4e"/>
    </linearGradient>
    <linearGradient id="shadow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(0,0,0,0)" />
      <stop offset="100%" stop-color="rgba(0,0,0,0.35)" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="320" height="180" fill="url(#sky)"/>

  <!-- Sun -->
  <circle cx="48" cy="38" r="20" fill="#ffe066" opacity="0.9"/>
  <circle cx="48" cy="38" r="13" fill="#ffd700"/>

  <!-- Clouds -->
  <ellipse cx="100" cy="30" rx="30" ry="12" fill="rgba(255,255,255,0.85)"/>
  <ellipse cx="85"  cy="32" rx="18" ry="10" fill="rgba(255,255,255,0.75)"/>
  <ellipse cx="118" cy="33" rx="20" ry="9"  fill="rgba(255,255,255,0.75)"/>

  <ellipse cx="240" cy="22" rx="25" ry="10" fill="rgba(255,255,255,0.8)"/>
  <ellipse cx="228" cy="25" rx="16" ry="8"  fill="rgba(255,255,255,0.7)"/>
  <ellipse cx="256" cy="24" rx="17" ry="7"  fill="rgba(255,255,255,0.7)"/>

  <!-- Road / Path dashes -->
  <rect x="0" y="117" width="320" height="63" fill="#6abf5e"/>
  <rect x="0" y="115" width="320" height="8" fill="#5aaf4e" opacity="0.6"/>

  <!-- Lane dashes (decorative) -->
  <rect x="60"  y="138" width="20" height="4" rx="2" fill="rgba(255,255,255,0.35)"/>
  <rect x="100" y="138" width="20" height="4" rx="2" fill="rgba(255,255,255,0.35)"/>
  <rect x="140" y="138" width="20" height="4" rx="2" fill="rgba(255,255,255,0.35)"/>
  <rect x="180" y="138" width="20" height="4" rx="2" fill="rgba(255,255,255,0.35)"/>

  <!-- Obstacles -->
  <text x="74"  y="115" font-size="28" text-anchor="middle">🌿</text>
  <text x="200" y="112" font-size="26" text-anchor="middle">🚗</text>

  <!-- Treats -->
  <text x="140" y="80"  font-size="22" text-anchor="middle" opacity="0.9">🦴</text>
  <text x="265" y="95"  font-size="18" text-anchor="middle" opacity="0.85">⭐</text>

  <!-- Dog character (center lane) -->
  <text x="160" y="120" font-size="44" text-anchor="middle">🐕</text>

  <!-- Bottom gradient overlay for depth -->
  <rect width="320" height="180" fill="url(#shadow)" opacity="0.2"/>

  <!-- Inner border -->
  <rect x="0.5" y="0.5" width="319" height="179" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Title (bottom-right) -->
  <g font-family="'Pretendard','Noto Sans KR',sans-serif">
    <text x="296" y="148" text-anchor="end" font-size="22" font-weight="900" fill="#ff9f43">강아지 산책</text>
    <text x="296" y="166" text-anchor="end" font-size="10" font-weight="500" fill="rgba(255,255,255,0.5)" letter-spacing="2">DOG WALK</text>
  </g>
</svg>
