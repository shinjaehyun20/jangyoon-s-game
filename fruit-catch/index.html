<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>🍎 과일 받기</title>
  <style>
    :root {
      --bg: #1a3a1a;
      --accent: #ff6b35;
      --sky: #87ceeb;
      --text: #ffffff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100vh; height: 100dvh;
      overflow: hidden;
      touch-action: manipulation;
      font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
      background: var(--bg);
    }
    .wrap {
      width: 100%; max-width: 480px;
      height: 100vh; height: 100dvh;
      display: flex; flex-direction: column;
      padding: 10px 12px 8px; gap: 6px;
      margin: 0 auto;
      position: relative;
    }
    h1 {
      font-size: clamp(18px, 5vw, 26px);
      color: #fff;
      text-align: center;
      text-shadow: 0 2px 4px rgba(0,0,0,0.4);
      flex-shrink: 0;
    }
    .hud {
      display: flex; gap: 8px; justify-content: space-between;
      background: rgba(255,255,255,0.12);
      border-radius: 12px; padding: 8px 14px;
      flex-shrink: 0;
    }
    .hud-item { display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .hud-label { font-size: 11px; color: rgba(255,255,255,0.7); }
    .hud-value { font-size: 20px; font-weight: 900; color: #fff; }
    .hud-value.combo { color: #ffdd57; }
    #gameArea {
      flex: 1;
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      background: linear-gradient(180deg, #87ceeb 0%, #b8e8b8 70%, #5a9e5a 100%);
      touch-action: none;
      cursor: none;
    }
    #basket {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 48px;
      line-height: 1;
      transition: left 0.04s linear;
      pointer-events: none;
      user-select: none;
      filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
    }
    .item {
      position: absolute;
      font-size: 36px;
      line-height: 1;
      pointer-events: none;
      user-select: none;
      transition: none;
    }
    .particle {
      position: absolute;
      pointer-events: none;
      font-size: 28px;
      animation: pop 0.6s ease-out forwards;
    }
    @keyframes pop {
      0% { opacity: 1; transform: scale(1.2) translateY(0); }
      100% { opacity: 0; transform: scale(0.5) translateY(-40px); }
    }
    #timerBar {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 5px;
      background: linear-gradient(90deg, #ff6b35, #ff3366);
      border-radius: 0 0 4px 4px;
      transition: width 0.1s linear;
    }
    footer {
      display: flex; justify-content: space-between; align-items: center;
      flex-shrink: 0; padding: 0 2px;
    }
    footer small { font-size: 11px; color: rgba(255,255,255,0.5); }
    .home-link {
      font-size: 13px; color: rgba(255,255,255,0.7);
      text-decoration: none; padding: 4px 8px;
      background: rgba(255,255,255,0.1); border-radius: 8px;
    }
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.75);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
    }
    .overlay.hidden { display: none; }
    .overlay-card {
      background: linear-gradient(135deg, #1e4d2b, #2d6a3f);
      border-radius: 24px; padding: 28px 24px;
      text-align: center; color: #fff;
      width: 88%; max-width: 360px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .overlay-card h2 { font-size: 28px; margin-bottom: 12px; }
    .result-score { font-size: 52px; font-weight: 900; color: #ffdd57; margin: 10px 0; }
    .result-msg { font-size: 16px; margin-bottom: 18px; }
    .best-tag { font-size: 13px; color: #88ffaa; margin-bottom: 14px; }
    .btn-start {
      background: linear-gradient(135deg, #ff6b35, #ff3366);
      color: #fff; border: none; border-radius: 50px;
      padding: 14px 36px; font-size: 18px; font-weight: 700;
      cursor: pointer; min-height: 52px;
      box-shadow: 0 6px 20px rgba(255,107,53,0.5);
      transition: transform 0.1s;
    }
    .btn-start:active { transform: scale(0.95); }
    .rules-list {
      display: flex; flex-direction: column; gap: 6px;
      margin-bottom: 18px; text-align: left;
    }
    .rules-list li { list-style: none; font-size: 13px; color: rgba(255,255,255,0.85); }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }
    .shake { animation: shake 0.4s ease; }
    .score-popup {
      position: absolute;
      font-size: 22px; font-weight: 900;
      pointer-events: none;
      animation: scoreFloat 0.8s ease-out forwards;
      color: #ffdd57;
      text-shadow: 0 2px 4px rgba(0,0,0,0.5);
    }
    @keyframes scoreFloat {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-60px) scale(0.8); }
    }
    .btn-home {
      display: block; margin-top: 10px;
      background: #374151;
      color: #fff;
      border: none; border-radius: 14px;
      font-size: 17px; font-weight: 700;
      padding: 14px 20px;
      cursor: pointer;
      min-height: 56px;
      width: 100%;
      text-decoration: none;
      text-align: center;
      box-sizing: border-box;
    }
    .btn-home:active { transform: scale(0.97); }
  </style>
</head>
<body>
<div class="wrap">
  <h1>🍎 과일 받기</h1>
  <div class="hud">
    <div class="hud-item">
      <span class="hud-label">점수</span>
      <span class="hud-value" id="scoreDisplay">0</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">콤보</span>
      <span class="hud-value combo" id="comboDisplay">x1</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">남은 시간</span>
      <span class="hud-value" id="timeDisplay">30</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">최고</span>
      <span class="hud-value" id="bestDisplay">0</span>
    </div>
  </div>

  <div id="gameArea">
    <div id="timerBar"></div>
    <div id="basket">🧺</div>
  </div>

  <footer>
    <small>🍎과일=받기 💣폭탄=피하기</small>
    <a class="home-link" href="../index.html">🏠 게임 목록으로</a>
  </footer>
</div>

<div class="overlay" id="startOverlay">
  <div class="overlay-card">
    <h2>🍎 과일 받기</h2>
    <ul class="rules-list">
      <li>🍎🍊🍋 과일을 바구니로 받아요!</li>
      <li>💣 폭탄은 피하세요! (-5점)</li>
      <li>👆 화면을 드래그해 바구니 이동</li>
      <li>⏱️ 30초 안에 최고 점수 도전!</li>
      <li>🔥 연속으로 받으면 콤보 보너스!</li>
    </ul>
    <button class="btn-start" id="startBtn">시작!</button>
  </div>
</div>

<div class="overlay hidden" id="endOverlay">
  <div class="overlay-card">
    <h2>🎉 게임 종료!</h2>
    <div class="result-score" id="finalScore">0</div>
    <div class="result-msg" id="resultMsg"></div>
    <div class="best-tag" id="bestTag"></div>
    <button class="btn-start" id="restartBtn">다시 하기!</button>
    <a class="btn-home" href="../index.html">🏠 게임 목록으로</a>
  </div>
</div>

<script>
(function () {
  'use strict';

  const CONFIG = {
    gameDuration: 30,
    spawnInterval: 900,
    spawnMinInterval: 400,
    spawnAccel: 20,
    fallDuration: 2800,
    fallMin: 1600,
    comboDecay: 2000,
    bombChance: 0.22,
    bombPenalty: 5,
    comboMultipliers: [1, 1, 1.5, 2, 2.5, 3],
    fruits: ['🍎','🍊','🍋','🍇','🍓','🍑','🍒','🥝','🍈','🍌'],
    storageKey: 'fruit_catch_best',
  };

  let state = {
    score: 0, combo: 0, comboTimer: null,
    timeLeft: CONFIG.gameDuration,
    running: false,
    items: [],
    spawnTimer: null, tickTimer: null,
    spawnInterval: CONFIG.spawnInterval,
    basketX: 0,
  };

  const gameArea    = document.getElementById('gameArea');
  const basketEl    = document.getElementById('basket');
  const scoreEl     = document.getElementById('scoreDisplay');
  const comboEl     = document.getElementById('comboDisplay');
  const timeEl      = document.getElementById('timeDisplay');
  const bestEl      = document.getElementById('bestDisplay');
  const timerBar    = document.getElementById('timerBar');
  const startOverlay= document.getElementById('startOverlay');
  const endOverlay  = document.getElementById('endOverlay');
  const finalScoreEl= document.getElementById('finalScore');
  const resultMsgEl = document.getElementById('resultMsg');
  const bestTagEl   = document.getElementById('bestTag');

  function getBest() { return parseInt(localStorage.getItem(CONFIG.storageKey) || '0'); }
  function saveBest(s) { if (s > getBest()) localStorage.setItem(CONFIG.storageKey, s); }
  bestEl.textContent = getBest();

  function setBasket(x) {
    const areaW = gameArea.offsetWidth;
    const bHalf = basketEl.offsetWidth / 2 || 28;
    x = Math.max(bHalf, Math.min(areaW - bHalf, x));
    state.basketX = x;
    basketEl.style.left = x + 'px';
    basketEl.style.transform = 'translateX(-50%)';
  }

  let dragging = false;
  gameArea.addEventListener('pointerdown', (e) => {
    if (!state.running) return;
    dragging = true;
    gameArea.setPointerCapture(e.pointerId);
    setBasket(e.offsetX);
  });
  gameArea.addEventListener('pointermove', (e) => {
    if (!state.running || !dragging) return;
    setBasket(e.offsetX);
  });
  gameArea.addEventListener('pointerup', () => { dragging = false; });

  function spawnItem() {
    if (!state.running) return;
    const areaW = gameArea.offsetWidth;
    const isBomb = Math.random() < CONFIG.bombChance;
    const emoji = isBomb ? '💣' : CONFIG.fruits[Math.floor(Math.random() * CONFIG.fruits.length)];
    const x = 28 + Math.random() * (areaW - 56);
    const fallDur = CONFIG.fallMin + Math.random() * (state.spawnInterval < 600
      ? (CONFIG.fallDuration - CONFIG.fallMin) * 0.6
      : CONFIG.fallDuration - CONFIG.fallMin);

    const el = document.createElement('div');
    el.className = 'item';
    el.textContent = emoji;
    el.style.left = x + 'px';
    el.style.top = '-40px';
    el.style.transition = `top ${fallDur}ms linear`;
    gameArea.appendChild(el);

    const itemObj = { el, x, isBomb };
    state.items.push(itemObj);

    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        el.style.top = (gameArea.offsetHeight + 10) + 'px';
      });
    });

    itemObj.timeoutId = setTimeout(() => {
      removeItem(itemObj, false);
    }, fallDur + 100);

    state.spawnInterval = Math.max(CONFIG.spawnMinInterval, state.spawnInterval - CONFIG.spawnAccel);
    clearTimeout(state.spawnTimer);
    if (state.running) {
      state.spawnTimer = setTimeout(spawnItem, state.spawnInterval);
    }
  }

  function removeItem(obj, caught) {
    clearTimeout(obj.timeoutId);
    if (obj.el.parentNode) obj.el.parentNode.removeChild(obj.el);
    const idx = state.items.indexOf(obj);
    if (idx !== -1) state.items.splice(idx, 1);
    if (!caught && !obj.isBomb) resetCombo();
  }

  let rafId = null;
  function collisionLoop() {
    if (!state.running) return;
    const areaRect = gameArea.getBoundingClientRect();
    const bHalf = (basketEl.offsetWidth || 56) / 2;
    const bBottom = gameArea.offsetHeight - 20;

    for (let i = state.items.length - 1; i >= 0; i--) {
      const obj = state.items[i];
      const rect = obj.el.getBoundingClientRect();
      if (!rect) continue;
      const itemCX = rect.left - areaRect.left + rect.width / 2;
      const itemCY = rect.top  - areaRect.top  + rect.height / 2;
      const inX = Math.abs(itemCX - state.basketX) < bHalf + 10;
      const inY = itemCY >= bBottom - 40 && itemCY <= bBottom + 20;
      if (inX && inY) catchItem(obj, itemCX, itemCY);
    }
    rafId = requestAnimationFrame(collisionLoop);
  }

  function catchItem(obj, cx, cy) {
    removeItem(obj, true);
    if (obj.isBomb) {
      state.score = Math.max(0, state.score - CONFIG.bombPenalty);
      updateScore();
      resetCombo();
      showScorePopup(cx, cy - 30, '-' + CONFIG.bombPenalty, '#ff4466');
      basketEl.classList.remove('shake');
      void basketEl.offsetWidth;
      basketEl.classList.add('shake');
    } else {
      state.combo = Math.min(state.combo + 1, CONFIG.comboMultipliers.length - 1);
      const mult = CONFIG.comboMultipliers[state.combo];
      const gain = Math.round(10 * mult);
      state.score += gain;
      updateScore();
      updateCombo();
      resetComboTimer();
      showParticle(cx, cy, obj.el.textContent);
      showScorePopup(cx, cy - 30, '+' + gain, state.combo >= 3 ? '#ffdd57' : '#88ffaa');
    }
  }

  function resetCombo() {
    state.combo = 0;
    clearTimeout(state.comboTimer);
    updateCombo();
  }
  function resetComboTimer() {
    clearTimeout(state.comboTimer);
    state.comboTimer = setTimeout(resetCombo, CONFIG.comboDecay);
  }
  function updateCombo() {
    const c = state.combo;
    const labels = ['x1','x1','x1.5','x2','x2.5','x3'];
    comboEl.textContent = labels[c] || 'x3';
    comboEl.style.color = c >= 3 ? '#ff6b35' : c >= 2 ? '#ffdd57' : '#fff';
    comboEl.style.fontSize = c >= 2 ? '24px' : '20px';
  }
  function updateScore() { scoreEl.textContent = state.score; }

  function showParticle(x, y, emoji) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.textContent = emoji;
    p.style.left = (x - 14) + 'px';
    p.style.top  = (y - 14) + 'px';
    gameArea.appendChild(p);
    setTimeout(() => { if (p.parentNode) p.parentNode.removeChild(p); }, 700);
  }
  function showScorePopup(x, y, text, color) {
    const p = document.createElement('div');
    p.className = 'score-popup';
    p.textContent = text;
    p.style.left = x + 'px';
    p.style.top  = y + 'px';
    p.style.color = color;
    gameArea.appendChild(p);
    setTimeout(() => { if (p.parentNode) p.parentNode.removeChild(p); }, 900);
  }

  function startTick() {
    state.tickTimer = setInterval(() => {
      state.timeLeft--;
      timeEl.textContent = state.timeLeft;
      timerBar.style.width = (state.timeLeft / CONFIG.gameDuration * 100) + '%';
      if (state.timeLeft <= 0) endGame();
    }, 1000);
  }

  function startGame() {
    state.score = 0; state.combo = 0; state.timeLeft = CONFIG.gameDuration;
    state.items = []; state.spawnInterval = CONFIG.spawnInterval;
    clearTimeout(state.comboTimer);
    updateScore(); updateCombo();
    timeEl.textContent = CONFIG.gameDuration;
    timerBar.style.width = '100%';
    bestEl.textContent = getBest();
    gameArea.querySelectorAll('.item,.particle,.score-popup').forEach(e => e.remove());
    setBasket(gameArea.offsetWidth / 2);
    state.running = true;
    startOverlay.classList.add('hidden');
    endOverlay.classList.add('hidden');
    startTick();
    spawnItem();
    collisionLoop();
  }

  function endGame() {
    state.running = false;
    clearInterval(state.tickTimer);
    clearTimeout(state.spawnTimer);
    clearTimeout(state.comboTimer);
    cancelAnimationFrame(rafId);
    state.items.forEach(obj => {
      clearTimeout(obj.timeoutId);
      if (obj.el.parentNode) obj.el.parentNode.removeChild(obj.el);
    });
    state.items = [];
    const prev = getBest();
    saveBest(state.score);
    const isNew = state.score > prev;
    finalScoreEl.textContent = state.score;
    bestEl.textContent = getBest();
    let msg = '';
    if (state.score >= 200)      msg = '🏆 과일 받기 마스터!';
    else if (state.score >= 120) msg = '🌟 대단해요! 아주 잘했어요!';
    else if (state.score >= 60)  msg = '🍎 과일을 많이 받았어요!';
    else                          msg = '😊 더 연습하면 최고!';
    resultMsgEl.textContent = msg;
    bestTagEl.textContent = isNew ? '🎉 새 최고 기록!' : '최고 기록: ' + getBest() + '점';
    endOverlay.classList.remove('hidden');
  }

  document.getElementById('startBtn').addEventListener('click', startGame);
  document.getElementById('restartBtn').addEventListener('click', startGame);

})();
</script>
</body>
</html>
