<svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e3a5f"/>
    </linearGradient>
    <linearGradient id="track" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="glow-green">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-red">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 배경 -->
  <rect width="320" height="180" fill="url(#bg)"/>

  <!-- 내부 경계 -->
  <rect x="0.5" y="0.5" width="319" height="179" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- 트랙 -->
  <rect x="40" y="110" width="240" height="40" rx="8" fill="url(#track)" stroke="#1e3a5f" stroke-width="1.5"/>
  <!-- 트랙 중선 -->
  <line x1="40" y1="130" x2="280" y2="130" stroke="rgba(255,255,255,0.07)" stroke-width="2"/>

  <!-- 결승선 체크패턴 -->
  <g>
    <rect x="264" y="110" width="6" height="40" fill="none"/>
    <rect x="264" y="110" width="6" height="8" fill="#fff" opacity="0.8"/>
    <rect x="264" y="118" width="6" height="8" fill="#000" opacity="0.6"/>
    <rect x="264" y="126" width="6" height="8" fill="#fff" opacity="0.8"/>
    <rect x="264" y="134" width="6" height="8" fill="#000" opacity="0.6"/>
    <rect x="264" y="142" width="6" height="8" fill="#fff" opacity="0.8"/>
  </g>
  <!-- 깃발 이모지 대신 SVG 삼각형 -->
  <polygon points="270,108 290,115 270,122" fill="#fbbf24" opacity="0.9"/>
  <line x1="270" y1="108" x2="270" y2="150" stroke="#fbbf24" stroke-width="2" opacity="0.7"/>

  <!-- 캐릭터 (달리는 사람) -->
  <!-- 몸 -->
  <circle cx="90" cy="118" r="8" fill="#fde68a"/>
  <rect x="85" y="126" width="10" height="14" rx="3" fill="#3b82f6"/>
  <!-- 팔 -->
  <line x1="90" y1="130" x2="78" y2="136" stroke="#3b82f6" stroke-width="3" stroke-linecap="round"/>
  <line x1="90" y1="130" x2="102" y2="124" stroke="#3b82f6" stroke-width="3" stroke-linecap="round"/>
  <!-- 다리 -->
  <line x1="88" y1="140" x2="82" y2="150" stroke="#1e40af" stroke-width="3" stroke-linecap="round"/>
  <line x1="92" y1="140" x2="100" y2="148" stroke="#1e40af" stroke-width="3" stroke-linecap="round"/>
  <!-- 신발 -->
  <ellipse cx="82" cy="150" rx="5" ry="3" fill="#f87171"/>
  <ellipse cx="100" cy="148" rx="5" ry="3" fill="#f87171"/>

  <!-- 달리기 먼지 -->
  <circle cx="74" cy="148" r="3" fill="rgba(255,255,255,0.15)"/>
  <circle cx="68" cy="145" r="2" fill="rgba(255,255,255,0.1)"/>
  <circle cx="78" cy="152" r="2" fill="rgba(255,255,255,0.12)"/>

  <!-- 신호등 본체 -->
  <rect x="190" y="20" width="46" height="90" rx="12" fill="#0f172a" stroke="#334155" stroke-width="2"/>
  <!-- 빨간불 (OFF) -->
  <circle cx="213" cy="42" r="13" fill="#f87171" opacity="0.2"/>
  <!-- 노란불 (OFF) -->
  <circle cx="213" cy="65" r="13" fill="#fbbf24" opacity="0.2"/>
  <!-- 초록불 (ON — 빛남) -->
  <circle cx="213" cy="88" r="13" fill="#4ade80" filter="url(#glow-green)" opacity="0.95"/>
  <!-- 초록불 글로우 -->
  <circle cx="213" cy="88" r="18" fill="#4ade80" opacity="0.15"/>

  <!-- 신호등 기둥 -->
  <rect x="210" y="110" width="6" height="20" rx="3" fill="#475569"/>

  <!-- "달려!" 텍스트 -->
  <text x="175" y="16" text-anchor="middle" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="13" font-weight="900" fill="#4ade80" opacity="0.9">🟢 초록불!</text>

  <!-- 속도선 -->
  <line x1="110" y1="122" x2="130" y2="122" stroke="rgba(56,189,248,0.5)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="114" y1="128" x2="138" y2="128" stroke="rgba(56,189,248,0.35)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="116" y1="134" x2="135" y2="134" stroke="rgba(56,189,248,0.25)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- 우하단 타이틀 -->
  <g font-family="'Apple SD Gothic Neo','Pretendard','Noto Sans KR',sans-serif">
    <text x="296" y="148" text-anchor="end" font-size="22" font-weight="900" fill="#4ade80">신호등 달리기</text>
    <text x="296" y="166" text-anchor="end" font-size="10" font-weight="500" fill="rgba(255,255,255,0.45)" letter-spacing="2">GREEN-LIGHT-RUN</text>
  </g>
</svg>
