<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f3460"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="b1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e74c3c"/>
      <stop offset="100%" stop-color="#c0392b"/>
    </linearGradient>
    <linearGradient id="b2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e67e22"/>
      <stop offset="100%" stop-color="#d35400"/>
    </linearGradient>
    <linearGradient id="b3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f1c40f"/>
      <stop offset="100%" stop-color="#e67e22"/>
    </linearGradient>
    <linearGradient id="b4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2ecc71"/>
      <stop offset="100%" stop-color="#27ae60"/>
    </linearGradient>
    <linearGradient id="b5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3498db"/>
      <stop offset="100%" stop-color="#2980b9"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="320" height="180" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="319" height="179" fill="none" stroke="rgba(255,255,255,0.08)"/>

  <!-- 별들 -->
  <circle cx="30"  cy="20" r="1.2" fill="rgba(255,255,255,0.8)"/>
  <circle cx="75"  cy="12" r="0.8" fill="rgba(255,255,255,0.6)"/>
  <circle cx="120" cy="25" r="1.5" fill="rgba(255,255,255,0.9)"/>
  <circle cx="160" cy="10" r="0.9" fill="rgba(255,255,255,0.7)"/>
  <circle cx="200" cy="30" r="1.1" fill="rgba(255,255,255,0.8)"/>
  <circle cx="50"  cy="45" r="0.7" fill="rgba(255,255,255,0.5)"/>
  <circle cx="100" cy="38" r="1.0" fill="rgba(255,255,255,0.7)"/>

  <!-- 기둥(바닥) -->
  <rect x="88" y="160" width="60" height="14" rx="3" fill="#8B5E3C" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>

  <!-- 쌓인 블록들 (5층) -->
  <rect x="90" y="138" width="56" height="24" rx="5" fill="url(#b1)" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
  <rect x="93" y="114" width="50" height="24" rx="5" fill="url(#b2)" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
  <rect x="95" y="90"  width="46" height="24" rx="5" fill="url(#b3)" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
  <rect x="97" y="66"  width="42" height="24" rx="5" fill="url(#b4)" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
  <rect x="99" y="42"  width="38" height="24" rx="5" fill="url(#b5)" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>

  <!-- 움직이는 블록 (비스듬히 옆에 표시) -->
  <rect x="155" y="42" width="38" height="24" rx="5" fill="url(#b5)" stroke="rgba(255,255,255,0.5)" stroke-width="2" opacity="0.85"/>
  <!-- 화살표 표시 이동 방향 -->
  <text x="153" y="57" font-size="14" fill="rgba(255,255,255,0.7)">←</text>

  <!-- 완성 이모지 -->
  <text x="32" y="75" font-size="36">🏰</text>

  <!-- 반짝임 -->
  <text x="22"  y="48" font-size="12" fill="#f5c518">✨</text>
  <text x="68"  y="28" font-size="10" fill="#f5c518">⭐</text>

  <!-- 우하단 타이틀 -->
  <g font-family="'Pretendard','Noto Sans KR',sans-serif">
    <text x="296" y="148" text-anchor="end" font-size="22" font-weight="900" fill="#e94560">성 쌓기</text>
    <text x="296" y="166" text-anchor="end" font-size="10" font-weight="500" fill="rgba(255,255,255,0.5)" letter-spacing="2">CASTLE BUILDER</text>
  </g>
</svg>
