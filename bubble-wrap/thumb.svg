<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#3b1a6e"/>
    </linearGradient>
    <radialGradient id="bub" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.7)"/>
      <stop offset="55%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </radialGradient>
    <radialGradient id="bub2" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.5)"/>
      <stop offset="55%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </radialGradient>
  </defs>
  <rect width="320" height="180" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="319" height="179" fill="none" stroke="rgba(255,255,255,0.08)"/>

  <!-- 3x3 뽁뽁이 그리드 (왼쪽) -->
  <!-- row 1 -->
  <circle cx="36" cy="42" r="18" fill="url(#bub)" opacity="0.95"/>
  <circle cx="80" cy="42" r="18" fill="url(#bub2)" opacity="0.9"/>
  <circle cx="124" cy="42" r="18" fill="url(#bub)" opacity="0.95"/>
  <!-- row 2 -->
  <circle cx="36" cy="90" r="18" fill="url(#bub2)" opacity="0.9"/>
  <!-- popped -->
  <circle cx="80" cy="90" r="18" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" stroke-dasharray="4 3"/>
  <circle cx="124" cy="90" r="18" fill="url(#bub)" opacity="0.95"/>
  <!-- row 3 -->
  <circle cx="36" cy="138" r="18" fill="url(#bub)" opacity="0.95"/>
  <circle cx="80" cy="138" r="18" fill="url(#bub2)" opacity="0.9"/>
  <!-- popped -->
  <circle cx="124" cy="138" r="18" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" stroke-dasharray="4 3"/>

  <!-- 팝 이펙트 별 -->
  <text x="80" y="83" font-size="16" text-anchor="middle" opacity="0.9">✨</text>
  <text x="124" y="131" font-size="16" text-anchor="middle" opacity="0.9">💥</text>

  <!-- 타이틀 -->
  <g font-family="'Pretendard','Noto Sans KR',sans-serif">
    <text x="296" y="148" text-anchor="end" font-size="22" font-weight="900" fill="#c084fc">뽁뽁이 터뜨리기</text>
    <text x="296" y="166" text-anchor="end" font-size="10" font-weight="500" fill="rgba(255,255,255,0.5)" letter-spacing="2">BUBBLE WRAP</text>
  </g>
</svg>
