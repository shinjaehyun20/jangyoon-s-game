<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>뽁뽁이 터뜨리기</title>
  <style>
    :root {
      --bg: #1a0a2e;
      --bubble-color: #a78bfa;
      --accent: #c084fc;
      --text: #ffffff;
      --cell-size: min(10vw, 52px);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100vh; height: 100dvh;
      overflow: hidden;
      touch-action: manipulation;
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .wrap {
      width: 100%; max-width: 480px;
      height: 100vh; height: 100dvh;
      display: flex; flex-direction: column;
      padding: 10px 12px 8px; gap: 6px;
      margin: 0 auto;
    }
    h1 { font-size: clamp(18px, 5vw, 26px); font-weight: 900; text-align: center; }
    .hud {
      display: flex; justify-content: space-between; align-items: center;
      background: rgba(255,255,255,0.08);
      border-radius: 12px; padding: 6px 14px;
    }
    .hud-item { display: flex; flex-direction: column; align-items: center; gap: 1px; }
    .hud-label { font-size: 10px; opacity: 0.65; }
    .hud-val   { font-size: clamp(16px, 4.5vw, 22px); font-weight: 900; }
    #timerVal  { color: #fde68a; }
    #levelVal  { color: var(--accent); }
    #scoreVal  { color: #6ee7b7; }
    #gameArea {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }
    #grid { display: grid; gap: 4px; }
    .cell {
      width: var(--cell-size); height: var(--cell-size);
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.55), var(--bubble-color) 60%, #6d28d9);
      box-shadow: 0 2px 8px rgba(0,0,0,0.3), inset 0 -2px 4px rgba(0,0,0,0.15);
      cursor: pointer;
      position: relative; user-select: none; -webkit-user-select: none;
    }
    .cell:active { transform: scale(0.92); }
    .cell.popped {
      background: rgba(255,255,255,0.07);
      box-shadow: none; pointer-events: none;
      border: 2px dashed rgba(255,255,255,0.12);
    }
    .pop-effect {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: clamp(14px, 3.5vw, 20px);
      pointer-events: none;
      animation: popOut 0.35s ease-out forwards;
    }
    @keyframes popOut {
      0%   { opacity: 1; transform: translate(-50%,-50%) scale(0.8); }
      60%  { opacity: 1; transform: translate(-50%,-70%) scale(1.3); }
      100% { opacity: 0; transform: translate(-50%,-90%) scale(1.1); }
    }
    .progress-bar-wrap {
      width: 90%; max-width: 420px; height: 8px;
      background: rgba(255,255,255,0.1); border-radius: 4px;
      overflow: hidden; margin: 6px auto 0;
    }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #f0abfc);
      border-radius: 4px; transition: width 0.2s; width: 0%;
    }
    footer {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 12px; opacity: 0.6;
    }
    .home-link {
      color: #fff; text-decoration: none; font-size: 13px;
      padding: 6px 10px; background: rgba(255,255,255,0.1); border-radius: 8px;
    }
    .overlay {
      position: fixed; inset: 0; background: rgba(15,5,30,0.88);
      display: flex; align-items: center; justify-content: center; z-index: 10;
    }
    .overlay.hidden { display: none; }
    .overlay-card {
      background: #2d1b69; border-radius: 20px; padding: 28px 24px;
      text-align: center; max-width: 320px; width: 88%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    .overlay-card h2 { font-size: 24px; margin-bottom: 10px; }
    .overlay-card p  { font-size: 14px; opacity: 0.85; margin-bottom: 18px; line-height: 1.55; }
    .result-score { font-size: 42px; font-weight: 900; color: var(--accent); margin: 10px 0; }
    .btn-start {
      background: linear-gradient(135deg, var(--accent), #7c3aed);
      color: #fff; border: none; border-radius: 14px;
      font-size: 18px; font-weight: 800;
      padding: 13px 32px; cursor: pointer;
      min-height: 48px; width: 100%;
      box-shadow: 0 4px 16px rgba(124,58,237,0.4);
    }
    .btn-start:active { transform: scale(0.96); }
    .best-txt { font-size: 12px; opacity: 0.55; margin-top: 8px; }
  </style>
</head>
<body>
<div class="wrap">
  <h1>🫧 뽁뽁이 터뜨리기</h1>
  <div class="hud">
    <div class="hud-item">
      <span class="hud-label">레벨</span>
      <span class="hud-val" id="levelVal">1</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">남은 시간</span>
      <span class="hud-val" id="timerVal">30</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">점수</span>
      <span class="hud-val" id="scoreVal">0</span>
    </div>
  </div>
  <div id="gameArea">
    <div id="grid"></div>
    <div class="progress-bar-wrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>
  </div>
  <footer>
    <small>다 터뜨리면 레벨업!</small>
    <a class="home-link" href="../index.html">&#8592; 홈으로</a>
  </footer>
</div>

<div class="overlay" id="startOverlay">
  <div class="overlay-card">
    <h2>🫧 뽁뽁이 터뜨리기</h2>
    <p>뽁뽁이를 모두 터뜨려요!<br>레벨이 오를수록 크기가 커져요.<br>30초 안에 최대한 많이!</p>
    <button class="btn-start" id="startBtn">시작!</button>
    <div class="best-txt" id="startBest"></div>
  </div>
</div>

<div class="overlay hidden" id="endOverlay">
  <div class="overlay-card">
    <h2>🎉 게임 종료!</h2>
    <div class="result-score" id="finalScore">0</div>
    <p id="resultMsg"></p>
    <button class="btn-start" id="restartBtn">다시 하기</button>
    <div class="best-txt" id="endBest"></div>
  </div>
</div>

<script>
(function () {
  'use strict';

  var CONFIG = {
    TOTAL_TIME:  30,
    BASE_GRID:   5,
    MAX_GRID:    9,
    POP_EMOJIS:  ['✨','💥','⭐','🌟','💫'],
    STORAGE_KEY: 'bubble-wrap_best',
  };

  function el(id) { return document.getElementById(id); }

  var grid      = el('grid');
  var levelEl   = el('levelVal');
  var timerEl   = el('timerVal');
  var scoreEl   = el('scoreVal');
  var progress  = el('progressBar');
  var startOvl  = el('startOverlay');
  var endOvl    = el('endOverlay');
  var finalScEl = el('finalScore');
  var resultMsg = el('resultMsg');
  var startBest = el('startBest');
  var endBest   = el('endBest');

  var state = {};

  function getBest() {
    return parseInt(localStorage.getItem(CONFIG.STORAGE_KEY) || '0', 10);
  }
  function saveBest(s) {
    if (s > getBest()) localStorage.setItem(CONFIG.STORAGE_KEY, String(s));
  }
  function getGridSize(level) {
    return Math.min(CONFIG.BASE_GRID + level - 1, CONFIG.MAX_GRID);
  }

  function buildGrid(size) {
    // 기존 셀 제거 (DOM 메서드 사용)
    while (grid.firstChild) grid.removeChild(grid.firstChild);
    grid.style.gridTemplateColumns = 'repeat(' + size + ', var(--cell-size))';
    state.total  = size * size;
    state.popped = 0;
    updateProgress();

    for (var i = 0; i < state.total; i++) {
      var cell = document.createElement('div');
      cell.className = 'cell';
      cell.addEventListener('pointerdown', onPop);
      grid.appendChild(cell);
    }
  }

  function onPop(e) {
    if (!state.running) return;
    var cell = e.currentTarget;
    if (cell.classList.contains('popped')) return;

    cell.classList.add('popped');
    state.popped++;
    state.score += state.level;
    scoreEl.textContent = state.score;
    updateProgress();

    // 팝 이펙트 (DOM 생성)
    var eff = document.createElement('div');
    eff.className = 'pop-effect';
    eff.textContent = CONFIG.POP_EMOJIS[Math.floor(Math.random() * CONFIG.POP_EMOJIS.length)];
    cell.appendChild(eff);
    eff.addEventListener('animationend', function() {
      if (eff.parentNode) eff.parentNode.removeChild(eff);
    });

    if (state.popped >= state.total) {
      state.level++;
      levelEl.textContent = state.level;
      buildGrid(getGridSize(state.level));
    }
  }

  function updateProgress() {
    var pct = state.total > 0 ? (state.popped / state.total) * 100 : 0;
    progress.style.width = pct + '%';
  }

  function startGame() {
    state = { level: 1, score: 0, timeLeft: CONFIG.TOTAL_TIME,
              total: 0, popped: 0, running: true, timerId: null };
    levelEl.textContent = '1';
    scoreEl.textContent = '0';
    timerEl.textContent = String(CONFIG.TOTAL_TIME);
    timerEl.style.color = '#fde68a';
    startOvl.classList.add('hidden');
    endOvl.classList.add('hidden');
    buildGrid(getGridSize(1));
    state.timerId = setInterval(tick, 1000);
  }

  function tick() {
    state.timeLeft--;
    timerEl.textContent = String(state.timeLeft);
    if (state.timeLeft <= 5) timerEl.style.color = '#f87171';
    else                      timerEl.style.color = '#fde68a';
    if (state.timeLeft <= 0) endGame();
  }

  function endGame() {
    clearInterval(state.timerId);
    state.running = false;
    saveBest(state.score);
    var best = getBest();
    finalScEl.textContent = state.score + '점';
    resultMsg.textContent  = '레벨 ' + state.level + '까지 도달! 뽁뽁이 고수!';
    endBest.textContent    = '최고 기록: ' + best + '점';
    endOvl.classList.remove('hidden');
  }

  el('startBtn').addEventListener('pointerdown', startGame);
  el('restartBtn').addEventListener('pointerdown', startGame);

  var b = getBest();
  if (b > 0) startBest.textContent = '최고 기록: ' + b + '점';
})();
</script>
</body>
</html>
