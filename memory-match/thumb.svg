<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a237e"/><stop offset="1" stop-color="#283593"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3949ab"/><stop offset="1" stop-color="#283593"/>
    </linearGradient>
    <linearGradient id="matched" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#81c784"/><stop offset="1" stop-color="#388e3c"/>
    </linearGradient>
  </defs>
  <rect width="320" height="180" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="319" height="179" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <!-- 카드 그리드 (4×3 일부 표시) -->
  <!-- 행1 -->
  <rect x="18" y="28" width="56" height="56" rx="8" fill="url(#card)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="46" y="66" text-anchor="middle" font-size="28">🦁</text>
  <rect x="82" y="28" width="56" height="56" rx="8" fill="url(#matched)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="110" y="66" text-anchor="middle" font-size="28">🐯</text>
  <rect x="146" y="28" width="56" height="56" rx="8" fill="url(#card)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="174" y="66" text-anchor="middle" font-size="24">🃏</text>
  <!-- 행2 -->
  <rect x="18" y="92" width="56" height="56" rx="8" fill="url(#matched)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="46" y="130" text-anchor="middle" font-size="28">🦁</text>
  <rect x="82" y="92" width="56" height="56" rx="8" fill="url(#card)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="110" y="130" text-anchor="middle" font-size="24">🃏</text>
  <rect x="146" y="92" width="56" height="56" rx="8" fill="url(#card)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="174" y="130" text-anchor="middle" font-size="24">🃏</text>
  <!-- 타이틀 -->
  <g font-family="'Pretendard','Noto Sans KR',sans-serif">
    <text x="296" y="148" text-anchor="end" font-size="22" font-weight="900" fill="#ffeb3b">기억력 카드</text>
    <text x="296" y="166" text-anchor="end" font-size="10" font-weight="500" fill="rgba(255,255,255,0.5)" letter-spacing="2">MEMORY MATCH</text>
  </g>
