<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>🎹 피아노 놀이</title>
  <style>
    :root {
      --bg: #1a0a2e;
      --panel: #2d1b54;
      --accent: #f9c74f;
      --white-key: #f8f4e8;
      --black-key: #1a1a2e;
      --pressed: #f9c74f;
      --text: #ffffff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100vh; height: 100dvh;
      overflow: hidden;
      touch-action: manipulation;
      font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .wrap {
      width: 100%; max-width: 480px;
      height: 100vh; height: 100dvh;
      display: flex; flex-direction: column;
      padding: 10px 12px 8px;
      gap: 8px;
      margin: 0 auto;
    }
    h1 {
      font-size: clamp(20px, 5.5vw, 26px);
      text-align: center;
      color: var(--text);
      text-shadow: 0 2px 8px rgba(249,199,79,0.4);
    }
    .hud {
      display: flex; justify-content: space-between; align-items: center;
      background: rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 8px 16px;
      font-size: clamp(14px, 4vw, 18px);
      font-weight: 700;
    }
    /* 모드 선택 탭 */
    .mode-bar {
      display: flex; gap: 6px;
    }
    .mode-btn {
      flex: 1;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      color: var(--text);
      font-size: clamp(12px, 3.5vw, 15px);
      font-weight: 600;
      padding: 8px 4px;
      min-height: 56px;
      cursor: pointer;
    }
    .mode-btn.active {
      background: var(--accent);
      color: #1a1a2e;
      border-color: var(--accent);
    }
    /* 악보 표시줄 (따라하기 모드) */
    .sheet {
      background: rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 10px 12px;
      min-height: 56px;
      display: flex; align-items: center; justify-content: center;
      flex-wrap: wrap;
      gap: 5px;
      font-size: clamp(13px, 3.8vw, 16px);
    }
    .note-dot {
      width: 34px; height: 34px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      font-weight: 700;
      background: rgba(255,255,255,0.12);
      color: var(--text);
      transition: transform 0.12s;
    }
    .note-dot.active {
      background: var(--accent);
      color: #1a1a2e;
      transform: scale(1.2);
    }
    .note-dot.done {
      background: rgba(67,160,71,0.5);
      color: #fff;
    }
    .note-dot.wrong {
      background: rgba(229,57,53,0.7);
      color: #fff;
    }

    /* 피아노 영역 */
    #pianoArea {
      flex: 1;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }
    /* 건반 컨테이너 */
    .keyboard {
      position: relative;
      display: flex;
      height: min(55vw, 260px);
      border-radius: 0 0 16px 16px;
      overflow: hidden;
    }
    /* 흰 건반 */
    .key-white {
      flex: 1;
      background: var(--white-key);
      border: 1px solid #c8b89a;
      border-radius: 0 0 10px 10px;
      cursor: pointer;
      position: relative;
      display: flex; align-items: flex-end; justify-content: center;
      padding-bottom: 10px;
      font-size: clamp(11px, 3vw, 14px);
      font-weight: 700;
      color: #555;
      user-select: none;
      transition: background 0.08s;
      -webkit-tap-highlight-color: transparent;
    }
    .key-white:active, .key-white.lit {
      background: var(--pressed);
      color: #1a1a2e;
    }
    /* 검은 건반 */
    .blacks-row {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 58%;
      display: flex;
      pointer-events: none;
    }
    .black-spacer { flex: 1; }
    .key-black {
      width: 9%;
      min-width: 28px;
      background: var(--black-key);
      border: 1px solid #000;
      border-radius: 0 0 8px 8px;
      cursor: pointer;
      position: relative;
      display: flex; align-items: flex-end; justify-content: center;
      padding-bottom: 5px;
      font-size: clamp(9px, 2.5vw, 11px);
      font-weight: 700;
      color: rgba(255,255,255,0.6);
      user-select: none;
      transition: background 0.08s;
      pointer-events: all;
      -webkit-tap-highlight-color: transparent;
    }
    .key-black:active, .key-black.lit {
      background: #4a3f7a;
    }
    /* 이펙트 레이어 */
    .note-effect {
      position: absolute;
      pointer-events: none;
      font-size: 26px;
      animation: floatUp 0.7s ease-out forwards;
      z-index: 20;
    }
    @keyframes floatUp {
      0%   { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-70px) scale(1.5); }
    }
    /* 메시지 표시 */
    #feedback {
      text-align: center;
      font-size: clamp(18px, 5vw, 24px);
      font-weight: 700;
      min-height: 34px;
      color: var(--accent);
      letter-spacing: -0.5px;
    }

    footer {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0 4px;
    }
    footer small { color: rgba(255,255,255,0.45); font-size: 12px; }
    .home-link {
      color: rgba(255,255,255,0.45);
      font-size: 13px;
      text-decoration: none;
    }
    .home-link:hover { color: #fff; }

    /* 오버레이 공통 */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.82);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
    }
    .overlay.hidden { display: none; }
    .overlay-card {
      background: var(--panel);
      border: 2px solid rgba(249,199,79,0.3);
      border-radius: 24px;
      padding: 28px 22px;
      max-width: 340px;
      width: 90%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    }
    .overlay-card h2 { font-size: 26px; margin-bottom: 10px; color: #fff; }
    .overlay-card p { font-size: 14px; color: rgba(255,255,255,0.7); margin-bottom: 18px; line-height: 1.6; }
    .result-score { font-size: 48px; font-weight: 900; color: var(--accent); margin: 10px 0; }
    .btn-main {
      background: var(--accent);
      color: #1a1a2e;
      border: none;
      border-radius: 14px;
      padding: 14px 28px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      min-height: 56px;
      width: 100%;
      margin-top: 4px;
    }
    .btn-main:hover { opacity: 0.92; }
    .song-list {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 14px;
    }
    .song-btn {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      color: #fff;
      padding: 10px 6px;
      font-size: clamp(12px, 3.5vw, 14px);
      font-weight: 600;
      cursor: pointer;
      min-height: 56px;
      line-height: 1.4;
    }
    .song-btn.selected { border-color: var(--accent); background: rgba(249,199,79,0.15); }
    .song-btn:hover { background: rgba(255,255,255,0.12); }
  </style>
</head>
<body>
<div class="wrap">
  <h1>🎹 피아노 놀이</h1>

  <div class="hud">
    <span>점수: <b id="scoreDisplay">0</b></span>
    <span id="modeLabel">연주 모드</span>
    <span>최고: <b id="bestDisplay">0</b></span>
  </div>

  <!-- 모드 탭 -->
  <div class="mode-bar">
    <button class="mode-btn active" id="modePlay" onclick="switchMode('play')">🎵 자유 연주</button>
    <button class="mode-btn" id="modeFollow" onclick="switchMode('follow')">🎼 따라하기</button>
  </div>

  <!-- 따라하기 악보 (follow 모드만 표시) -->
  <div class="sheet hidden" id="sheetArea">
    <div id="sheetNotes"></div>
  </div>

  <div id="pianoArea">
    <div id="feedback"></div>

    <div class="keyboard" id="keyboard">
      <!-- 흰 건반 (도레미파솔라시도 = C4 D4 E4 F4 G4 A4 B4 C5) -->
      <div class="key-white" data-note="C4" data-freq="261.63" onpointerdown="keyPress(this)" onpointerup="keyRelease(this)">도</div>
      <div class="key-white" data-note="D4" data-freq="293.66" onpointerdown="keyPress(this)" onpointerup="keyRelease(this)">레</div>
      <div class="key-white" data-note="E4" data-freq="329.63" onpointerdown="keyPress(this)" onpointerup="keyRelease(this)">미</div>
      <div class="key-white" data-note="F4" data-freq="349.23" onpointerdown="keyPress(this)" onpointerup="keyRelease(this)">파</div>
      <div class="key-white" data-note="G4" data-freq="392.00" onpointerdown="keyPress(this)" onpointerup="keyRelease(this)">솔</div>
      <div class="key-white" data-note="A4" data-freq="440.00" onpointerdown="keyPress(this)" onpointerup="keyRelease(this)">라</div>
      <div class="key-white" data-note="B4" data-freq="493.88" onpointerdown="keyPress(this)" onpointerup="keyRelease(this)">시</div>
      <div class="key-white" data-note="C5" data-freq="523.25" onpointerdown="keyPress(this)" onpointerup="keyRelease(this)">도↑</div>

      <!-- 검은 건반 레이어 (도#,레#,파#,솔#,라#) -->
      <div class="blacks-row">
        <!-- 흰건반 8개 위치에 따른 검은건반 배치 -->
        <!-- C#=사이1 / D#=사이2 / E#없음 / F#=사이4 / G#=사이5 / A#=사이6 / B#없음 -->
        <div class="black-spacer" style="flex:0.6"></div>
        <div class="key-black" data-note="C#4" data-freq="277.18" onpointerdown="keyPress(this)" onpointerup="keyRelease(this)">도#</div>
        <div class="black-spacer" style="flex:0.4"></div>
        <div class="key-black" data-note="D#4" data-freq="311.13" onpointerdown="keyPress(this)" onpointerup="keyRelease(this)">레#</div>
        <div class="black-spacer" style="flex:1.0"></div>
        <div class="key-black" data-note="F#4" data-freq="369.99" onpointerdown="keyPress(this)" onpointerup="keyRelease(this)">파#</div>
        <div class="black-spacer" style="flex:0.4"></div>
        <div class="key-black" data-note="G#4" data-freq="415.30" onpointerdown="keyPress(this)" onpointerup="keyRelease(this)">솔#</div>
        <div class="black-spacer" style="flex:0.4"></div>
        <div class="key-black" data-note="A#4" data-freq="466.16" onpointerdown="keyPress(this)" onpointerup="keyRelease(this)">라#</div>
        <div class="black-spacer" style="flex:0.6"></div>
      </div>
    </div>
  </div>

  <footer>
    <small>건반을 탭해서 연주해요</small>
    <a class="home-link" href="../index.html">🏠 게임 목록으로</a>
  </footer>
</div>

<!-- 시작 오버레이 -->
<div class="overlay" id="startOverlay">
  <div class="overlay-card">
    <h2>🎹 피아노 놀이</h2>
    <p>건반을 탭해서 음악을 연주해요!<br>
       <b>자유 연주</b>: 원하는 건반을 마음껏 눌러요<br>
       <b>따라하기</b>: 악보 순서대로 탭해 점수 획득!</p>
    <div class="song-list" id="songList">
      <button class="song-btn selected" data-idx="0">🎵<br>나비야</button>
      <button class="song-btn" data-idx="1">🌟<br>반짝반짝</button>
      <button class="song-btn" data-idx="2">🐑<br>메리의 양</button>
      <button class="song-btn" data-idx="3">🎂<br>생일 축하</button>
    </div>
    <button class="btn-main" id="startBtn">시작!</button>
  </div>
</div>

<!-- 결과 오버레이 -->
<div class="overlay hidden" id="endOverlay">
  <div class="overlay-card">
    <h2 id="endTitle">🎉 완주!</h2>
    <div class="result-score" id="finalScore">0</div>
    <p id="resultMsg"></p>
    <button class="btn-main" id="restartBtn">다시 하기</button>
    <br><br>
    <a class="home-link" href="../index.html" style="display:block;color:rgba(255,255,255,0.5);font-size:14px;margin-top:10px;text-decoration:none;min-height:44px;line-height:44px;">🏠 게임 목록으로</a>
  </div>
</div>

<script>
(function () {
  'use strict';

  // ── AudioContext 초기화 ─────────────────────────────
  let ctx = null;
  function getCtx() {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === 'suspended') ctx.resume();
    return ctx;
  }

  function playNote(freq, dur = 0.4) {
    const ac = getCtx();
    const osc  = ac.createOscillator();
    const gain = ac.createGain();
    osc.type = 'triangle';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.35, ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
    osc.connect(gain);
    gain.connect(ac.destination);
    osc.start();
    osc.stop(ac.currentTime + dur);
  }

  // ── 악보 데이터 ────────────────────────────────────
  // 각 note: {n: 'C4', label:'도', freq:261.63}
  const NOTE_MAP = {
    'C4':{'label':'도','freq':261.63},
    'D4':{'label':'레','freq':293.66},
    'E4':{'label':'미','freq':329.63},
    'F4':{'label':'파','freq':349.23},
    'G4':{'label':'솔','freq':392.00},
    'A4':{'label':'라','freq':440.00},
    'B4':{'label':'시','freq':493.88},
    'C5':{'label':'도↑','freq':523.25},
  };

  const SONGS = [
    {
      name: '나비야',
      notes: ['C4','C4','G4','G4','A4','A4','G4',
               'F4','F4','E4','E4','D4','D4','C4',
               'G4','G4','F4','F4','E4','E4','D4',
               'G4','G4','F4','F4','E4','E4','D4',
               'C4','C4','G4','G4','A4','A4','G4',
               'F4','F4','E4','E4','D4','D4','C4']
    },
    {
      name: '반짝반짝 작은 별',
      notes: ['C4','C4','G4','G4','A4','A4','G4',
               'F4','F4','E4','E4','D4','D4','C4',
               'G4','G4','F4','F4','E4','E4','D4',
               'G4','G4','F4','F4','E4','E4','D4',
               'C4','C4','G4','G4','A4','A4','G4',
               'F4','F4','E4','E4','D4','D4','C4']
    },
    {
      name: '메리의 양',
      notes: ['E4','D4','C4','D4','E4','E4','E4',
               'D4','D4','D4','E4','G4','G4',
               'E4','D4','C4','D4','E4','E4','E4',
               'D4','D4','E4','D4','C4']
    },
    {
      name: '생일 축하합니다',
      notes: ['C4','C4','D4','C4','F4','E4',
               'C4','C4','D4','C4','G4','F4',
               'C4','C4','C5','A4','F4','E4','D4',
               'B4','B4','A4','F4','G4','F4']
    }
  ];

  // ── 상태 ───────────────────────────────────────────
  let mode      = 'play'; // 'play' | 'follow'
  let score     = 0;
  let best      = parseInt(localStorage.getItem('piano_best') || '0');
  let songIdx   = 0;
  let noteIdx   = 0;
  let isRunning = false;

  // ── DOM ────────────────────────────────────────────
  const scoreEl   = document.getElementById('scoreDisplay');
  const bestEl    = document.getElementById('bestDisplay');
  const modeLbl   = document.getElementById('modeLabel');
  const feedback  = document.getElementById('feedback');
  const sheetArea = document.getElementById('sheetArea');
  const sheetNotes= document.getElementById('sheetNotes');
  const startOvl  = document.getElementById('startOverlay');
  const endOvl    = document.getElementById('endOverlay');
  const finalScoreEl = document.getElementById('finalScore');
  const resultMsg    = document.getElementById('resultMsg');
  const endTitle     = document.getElementById('endTitle');

  bestEl.textContent = best;

  // 곡 선택 버튼
  document.getElementById('songList').addEventListener('click', e => {
    const btn = e.target.closest('.song-btn');
    if (!btn) return;
    document.querySelectorAll('.song-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    songIdx = parseInt(btn.dataset.idx);
  });

  document.getElementById('startBtn').addEventListener('click', () => {
    startOvl.classList.add('hidden');
    startGame();
  });
  document.getElementById('restartBtn').addEventListener('click', () => {
    endOvl.classList.add('hidden');
    if (mode === 'follow') {
      startOvl.classList.remove('hidden');
    } else {
      resetPlay();
    }
  });

  // ── 모드 전환 ──────────────────────────────────────
  window.switchMode = function(m) {
    mode = m;
    document.getElementById('modePlay').classList.toggle('active', m === 'play');
    document.getElementById('modeFollow').classList.toggle('active', m === 'follow');
    modeLbl.textContent = m === 'play' ? '자유 연주' : '따라하기';
    sheetArea.classList.toggle('hidden', m === 'play');
    if (m === 'follow') {
      // 따라하기 선택 시 곡 선택 오버레이 표시
      startOvl.classList.remove('hidden');
    } else {
      startOvl.classList.add('hidden');
      resetPlay();
    }
  };

  function resetPlay() {
    score = 0; noteIdx = 0; isRunning = true;
    scoreEl.textContent = 0;
    feedback.textContent = '';
    sheetNotes.innerHTML = '';
  }

  // ── 게임 시작 (따라하기) ───────────────────────────
  function startGame() {
    score = 0; noteIdx = 0; isRunning = true;
    scoreEl.textContent = 0;
    feedback.textContent = '첫 음을 눌러요!';
    renderSheet();
  }

  function renderSheet() {
    const song = SONGS[songIdx];
    sheetNotes.innerHTML = '';
    // 현재 위치 앞뒤 7개만 보임
    const start = Math.max(0, noteIdx - 2);
    const end   = Math.min(song.notes.length, start + 9);
    for (let i = start; i < end; i++) {
      const n = song.notes[i];
      const nm = NOTE_MAP[n];
      const div = document.createElement('div');
      div.className = 'note-dot' +
        (i < noteIdx ? ' done' : i === noteIdx ? ' active' : '');
      div.textContent = nm ? nm.label : n;
      sheetNotes.appendChild(div);
    }
  }

  // ── 건반 이벤트 ────────────────────────────────────
  window.keyPress = function(el) {
    const freq = parseFloat(el.dataset.freq);
    const note = el.dataset.note;
    el.classList.add('lit');

    playNote(freq);
    spawnEffect(el);

    if (mode === 'follow' && isRunning) {
      const song = SONGS[songIdx];
      const expected = song.notes[noteIdx];
      if (note === expected) {
        score += 10;
        scoreEl.textContent = score;
        feedback.textContent = '👍 잘했어요!';
        noteIdx++;
        if (noteIdx >= song.notes.length) {
          endGame(true);
          return;
        }
        renderSheet();
      } else {
        feedback.textContent = '❌ 다시!';
        el.style.background = '#e53935';
        setTimeout(() => { el.style.background = ''; feedback.textContent = ''; }, 400);
      }
    } else if (mode === 'play') {
      score++;
      scoreEl.textContent = score;
    }
  };

  window.keyRelease = function(el) {
    el.classList.remove('lit');
    el.style.background = '';
  };

  // ── 이펙트 ─────────────────────────────────────────
  const emojis = ['🎵','🎶','✨','🌟','💫'];
  function spawnEffect(el) {
    const rect = el.getBoundingClientRect();
    const wrap = document.querySelector('.wrap').getBoundingClientRect();
    const eff = document.createElement('div');
    eff.className = 'note-effect';
    eff.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    eff.style.left = (rect.left - wrap.left + rect.width / 2 - 14) + 'px';
    eff.style.top  = (rect.top  - wrap.top  - 10) + 'px';
    document.querySelector('.wrap').appendChild(eff);
    eff.addEventListener('animationend', () => eff.remove());
  }

  // ── 게임 종료 ──────────────────────────────────────
  function endGame(clear) {
    isRunning = false;
    if (score > best) {
      best = score;
      localStorage.setItem('piano_best', best);
      bestEl.textContent = best;
    }
    endTitle.textContent    = clear ? '🎉 완주!' : '🎹 게임 종료';
    finalScoreEl.textContent = score;
    const star = score >= 200 ? '⭐⭐⭐' : score >= 100 ? '⭐⭐' : '⭐';
    resultMsg.textContent = clear
      ? `${star} ${SONGS[songIdx].name} 완주! 최고 ${best}점`
      : `탭 수: ${score}회 | 최고 ${best}점`;
    endOvl.classList.remove('hidden');
  }

  // ── 초기 상태 ──────────────────────────────────────
  // 자유 연주 모드로 시작
  resetPlay();

})();
