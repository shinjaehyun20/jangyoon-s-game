<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#2d1b54"/>
    </linearGradient>
    <linearGradient id="keyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f8f4e8"/>
      <stop offset="100%" stop-color="#e8e0cc"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 배경 -->
  <rect width="320" height="180" fill="url(#bg)"/>

  <!-- 배경 음표 장식 -->
  <text x="20" y="50" font-size="28" opacity="0.15" fill="#f9c74f">♪</text>
  <text x="270" y="40" font-size="22" opacity="0.12" fill="#f9c74f">♫</text>
  <text x="140" y="30" font-size="18" opacity="0.10" fill="#fff">♩</text>
  <text x="240" y="80" font-size="20" opacity="0.10" fill="#f9c74f">♬</text>

  <!-- 피아노 건반 영역 (하단) -->
  <rect x="20" y="90" width="280" height="70" rx="8" fill="rgba(0,0,0,0.3)"/>

  <!-- 흰 건반 7개 -->
  <rect x="24" y="94" width="35" height="62" rx="4" fill="url(#keyGrad)" stroke="#c8b89a" stroke-width="0.5"/>
  <rect x="63" y="94" width="35" height="62" rx="4" fill="url(#keyGrad)" stroke="#c8b89a" stroke-width="0.5"/>
  <!-- 미 건반 강조 (노란색) -->
  <rect x="102" y="94" width="35" height="62" rx="4" fill="#f9c74f" stroke="#e8a800" stroke-width="0.5" filter="url(#glow)"/>
  <rect x="141" y="94" width="35" height="62" rx="4" fill="url(#keyGrad)" stroke="#c8b89a" stroke-width="0.5"/>
  <rect x="180" y="94" width="35" height="62" rx="4" fill="url(#keyGrad)" stroke="#c8b89a" stroke-width="0.5"/>
  <!-- 라 건반 강조 -->
  <rect x="219" y="94" width="35" height="62" rx="4" fill="#f9c74f" stroke="#e8a800" stroke-width="0.5" filter="url(#glow)"/>
  <rect x="258" y="94" width="36" height="62" rx="4" fill="url(#keyGrad)" stroke="#c8b89a" stroke-width="0.5"/>

  <!-- 흰 건반 라벨 -->
  <text x="41" y="148" text-anchor="middle" font-size="10" font-weight="700" fill="#888" font-family="sans-serif">도</text>
  <text x="80" y="148" text-anchor="middle" font-size="10" font-weight="700" fill="#888" font-family="sans-serif">레</text>
  <text x="119" y="148" text-anchor="middle" font-size="10" font-weight="700" fill="#1a1a2e" font-family="sans-serif">미</text>
  <text x="158" y="148" text-anchor="middle" font-size="10" font-weight="700" fill="#888" font-family="sans-serif">파</text>
  <text x="197" y="148" text-anchor="middle" font-size="10" font-weight="700" fill="#888" font-family="sans-serif">솔</text>
  <text x="236" y="148" text-anchor="middle" font-size="10" font-weight="700" fill="#1a1a2e" font-family="sans-serif">라</text>
  <text x="276" y="148" text-anchor="middle" font-size="10" font-weight="700" fill="#888" font-family="sans-serif">시</text>

  <!-- 검은 건반 4개 -->
  <rect x="50" y="94" width="22" height="38" rx="3" fill="#1a1a2e"/>
  <rect x="89" y="94" width="22" height="38" rx="3" fill="#1a1a2e"/>
  <rect x="167" y="94" width="22" height="38" rx="3" fill="#1a1a2e"/>
  <rect x="206" y="94" width="22" height="38" rx="3" fill="#1a1a2e"/>
  <rect x="245" y="94" width="22" height="38" rx="3" fill="#1a1a2e"/>

  <!-- 이펙트 음표 -->
  <text x="110" y="82" font-size="20" fill="#f9c74f" opacity="0.9">🎵</text>
  <text x="180" y="75" font-size="16" fill="#fff" opacity="0.7">✨</text>

  <!-- 타이틀 (우하단) -->
  <rect x="0" y="155" width="320" height="25" fill="rgba(0,0,0,0.45)"/>
  <text x="312" y="171" text-anchor="end" font-size="13" font-weight="700" fill="#ffffff" font-family="Pretendard, sans-serif" letter-spacing="-0.3">피아노 놀이</text>
  <text x="312" y="178" text-anchor="end" font-size="8" fill="rgba(255,255,255,0.55)" font-family="sans-serif" letter-spacing="1.5">PIANO PLAY</text>

  <!-- 프레임 -->
  <rect x="0.5" y="0.5" width="319" height="179" rx="0" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
</svg>
