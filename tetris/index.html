<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Javascript Tetris</title>
  <style>
    /* ===== 기본 리셋 ===== */
    html, body {
      width: 100%; height: 100%;
      margin: 0; padding: 0;
      font-family: Helvetica, sans-serif;
      background: #ececec;
      overflow: hidden;
    }

    /* ===== 데스크탑 레이아웃 (기존 방식 유지) ===== */
    body { padding: 0.5rem; box-sizing: border-box; }
    #tetris {
      margin: 0 auto; padding: 0.5em;
      border: 4px solid black; border-radius: 10px;
      background-color: #F8F8F8;
    }
    #stats    { display: inline-block; vertical-align: top; }
    #canvas   { display: block; margin: 0 auto; background: url(texture.jpg); box-shadow: 10px 10px 10px #999; border: 2px solid #333; }
    #menu     { display: block; position: relative; text-align: center; margin-bottom: 0.5em; }
    #menu p   { margin: 0.25em 0; text-align: center; display: inline-block; margin-right: 0.5em; }
    #menu p a { text-decoration: none; color: black; }
    #upcoming { display: inline-block; background-color: #E0E0E0; vertical-align: middle; }
    #score    { color: red; font-weight: bold; vertical-align: middle; }
    #rows     { color: blue; font-weight: bold; vertical-align: middle; }
    #stats    { display: none; }

    /* ===== 모바일 컨트롤: 기본 숨김 ===== */
    #mobile-controls { display: none; }
    .mobile-home-link { display: none; }

    /* ===== 데스크탑 미디어쿼리 ===== */
    @media screen and (min-width: 600px) and (min-height: 600px) {
      #canvas   { display: inline-block; margin: 0; }
      #menu     { display: inline-block; vertical-align: top; position: relative; }
      #menu p   { display: block; margin-right: 0; }
      #stats    { display: inline-block; position: absolute; bottom: 0; right: 1em; }
    }
    /* 데스크탑: canvas에 CSS 크기 명시 → clientWidth/Height가 올바르게 반환됨 */
    @media screen and (min-width:   0px) and (min-height:   0px)  { #tetris { font-size: 0.75em; width: 250px; } #menu { width: 100px; height: 200px; } #upcoming { width:  50px; height:  50px; } #canvas { width: 100px; height: 200px; } }
    @media screen and (min-width: 600px) and (min-height: 600px)  { #tetris { font-size: 1.50em; width: 550px; } #menu { width: 250px; height: 500px; } #upcoming { width: 125px; height: 125px; } #canvas { width: 250px; height: 500px; } }
    @media screen and (min-width: 700px) and (min-height: 700px)  { #tetris { font-size: 1.75em; width: 650px; } #menu { width: 300px; height: 600px; } #upcoming { width: 150px; height: 150px; } #canvas { width: 300px; height: 600px; } }
    @media screen and (min-width: 800px) and (min-height: 800px)  { #tetris { font-size: 2.00em; width: 750px; } #menu { width: 350px; height: 700px; } #upcoming { width: 175px; height: 175px; } #canvas { width: 350px; height: 700px; } }
    @media screen and (min-width: 900px) and (min-height: 900px)  { #tetris { font-size: 2.25em; width: 850px; } #menu { width: 400px; height: 800px; } #upcoming { width: 200px; height: 200px; } #canvas { width: 400px; height: 800px; } }

    /* ===== 모바일 레이아웃 ===== */
    /*
     * 모바일 전체 구조:
     *   [헤더: 정보바]  ~40px
     *   [게임보드]      가변 (viewport 세로 - 헤더 - 컨트롤 - 여백)
     *   [컨트롤]        ~160px (버튼 2행)
     *   [홈버튼]        ~48px
     *
     * 총 비게임 영역: 40 + 160 + 48 + 여백(24) = ~272px
     * 보드 높이 = 100vh - 272px (최소 320px)
     * 보드 너비 = 보드높이 * (10/20) = 보드높이 / 2
     */
    @media (pointer: coarse), (max-width: 599px) {
      html, body {
        overflow: hidden;
      }

      body {
        padding: 0;
        display: flex;
        flex-direction: column;
        height: 100%;
        height: 100dvh; /* dynamic viewport height for mobile browsers */
      }

      #tetris {
        /* 모바일에서는 전체 화면 flexbox 컨테이너 */
        display: flex;
        flex-direction: column;
        width: 100%;
        height: 100%;
        box-sizing: border-box;
        border: none;
        border-radius: 0;
        padding: 4px 6px 0 6px;
        margin: 0;
        /* 스크롤 완전 차단 */
        overflow: hidden;
        background-color: #F8F8F8;
      }

      /* 헤더 정보바: 고정 높이 */
      #menu {
        display: flex !important;
        flex-direction: row;
        flex-wrap: nowrap;
        align-items: center;
        justify-content: space-around;
        gap: 4px;
        flex-shrink: 0;
        height: 40px;
        margin-bottom: 4px;
        padding: 0 4px;
        background: #eee;
        border-radius: 8px;
        font-size: 0.85em;
      }
      #menu p {
        margin: 0;
        display: inline-block !important;
        white-space: nowrap;
      }

      /* 캔버스: flex-grow로 남은 공간 모두 차지, 비율 유지 */
      #canvas {
        display: block !important;
        flex-shrink: 1;
        align-self: center;
        /* JS가 실제 크기를 계산해서 설정함 */
        background: url(texture.jpg);
        box-shadow: 4px 4px 8px #999;
        border: 2px solid #333;
        margin: 0;
      }

      /* 모바일 컨트롤: 고정 높이, 하단에 위치 */
      #mobile-controls {
        display: block !important;
        flex-shrink: 0;
        width: 100%;
        box-sizing: border-box;
        padding: 4px 4px 0 4px;
      }

      #mobile-controls .touch-row {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 5px;
        margin-bottom: 5px;
      }

      #mobile-controls button {
        appearance: none;
        height: 56px;           /* 최소 hit area */
        min-height: 56px;
        border: 2px solid #222;
        border-radius: 12px;
        background: linear-gradient(180deg, #ffffff, #d9d9d9);
        box-shadow: 0 3px 0 rgba(0,0,0,0.18);
        color: #111;
        font-size: 1.1rem;
        font-weight: bold;
        touch-action: manipulation;
        user-select: none;
        cursor: pointer;
        padding: 0;
      }

      #mobile-controls button:active,
      #mobile-controls button.is-active {
        transform: translateY(2px);
        box-shadow: 0 1px 0 rgba(0,0,0,0.18);
        background: linear-gradient(180deg, #dff3ff, #a7d6ff);
      }

      #mobile-controls .wide {
        grid-column: span 3;
      }

      /* 홈 버튼 */
      .mobile-home-link {
        display: flex !important;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        width: 100%;
        height: 44px;
        margin-top: 4px;
        margin-bottom: 4px;
        padding: 0 1rem;
        border-radius: 12px;
        background: #1f2937;
        color: #fff;
        text-align: center;
        text-decoration: none;
        font-weight: 700;
        font-size: 0.9rem;
        box-sizing: border-box;
      }
    }
  </style>
</head>

<body>

  <div id="tetris">
    <div id="menu">
      <p id="start"><a href="javascript:play();">Press Space to Play.</a></p>
      <p><canvas id="upcoming"></canvas></p>
      <p>score <span id="score">00000</span></p>
      <p>rows <span id="rows">0</span></p>
    </div>
    <canvas id="canvas">
      Sorry, this example cannot be run because your browser does not support the &lt;canvas&gt; element
    </canvas>
    <div id="mobile-controls" aria-label="터치 컨트롤">
      <div class="touch-row">
        <button type="button" data-action="left"   aria-label="왼쪽 이동">◀</button>
        <button type="button" data-action="rotate" aria-label="회전">⟳</button>
        <button type="button" data-action="right"  aria-label="오른쪽 이동">▶</button>
      </div>
      <div class="touch-row">
        <button type="button" data-action="down"  aria-label="빠르게 내리기" class="wide">▼ 빠르게 내리기</button>
      </div>
      <div class="touch-row">
        <button type="button" data-action="start" aria-label="게임 시작 또는 다시 시작" class="wide">▶ 게임 시작</button>
      </div>
    </div>
    <a class="mobile-home-link" href="../index.html">🏠 게임 목록으로</a>
  </div>

  <!-- 게임 오버 오버레이 -->
  <div id="gameOverOverlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.72); z-index:200; align-items:center; justify-content:center; flex-direction:column; backdrop-filter:blur(3px);">
    <div style="background:linear-gradient(135deg,#1f2937,#111827); border-radius:24px; padding:32px 28px; text-align:center; color:#fff; max-width:300px; width:88%; box-shadow:0 16px 48px rgba(0,0,0,0.6);">
      <div style="font-size:40px; margin-bottom:8px;">😵</div>
      <h2 style="font-size:24px; margin-bottom:6px;">게임 오버!</h2>
      <p style="font-size:15px; color:rgba(255,255,255,0.7); margin-bottom:6px;">점수: <span id="goScore" style="color:#ffd700; font-weight:900;"></span></p>
      <button id="goRetryBtn" style="display:block; width:100%; margin-top:16px; padding:16px; border:none; border-radius:14px; background:linear-gradient(135deg,#f7971e,#ffd200); color:#111; font-size:18px; font-weight:900; cursor:pointer; min-height:56px; box-sizing:border-box;">🔄 다시 하기</button>
      <a href="../index.html" style="display:flex; align-items:center; justify-content:center; margin-top:10px; padding:16px; border-radius:14px; background:#374151; color:#fff; text-decoration:none; font-size:17px; font-weight:700; min-height:56px; box-sizing:border-box;">🏠 게임 목록으로</a>
    </div>
  </div>

  <script src="stats.js"></script>
  <script>

    //-------------------------------------------------------------------------
    // base helper methods
    //-------------------------------------------------------------------------

    function get(id)        { return document.getElementById(id);  }
    function hide(id)       { get(id).style.visibility = 'hidden'; }
    function show(id)       { get(id).style.visibility = null;     }
    function html(id, html) { get(id).innerHTML = html;            }

    function timestamp()           { return new Date().getTime();                             }
    function random(min, max)      { return (min + (Math.random() * (max - min)));            }
    function randomChoice(choices) { return choices[Math.round(random(0, choices.length-1))]; }

    if (!window.requestAnimationFrame) {
      window.requestAnimationFrame = window.webkitRequestAnimationFrame ||
                                     window.mozRequestAnimationFrame    ||
                                     window.oRequestAnimationFrame      ||
                                     window.msRequestAnimationFrame     ||
                                     function(callback, element) {
                                       window.setTimeout(callback, 1000 / 60);
                                     }
    }

    //-------------------------------------------------------------------------
    // game constants
    //-------------------------------------------------------------------------

    var KEY     = { ESC: 27, SPACE: 32, LEFT: 37, UP: 38, RIGHT: 39, DOWN: 40 },
        DIR     = { UP: 0, RIGHT: 1, DOWN: 2, LEFT: 3, MIN: 0, MAX: 3 },
        stats   = new Stats(),
        canvas  = get('canvas'),
        ctx     = canvas.getContext('2d'),
        ucanvas = get('upcoming'),
        uctx    = ucanvas.getContext('2d'),
        speed   = { start: 0.6, decrement: 0.005, min: 0.1 },
        nx      = 10, // 가로 칸 수
        ny      = 20, // 세로 칸 수
        nu      = 5;  // 넥스트 프리뷰 칸 수

    //-------------------------------------------------------------------------
    // game variables (initialized during reset)
    //-------------------------------------------------------------------------

    var dx, dy,
        blocks,
        actions,
        playing,
        dt,
        current,
        next,
        score,
        vscore,
        rows,
        step,
        holdTimers = {};

    //-------------------------------------------------------------------------
    // tetris pieces
    //-------------------------------------------------------------------------

    var i = { size: 4, blocks: [0x0F00, 0x2222, 0x00F0, 0x4444], color: 'cyan'   };
    var j = { size: 3, blocks: [0x44C0, 0x8E00, 0x6440, 0x0E20], color: 'blue'   };
    var l = { size: 3, blocks: [0x4460, 0x0E80, 0xC440, 0x2E00], color: 'orange' };
    var o = { size: 2, blocks: [0xCC00, 0xCC00, 0xCC00, 0xCC00], color: 'yellow' };
    var s = { size: 3, blocks: [0x06C0, 0x8C40, 0x6C00, 0x4620], color: 'green'  };
    var t = { size: 3, blocks: [0x0E40, 0x4C40, 0x4E00, 0x4640], color: 'purple' };
    var z = { size: 3, blocks: [0x0C60, 0x4C80, 0xC600, 0x2640], color: 'red'    };

    function eachblock(type, x, y, dir, fn) {
      var bit, result, row = 0, col = 0, blocks = type.blocks[dir];
      for(bit = 0x8000 ; bit > 0 ; bit = bit >> 1) {
        if (blocks & bit) { fn(x + col, y + row); }
        if (++col === 4) { col = 0; ++row; }
      }
    }

    function occupied(type, x, y, dir) {
      var result = false;
      eachblock(type, x, y, dir, function(x, y) {
        if ((x < 0) || (x >= nx) || (y < 0) || (y >= ny) || getBlock(x,y))
          result = true;
      });
      return result;
    }

    function unoccupied(type, x, y, dir) { return !occupied(type, x, y, dir); }

    var pieces = [];
    function randomPiece() {
      if (pieces.length == 0)
        pieces = [i,i,i,i,j,j,j,j,l,l,l,l,o,o,o,o,s,s,s,s,t,t,t,t,z,z,z,z];
      var type = pieces.splice(random(0, pieces.length-1), 1)[0];
      return { type: type, dir: DIR.UP, x: Math.round(random(0, nx - type.size)), y: 0 };
    }

    //-------------------------------------------------------------------------
    // GAME LOOP
    //-------------------------------------------------------------------------

    function run() {
      showStats();
      addEvents();

      var last = now = timestamp();
      function frame() {
        now = timestamp();
        update(Math.min(1, (now - last) / 1000.0));
        draw();
        stats.update();
        last = now;
        requestAnimationFrame(frame, canvas);
      }

      resize();
      reset();
      frame();
    }

    function showStats() {
      stats.domElement.id = 'stats';
      get('menu').appendChild(stats.domElement);
    }

    function addEvents() {
      document.addEventListener('keydown', keydown, false);
      window.addEventListener('resize', resize, false);
      bindTouchControls();
      bindSwipeControls();
      bindStartTouch();
    }

    function bindTouchControls() {
      var buttons = document.querySelectorAll('#mobile-controls button[data-action]');
      buttons.forEach(function(button) {
        button.addEventListener('pointerdown', function(ev) {
          ev.preventDefault();
          handleTouchAction(button.dataset.action, true, button);
        }, false);
        ['pointerup', 'pointercancel', 'pointerleave'].forEach(function(type) {
          button.addEventListener(type, function() {
            stopTouchAction(button.dataset.action, button);
          }, false);
        });
      });
    }

    function bindSwipeControls() {
      var swipeStartX = 0, swipeStartY = 0;
      canvas.addEventListener('touchstart', function(ev) {
        swipeStartX = ev.touches[0].clientX;
        swipeStartY = ev.touches[0].clientY;
        ev.preventDefault();
      }, { passive: false });
      canvas.addEventListener('touchend', function(ev) {
        var deltaX = ev.changedTouches[0].clientX - swipeStartX;
        var deltaY = ev.changedTouches[0].clientY - swipeStartY;
        if (Math.abs(deltaX) > Math.abs(deltaY)) {
          actions.push(deltaX > 0 ? DIR.RIGHT : DIR.LEFT);
        } else {
          actions.push(deltaY > 0 ? DIR.DOWN : DIR.UP);
        }
        ev.preventDefault();
      }, { passive: false });
    }

    function bindStartTouch() {
      get('start').addEventListener('click', function(ev) {
        if (!playing) { play(); ev.preventDefault(); }
      }, false);
    }

    function mapTouchAction(action) {
      switch(action) {
        case 'left':   return DIR.LEFT;
        case 'right':  return DIR.RIGHT;
        case 'rotate': return DIR.UP;
        case 'down':   return DIR.DOWN;
      }
      return null;
    }

    function queueAction(action) {
      if (!playing) return;
      var mapped = mapTouchAction(action);
      if (mapped !== null) actions.push(mapped);
    }

    function handleTouchAction(action, allowRepeat, button) {
      if (action === 'start') {
        if (!playing) play();
        flashTouchButton(button);
        return;
      }
      queueAction(action);
      flashTouchButton(button);
      if (allowRepeat && (action === 'left' || action === 'right' || action === 'down')) {
        stopTouchAction(action, button);
        holdTimers[action] = {
          timeout: setTimeout(function() {
            holdTimers[action].interval = setInterval(function() {
              queueAction(action);
            }, 85);
          }, 220)
        };
      }
    }

    function stopTouchAction(action, button) {
      if (holdTimers[action]) {
        clearTimeout(holdTimers[action].timeout);
        clearInterval(holdTimers[action].interval);
        delete holdTimers[action];
      }
      if (button) button.classList.remove('is-active');
    }

    function flashTouchButton(button) {
      if (!button) return;
      button.classList.add('is-active');
      setTimeout(function() { button.classList.remove('is-active'); }, 120);
    }

    /**
     * resize(): viewport 실측 기반 캔버스 크기 계산
     *
     * 모바일 레이아웃 예산 (실측값):
     *   메뉴바:       40px + 4px margin = 44px
     *   컨트롤 3행:   56*3 + gap(5*2) + padding(8) = 186px
     *   홈버튼:       44px + margin(4+4) = 52px
     *   tetris padding: 4px top
     *   여백 버퍼:    16px
     *   합계:         ~302px
     *
     * 보드 가용 세로: vh - 302
     * 보드 가용 가로: vw - 12 (좌우 padding 6*2)
     * blockSize = min(가용세로/20, 가용가로/10)
     */
    function resize(event) {
      var isMobile = (window.innerWidth < 600) || ('ontouchstart' in window && window.innerWidth <= 600);

      if (isMobile) {
        // viewport 실측: dvh 지원 여부에 따라 실제 가용 높이 결정
        var vh = window.innerHeight;
        var vw = window.innerWidth;

        // 비게임 영역 예산 (px)
        var MENU_H     = 44;   // 헤더 메뉴바 + 하단 margin
        var CTRL_H     = 190;  // 컨트롤 3행 (버튼 56px * 3행 + gap + padding)
        var HOME_H     = 52;   // 홈 버튼 + 여백
        var PADDING_T  = 4;    // #tetris 상단 padding
        var BUFFER     = 16;   // 안전 여백
        var RESERVED   = MENU_H + CTRL_H + HOME_H + PADDING_T + BUFFER;

        // 보드에 쓸 수 있는 최대 픽셀
        var maxBoardH  = vh - RESERVED;
        var maxBoardW  = vw - 12; // 좌우 padding 6px * 2

        // blockSize: 세로 기준(ny=20)과 가로 기준(nx=10) 중 작은 쪽
        var bsByH = Math.floor(maxBoardH / ny);
        var bsByW = Math.floor(maxBoardW / nx);
        var blockSize = Math.max(12, Math.min(bsByH, bsByW)); // 최소 12px, 제한 없는 최대

        var canvasW = blockSize * nx;
        var canvasH = blockSize * ny;

        canvas.width  = canvasW;
        canvas.height = canvasH;
        canvas.style.width  = canvasW + 'px';
        canvas.style.height = canvasH + 'px';

        // 넥스트 프리뷰: blockSize의 60%
        var uBlockSize = Math.floor(blockSize * 0.6);
        ucanvas.width  = uBlockSize * nu;
        ucanvas.height = uBlockSize * nu;
        ucanvas.style.width  = ucanvas.width  + 'px';
        ucanvas.style.height = ucanvas.height + 'px';

      } else {
        // 데스크탑: 기존 clientWidth/Height 방식
        canvas.width   = canvas.clientWidth;
        canvas.height  = canvas.clientHeight;
        ucanvas.width  = ucanvas.clientWidth;
        ucanvas.height = ucanvas.clientHeight;
      }

      dx = canvas.width  / nx;
      dy = canvas.height / ny;
      invalidate();
      invalidateNext();
    }

    function keydown(ev) {
      var handled = false;
      if (playing) {
        switch(ev.keyCode) {
          case KEY.LEFT:   actions.push(DIR.LEFT);  handled = true; break;
          case KEY.RIGHT:  actions.push(DIR.RIGHT); handled = true; break;
          case KEY.UP:     actions.push(DIR.UP);    handled = true; break;
          case KEY.DOWN:   actions.push(DIR.DOWN);  handled = true; break;
          case KEY.ESC:    lose();                  handled = true; break;
        }
      }
      else if (ev.keyCode == KEY.SPACE) {
        play();
        handled = true;
      }
      if (handled) ev.preventDefault();
    }

    //-------------------------------------------------------------------------
    // GAME LOGIC
    //-------------------------------------------------------------------------

    function play() {
      hide('start');
      get('gameOverOverlay').style.display = 'none';
      reset();
      playing = true;
    }

    function lose() {
      show('start');
      setVisualScore();
      playing = false;
      get('goScore').textContent = Math.floor(score);
      var ov = get('gameOverOverlay');
      ov.style.display = 'flex';
    }

    function setVisualScore(n)      { vscore = n || score; invalidateScore(); }
    function setScore(n)            { score = n; setVisualScore(n);  }
    function addScore(n)            { score = score + n;   }
    function clearScore()           { setScore(0); }
    function clearRows()            { setRows(0); }
    function setRows(n)             { rows = n; step = Math.max(speed.min, speed.start - (speed.decrement*rows)); invalidateRows(); }
    function addRows(n)             { setRows(rows + n); }
    function getBlock(x,y)          { return (blocks && blocks[x] ? blocks[x][y] : null); }
    function setBlock(x,y,type)     { blocks[x] = blocks[x] || []; blocks[x][y] = type; invalidate(); }
    function clearBlocks()          { blocks = []; invalidate(); }
    function clearActions()         { actions = []; }
    function setCurrentPiece(piece) { current = piece || randomPiece(); invalidate();     }
    function setNextPiece(piece)    { next    = piece || randomPiece(); invalidateNext(); }

    function reset() {
      dt = 0;
      clearActions();
      clearBlocks();
      clearRows();
      clearScore();
      setCurrentPiece(next);
      setNextPiece();
    }

    function update(idt) {
      if (playing) {
        if (vscore < score) setVisualScore(vscore + 1);
        handle(actions.shift());
        dt = dt + idt;
        if (dt > step) { dt = dt - step; drop(); }
      }
    }

    function handle(action) {
      switch(action) {
        case DIR.LEFT:  move(DIR.LEFT);  break;
        case DIR.RIGHT: move(DIR.RIGHT); break;
        case DIR.UP:    rotate();        break;
        case DIR.DOWN:  drop();          break;
      }
    }

    function move(dir) {
      var x = current.x, y = current.y;
      switch(dir) {
        case DIR.RIGHT: x = x + 1; break;
        case DIR.LEFT:  x = x - 1; break;
        case DIR.DOWN:  y = y + 1; break;
      }
      if (unoccupied(current.type, x, y, current.dir)) {
        current.x = x;
        current.y = y;
        invalidate();
        return true;
      } else {
        return false;
      }
    }

    function rotate() {
      var newdir = (current.dir == DIR.MAX ? DIR.MIN : current.dir + 1);
      if (unoccupied(current.type, current.x, current.y, newdir)) {
        current.dir = newdir;
        invalidate();
      }
    }

    function drop() {
      if (!move(DIR.DOWN)) {
        addScore(10);
        dropPiece();
        removeLines();
        setCurrentPiece(next);
        setNextPiece(randomPiece());
        clearActions();
        if (occupied(current.type, current.x, current.y, current.dir)) {
          lose();
        }
      }
    }

    function dropPiece() {
      eachblock(current.type, current.x, current.y, current.dir, function(x, y) {
        setBlock(x, y, current.type);
      });
    }

    function removeLines() {
      var x, y, complete, n = 0;
      for(y = ny ; y > 0 ; --y) {
        complete = true;
        for(x = 0 ; x < nx ; ++x) {
          if (!getBlock(x, y)) complete = false;
        }
        if (complete) {
          removeLine(y);
          y = y + 1;
          n++;
        }
      }
      if (n > 0) {
        addRows(n);
        addScore(100*Math.pow(2,n-1));
      }
    }

    function removeLine(n) {
      var x, y;
      for(y = n ; y >= 0 ; --y) {
        for(x = 0 ; x < nx ; ++x)
          setBlock(x, y, (y == 0) ? null : getBlock(x, y-1));
      }
    }

    //-------------------------------------------------------------------------
    // RENDERING
    //-------------------------------------------------------------------------

    var invalid = {};

    function invalidate()         { invalid.court  = true; }
    function invalidateNext()     { invalid.next   = true; }
    function invalidateScore()    { invalid.score  = true; }
    function invalidateRows()     { invalid.rows   = true; }

    function draw() {
      ctx.save();
      ctx.lineWidth = 1;
      ctx.translate(0.5, 0.5);
      drawCourt();
      drawNext();
      drawScore();
      drawRows();
      ctx.restore();
    }

    function drawCourt() {
      if (invalid.court) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (playing)
          drawPiece(ctx, current.type, current.x, current.y, current.dir);
        var x, y, block;
        for(y = 0 ; y < ny ; y++) {
          for (x = 0 ; x < nx ; x++) {
            if (block = getBlock(x,y))
              drawBlock(ctx, x, y, block.color);
          }
        }
        ctx.strokeRect(0, 0, nx*dx - 1, ny*dy - 1);
        invalid.court = false;
      }
    }

    function drawNext() {
      if (invalid.next) {
        var padding = (nu - next.type.size) / 2;
        uctx.save();
        uctx.translate(0.5, 0.5);
        uctx.clearRect(0, 0, nu*dx, nu*dy);
        drawPiece(uctx, next.type, padding, padding, next.dir);
        uctx.strokeStyle = 'black';
        uctx.strokeRect(0, 0, nu*dx - 1, nu*dy - 1);
        uctx.restore();
        invalid.next = false;
      }
    }

    function drawScore() {
      if (invalid.score) {
        html('score', ("00000" + Math.floor(vscore)).slice(-5));
        invalid.score = false;
      }
    }

    function drawRows() {
      if (invalid.rows) {
        html('rows', rows);
        invalid.rows = false;
      }
    }

    function drawPiece(ctx, type, x, y, dir) {
      eachblock(type, x, y, dir, function(x, y) {
        drawBlock(ctx, x, y, type.color);
      });
    }

    function drawBlock(ctx, x, y, color) {
      ctx.fillStyle = color;
      ctx.fillRect(x*dx, y*dy, dx, dy);
      ctx.strokeRect(x*dx, y*dy, dx, dy);
    }

    //-------------------------------------------------------------------------
    // FINALLY, lets run the game
    //-------------------------------------------------------------------------

    document.getElementById('goRetryBtn').addEventListener('click', function() {
      document.getElementById('gameOverOverlay').style.display = 'none';
      play();
    });

    run();

  </script>

</body>
</html>
