<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
  
  <defs>
    
    <linearGradient id="blockI" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#22d3ee"/><stop offset="1" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="blockO" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#facc15"/><stop offset="1" stop-color="#ca8a04"/>
    </linearGradient>
    <linearGradient id="blockT" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c084fc"/><stop offset="1" stop-color="#7e22ce"/>
    </linearGradient>
    <linearGradient id="blockS" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4ade80"/><stop offset="1" stop-color="#15803d"/>
    </linearGradient>
    <linearGradient id="blockL" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fb923c"/><stop offset="1" stop-color="#c2410c"/>
    </linearGradient>
  
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      
    <stop offset="0" stop-color="#1e1b2e"/>
    <stop offset="1" stop-color="#0b0818"/>
  
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.04"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="320" height="180" fill="url(#bg)"/>
  <rect width="320" height="180" fill="url(#sheen)"/>
  <rect x="0.5" y="0.5" width="319" height="179" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  
  <!-- 그리드 배경 -->
  <g stroke="rgba(192, 132, 252, 0.08)" stroke-width="1">
    <line x1="0" y1="0" x2="320" y2="0"/><line x1="0" y1="20" x2="320" y2="20"/><line x1="0" y1="40" x2="320" y2="40"/><line x1="0" y1="60" x2="320" y2="60"/><line x1="0" y1="80" x2="320" y2="80"/><line x1="0" y1="100" x2="320" y2="100"/><line x1="0" y1="120" x2="320" y2="120"/><line x1="0" y1="140" x2="320" y2="140"/><line x1="0" y1="160" x2="320" y2="160"/>
    <line x1="0" y1="0" x2="0" y2="180"/><line x1="20" y1="0" x2="20" y2="180"/><line x1="40" y1="0" x2="40" y2="180"/><line x1="60" y1="0" x2="60" y2="180"/><line x1="80" y1="0" x2="80" y2="180"/><line x1="100" y1="0" x2="100" y2="180"/><line x1="120" y1="0" x2="120" y2="180"/><line x1="140" y1="0" x2="140" y2="180"/><line x1="160" y1="0" x2="160" y2="180"/><line x1="180" y1="0" x2="180" y2="180"/><line x1="200" y1="0" x2="200" y2="180"/><line x1="220" y1="0" x2="220" y2="180"/><line x1="240" y1="0" x2="240" y2="180"/><line x1="260" y1="0" x2="260" y2="180"/><line x1="280" y1="0" x2="280" y2="180"/><line x1="300" y1="0" x2="300" y2="180"/><line x1="320" y1="0" x2="320" y2="180"/>
  </g>
  <!-- 떨어지는 블록들 -->
  <!-- I 블록 -->
  <g transform="translate(30, 30)">
    <rect width="20" height="20" fill="url(#blockI)" stroke="rgba(0,0,0,0.3)" stroke-width="1"/>
    <rect x="20" width="20" height="20" fill="url(#blockI)" stroke="rgba(0,0,0,0.3)" stroke-width="1"/>
    <rect x="40" width="20" height="20" fill="url(#blockI)" stroke="rgba(0,0,0,0.3)" stroke-width="1"/>
    <rect x="60" width="20" height="20" fill="url(#blockI)" stroke="rgba(0,0,0,0.3)" stroke-width="1"/>
  </g>
  <!-- T 블록 -->
  <g transform="translate(40, 80)">
    <rect width="20" height="20" fill="url(#blockT)" stroke="rgba(0,0,0,0.3)" stroke-width="1"/>
    <rect x="20" width="20" height="20" fill="url(#blockT)" stroke="rgba(0,0,0,0.3)" stroke-width="1"/>
    <rect x="40" width="20" height="20" fill="url(#blockT)" stroke="rgba(0,0,0,0.3)" stroke-width="1"/>
    <rect x="20" y="20" width="20" height="20" fill="url(#blockT)" stroke="rgba(0,0,0,0.3)" stroke-width="1"/>
  </g>
  <!-- O 블록 -->
  <g transform="translate(130, 110)">
    <rect width="20" height="20" fill="url(#blockO)" stroke="rgba(0,0,0,0.3)" stroke-width="1"/>
    <rect x="20" width="20" height="20" fill="url(#blockO)" stroke="rgba(0,0,0,0.3)" stroke-width="1"/>
    <rect y="20" width="20" height="20" fill="url(#blockO)" stroke="rgba(0,0,0,0.3)" stroke-width="1"/>
    <rect x="20" y="20" width="20" height="20" fill="url(#blockO)" stroke="rgba(0,0,0,0.3)" stroke-width="1"/>
  </g>
  <!-- L 블록 -->
  <g transform="translate(180, 70)">
    <rect width="20" height="20" fill="url(#blockL)" stroke="rgba(0,0,0,0.3)" stroke-width="1"/>
    <rect y="20" width="20" height="20" fill="url(#blockL)" stroke="rgba(0,0,0,0.3)" stroke-width="1"/>
    <rect y="40" width="20" height="20" fill="url(#blockL)" stroke="rgba(0,0,0,0.3)" stroke-width="1"/>
    <rect x="20" y="40" width="20" height="20" fill="url(#blockL)" stroke="rgba(0,0,0,0.3)" stroke-width="1"/>
  </g>
  
  <g font-family="'Pretendard', 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif">
    <text x="296" y="148" text-anchor="end" font-size="22" font-weight="900" fill="#c084fc" letter-spacing="-0.5">테트리스</text>
    <text x="296" y="166" text-anchor="end" font-size="10" font-weight="500" fill="rgba(255,255,255,0.5)" letter-spacing="2">TETRIS</text>
  </g>
  
</svg>