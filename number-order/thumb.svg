<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#0f2027"/>
    </linearGradient>
  </defs>
  <rect width="320" height="180" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="319" height="179" fill="none" stroke="rgba(255,255,255,0.08)"/>

  <!-- 숫자 버튼들 -->
  <!-- 1 -->
  <rect x="20" y="30" width="52" height="52" rx="12" fill="#ff6b6bcc"/>
  <text x="46" y="66" text-anchor="middle" font-size="30" font-weight="900" fill="#fff" font-family="sans-serif">1</text>

  <!-- 2 -->
  <rect x="82" y="30" width="52" height="52" rx="12" fill="#ffd700cc"/>
  <text x="108" y="66" text-anchor="middle" font-size="30" font-weight="900" fill="#fff" font-family="sans-serif">2</text>

  <!-- 3 -->
  <rect x="144" y="30" width="52" height="52" rx="12" fill="#26de81cc"/>
  <text x="170" y="66" text-anchor="middle" font-size="30" font-weight="900" fill="#fff" font-family="sans-serif">3</text>

  <!-- 5 -->
  <rect x="20" y="96" width="52" height="52" rx="12" fill="#a29bfecc"/>
  <text x="46" y="132" text-anchor="middle" font-size="30" font-weight="900" fill="#fff" font-family="sans-serif">5</text>

  <!-- 4 — 반짝이는 강조 -->
  <rect x="82" y="96" width="52" height="52" rx="12" fill="#45aaf2"/>
  <rect x="82" y="96" width="52" height="52" rx="12" fill="none" stroke="#ffd700" stroke-width="3"/>
  <text x="108" y="132" text-anchor="middle" font-size="30" font-weight="900" fill="#ffd700" font-family="sans-serif">4</text>

  <!-- 화살표 힌트 -->
  <text x="165" y="128" font-size="28" text-anchor="middle">👆</text>

  <!-- 별 -->
  <text x="200" y="60" font-size="26">⭐</text>
  <text x="230" y="90" font-size="20">⭐</text>
  <text x="205" y="110" font-size="16">⭐</text>

  <!-- 타이틀 -->
  <g font-family="'Pretendard','Noto Sans KR',sans-serif">
    <text x="296" y="148" text-anchor="end" font-size="22" font-weight="900" fill="#ffd700">숫자 순서 맞추기</text>
    <text x="296" y="166" text-anchor="end" font-size="10" font-weight="500" fill="rgba(255,255,255,0.5)" letter-spacing="2">NUMBER ORDER</text>
  </g>
</svg>
