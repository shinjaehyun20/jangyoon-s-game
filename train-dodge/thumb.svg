  <!-- 구름 -->
  <text x="40" y="36" font-size="28">☁️</text>
  <text x="210" y="28" font-size="20">☁️</text>

  <!-- 선로 침목 -->
  <rect x="0" y="122" width="320" height="4" rx="2" fill="#888"/>
  <rect x="0" y="136" width="320" height="4" rx="2" fill="#888"/>
  <rect x="16"  y="122" width="12" height="18" rx="2" fill="#8B5E3C"/>
  <rect x="48"  y="122" width="12" height="18" rx="2" fill="#8B5E3C"/>
  <rect x="80"  y="122" width="12" height="18" rx="2" fill="#8B5E3C"/>
  <rect x="112" y="122" width="12" height="18" rx="2" fill="#8B5E3C"/>
  <rect x="144" y="122" width="12" height="18" rx="2" fill="#8B5E3C"/>
  <rect x="176" y="122" width="12" height="18" rx="2" fill="#8B5E3C"/>
  <rect x="208" y="122" width="12" height="18" rx="2" fill="#8B5E3C"/>
  <rect x="240" y="122" width="12" height="18" rx="2" fill="#8B5E3C"/>
  <rect x="272" y="122" width="12" height="18" rx="2" fill="#8B5E3C"/>

  <!-- 플레이어 (점프 중) -->
