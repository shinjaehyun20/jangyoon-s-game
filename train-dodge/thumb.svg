  <!-- 타이틀 -->
  <g font-family="'Pretendard','Noto Sans KR',sans-serif">
    <text x="296" y="148" text-anchor="end" font-size="22" font-weight="900" fill="#1a5276">기차 피하기</text>
    <text x="296" y="166" text-anchor="end" font-size="10" font-weight="500" fill="rgba(26,82,118,0.5)" letter-spacing="2">TRAIN DODGE</text>
