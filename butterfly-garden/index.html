<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>나비 꽃밭</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100vh; height: 100dvh;
      overflow: hidden;
      touch-action: manipulation;
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: linear-gradient(180deg, #87CEEB 0%, #B0E2FF 35%, #90EE90 65%, #5CB85C 100%);
      user-select: none;
    }
    .wrap {
      width: 100%; max-width: 480px;
      height: 100vh; height: 100dvh;
      display: flex; flex-direction: column;
      margin: 0 auto;
      padding: 10px 12px 8px;
      gap: 8px;
      position: relative;
    }
    h1 {
      font-size: clamp(18px, 5vw, 26px);
      color: #2d5a27;
      text-align: center;
      text-shadow: 0 1px 3px rgba(255,255,255,0.9);
      flex-shrink: 0;
    }
    .hud {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255,255,255,0.55);
      border-radius: 12px;
      padding: 6px 14px;
      flex-shrink: 0;
    }
    .hud-item { display: flex; flex-direction: column; align-items: center; }
    .hud-label { font-size: 11px; color: #555; }
    .hud-val { font-size: 22px; font-weight: 900; color: #2d5a27; }
    #timeVal { color: #c0392b; }
    #gameArea {
      flex: 1;
      position: relative;
      overflow: hidden;
      border-radius: 16px;
      background: rgba(255,255,255,0.12);
    }
    .flower {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      touch-action: none;
    }
    .flower-body {
      font-size: 42px;
      line-height: 1;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.15));
      transition: transform 0.1s;
    }
    .flower:active .flower-body { transform: scale(0.82); }
    .flower-stem {
      width: 4px;
      background: #4a9a4a;
      border-radius: 2px;
    }
    .wilt-bar {
      position: absolute;
      bottom: -9px;
      left: 50%;
      transform: translateX(-50%);
      width: 38px;
      height: 4px;
      background: rgba(0,0,0,0.12);
      border-radius: 2px;
      overflow: hidden;
    }
    .wilt-fill {
      height: 100%;
      background: #5CB85C;
      border-radius: 2px;
      transition: background 0.3s;
    }
    #butterfly {
      position: absolute;
      font-size: 34px;
      pointer-events: none;
      transition: left 0.35s cubic-bezier(.4,0,.2,1), top 0.35s cubic-bezier(.4,0,.2,1);
      z-index: 10;
    }
    .particle {
      position: absolute;
      font-weight: 900;
      pointer-events: none;
      animation: floatUp 0.85s ease-out forwards;
      z-index: 20;
    }
    @keyframes floatUp {
      0%   { transform: translateY(0) scale(1);    opacity: 1; }
      100% { transform: translateY(-64px) scale(0.4); opacity: 0; }
    }
    footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    footer small { font-size: 11px; color: rgba(0,0,0,0.45); }
    .home-link {
      font-size: 13px;
      color: #2d5a27;
      text-decoration: none;
      background: rgba(255,255,255,0.55);
      padding: 4px 10px;
      border-radius: 20px;
    }
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.58);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
    }
    .overlay.hidden { display: none; }
    .overlay-card {
      background: #fff;
      border-radius: 22px;
      padding: 28px 30px;
      text-align: center;
      max-width: 320px; width: 90%;
    }
    .overlay-card h2 { font-size: 26px; margin-bottom: 10px; }
    .overlay-card p  { color: #555; font-size: 14px; margin-bottom: 18px; line-height: 1.6; }
    .result-score { font-size: 54px; font-weight: 900; color: #2d5a27; margin: 6px 0; }
    .result-msg   { font-size: 15px; color: #555; margin-bottom: 18px; }
    .btn-start {
      background: #5CB85C; color: #fff;
      border: none; border-radius: 14px;
      font-size: 18px; font-weight: 700;
      padding: 12px 0; width: 100%;
      cursor: pointer; min-height: 44px;
    }
    .btn-start:active { background: #4a9a4a; }
    .best-note { font-size: 12px; color: #aaa; margin-top: 8px; }
  </style>
</head>
<body>
<div class="wrap">
  <h1>나비 꽃밭</h1>
  <div class="hud">
    <div class="hud-item">
      <span class="hud-label">점수</span>
      <span class="hud-val" id="scoreVal">0</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">남은 시간</span>
      <span class="hud-val" id="timeVal">40</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">최고</span>
      <span class="hud-val" id="bestVal">0</span>
    </div>
  </div>
  <div id="gameArea"></div>
  <footer>
    <small>꽃을 탭해서 나비에게 꿀을 줘요!</small>
    <a class="home-link" href="../index.html">홈으로</a>
  </footer>
</div>

<div class="overlay" id="startOverlay">
  <div class="overlay-card">
    <h2>나비 꽃밭</h2>
    <p>꽃을 탭하면 나비가 날아가서<br>꿀을 먹어요!<br>꽃이 시들기 전에 빠르게 탭하세요</p>
    <button class="btn-start" id="startBtn">시작!</button>
    <div class="best-note" id="startBest"></div>
  </div>
</div>

<div class="overlay hidden" id="endOverlay">
  <div class="overlay-card">
    <h2>게임 종료!</h2>
    <div class="result-score" id="finalScore">0</div>
    <div class="result-msg" id="resultMsg"></div>
    <button class="btn-start" id="restartBtn">다시 하기</button>
    <div class="best-note" id="endBest"></div>
  </div>
</div>

<script>
(function () {
  'use strict';

  var CFG = {
    TIME: 40,
    FLOWER_N: 6,
    WILT_MS: 5000,
    BASE_SCORE: 10,
    COMBO_BONUS: 5,
    BEST_KEY: 'butterfly_garden_best',
    FLOWERS: ['🌸','🌼','🌺','🌻','🌷','💐','🌹','🏵️'],
    STEMS:   [20, 24, 28, 32]
  };

  var state = {
    score: 0, timeLeft: CFG.TIME, running: false, combo: 0,
    flowers: [], timerInt: null, wiltInts: {}
  };

  var $score  = document.getElementById('scoreVal');
  var $time   = document.getElementById('timeVal');
  var $best   = document.getElementById('bestVal');
  var $area   = document.getElementById('gameArea');
  var $start  = document.getElementById('startOverlay');
  var $end    = document.getElementById('endOverlay');
  var $final  = document.getElementById('finalScore');
  var $msg    = document.getElementById('resultMsg');
  var $sb     = document.getElementById('startBest');
  var $eb     = document.getElementById('endBest');
  var $bfly   = null;

  function getBest() { return parseInt(localStorage.getItem(CFG.BEST_KEY)||'0',10); }
  function saveBest(s) { if(s>getBest()) localStorage.setItem(CFG.BEST_KEY,String(s)); }

  function mkButterfly() {
    if ($bfly) $bfly.remove();
    $bfly = document.createElement('div');
    $bfly.id = 'butterfly';
    $bfly.textContent = '🦋';
    $bfly.style.left = '46%';
    $bfly.style.top  = '8%';
    $area.appendChild($bfly);
  }

  function moveBfly(x, y) {
    if (!$bfly) return;
    var aw = $area.offsetWidth, ah = $area.offsetHeight;
    $bfly.style.left = Math.max(0, Math.min(aw-44, x-22)) + 'px';
    $bfly.style.top  = Math.max(0, Math.min(ah-44, y-22)) + 'px';
  }

  function spawnFlower(i) {
    var aw = $area.offsetWidth, ah = $area.offsetHeight;
    var el = document.createElement('div');
    el.className = 'flower';
    var emoji = CFG.FLOWERS[Math.floor(Math.random()*CFG.FLOWERS.length)];
    var stem  = CFG.STEMS[Math.floor(Math.random()*CFG.STEMS.length)];
    el.innerHTML =
      '<div class="flower-body">'+emoji+'</div>' +
      '<div class="flower-stem" style="height:'+stem+'px"></div>' +
      '<div class="wilt-bar"><div class="wilt-fill" id="wf'+i+'"></div></div>';

    var col = i % 3, row = Math.floor(i/3);
    var bx = (aw/3)*col + (aw/6) + (Math.random()-0.5)*24;
    var by = ah*0.45 + row*(ah*0.27) + (Math.random()-0.5)*16;
    el.style.left = Math.max(16, Math.min(aw-56, bx-22)) + 'px';
    el.style.top  = Math.max(16, Math.min(ah-80, by))    + 'px';
    $area.appendChild(el);
    state.flowers[i] = { el: el, alive: true, pct: 100 };
    el.addEventListener('pointerdown', function(e){ e.stopPropagation(); onTap(i); });
    startWilt(i);
  }

  function startWilt(i) {
    if (state.wiltInts[i]) clearInterval(state.wiltInts[i]);
    var fl = state.flowers[i];
    if (!fl || !fl.alive) return;
    var step = 100 / (CFG.WILT_MS / 100);
    state.wiltInts[i] = setInterval(function(){
      if (!state.running) return;
      fl.pct -= step;
      var fill = document.getElementById('wf'+i);
      if (fill) {
        fill.style.width = Math.max(0, fl.pct) + '%';
        fill.style.background = fl.pct < 30 ? '#e74c3c' : fl.pct < 60 ? '#f39c12' : '#5CB85C';
      }
      if (fl.pct <= 0) {
        clearInterval(state.wiltInts[i]);
        var body = fl.el.querySelector('.flower-body');
        if (body) body.style.filter = 'grayscale(1) opacity(0.35)';
        fl.alive = false;
        state.combo = 0;
      }
    }, 100);
  }

  function onTap(i) {
    var fl = state.flowers[i];
    if (!fl || !fl.alive || !state.running) return;
    var rect = fl.el.getBoundingClientRect();
    var ar   = $area.getBoundingClientRect();
    moveBfly(rect.left - ar.left + rect.width/2, rect.top - ar.top + rect.height/2 - 30);
    state.combo++;
    var pts = CFG.BASE_SCORE + (state.combo > 1 ? CFG.COMBO_BONUS*(state.combo-1) : 0);
    state.score += pts;
    $score.textContent = state.score;
    mkParticle(rect.left-ar.left+rect.width/2, rect.top-ar.top+rect.height/2, pts);
    clearInterval(state.wiltInts[i]);
    fl.alive = false;
    fl.el.remove();
    setTimeout(function(){ if (state.running) spawnFlower(i); }, 400);
  }

  function mkParticle(x, y, pts) {
    var p = document.createElement('div');
    p.className = 'particle';
    p.textContent = '+' + pts;
    p.style.left   = (x-16)+'px';
    p.style.top    = (y-20)+'px';
    p.style.color  = pts > CFG.BASE_SCORE ? '#e67e22' : '#27ae60';
    p.style.fontSize = pts > CFG.BASE_SCORE ? '20px' : '15px';
    $area.appendChild(p);
    setTimeout(function(){ p.remove(); }, 900);
  }

  function startGame() {
    state.score = 0; state.timeLeft = CFG.TIME; state.running = true; state.combo = 0;
    state.flowers = [];
    Object.values(state.wiltInts).forEach(clearInterval);
    state.wiltInts = {};
    $score.textContent = '0';
    $time.textContent  = CFG.TIME;
    $time.style.color  = '#c0392b';
    $best.textContent  = getBest();
    $area.innerHTML = '';
    mkButterfly();
    for (var i=0; i<CFG.FLOWER_N; i++) (function(idx){ setTimeout(function(){ spawnFlower(idx); }, idx*80); })(i);
    $start.classList.add('hidden');
    $end.classList.add('hidden');
    if (state.timerInt) clearInterval(state.timerInt);
    state.timerInt = setInterval(function(){
      state.timeLeft--;
      $time.textContent = state.timeLeft;
      if (state.timeLeft <= 0) { clearInterval(state.timerInt); endGame(); }
    }, 1000);
  }

  function endGame() {
    state.running = false;
    Object.values(state.wiltInts).forEach(clearInterval);
    state.wiltInts = {};
    saveBest(state.score);
    var best = getBest();
    $final.textContent = state.score;
    $msg.textContent = state.score >= 300 ? '나비 달인! 정말 빨라요!' :
                       state.score >= 200 ? '꽃밭의 수호자! 멋져요!' :
                       state.score >= 100 ? '꽃향기 가득! 잘했어요!' :
                                            '조금 더 연습하면 나비 달인!';
    if (state.score > 0 && state.score >= best) $msg.textContent = '최고 기록! ' + $msg.textContent;
    $eb.textContent = '최고 기록: ' + best + '점';
    $end.classList.remove('hidden');
  }

  document.getElementById('startBtn').addEventListener('pointerdown', startGame);
  document.getElementById('restartBtn').addEventListener('pointerdown', startGame);
  var b = getBest();
  $sb.textContent = b > 0 ? '최고 기록: '+b+'점' : '';
  $best.textContent = b;
})();
</script>
</body>
</html>
