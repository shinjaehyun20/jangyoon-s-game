<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#87ceeb"/>
      <stop offset="100%" stop-color="#c8e6f5"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e3f2fd"/>
      <stop offset="100%" stop-color="#bbdefb"/>
    </linearGradient>
  </defs>
  <rect width="320" height="180" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="319" height="179" fill="none" stroke="rgba(255,255,255,0.08)"/>

  <!-- 눈 땅 -->
  <ellipse cx="160" cy="190" rx="180" ry="50" fill="url(#ground)"/>

  <!-- 눈사람 몸통 -->
  <circle cx="130" cy="130" r="34" fill="white" stroke="#c5e3f7" stroke-width="2" opacity="0.95"/>
  <!-- 눈사람 머리 -->
  <circle cx="130" cy="84" r="24" fill="white" stroke="#c5e3f7" stroke-width="2" opacity="0.95"/>

  <!-- 눈 -->
  <circle cx="122" cy="79" r="3.5" fill="#333"/>
  <circle cx="138" cy="79" r="3.5" fill="#333"/>
  <!-- 당근 코 -->
  <text x="125" y="89" font-size="10" text-anchor="middle">🥕</text>
  <!-- 입 -->
  <text x="130" y="98" font-size="10" text-anchor="middle">😊</text>

  <!-- 모자 -->
  <rect x="112" y="52" width="36" height="6" rx="3" fill="#37474f"/>
  <rect x="118" y="34" width="24" height="20" rx="3" fill="#455a64"/>

  <!-- 목도리 -->
  <path d="M108 108 Q130 116 152 108" fill="none" stroke="#ef5350" stroke-width="6" stroke-linecap="round"/>

  <!-- 단추 -->
  <circle cx="130" cy="120" r="3" fill="#78909c"/>
  <circle cx="130" cy="132" r="3" fill="#78909c"/>
  <circle cx="130" cy="144" r="3" fill="#78909c"/>

  <!-- 별 파티클 -->
  <text x="30" y="40" font-size="16" opacity="0.7">⭐</text>
  <text x="220" y="30" font-size="12" opacity="0.5">❄️</text>
  <text x="260" y="60" font-size="10" opacity="0.6">❄️</text>
  <text x="50" y="70" font-size="10" opacity="0.5">❄️</text>
  <text x="200" y="80" font-size="14" opacity="0.6">✨</text>

  <!-- 타이틀 -->
  <g font-family="'Pretendard','Noto Sans KR',sans-serif">
    <text x="296" y="148" text-anchor="end" font-size="22" font-weight="900" fill="#0288d1">눈사람 만들기</text>
    <text x="296" y="166" text-anchor="end" font-size="10" font-weight="500" fill="rgba(255,255,255,0.6)" letter-spacing="2">BUILD SNOWMAN</text>
  </g>
</svg>
