<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1428"/>
      <stop offset="100%" stop-color="#1a3a6a"/>
    </linearGradient>
  </defs>
  <rect width="320" height="180" fill="url(#sky)"/>
  <rect x="0.5" y="0.5" width="319" height="179" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- 별 -->
  <circle cx="30" cy="20" r="1.5" fill="rgba(255,255,255,0.8)"/>
  <circle cx="80" cy="12" r="1" fill="rgba(255,255,255,0.6)"/>
  <circle cx="130" cy="25" r="1.5" fill="rgba(255,255,255,0.7)"/>
  <circle cx="60" cy="40" r="1" fill="rgba(255,255,255,0.5)"/>
  <circle cx="20" cy="55" r="1" fill="rgba(255,255,255,0.6)"/>

  <!-- 구름들 -->
  <!-- 구름3 (위) -->
  <rect x="55" y="42" width="80" height="18" rx="9" fill="rgba(255,255,255,0.85)"/>
  <circle cx="75" cy="38" r="12" fill="rgba(255,255,255,0.85)"/>
  <circle cx="108" cy="40" r="10" fill="rgba(255,255,255,0.85)"/>
  <!-- 구름2 (중간) -->
  <rect x="15" y="82" width="75" height="16" rx="8" fill="rgba(255,255,255,0.8)"/>
  <circle cx="35" cy="78" r="10" fill="rgba(255,255,255,0.8)"/>
  <circle cx="65" cy="79" r="9" fill="rgba(255,255,255,0.8)"/>
  <!-- 구름1 (아래) -->
  <rect x="100" y="120" width="85" height="17" rx="8" fill="rgba(255,255,255,0.75)"/>
  <circle cx="120" cy="115" r="10" fill="rgba(255,255,255,0.75)"/>
  <circle cx="155" cy="116" r="9" fill="rgba(255,255,255,0.75)"/>

  <!-- 캐릭터 (구름3 위) -->
  <text x="95" y="42" font-size="26" text-anchor="middle">🐣</text>

  <!-- 점프 화살표 효과 -->
  <line x1="95" y1="16" x2="95" y2="36" stroke="#88ccff" stroke-width="2" stroke-dasharray="3,2" opacity="0.7"/>
  <polygon points="95,10 90,20 100,20" fill="#88ccff" opacity="0.7"/>

  <!-- 타이틀 우하단 -->
  <g font-family="'Pretendard','Noto Sans KR',sans-serif">
    <text x="296" y="148" text-anchor="end" font-size="22" font-weight="900" fill="#88ccff">구름 점프</text>
    <text x="296" y="166" text-anchor="end" font-size="10" font-weight="500" fill="rgba(255,255,255,0.5)" letter-spacing="2">CLOUD JUMP</text>
  </g>
</svg>
