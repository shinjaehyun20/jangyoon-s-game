<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>🌈 색깔 거품 잡기</title>
  <style>
    :root {
      --bg: #1a0533;
      --accent: #ff6fd8;
      --text: #ffffff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100vh; height: 100dvh;
      overflow: hidden;
      touch-action: manipulation;
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .wrap {
      width: 100%; max-width: 480px;
      height: 100vh; height: 100dvh;
      display: flex; flex-direction: column;
      padding: 10px 12px 8px; gap: 6px;
      margin: 0 auto;
      position: relative;
    }
    h1 {
      font-size: clamp(18px, 5vw, 26px);
      text-align: center;
      text-shadow: 0 0 12px rgba(255,111,216,0.8);
    }
    .hud {
      display: flex; flex-direction: row;
      justify-content: space-between; align-items: center;
      background: rgba(255,255,255,0.08);
      border-radius: 14px; padding: 6px 14px;
      font-size: clamp(13px, 3.5vw, 16px);
    }
    .hud span { font-weight: 700; }
    .target-box {
      display: flex; flex-direction: column;
      align-items: center; gap: 4px;
    }
    .target-label {
      font-size: clamp(11px, 2.8vw, 13px);
      opacity: 0.75;
    }
    .target-circle {
      width: clamp(42px, 11vw, 56px);
      height: clamp(42px, 11vw, 56px);
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.6);
      box-shadow: 0 0 14px 4px rgba(255,255,255,0.25);
      transition: background 0.25s;
    }
    #gameArea {
      flex: 1;
      position: relative;
      overflow: hidden;
      border-radius: 18px;
      background: rgba(255,255,255,0.04);
    }
    .bubble {
      position: absolute;
      border-radius: 50%;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      transition: transform 0.1s;
      border: 2px solid rgba(255,255,255,0.3);
      box-shadow: inset 0 -6px 12px rgba(0,0,0,0.15),
                  inset 0 6px 12px rgba(255,255,255,0.25),
                  0 0 8px 2px rgba(255,255,255,0.1);
      user-select: none;
      -webkit-user-select: none;
    }
    .bubble:active { transform: scale(0.88); }
    .burst {
      position: absolute;
      pointer-events: none;
      font-size: 28px;
      animation: burst-anim 0.5s ease-out forwards;
      z-index: 10;
    }
    @keyframes burst-anim {
      0%   { transform: scale(0.5); opacity: 1; }
      100% { transform: scale(2.2); opacity: 0; }
    }
    .wrong-flash {
      position: absolute; inset: 0; border-radius: 18px;
      background: rgba(255, 80, 80, 0.35);
      pointer-events: none;
      animation: wrong-anim 0.4s ease-out forwards;
      z-index: 5;
    }
    @keyframes wrong-anim {
      0%   { opacity: 1; }
      100% { opacity: 0; }
    }
    footer {
      display: flex; flex-direction: row;
      justify-content: space-between; align-items: center;
      font-size: clamp(11px, 2.8vw, 13px); opacity: 0.7;
      padding: 0 4px;
    }
    .home-link {
      color: #fff; text-decoration: none;
      background: rgba(255,255,255,0.12);
      padding: 4px 10px; border-radius: 8px;
    }
    /* 오버레이 */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(20, 0, 40, 0.88);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
    }
    .overlay.hidden { display: none; }
    .overlay-card {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 24px;
      padding: 28px 24px 24px;
      text-align: center;
      width: min(320px, 88vw);
      display: flex; flex-direction: column; gap: 12px;
    }
    .overlay-card h2 { font-size: clamp(20px, 6vw, 28px); }
    .overlay-card p { font-size: clamp(13px, 3.5vw, 15px); opacity: 0.85; line-height: 1.6; }
    .result-score {
      font-size: clamp(40px, 12vw, 56px);
      font-weight: 900;
      color: var(--accent);
    }
    .btn-start {
      min-height: 52px;
      font-size: clamp(15px, 4.5vw, 18px);
      font-weight: 700;
      background: linear-gradient(135deg, #ff6fd8, #8b5cf6);
      color: #fff; border: none; border-radius: 16px;
      cursor: pointer; padding: 0 24px;
      box-shadow: 0 4px 18px rgba(139,92,246,0.45);
    }
    .difficulty-row {
      display: flex; gap: 8px; justify-content: center;
    }
    .diff-btn {
      flex: 1; min-height: 44px;
      border: 2px solid rgba(255,255,255,0.3);
      background: rgba(255,255,255,0.08);
      color: #fff; border-radius: 12px;
      font-size: clamp(13px, 3.5vw, 15px);
      cursor: pointer;
    }
    .diff-btn.selected {
      border-color: var(--accent);
      background: rgba(255,111,216,0.25);
    }
    .lives-display { font-size: 20px; letter-spacing: 2px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>🌈 색깔 거품 잡기</h1>

    <div class="hud">
      <div>
        <div style="font-size:11px;opacity:0.7">점수</div>
        <span id="scoreDisp">0</span>
      </div>
      <div class="target-box">
        <div class="target-label">이 색을 잡아요!</div>
        <div class="target-circle" id="targetCircle"></div>
      </div>
      <div>
        <div style="font-size:11px;opacity:0.7">목숨</div>
        <div class="lives-display" id="livesDisp">❤️❤️❤️</div>
      </div>
    </div>

    <div id="gameArea"></div>

    <footer>
      <small>목표 색 거품만 터치!</small>
      <a class="home-link" href="../index.html">← 홈으로</a>
    </footer>
  </div>

  <!-- 시작 오버레이 -->
  <div class="overlay" id="startOverlay">
    <div class="overlay-card">
      <h2>🌈 색깔 거품 잡기</h2>
      <p>화면 위에 표시된 색과<br>같은 색 거품만 터치해요!<br>다른 색을 터치하면 목숨이 줄어요 💔</p>
      <div class="difficulty-row">
        <button class="diff-btn selected" data-level="easy">쉬움<br><small>2가지 색</small></button>
        <button class="diff-btn" data-level="normal">보통<br><small>3가지 색</small></button>
        <button class="diff-btn" data-level="hard">어려움<br><small>4가지 색</small></button>
      </div>
      <button class="btn-start" id="startBtn">시작!</button>
    </div>
  </div>

  <!-- 결과 오버레이 -->
  <div class="overlay hidden" id="endOverlay">
    <div class="overlay-card">
      <h2>🎉 게임 종료!</h2>
      <div class="result-score" id="finalScore">0</div>
      <p id="resultMsg"></p>
      <button class="btn-start" id="restartBtn">다시 하기</button>
    </div>
  </div>

  <script>
  (function () {
    'use strict';

    /* ─── 색 팔레트 ─── */
    const PALETTE = [
      { name: '빨강', hex: '#FF4B4B' },
      { name: '파랑', hex: '#4B7FFF' },
      { name: '초록', hex: '#3BCB6E' },
      { name: '노랑', hex: '#FFD234' },
      { name: '보라', hex: '#B44BFF' },
      { name: '주황', hex: '#FF8C42' },
    ];

    const CONFIG = {
      easy:   { colors: 2, spawnMs: 1400, speedMin: 1.2, speedMax: 2.2, maxBubbles: 6  },
      normal: { colors: 3, spawnMs: 1100, speedMin: 1.5, speedMax: 2.8, maxBubbles: 8  },
      hard:   { colors: 4, spawnMs:  900, speedMin: 1.8, speedMax: 3.5, maxBubbles: 10 },
    };

    let state = {
      running: false,
      score: 0,
      lives: 3,
      targetIdx: 0,
      colors: [],
      bubbles: [],
      spawnTimer: null,
      rafId: null,
      level: 'easy',
      lastTime: 0,
    };

    /* ─── 요소 ─── */
    const gameArea    = document.getElementById('gameArea');
    const scoreDisp   = document.getElementById('scoreDisp');
    const livesDisp   = document.getElementById('livesDisp');
    const targetCircle= document.getElementById('targetCircle');
    const startOverlay= document.getElementById('startOverlay');
    const endOverlay  = document.getElementById('endOverlay');
    const finalScore  = document.getElementById('finalScore');
    const resultMsg   = document.getElementById('resultMsg');

    /* ─── 난이도 버튼 ─── */
    document.querySelectorAll('.diff-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        state.level = btn.dataset.level;
      });
    });

    /* ─── 시작 ─── */
    document.getElementById('startBtn').addEventListener('click', startGame);
    document.getElementById('restartBtn').addEventListener('click', () => {
      endOverlay.classList.add('hidden');
      startGame();
    });

    function startGame() {
      const cfg = CONFIG[state.level];
      state.score = 0;
      state.lives = 3;
      state.running = true;
      state.bubbles = [];
      state.colors = PALETTE.slice(0, cfg.colors);
      state.lastTime = performance.now();
      gameArea.innerHTML = '';
      updateHUD();
      chooseTarget();
      startOverlay.classList.add('hidden');
      endOverlay.classList.add('hidden');
      clearInterval(state.spawnTimer);
      state.spawnTimer = setInterval(spawnBubble, cfg.spawnMs);
      spawnBubble();
      loop(performance.now());
    }

    function chooseTarget() {
      state.targetIdx = Math.floor(Math.random() * state.colors.length);
      targetCircle.style.background = state.colors[state.targetIdx].hex;
    }

    /* ─── 거품 생성 ─── */
    function spawnBubble() {
      if (!state.running) return;
      const cfg = CONFIG[state.level];
      if (state.bubbles.length >= cfg.maxBubbles) return;

      const areaW = gameArea.clientWidth;
      const areaH = gameArea.clientHeight;
      const size  = Math.floor(Math.random() * 28) + 44; // 44~72px
      const colorObj = state.colors[Math.floor(Math.random() * state.colors.length)];
      const speed = cfg.speedMin + Math.random() * (cfg.speedMax - cfg.speedMin);

      // 살짝 흔들리며 위로
      const xStart = Math.random() * (areaW - size);
      const driftX = (Math.random() - 0.5) * 60;

      const el = document.createElement('div');
      el.className = 'bubble';
      el.style.cssText = `
        width:${size}px; height:${size}px;
        background:${colorObj.hex};
        left:${xStart}px;
        top:${areaH}px;
      `;

      // 반짝 이모지 (가끔)
      if (Math.random() < 0.3) el.textContent = '✨';

      el.addEventListener('pointerdown', e => {
        e.preventDefault();
        if (!state.running) return;
        handleTap(el, colorObj, xStart + size / 2, parseFloat(el.style.top) + size / 2);
      });

      gameArea.appendChild(el);
      state.bubbles.push({ el, colorObj, x: xStart, y: areaH, speed, driftX, size, born: performance.now() });
    }

    /* ─── 탭 처리 ─── */
    function handleTap(el, colorObj, cx, cy) {
      removeBubble(el);
      const isTarget = (state.colors[state.targetIdx].hex === colorObj.hex);
      if (isTarget) {
        state.score += 10;
        showBurst('🎊', cx, cy);
      } else {
        state.lives -= 1;
        showWrongFlash();
        showBurst('💨', cx, cy);
      }
      updateHUD();
      chooseTarget();
      if (state.lives <= 0) endGame();
    }

    function removeBubble(el) {
      el.remove();
      state.bubbles = state.bubbles.filter(b => b.el !== el);
    }

    function showBurst(emoji, x, y) {
      const d = document.createElement('div');
      d.className = 'burst';
      d.textContent = emoji;
      d.style.left = (x - 14) + 'px';
      d.style.top  = (y - 14) + 'px';
      gameArea.appendChild(d);
      setTimeout(() => d.remove(), 520);
    }

    function showWrongFlash() {
      const f = document.createElement('div');
      f.className = 'wrong-flash';
      gameArea.appendChild(f);
      setTimeout(() => f.remove(), 420);
    }

    /* ─── 애니메이션 루프 ─── */
    function loop(ts) {
      if (!state.running) return;
      const dt = Math.min(ts - state.lastTime, 40);
      state.lastTime = ts;
      const areaH = gameArea.clientHeight;

      for (let i = state.bubbles.length - 1; i >= 0; i--) {
        const b = state.bubbles[i];
        const elapsed = (ts - b.born) / 1000;
        b.y -= b.speed * (dt / 16.67);
        const curX = b.x + Math.sin(elapsed * 1.8) * b.driftX * 0.15;
        b.el.style.top  = b.y + 'px';
        b.el.style.left = curX + 'px';

        // 화면 위로 나간 거품 — 목표 색이면 목숨 차감
        if (b.y + b.size < 0) {
          if (state.colors[state.targetIdx].hex === b.colorObj.hex) {
            state.lives -= 1;
            updateHUD();
            if (state.lives <= 0) { endGame(); return; }
          }
          removeBubble(b.el);
        }
      }
      state.rafId = requestAnimationFrame(loop);
    }

    /* ─── HUD ─── */
    function updateHUD() {
      scoreDisp.textContent = state.score;
      const hearts = ['', '❤️', '❤️❤️', '❤️❤️❤️'];
      livesDisp.textContent = hearts[Math.max(0, state.lives)] || '💀';
    }

    /* ─── 종료 ─── */
    function endGame() {
      state.running = false;
      cancelAnimationFrame(state.rafId);
      clearInterval(state.spawnTimer);
      state.bubbles.forEach(b => b.el.remove());
      state.bubbles = [];

      const best = localStorage.getItem('color-bubble-catch_best') || 0;
      const isNew = state.score > parseInt(best);
      if (isNew) localStorage.setItem('color-bubble-catch_best', state.score);

      finalScore.textContent = state.score + '점';
      resultMsg.textContent = isNew
        ? `🏆 최고기록 달성! (이전: ${best}점)`
        : `최고기록: ${best}점`;
      endOverlay.classList.remove('hidden');
    }
  })();
  </script>
</body>
</html>
