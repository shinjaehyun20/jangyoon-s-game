  <circle cx="300" cy="20" r="1.5" fill="rgba(255,255,255,0.5)"/>
  <circle cx="270" cy="35" r="1"   fill="rgba(255,255,255,0.35)"/>
  <circle cx="10"  cy="60" r="1"   fill="rgba(255,255,255,0.3)"/>

  <!-- 목표 색 표시판 -->
  <rect x="10" y="10" width="82" height="34" rx="10" fill="rgba(255,255,255,0.09)" stroke="rgba(255,255,255,0.22)" stroke-width="1"/>
  <text x="18" y="24" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.65)">이 색을 잡아요!</text>
  <circle cx="72" cy="26" r="10" fill="url(#b1)" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
  <circle cx="72" cy="22" r="4"  fill="rgba(255,255,255,0.3)"/>

  <!-- 거품들 -->
  <circle cx="50"  cy="130" r="30" fill="url(#b1)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <circle cx="50"  cy="118" r="10" fill="rgba(255,255,255,0.22)"/>

  <circle cx="118" cy="100" r="24" fill="url(#b2)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <circle cx="118" cy="90"  r="8"  fill="rgba(255,255,255,0.22)"/>

  <circle cx="75"  cy="62"  r="18" fill="url(#b3)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <circle cx="75"  cy="55"  r="6"  fill="rgba(255,255,255,0.22)"/>

  <circle cx="165" cy="140" r="22" fill="url(#b4)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
