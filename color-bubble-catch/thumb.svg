  <circle cx="155" cy="55"  r="16" fill="url(#b6)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <circle cx="155" cy="48"  r="5"  fill="rgba(255,255,255,0.22)"/>

  <!-- 터치 이펙트 -->
  <text x="30" y="152" font-size="18">🎊</text>
  <text x="185" y="60"  font-size="14">✨</text>

  <!-- 타이틀 -->
  <g font-family="'Pretendard','Noto Sans KR',sans-serif">
    <text x="296" y="148" text-anchor="end" font-size="20" font-weight="900" fill="#ff6fd8">색깔 거품 잡기</text>
    <text x="296" y="166" text-anchor="end" font-size="10" font-weight="500" fill="rgba(255,255,255,0.5)" letter-spacing="2">COLOR BUBBLE CATCH</text>
