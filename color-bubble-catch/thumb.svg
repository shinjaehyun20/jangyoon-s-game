<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
  <defs>
    <radialGradient id="bg" cx="40%" cy="40%">
      <stop offset="0%" stop-color="#2d0b5c"/>
      <stop offset="100%" stop-color="#0d0022"/>
    </radialGradient>
    <radialGradient id="b1" cx="35%" cy="35%">
      <stop offset="0%" stop-color="#ff8c8c"/>
      <stop offset="100%" stop-color="#FF4B4B"/>
    </radialGradient>
    <radialGradient id="b2" cx="35%" cy="35%">
      <stop offset="0%" stop-color="#8caaff"/>
      <stop offset="100%" stop-color="#4B7FFF"/>
    </radialGradient>
    <radialGradient id="b3" cx="35%" cy="35%">
      <stop offset="0%" stop-color="#7bffa8"/>
      <stop offset="100%" stop-color="#3BCB6E"/>
    </radialGradient>
    <radialGradient id="b4" cx="35%" cy="35%">
      <stop offset="0%" stop-color="#ffe97a"/>
