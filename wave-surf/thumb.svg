<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#0d3b5e"/>
    </linearGradient>
    <linearGradient id="wave1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1565c0;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#1976d2;stop-opacity:0.9"/>
    </linearGradient>
    <linearGradient id="wave2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#42a5f5;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#64b5f6;stop-opacity:0.6"/>
    </linearGradient>
    <linearGradient id="wave3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#90caf9;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#bbdefb;stop-opacity:0.3"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="320" height="180" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="319" height="179" fill="none" stroke="rgba(255,255,255,0.08)"/>

  <!-- 원거리 물거품 점 -->
  <circle cx="40" cy="45" r="2" fill="rgba(255,255,255,0.15)"/>
  <circle cx="90" cy="30" r="2" fill="rgba(255,255,255,0.12)"/>
  <circle cx="160" cy="50" r="1.5" fill="rgba(255,255,255,0.10)"/>
  <circle cx="240" cy="35" r="2" fill="rgba(255,255,255,0.12)"/>
  <circle cx="290" cy="55" r="1.5" fill="rgba(255,255,255,0.08)"/>

  <!-- 파도 3레이어 -->
  <path d="M0 130 Q40 115 80 130 Q120 145 160 130 Q200 115 240 130 Q280 145 320 130 L320 180 L0 180 Z" fill="url(#wave1)"/>
  <path d="M0 142 Q50 128 100 142 Q150 156 200 142 Q250 128 320 142 L320 180 L0 180 Z" fill="url(#wave2)"/>
  <path d="M0 155 Q60 143 120 155 Q180 167 240 155 Q280 147 320 155 L320 180 L0 180 Z" fill="url(#wave3)"/>

  <!-- 별 아이템 -->
  <polygon points="70,70 73,79 83,79 75,85 78,94 70,88 62,94 65,85 57,79 67,79" fill="#f7b731" opacity="0.9"/>

  <!-- 바위 장애물 -->
  <text x="200" y="110" font-size="28" text-anchor="middle" dominant-baseline="middle">🪨</text>
  <text x="260" y="95" font-size="22" text-anchor="middle" dominant-baseline="middle">🪼</text>

  <!-- 서퍼 (중앙) -->
  <!-- 서핑보드 -->
  <ellipse cx="130" cy="123" rx="32" ry="9" fill="#f97f51" opacity="0.95"/>
  <ellipse cx="130" cy="123" rx="20" ry="5" fill="#fff" opacity="0.7"/>
  <!-- 서퍼 이모지 -->
  <text x="130" y="108" font-size="32" text-anchor="middle" dominant-baseline="middle">🏄</text>

  <!-- 물보라 파티클 -->
  <circle cx="100" cy="118" r="3" fill="rgba(255,255,255,0.5)"/>
  <circle cx="108" cy="112" r="2" fill="rgba(255,255,255,0.4)"/>
  <circle cx="160" cy="115" r="3" fill="rgba(255,255,255,0.5)"/>
  <circle cx="152" cy="120" r="2" fill="rgba(255,255,255,0.35)"/>

  <!-- 타이틀 -->
  <g font-family="'Pretendard','Noto Sans KR',sans-serif">
    <text x="296" y="148" text-anchor="end" font-size="22" font-weight="900" fill="#00c6ff">파도 서핑</text>
    <text x="296" y="166" text-anchor="end" font-size="10" font-weight="500" fill="rgba(255,255,255,0.5)" letter-spacing="2">WAVE SURF</text>
  </g>
</svg>
