<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>🌊 파도 서핑</title>
  <style>
    :root {
      --bg: #0a1628;
      --accent: #00c6ff;
      --text: #ffffff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100vh; height: 100dvh;
      overflow: hidden;
      touch-action: manipulation;
      background: var(--bg);
      font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
      color: var(--text);
    }
    .wrap {
      width: 100%; max-width: 480px;
      height: 100vh; height: 100dvh;
      display: flex; flex-direction: column;
      padding: 8px 10px 6px;
      gap: 6px;
      margin: 0 auto;
    }
    h1 {
      font-size: clamp(18px, 5vw, 26px);
      text-align: center;
      text-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }
    .hud {
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(255,255,255,0.08); border-radius: 12px;
      padding: 6px 14px;
      font-size: clamp(13px, 3.5vw, 16px);
    }
    .hud-score { font-weight: 700; color: var(--accent); }
    .lives { display: flex; gap: 4px; }

    #gameArea {
      flex: 1;
      position: relative;
      overflow: hidden;
      border-radius: 16px;
    }
    #gameCanvas {
      width: 100%; height: 100%;
      display: block;
      touch-action: none;
    }

    footer {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 12px; color: rgba(255,255,255,0.5);
      padding: 0 4px;
    }
    .home-link {
      color: rgba(255,255,255,0.6);
      text-decoration: none; font-size: 13px;
    }
    .home-link:hover { color: #fff; }

    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.75);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
    }
    .overlay.hidden { display: none; }
    .overlay-card {
      background: linear-gradient(135deg, #0a1628 0%, #0d3b5e 100%);
      border-radius: 24px;
      padding: 28px 24px;
      text-align: center;
      max-width: 320px; width: 90%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    }
    .overlay-card h2 { font-size: clamp(22px, 6vw, 30px); margin-bottom: 10px; }
    .overlay-card p { font-size: clamp(13px, 3.5vw, 16px); color: rgba(255,255,255,0.8); margin-bottom: 18px; line-height: 1.6; }
    .result-score {
      font-size: clamp(36px, 10vw, 56px);
      font-weight: 900;
      color: var(--accent);
      margin-bottom: 6px;
    }
    .best-label { font-size: 13px; color: rgba(255,255,255,0.5); margin-bottom: 14px; }
    .btn-start {
      background: linear-gradient(135deg, #00c6ff 0%, #0072ff 100%);
      color: #fff;
      border: none; border-radius: 50px;
      padding: 12px 32px;
      font-size: clamp(16px, 4vw, 20px); font-weight: 700;
      cursor: pointer; min-height: 48px;
      box-shadow: 0 4px 16px rgba(0,198,255,0.4);
      transition: transform 0.1s;
    }
    .btn-start:active { transform: scale(0.96); }
  </style>
</head>
<body>
<div class="wrap">
  <h1>🌊 파도 서핑</h1>

  <div class="hud">
    <span>🏄 거리: <span class="hud-score" id="distEl">0m</span></span>
    <span class="lives" id="livesEl">❤️❤️❤️</span>
  </div>

  <div id="gameArea">
    <canvas id="gameCanvas"></canvas>
  </div>

  <footer>
    <small>손가락으로 서퍼를 조종해요!</small>
    <a class="home-link" href="../index.html">← 홈으로</a>
  </footer>
</div>

<!-- 시작 오버레이 -->
<div class="overlay" id="startOverlay">
  <div class="overlay-card">
    <h2>🌊 파도 서핑</h2>
    <p>서퍼를 드래그해서<br>바위🪨와 해파리🪼를 피해요!<br>별⭐을 먹으면 보너스 점수!</p>
    <button class="btn-start" id="startBtn">출발!</button>
  </div>
</div>

<!-- 결과 오버레이 -->
<div class="overlay hidden" id="endOverlay">
  <div class="overlay-card">
    <h2>🏄 서핑 종료!</h2>
    <div class="result-score" id="finalDist">0m</div>
    <div class="best-label" id="bestLabel">최고기록: 0m</div>
    <p id="resultMsg">잘 탔어요!</p>
    <button class="btn-start" id="restartBtn">다시 서핑!</button>
  </div>
</div>

<script>
(function () {
  'use strict';

  const STORAGE_KEY = 'wave-surf_best';
  const canvas = document.getElementById('gameCanvas');
  const ctx    = canvas.getContext('2d');
  const area   = document.getElementById('gameArea');

  /* ── 상수 ── */
  const CFG = {
    surferR: 22,        // 서퍼 반지름
    surferY: 0.65,      // 화면 세로 비율 (서퍼 Y 기준선)
    laneW: 0,           // 레인 폭 (동적 계산)
    baseSpeed: 3,       // 초기 스크롤 속도(px/frame)
    speedUp: 0.0015,    // 거리당 속도 증가
    obstacleInterval: 80, // 장애물 생성 간격(frame)
    starInterval: 150,   // 별 생성 간격
    waveCount: 5,        // 파도 레이어 수
  };

  /* ── 상태 ── */
  let state = {
    running: false,
    dist: 0,
    lives: 3,
    frame: 0,
    speed: CFG.baseSpeed,
    surferX: 0,
    surferY: 0,
    surferDrag: false,
    surferDX: 0,
    obstacles: [],    // { x, y, type, r }
    stars: [],        // { x, y, r, collected }
    waves: [],        // { y, amp, freq, phase, speed, color, alpha }
    particles: [],    // 이펙트 파티클
  };

  /* ── 캔버스 크기 ── */
  function resize() {
    canvas.width  = area.clientWidth;
    canvas.height = area.clientHeight;
    state.surferX = canvas.width / 2;
    state.surferY = canvas.height * CFG.surferY;
    initWaves();
  }
  window.addEventListener('resize', () => { if (state.running) resize(); });

  /* ── 파도 초기화 ── */
  function initWaves() {
    state.waves = [];
    const colors = [
      { c:'#0a4f8f', a:0.9 },
      { c:'#1565c0', a:0.7 },
      { c:'#1976d2', a:0.6 },
      { c:'#42a5f5', a:0.4 },
      { c:'#90caf9', a:0.25 },
    ];
    for (let i = 0; i < CFG.waveCount; i++) {
      state.waves.push({
        y:     canvas.height * (0.55 + i * 0.045),
        amp:   12 + i * 4,
        freq:  0.018 - i * 0.002,
        phase: Math.random() * Math.PI * 2,
        speed: 0.04 + i * 0.015,
        color: colors[i].c,
        alpha: colors[i].a,
      });
    }
  }

  /* ── 장애물 생성 ── */
  function spawnObstacle() {
    const W = canvas.width;
    const type = Math.random() < 0.6 ? 'rock' : 'jellyfish';
    state.obstacles.push({
      x: 30 + Math.random() * (W - 60),
      y: -30,
      type,
      r: type === 'rock' ? 18 : 16,
      vy: state.speed * (0.8 + Math.random() * 0.4),
    });
  }

  /* ── 별 생성 ── */
  function spawnStar() {
    const W = canvas.width;
    state.stars.push({
      x: 20 + Math.random() * (W - 40),
      y: -20,
      r: 12,
      vy: state.speed * 0.6,
      rot: 0,
      collected: false,
    });
  }

  /* ── 파티클 ── */
  function addParticles(x, y, color, n) {
    for (let i = 0; i < n; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 1.5 + Math.random() * 3;
      state.particles.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        r:  3 + Math.random() * 3,
        life: 1.0,
        color,
      });
    }
  }

  /* ── 별 그리기 ── */
  function drawStar(ctx, x, y, r, rot, color) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(rot);
    ctx.beginPath();
    for (let i = 0; i < 5; i++) {
      const angle = (i * 4 * Math.PI) / 5 - Math.PI / 2;
      const px = Math.cos(angle) * r;
      const py = Math.sin(angle) * r;
      i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.fillStyle = color;
    ctx.fill();
    ctx.restore();
  }

  /* ── 거리→배경 그라디언트 ── */
  function bgGradient() {
    const t = Math.min(state.dist / 1000, 1); // 1000m까지 점점 어두워짐
    const g = ctx.createLinearGradient(0, 0, 0, canvas.height);
    const top = `hsl(${210 - t * 30}, ${80 - t * 20}%, ${20 - t * 8}%)`;
    const bot = `hsl(${200 - t * 20}, ${70 - t * 10}%, ${12 - t * 6}%)`;
    g.addColorStop(0, top);
    g.addColorStop(1, bot);
    return g;
  }

  /* ── 메인 루프 ── */
  function loop() {
    if (!state.running) return;
    state.frame++;
    state.dist += state.speed * 0.3;
    state.speed = CFG.baseSpeed + state.dist * CFG.speedUp;

    const W = canvas.width, H = canvas.height;

    /* 배경 */
    ctx.fillStyle = bgGradient();
    ctx.fillRect(0, 0, W, H);

    /* 거품 점 (원거리 물) */
    ctx.fillStyle = 'rgba(255,255,255,0.04)';
    for (let i = 0; i < 8; i++) {
      const bx = ((state.frame * 1.2 + i * 137) % W);
      const by = (20 + i * 23) % (H * 0.5);
      ctx.beginPath();
      ctx.arc(bx, by, 2, 0, Math.PI * 2);
      ctx.fill();
    }

    /* 파도 */
    state.waves.forEach(w => {
      w.phase += w.speed;
      ctx.beginPath();
      ctx.moveTo(0, H);
      for (let x = 0; x <= W; x += 4) {
        const y = w.y + Math.sin(x * w.freq + w.phase) * w.amp;
        ctx.lineTo(x, y);
      }
      ctx.lineTo(W, H); ctx.lineTo(0, H); ctx.closePath();
      ctx.fillStyle = w.color;
      ctx.globalAlpha = w.alpha;
      ctx.fill();
      ctx.globalAlpha = 1;
    });

    /* 장애물 생성 */
    if (state.frame % CFG.obstacleInterval === 0) spawnObstacle();
    if (state.frame % CFG.starInterval   === 0) spawnStar();

    /* 장애물 업데이트·그리기 */
    state.obstacles = state.obstacles.filter(o => {
      o.y += o.vy;
      if (o.y > H + 40) return false;

      // 충돌 검사
      const dx = o.x - state.surferX;
      const dy = o.y - state.surferY;
      if (Math.sqrt(dx*dx + dy*dy) < o.r + CFG.surferR - 8) {
        addParticles(o.x, o.y, '#ff6b6b', 8);
        state.lives--;
        updateLives();
        if (state.lives <= 0) { endGame(); return false; }
        return false; // 충돌한 장애물 제거
      }

      // 그리기
      if (o.type === 'rock') {
        ctx.font = `${o.r * 2}px serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('🪨', o.x, o.y);
      } else {
        ctx.font = `${o.r * 2}px serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        // 해파리 위아래 진동
        const wobble = Math.sin(state.frame * 0.1 + o.x) * 4;
        ctx.fillText('🪼', o.x, o.y + wobble);
      }
      return true;
    });

    /* 별 업데이트·그리기 */
    state.stars = state.stars.filter(s => {
      if (s.collected) return false;
      s.y  += s.vy;
      s.rot += 0.05;
      if (s.y > H + 30) return false;

      const dx = s.x - state.surferX;
      const dy = s.y - state.surferY;
      if (Math.sqrt(dx*dx + dy*dy) < s.r + CFG.surferR - 4) {
        addParticles(s.x, s.y, '#f7b731', 10);
        state.dist += 50; // 보너스
        s.collected = true;
        return false;
      }
      drawStar(ctx, s.x, s.y, s.r, s.rot, '#f7b731');
      return true;
    });

    /* 서퍼 그리기 */
    // 보드 (서핑보드)
    ctx.save();
    ctx.translate(state.surferX, state.surferY + 18);
    const tilt = state.surferDX * 0.4;
    ctx.rotate(tilt);
    ctx.fillStyle = '#f97f51';
    ctx.beginPath();
    ctx.ellipse(0, 0, 28, 8, 0, 0, Math.PI * 2);
    ctx.fill();
    // 보드 줄무늬
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.ellipse(0, 0, 18, 4, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    // 서퍼 캐릭터
    ctx.font = `${CFG.surferR * 2}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('🏄', state.surferX, state.surferY);

    /* 파티클 */
    state.particles = state.particles.filter(p => {
      p.x += p.vx; p.y += p.vy;
      p.vy += 0.1;
      p.life -= 0.04;
      if (p.life <= 0) return false;
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
      return true;
    });

    /* HUD 거리 업데이트 */
    document.getElementById('distEl').textContent = Math.floor(state.dist) + 'm';

    requestAnimationFrame(loop);
  }

  /* ── 서퍼 이동 ── */
  let pointerStartX = 0;
  let pointerStartSurferX = 0;

  canvas.addEventListener('pointerdown', e => {
    if (!state.running) return;
    e.preventDefault();
    state.surferDrag = true;
    pointerStartX = e.clientX;
    pointerStartSurferX = state.surferX;
  });
  window.addEventListener('pointermove', e => {
    if (!state.surferDrag || !state.running) return;
    e.preventDefault();
    const dx = e.clientX - pointerStartX;
    state.surferDX = dx * 0.05; // 기울기용
    const newX = pointerStartSurferX + dx;
    state.surferX = Math.max(CFG.surferR, Math.min(canvas.width - CFG.surferR, newX));
  });
  window.addEventListener('pointerup', () => {
    state.surferDrag = false;
    state.surferDX = 0;
  });

  /* ── 목숨 UI ── */
  function updateLives() {
    const el = document.getElementById('livesEl');
    el.textContent = '❤️'.repeat(Math.max(0, state.lives)) + '🖤'.repeat(Math.max(0, 3 - state.lives));
  }

  /* ── 게임 시작 ── */
  function startGame() {
    resize();
    state = {
      ...state,
      running: true,
      dist: 0,
      lives: 3,
      frame: 0,
      speed: CFG.baseSpeed,
      surferX: canvas.width / 2,
      surferY: canvas.height * CFG.surferY,
      surferDrag: false,
      surferDX: 0,
      obstacles: [],
      stars: [],
      particles: [],
    };
    initWaves();
    updateLives();
    requestAnimationFrame(loop);
  }

  /* ── 게임 종료 ── */
  function endGame() {
    state.running = false;
    const dist = Math.floor(state.dist);
    const best = parseInt(localStorage.getItem(STORAGE_KEY) || '0', 10);
    const newBest = Math.max(dist, best);
    localStorage.setItem(STORAGE_KEY, newBest);

    document.getElementById('finalDist').textContent = dist + 'm';
    document.getElementById('bestLabel').textContent = '최고기록: ' + newBest + 'm';
    const msgs = ['잘 탔어요! 🏄', '파도 마스터! 🌊', '대단한 서퍼! ⭐', '굉장해요! 🎉'];
    document.getElementById('resultMsg').textContent = dist > 200 ? msgs[2] : dist > 100 ? msgs[1] : msgs[0];
    document.getElementById('endOverlay').classList.remove('hidden');
  }

  /* ── 버튼 ── */
  document.getElementById('startBtn').addEventListener('pointerdown', () => {
    document.getElementById('startOverlay').classList.add('hidden');
    startGame();
  });
  document.getElementById('restartBtn').addEventListener('pointerdown', () => {
    document.getElementById('endOverlay').classList.add('hidden');
    startGame();
  });

  /* ── 초기 캔버스 그리기 ── */
  resize();

})();
</script>
</body>
</html>
