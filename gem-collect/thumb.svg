<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a2e"/>
      <stop offset="100%" style="stop-color:#2d1b5e"/>
    </linearGradient>
    <linearGradient id="shimmer" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0c040;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:0.9"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="320" height="180" fill="url(#bg)"/>
  <!-- border -->
  <rect x="0.5" y="0.5" width="319" height="179" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Stars scattered -->
  <circle cx="20" cy="20" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="60" cy="12" r="1" fill="white" opacity="0.4"/>
  <circle cx="100" cy="30" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="40" cy="55" r="1" fill="white" opacity="0.35"/>
  <circle cx="140" cy="15" r="1" fill="white" opacity="0.45"/>

  <!-- Falling gems visual -->
  <!-- Diamond big -->
  <text x="50" y="75" font-size="42" text-anchor="middle" font-family="Apple Color Emoji,Segoe UI Emoji,sans-serif">&#x1f48e;</text>
  <!-- Star -->
  <text x="120" y="55" font-size="34" text-anchor="middle" font-family="Apple Color Emoji,Segoe UI Emoji,sans-serif">&#x2b50;</text>
  <!-- Ring -->
  <text x="88" y="110" font-size="30" text-anchor="middle" font-family="Apple Color Emoji,Segoe UI Emoji,sans-serif">&#x1f48d;</text>
  <!-- Bomb -->
  <text x="155" y="95" font-size="26" text-anchor="middle" font-family="Apple Color Emoji,Segoe UI Emoji,sans-serif">&#x1f4a3;</text>
  <!-- Small diamonds trailing -->
  <text x="30" y="130" font-size="20" text-anchor="middle" font-family="Apple Color Emoji,Segoe UI Emoji,sans-serif">&#x1f48e;</text>
  <text x="165" y="45" font-size="18" text-anchor="middle" font-family="Apple Color Emoji,Segoe UI Emoji,sans-serif">&#x2b50;</text>

  <!-- Basket at bottom left area -->
  <rect x="16" y="148" width="70" height="22" rx="5" ry="11" fill="#f97316" opacity="0.9"/>
  <text x="51" y="164" text-anchor="middle" font-size="12" font-weight="700" fill="white" font-family="sans-serif">BASKET</text>

  <!-- Score HUD preview -->
  <rect x="185" y="20" width="120" height="34" rx="8" fill="rgba(255,255,255,0.08)"/>
  <text x="200" y="42" font-size="13" font-weight="700" fill="#f0c040" font-family="sans-serif">SCORE  LV  &#x2665;&#x2665;&#x2665;</text>

  <!-- Title block bottom-right -->
  <g font-family="'Pretendard','Noto Sans KR',sans-serif">
    <text x="296" y="148" text-anchor="end" font-size="22" font-weight="900" fill="#f0c040">&#xbcf4;&#xc11d; &#xbaa8;&#xc73c;&#xae30;</text>
    <text x="296" y="166" text-anchor="end" font-size="10" font-weight="500" fill="rgba(255,255,255,0.5)" letter-spacing="2">GEM COLLECT</text>
  </g>
</svg>
