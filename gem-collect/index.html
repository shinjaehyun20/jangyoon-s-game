<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>보석 모으기</title>
  <style>
    :root {
      --bg: #1a0a2e;
      --bg2: #2d1b5e;
      --accent: #f0c040;
      --accent2: #a855f7;
      --text: #ffffff;
      --basket: #f97316;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100vh; height: 100dvh;
      overflow: hidden;
      touch-action: manipulation;
      font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
      background: linear-gradient(180deg, var(--bg) 0%, var(--bg2) 100%);
      color: var(--text);
      user-select: none;
    }
    .wrap {
      width: 100%; max-width: 480px;
      height: 100vh; height: 100dvh;
      display: flex; flex-direction: column;
      padding: 10px 12px 8px; gap: 6px;
      margin: 0 auto;
      position: relative;
    }
    h1 {
      font-size: clamp(18px, 5vw, 26px);
      font-weight: 900;
      text-align: center;
      flex-shrink: 0;
    }
    .hud {
      display: flex; flex-direction: row;
      justify-content: space-between; align-items: center;
      background: rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 6px 14px;
      flex-shrink: 0;
    }
    .hud-item {
      display: flex; flex-direction: column; align-items: center;
      font-size: 12px; gap: 2px;
    }
    .hud-val {
      font-size: clamp(18px, 4.5vw, 24px);
      font-weight: 900;
      color: var(--accent);
    }
    .hud-label { font-size: 11px; opacity: 0.7; }
    #gameArea {
      flex: 1;
      position: relative;
      overflow: hidden;
      border-radius: 14px;
      background: rgba(0,0,0,0.25);
      touch-action: none;
    }
    /* Basket */
    #basket {
      position: absolute;
      bottom: 8px;
      width: 80px; height: 36px;
      background: var(--basket);
      border-radius: 6px 6px 12px 12px;
      transform: translateX(-50%);
      transition: left 0.05s linear;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      box-shadow: 0 4px 12px rgba(249,115,22,0.5);
    }
    /* Falling gems */
    .gem {
      position: absolute;
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
      transform: translateX(-50%);
      pointer-events: none;
      filter: drop-shadow(0 0 6px rgba(255,255,255,0.4));
    }
    .gem.bomb {
      filter: drop-shadow(0 0 8px rgba(255,80,80,0.7));
    }
    /* Stars burst */
    .burst {
      position: absolute;
      font-size: 22px;
      pointer-events: none;
      animation: burstAnim 0.5s forwards;
      transform: translateX(-50%);
    }
    @keyframes burstAnim {
      0%   { opacity: 1; transform: translateX(-50%) scale(1); }
      100% { opacity: 0; transform: translateX(-50%) translateY(-40px) scale(1.8); }
    }
    /* Score pop */
    .score-pop {
      position: absolute;
      font-size: 18px; font-weight: 900;
      color: var(--accent);
      pointer-events: none;
      animation: popAnim 0.7s forwards;
    }
    @keyframes popAnim {
      0%   { opacity: 1; transform: translateY(0); }
      100% { opacity: 0; transform: translateY(-50px); }
    }
    /* Level up flash */
    .level-flash {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: clamp(24px, 7vw, 36px); font-weight: 900;
      color: var(--accent);
      background: rgba(240,192,64,0.15);
      border-radius: 14px;
      pointer-events: none;
      animation: flashAnim 0.8s forwards;
    }
    @keyframes flashAnim {
      0%   { opacity: 1; }
      70%  { opacity: 1; }
      100% { opacity: 0; }
    }
    footer {
      display: flex; flex-direction: row;
      justify-content: space-between; align-items: center;
      flex-shrink: 0;
    }
    footer small { font-size: 11px; opacity: 0.55; }
    .home-link {
      font-size: 12px; color: rgba(255,255,255,0.6);
      text-decoration: none;
      background: rgba(255,255,255,0.08);
      border-radius: 8px; padding: 4px 10px;
    }
    /* Overlays */
    .overlay {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: rgba(10,5,20,0.85);
      z-index: 100;
    }
    .overlay.hidden { display: none; }
    .overlay-card {
      background: linear-gradient(145deg, #2d1b5e, #1a0a2e);
      border: 2px solid rgba(240,192,64,0.35);
      border-radius: 20px;
      padding: 28px 24px;
      max-width: 320px; width: 88%;
      text-align: center;
      display: flex; flex-direction: column; gap: 12px;
    }
    .overlay-card h2 { font-size: clamp(22px, 6vw, 30px); }
    .overlay-card p  { font-size: 14px; line-height: 1.6; opacity: 0.85; }
    .gem-legend {
      display: flex; flex-direction: row; justify-content: center; gap: 10px;
      flex-wrap: wrap;
    }
    .gem-legend span {
      background: rgba(255,255,255,0.08);
      border-radius: 8px; padding: 4px 8px;
      font-size: 13px;
    }
    .btn-start {
      background: linear-gradient(135deg, #f0c040, #f97316);
      color: #1a0a2e; border: none; border-radius: 14px;
      padding: 14px 32px; font-size: clamp(16px, 4.5vw, 20px);
      font-weight: 900; cursor: pointer;
      min-height: 48px;
      box-shadow: 0 4px 16px rgba(240,192,64,0.4);
    }
    .result-score {
      font-size: clamp(40px, 12vw, 60px);
      font-weight: 900; color: var(--accent);
      line-height: 1;
    }
    #resultMsg { font-size: 14px; opacity: 0.8; }
    #bestDisplay {
      font-size: 13px;
      color: rgba(240,192,64,0.75);
    }
    /* Life hearts */
    #livesDisplay { font-size: 20px; letter-spacing: 2px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>&#x1f48e; &#xbcf4;&#xc11d; &#xbaa8;&#xc73c;&#xae30;</h1>

    <div class="hud">
      <div class="hud-item">
        <span class="hud-val" id="scoreDisplay">0</span>
        <span class="hud-label">&#xc810;&#xc218;</span>
      </div>
      <div class="hud-item">
        <span class="hud-val" id="levelDisplay">1</span>
        <span class="hud-label">&#xb808;&#xbca8;</span>
      </div>
      <div class="hud-item">
        <span id="livesDisplay">&#x2665;&#x2665;&#x2665;</span>
        <span class="hud-label">&#xc0dd;&#xba85;</span>
      </div>
      <div class="hud-item">
        <span class="hud-val" id="timeDisplay">30</span>
        <span class="hud-label">&#xcd08;</span>
      </div>
    </div>

    <div id="gameArea"></div>

    <footer>
      <small>&#xbc14;&#xad6c;&#xb2c8;&#xb97c; &#xb4dc;&#xb798;&#xadf8;&#xd574;&#xc11c; &#xbcf4;&#xc11d;&#xc744; &#xbc1b;&#xc544;&#xc694;! &#x1f4a3;&#xd3ed;&#xbc14;&#xd0c4;&#xc740; &#xd53c;&#xd558;&#xc138;&#xc694;!</small>
      <a class="home-link" href="../index.html">&#x2190; &#xd648;&#xc73c;&#xb85c;</a>
    </footer>
  </div>

  <!-- Start Overlay -->
  <div class="overlay" id="startOverlay">
    <div class="overlay-card">
      <h2>&#x1f48e; &#xbcf4;&#xc11d; &#xbaa8;&#xc73c;&#xae30;</h2>
      <p>&#xd558;&#xb298;&#xc5d0;&#xc11c; &#xb5a8;&#xc5b4;&#xc9c0;&#xb294; &#xbcf4;&#xc11d;&#xc744;<br>&#xbc14;&#xad6c;&#xb2c8;&#xb85c; &#xbc1b;&#xc544;&#xbcf4;&#xc138;&#xc694;!</p>
      <div class="gem-legend">
        <span>&#x1f48e; 5&#xc810;</span>
        <span>&#x2b50; 3&#xc810;</span>
        <span>&#x1f48d; 2&#xc810;</span>
        <span>&#x1f4a3; -&#xd558;&#xd2b8;</span>
      </div>
      <div id="bestDisplay">&#xcd5c;&#xace0; &#xae30;&#xb85d;: <span id="bestScoreStart">0</span></div>
      <button class="btn-start" id="startBtn">&#xc2dc;&#xc791;!</button>
    </div>
  </div>

  <!-- End Overlay -->
  <div class="overlay hidden" id="endOverlay">
    <div class="overlay-card">
      <h2>&#x1f389; &#xac8c;&#xc784; &#xc885;&#xb8cc;!</h2>
      <div class="result-score" id="finalScore">0</div>
      <p id="resultMsg"></p>
      <div id="bestDisplay2" style="font-size:13px;color:rgba(240,192,64,0.75)"></div>
      <button class="btn-start" id="restartBtn">&#xb2e4;&#xc2dc; &#xd558;&#xae30;</button>
    </div>
  </div>

  <script>
  (function () {
    'use strict';

    /* ─── CONFIG ─────────────────────────────── */
    const CONFIG = {
      gameDuration: 30,       // seconds per round
      basketWidth: 80,        // px
      gemSize: 36,            // px
      baseSpeed: 2.2,         // px/frame at level 1
      speedIncPerLevel: 0.6,  // speed increase per level
      spawnIntervalBase: 1200,// ms between spawns at level 1
      spawnIntervalMin: 400,  // ms floor
      spawnDecayPerLevel: 120,// ms reduction per level
      bombChanceBase: 0.12,   // probability of bomb at level 1
      bombChanceMax: 0.30,    // max bomb probability
      maxLives: 3,
      levelScoreThresholds: [0, 20, 50, 90, 140], // score to reach each level (1-indexed)
      gems: [
        { emoji: '\u{1f48e}', points: 5, weight: 1 },  // diamond
        { emoji: '⭐',    points: 3, weight: 3 },  // star
        { emoji: '\u{1f48d}', points: 2, weight: 4 },  // ring
      ],
      bomb: { emoji: '\u{1f4a3}', weight: 0 },         // weight computed dynamically
      STORAGE_KEY: 'gem-collect_best',
    };

    /* ─── STATE ──────────────────────────────── */
    let state = {
      running: false,
      score: 0,
      lives: CONFIG.maxLives,
      timeLeft: CONFIG.gameDuration,
      level: 1,
      basketX: 0,           // center x of basket
      gems: [],             // active falling objects
      animId: null,
      timerInterval: null,
      spawnTimeout: null,
      lastFrame: 0,
    };

    /* ─── DOM ────────────────────────────────── */
    const gameArea      = document.getElementById('gameArea');
    const basketEl      = document.getElementById('basket');
    const scoreDisplay  = document.getElementById('scoreDisplay');
    const levelDisplay  = document.getElementById('levelDisplay');
    const livesDisplay  = document.getElementById('livesDisplay');
    const timeDisplay   = document.getElementById('timeDisplay');
    const startOverlay  = document.getElementById('startOverlay');
    const endOverlay    = document.getElementById('endOverlay');
    const finalScore    = document.getElementById('finalScore');
    const resultMsg     = document.getElementById('resultMsg');
    const bestScoreStart= document.getElementById('bestScoreStart');
    const bestDisplay2  = document.getElementById('bestDisplay2');
    const startBtn      = document.getElementById('startBtn');
    const restartBtn    = document.getElementById('restartBtn');

    /* ─── BEST SCORE ─────────────────────────── */
    function getBest() {
      return parseInt(localStorage.getItem(CONFIG.STORAGE_KEY) || '0', 10);
    }
    function saveBest(s) {
      if (s > getBest()) localStorage.setItem(CONFIG.STORAGE_KEY, String(s));
    }

    /* ─── UTILS ──────────────────────────────── */
    function areaW() { return gameArea.clientWidth; }
    function areaH() { return gameArea.clientHeight; }

    function pickGemType(level) {
      const bombChance = Math.min(
        CONFIG.bombChanceBase + (level - 1) * 0.03,
        CONFIG.bombChanceMax
      );
      if (Math.random() < bombChance) {
        return { emoji: CONFIG.bomb.emoji, points: 0, isBomb: true };
      }
      // weighted pick among gems
      const totalW = CONFIG.gems.reduce((s, g) => s + g.weight, 0);
      let r = Math.random() * totalW;
      for (const g of CONFIG.gems) {
        r -= g.weight;
        if (r <= 0) return { emoji: g.emoji, points: g.points, isBomb: false };
      }
      return { ...CONFIG.gems[0], isBomb: false };
    }

    function currentSpawnInterval(level) {
      return Math.max(
        CONFIG.spawnIntervalBase - (level - 1) * CONFIG.spawnDecayPerLevel,
        CONFIG.spawnIntervalMin
      );
    }

    function currentSpeed(level) {
      return CONFIG.baseSpeed + (level - 1) * CONFIG.speedIncPerLevel;
    }

    function computeLevel(score) {
      const thresh = CONFIG.levelScoreThresholds;
      for (let i = thresh.length - 1; i >= 1; i--) {
        if (score >= thresh[i]) return i;
      }
      return 1;
    }

    /* ─── SPAWN ──────────────────────────────── */
    function spawnGem() {
      if (!state.running) return;
      const type = pickGemType(state.level);
      const x = CONFIG.gemSize / 2 + Math.random() * (areaW() - CONFIG.gemSize);

      const el = document.createElement('div');
      el.className = 'gem' + (type.isBomb ? ' bomb' : '');
      el.textContent = type.emoji;
      el.style.left  = x + 'px';
      el.style.top   = -CONFIG.gemSize + 'px';
      gameArea.appendChild(el);

      state.gems.push({
        el,
        x,
        y: -CONFIG.gemSize,
        points: type.points,
        isBomb: type.isBomb,
        active: true,
      });

      // schedule next spawn
      state.spawnTimeout = setTimeout(spawnGem, currentSpawnInterval(state.level));
    }

    /* ─── COLLISION ──────────────────────────── */
    function checkCollision(gem) {
      const basketTop = areaH() - 8 - CONFIG.gemSize / 2 - 36; // basket top
      const basketLeft  = state.basketX - CONFIG.basketWidth / 2;
      const basketRight = state.basketX + CONFIG.basketWidth / 2;
      const gemBottom = gem.y + CONFIG.gemSize;

      return (
        gemBottom >= basketTop &&
        gem.y <= basketTop + 36 &&
        gem.x >= basketLeft &&
        gem.x <= basketRight
      );
    }

    function removeGem(gem) {
      if (!gem.active) return;
      gem.active = false;
      if (gem.el.parentNode) gem.el.parentNode.removeChild(gem.el);
    }

    /* ─── FEEDBACK ───────────────────────────── */
    function showBurst(x, y, emoji) {
      const el = document.createElement('div');
      el.className = 'burst';
      el.textContent = emoji;
      el.style.left = x + 'px';
      el.style.top  = y + 'px';
      gameArea.appendChild(el);
      setTimeout(() => { if (el.parentNode) el.parentNode.removeChild(el); }, 500);
    }

    function showScorePop(x, y, pts) {
      const el = document.createElement('div');
      el.className = 'score-pop';
      el.textContent = '+' + pts;
      el.style.left = (x - 12) + 'px';
      el.style.top  = (y - 10) + 'px';
      gameArea.appendChild(el);
      setTimeout(() => { if (el.parentNode) el.parentNode.removeChild(el); }, 700);
    }

    function showLevelUp(level) {
      const el = document.createElement('div');
      el.className = 'level-flash';
      el.textContent = '\u{1f31f} LEVEL ' + level + '!';
      gameArea.appendChild(el);
      setTimeout(() => { if (el.parentNode) el.parentNode.removeChild(el); }, 800);
    }

    /* ─── LIVES ──────────────────────────────── */
    function updateLivesUI() {
      livesDisplay.textContent =
        '♥'.repeat(state.lives) + '♡'.repeat(CONFIG.maxLives - state.lives);
    }

    function loseLife() {
      state.lives = Math.max(0, state.lives - 1);
      updateLivesUI();
      if (state.lives === 0) {
        endGame();
      } else {
        // flash basket red briefly
        basketEl.style.background = '#ef4444';
        setTimeout(() => { basketEl.style.background = ''; }, 300);
      }
    }

    /* ─── GAME LOOP ──────────────────────────── */
    function gameLoop(ts) {
      if (!state.running) return;
      state.animId = requestAnimationFrame(gameLoop);

      const h = areaH();
      const speed = currentSpeed(state.level);

      for (let i = state.gems.length - 1; i >= 0; i--) {
        const gem = state.gems[i];
        if (!gem.active) { state.gems.splice(i, 1); continue; }

        gem.y += speed;
        gem.el.style.top = gem.y + 'px';

        if (checkCollision(gem)) {
          // caught
          showBurst(gem.x, gem.y, gem.emoji || '✨');
          if (gem.isBomb) {
            loseLife();
          } else {
            state.score += gem.points;
            showScorePop(gem.x, gem.y, gem.points);
            updateScore();
          }
          removeGem(gem);
          state.gems.splice(i, 1);
          continue;
        }

        if (gem.y > h) {
          // missed — only lose life if it was a gem (not a bomb)
          if (!gem.isBomb) {
            loseLife();
          }
          removeGem(gem);
          state.gems.splice(i, 1);
        }
      }
    }

    function updateScore() {
      scoreDisplay.textContent = state.score;
      const newLevel = computeLevel(state.score);
      if (newLevel > state.level) {
        state.level = newLevel;
        levelDisplay.textContent = state.level;
        showLevelUp(state.level);
      }
    }

    /* ─── TIMER ──────────────────────────────── */
    function startTimer() {
      state.timerInterval = setInterval(() => {
        state.timeLeft--;
        timeDisplay.textContent = state.timeLeft;
        if (state.timeLeft <= 0) endGame();
      }, 1000);
    }

    /* ─── BASKET DRAG ────────────────────────── */
    let dragging = false;
    let dragOffsetX = 0;

    function clampBasket(x) {
      const half = CONFIG.basketWidth / 2;
      return Math.max(half, Math.min(areaW() - half, x));
    }

    function setBasket(cx) {
      state.basketX = clampBasket(cx);
      basketEl.style.left = state.basketX + 'px';
    }

    gameArea.addEventListener('pointerdown', (e) => {
      if (!state.running) return;
      dragging = true;
      gameArea.setPointerCapture(e.pointerId);
      const rect = gameArea.getBoundingClientRect();
      dragOffsetX = e.clientX - rect.left - state.basketX;
      e.preventDefault();
    });

    gameArea.addEventListener('pointermove', (e) => {
      if (!dragging || !state.running) return;
      const rect = gameArea.getBoundingClientRect();
      setBasket(e.clientX - rect.left - dragOffsetX);
      e.preventDefault();
    });

    gameArea.addEventListener('pointerup', () => { dragging = false; });
    gameArea.addEventListener('pointercancel', () => { dragging = false; });

    /* ─── START / END ────────────────────────── */
    function initGame() {
      // clear old gems
      state.gems.forEach(g => { if (g.el.parentNode) g.el.parentNode.removeChild(g.el); });
      state.gems = [];
      // clear leftover DOM gems
      gameArea.querySelectorAll('.gem,.burst,.score-pop,.level-flash').forEach(el => el.remove());

      state.score = 0;
      state.lives = CONFIG.maxLives;
      state.timeLeft = CONFIG.gameDuration;
      state.level = 1;
      state.running = false;

      scoreDisplay.textContent = '0';
      levelDisplay.textContent = '1';
      timeDisplay.textContent = CONFIG.gameDuration;
      updateLivesUI();

      // center basket
      setBasket(areaW() / 2);
    }

    function startGame() {
      initGame();
      state.running = true;
      startTimer();
      spawnGem();
      state.animId = requestAnimationFrame(gameLoop);
    }

    function endGame() {
      state.running = false;
      clearInterval(state.timerInterval);
      clearTimeout(state.spawnTimeout);
      cancelAnimationFrame(state.animId);

      const best = getBest();
      saveBest(state.score);
      const newBest = getBest();

      finalScore.textContent = state.score;
      if (state.score >= newBest && state.score > 0 && state.score > best) {
        resultMsg.textContent = '\u{1f3c6} 신기록 경신!! ' + newBest + '점!';
      } else if (state.score >= 50) {
        resultMsg.textContent = '\u{1f48e} 대단해요! 보석 마스터!';
      } else if (state.score >= 20) {
        resultMsg.textContent = '\u{2b50} 잘행어요! 다시 도전해보세요!';
      } else {
        resultMsg.textContent = '\u{1f4aa} 헙커! 다음엔 더 잘할 수 있어요!';
      }
      bestDisplay2.textContent = '새 최고기록: ' + newBest + '점';

      endOverlay.classList.remove('hidden');
    }

    /* ─── EVENT LISTENERS ────────────────────── */
    startBtn.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      startOverlay.classList.add('hidden');
      startGame();
    });
    restartBtn.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      endOverlay.classList.add('hidden');
      startGame();
    });

    /* ─── INIT ───────────────────────────────── */
    bestScoreStart.textContent = getBest();
    initGame();

  })();
  </script>
</body>
</html>
