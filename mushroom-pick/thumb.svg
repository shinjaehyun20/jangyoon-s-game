<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a16"/>
      <stop offset="100%" style="stop-color:#2d5a27"/>
    </linearGradient>
    <linearGradient id="grass" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4caf50"/>
      <stop offset="100%" style="stop-color:#2e7d32"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="320" height="180" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="319" height="179" fill="none" stroke="rgba(255,255,255,0.08)"/>

  <!-- ground strip -->
  <rect x="0" y="148" width="320" height="32" fill="url(#grass)" rx="4"/>

  <!-- basket -->
  <text x="50" y="155" font-size="40" text-anchor="middle" font-family="serif">🧺</text>

  <!-- good mushrooms falling -->
  <text x="110" y="80" font-size="38" text-anchor="middle" opacity="0.95">🍄</text>
  <text x="80" y="130" font-size="32" text-anchor="middle" opacity="0.8">🍀</text>
  <text x="155" y="55" font-size="30" text-anchor="middle" opacity="0.85">⭐</text>

  <!-- poison mushroom with red indicator -->
  <text x="195" y="100" font-size="36" text-anchor="middle" opacity="0.95">🍄</text>
  <circle cx="210" cy="80" r="10" fill="#e63946" opacity="0.9"/>
  <text x="210" y="84" font-size="11" text-anchor="middle" fill="white" font-weight="bold">☠</text>

  <!-- title bottom right -->
  <g font-family="'Pretendard','Noto Sans KR',sans-serif">
    <text x="296" y="148" text-anchor="end" font-size="22" font-weight="900" fill="#f9c74f">버섯 바구니</text>
    <text x="296" y="166" text-anchor="end" font-size="10" font-weight="500" fill="rgba(255,255,255,0.5)" letter-spacing="2">MUSHROOM PICK</text>
  </g>
</svg>
