<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>버섯 바구니</title>
  <style>
    :root {
      --bg: #2d5a27;
      --bg2: #1a3a16;
      --accent: #f9c74f;
      --danger: #e63946;
      --safe: #90be6d;
      --text: #ffffff;
      --card: rgba(255,255,255,0.12);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100vh; height: 100dvh;
      overflow: hidden;
      touch-action: manipulation;
      font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
      background: linear-gradient(180deg, var(--bg2) 0%, var(--bg) 100%);
    }
    .wrap {
      width: 100%; max-width: 480px;
      height: 100vh; height: 100dvh;
      display: flex; flex-direction: column;
      padding: 10px 12px 8px; gap: 6px;
      margin: 0 auto;
      position: relative;
    }
    h1 {
      font-size: clamp(20px, 5.5vw, 28px);
      color: var(--text);
      text-align: center;
      text-shadow: 0 2px 6px rgba(0,0,0,0.5);
    }
    .hud {
      display: flex; flex-direction: row;
      justify-content: space-between; align-items: center;
      background: var(--card);
      border-radius: 12px; padding: 6px 14px;
      font-size: 15px; color: var(--text);
      font-weight: 700;
    }
    .hud-item { display: flex; flex-direction: column; align-items: center; gap: 1px; }
    .hud-label { font-size: 10px; font-weight: 400; opacity: 0.75; }
    #gameArea {
      flex: 1;
      position: relative;
      overflow: hidden;
      border-radius: 14px;
      background: linear-gradient(180deg, #3a7a30 0%, #1f4a1c 100%);
      border: 2px solid rgba(255,255,255,0.1);
      touch-action: none;
    }
    /* grass strip at bottom of game area */
    #grassStrip {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 30px;
      background: linear-gradient(180deg, #4caf50, #2e7d32);
      border-radius: 0 0 12px 12px;
    }
    /* basket */
    #basket {
      position: absolute;
      bottom: 18px;
      width: 70px; height: 52px;
      display: flex; align-items: center; justify-content: center;
      font-size: 38px;
      line-height: 1;
      transform: translateX(-50%);
      user-select: none;
      pointer-events: none;
      transition: left 0.05s linear;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.4));
      z-index: 10;
    }
    /* mushroom items */
    .mushroom {
      position: absolute;
      font-size: 34px;
      line-height: 1;
      user-select: none;
      pointer-events: none;
      will-change: top;
    }
    /* lives (hearts) */
    #livesDisplay {
      display: flex; flex-direction: row; gap: 4px; align-items: center;
    }
    /* footer */
    footer {
      display: flex; flex-direction: row;
      justify-content: space-between; align-items: center;
      font-size: 12px; color: rgba(255,255,255,0.6);
      padding: 0 2px;
    }
    footer a {
      color: rgba(255,255,255,0.6);
      text-decoration: none; font-size: 12px;
    }

    /* overlays */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.72);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
    }
    .overlay.hidden { display: none; }
    .overlay-card {
      background: linear-gradient(160deg, #2d5a27, #1a3a16);
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 24px;
      padding: 30px 24px;
      max-width: 320px; width: 90%;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    .overlay-card h2 {
      font-size: 26px; color: var(--text);
      margin-bottom: 12px;
    }
    .overlay-card p {
      font-size: 14px; color: rgba(255,255,255,0.85);
      line-height: 1.6; margin-bottom: 8px;
    }
    .rule-row {
      display: flex; align-items: center; gap: 10px;
      background: rgba(255,255,255,0.08);
      border-radius: 12px; padding: 8px 12px;
      margin: 6px 0; text-align: left;
    }
    .rule-icon { font-size: 26px; flex-shrink: 0; }
    .rule-text { font-size: 13px; color: rgba(255,255,255,0.9); line-height: 1.4; }
    .btn-start {
      margin-top: 18px;
      width: 100%;
      min-height: 52px;
      background: var(--accent);
      color: #333;
      font-size: 20px;
      font-weight: 900;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(249,199,79,0.4);
      transition: transform 0.1s;
    }
    .btn-start:active { transform: scale(0.96); }
    .result-score {
      font-size: 52px; font-weight: 900;
      color: var(--accent);
      margin: 10px 0;
    }
    #resultMsg {
      font-size: 15px; color: rgba(255,255,255,0.85);
      margin-bottom: 4px;
    }
    #bestMsg {
      font-size: 12px; color: #f9c74f; margin-bottom: 12px;
    }
    /* difficulty buttons */
    .diff-btns {
      display: flex; gap: 8px; justify-content: center; margin: 10px 0;
    }
    .diff-btn {
      flex: 1;
      min-height: 44px;
      border: 2px solid rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.08);
      color: var(--text);
      border-radius: 10px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
    }
    .diff-btn.selected, .diff-btn:active {
      background: var(--accent);
      color: #333;
      border-color: var(--accent);
    }
    /* catch flash */
    .catch-flash {
      position: absolute;
      font-size: 22px;
      font-weight: 900;
      color: #fff;
      text-shadow: 0 0 8px rgba(0,0,0,0.6);
      pointer-events: none;
      animation: floatUp 0.7s ease-out forwards;
      z-index: 20;
    }
    @keyframes floatUp {
      0%   { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-50px) scale(1.2); }
    }
    /* danger flash */
    @keyframes flashRed {
      0%, 100% { background: transparent; }
      50% { background: rgba(230, 57, 70, 0.3); }
    }
    .flash-danger { animation: flashRed 0.3s; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>🍄 버섯 바구니</h1>

    <div class="hud">
      <div class="hud-item">
        <span class="hud-label">점수</span>
        <span id="scoreDisplay">0</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">목숨</span>
        <span id="livesDisplay">❤️❤️❤️</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">시간</span>
        <span id="timeDisplay">40</span>
      </div>
    </div>

    <div id="gameArea">
      <div id="grassStrip"></div>
      <div id="basket">🧺</div>
    </div>

    <footer>
      <small>착한 버섯만 잡아요!</small>
      <a href="../index.html">← 홈으로</a>
    </footer>
  </div>

  <!-- 시작 오버레이 -->
  <div class="overlay" id="startOverlay">
    <div class="overlay-card">
      <h2>🍄 버섯 바구니</h2>
      <div class="rule-row">
        <span class="rule-icon">🍄</span>
        <span class="rule-text">착한 버섯은 바구니로 받아요</span>
      </div>
      <div class="rule-row">
        <span class="rule-icon">☠️</span>
        <span class="rule-text">빨간 점 독버섯은 피하세요! 목숨 차감</span>
      </div>
      <div class="rule-row">
        <span class="rule-icon">✨</span>
        <span class="rule-text">반짝이는 금버섯은 3배 점수!</span>
      </div>
      <p style="margin-top:10px">바구니를 좌우로 움직여요</p>
      <div class="diff-btns">
        <button class="diff-btn selected" id="diffEasy" data-diff="easy">쉬움</button>
        <button class="diff-btn" id="diffNormal" data-diff="normal">보통</button>
        <button class="diff-btn" id="diffHard" data-diff="hard">어려움</button>
      </div>
      <button class="btn-start" id="startBtn">시작!</button>
    </div>
  </div>

  <!-- 결과 오버레이 -->
  <div class="overlay hidden" id="endOverlay">
    <div class="overlay-card">
      <h2>🎉 게임 종료!</h2>
      <div class="result-score" id="finalScore">0</div>
      <p id="resultMsg"></p>
      <p id="bestMsg"></p>
      <button class="btn-start" id="restartBtn">다시 하기</button>
    </div>
  </div>

  <script>
  (function () {
    'use strict';

    const CONFIG = {
      gameDuration: 40,           // seconds
      basketWidth: 70,
      basketEdgePad: 8,
      spawnIntervalBase: 1100,    // ms between spawns (easy)
      spawnIntervalNormal: 850,
      spawnIntervalHard: 600,
      fallSpeedBase: 2.2,         // px per frame (easy)
      fallSpeedNormal: 3.2,
      fallSpeedHard: 4.5,
      maxLives: 3,
      poisonRatioEasy: 0.25,
      poisonRatioNormal: 0.35,
      poisonRatioHard: 0.42,
      goldRatio: 0.10,
      normalScore: 10,
      goldScore: 30,
      catchZoneHeight: 65,        // px from bottom where catch is checked
    };

    // mushroom sets
    const GOOD_MUSHROOMS  = ['🍄','🌸','🌿','🍀','🌱'];
    const POISON_MUSHROOM = '☠️'; // rendered with red dot overlay
    const GOLD_MUSHROOM   = '⭐';

    let state = {
      running: false,
      score: 0,
      lives: CONFIG.maxLives,
      timeLeft: CONFIG.gameDuration,
      basketX: 0,
      mushrooms: [],
      animFrame: null,
      timerInterval: null,
      spawnTimeout: null,
      difficulty: 'easy',
      lastTimestamp: 0,
    };

    // DOM
    const gameArea    = document.getElementById('gameArea');
    const basket      = document.getElementById('basket');
    const scoreEl     = document.getElementById('scoreDisplay');
    const livesEl     = document.getElementById('livesDisplay');
    const timeEl      = document.getElementById('timeDisplay');
    const startOverlay= document.getElementById('startOverlay');
    const endOverlay  = document.getElementById('endOverlay');
    const finalScoreEl= document.getElementById('finalScore');
    const resultMsgEl = document.getElementById('resultMsg');
    const bestMsgEl   = document.getElementById('bestMsg');
    const startBtn    = document.getElementById('startBtn');
    const restartBtn  = document.getElementById('restartBtn');

    // difficulty selection
    document.querySelectorAll('.diff-btn').forEach(btn => {
      btn.addEventListener('pointerdown', e => {
        e.preventDefault();
        document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        state.difficulty = btn.dataset.diff;
      });
    });

    // basket drag via pointer events
    let dragging = false;
    let dragOffsetX = 0;

    gameArea.addEventListener('pointerdown', e => {
      if (!state.running) return;
      dragging = true;
      const rect = gameArea.getBoundingClientRect();
      dragOffsetX = e.clientX - rect.left;
      gameArea.setPointerCapture(e.pointerId);
      e.preventDefault();
    }, { passive: false });

    gameArea.addEventListener('pointermove', e => {
      if (!dragging || !state.running) return;
      const rect = gameArea.getBoundingClientRect();
      let x = e.clientX - rect.left;
      const halfW = CONFIG.basketWidth / 2;
      x = Math.max(halfW + CONFIG.basketEdgePad, Math.min(rect.width - halfW - CONFIG.basketEdgePad, x));
      state.basketX = x;
      basket.style.left = x + 'px';
      e.preventDefault();
    }, { passive: false });

    gameArea.addEventListener('pointerup', e => {
      dragging = false;
    });
    gameArea.addEventListener('pointercancel', e => {
      dragging = false;
    });

    // start / restart
    startBtn.addEventListener('pointerdown', e => {
      e.preventDefault();
      startOverlay.classList.add('hidden');
      startGame();
    }, { passive: false });

    restartBtn.addEventListener('pointerdown', e => {
      e.preventDefault();
      endOverlay.classList.add('hidden');
      startOverlay.classList.remove('hidden');
    }, { passive: false });

    function startGame() {
      // reset state
      state.score = 0;
      state.lives = CONFIG.maxLives;
      state.timeLeft = CONFIG.gameDuration;
      state.mushrooms = [];
      state.running = true;
      state.lastTimestamp = 0;

      // clear previous mushrooms from DOM
      document.querySelectorAll('.mushroom').forEach(el => el.remove());

      // init basket position
      const rect = gameArea.getBoundingClientRect();
      state.basketX = rect.width / 2;
      basket.style.left = state.basketX + 'px';

      updateHUD();

      // timer
      clearInterval(state.timerInterval);
      state.timerInterval = setInterval(() => {
        state.timeLeft--;
        timeEl.textContent = state.timeLeft;
        if (state.timeLeft <= 0) {
          endGame();
        }
      }, 1000);

      // spawn loop
      scheduleSpawn();

      // animation loop
      if (state.animFrame) cancelAnimationFrame(state.animFrame);
      state.animFrame = requestAnimationFrame(loop);
    }

    function getDiffConfig() {
      const d = state.difficulty;
      return {
        spawnInterval: d === 'easy'   ? CONFIG.spawnIntervalBase
                     : d === 'normal' ? CONFIG.spawnIntervalNormal
                                      : CONFIG.spawnIntervalHard,
        fallSpeed:     d === 'easy'   ? CONFIG.fallSpeedBase
                     : d === 'normal' ? CONFIG.fallSpeedNormal
                                      : CONFIG.fallSpeedHard,
        poisonRatio:   d === 'easy'   ? CONFIG.poisonRatioEasy
                     : d === 'normal' ? CONFIG.poisonRatioNormal
                                      : CONFIG.poisonRatioHard,
      };
    }

    function scheduleSpawn() {
      if (!state.running) return;
      const { spawnInterval } = getDiffConfig();
      // slight random jitter ±20%
      const jitter = (Math.random() * 0.4 + 0.8);
      state.spawnTimeout = setTimeout(() => {
        spawnMushroom();
        scheduleSpawn();
      }, spawnInterval * jitter);
    }

    function spawnMushroom() {
      if (!state.running) return;
      const rect = gameArea.getBoundingClientRect();
      const { poisonRatio } = getDiffConfig();

      const r = Math.random();
      let type, emoji;
      if (r < CONFIG.goldRatio) {
        type = 'gold';
        emoji = GOLD_MUSHROOM;
      } else if (r < CONFIG.goldRatio + poisonRatio) {
        type = 'poison';
        emoji = '🍄'; // will add red overlay via data attr
      } else {
        type = 'good';
        emoji = GOOD_MUSHROOMS[Math.floor(Math.random() * GOOD_MUSHROOMS.length)];
      }

      const el = document.createElement('div');
      el.className = 'mushroom';
      el.dataset.type = type;

      const size = 34;
      const x = Math.random() * (rect.width - size - 20) + 10;
      el.style.left = x + 'px';
      el.style.top  = '-40px';

      // for poison: show skull/red cap indicator
      if (type === 'poison') {
        el.innerHTML = '<span style="font-size:32px;display:block">🍄</span>' +
          '<span style="font-size:11px;display:block;text-align:center;color:#ff4444;' +
          'font-weight:900;line-height:1;margin-top:-4px">☠</span>';
      } else {
        el.textContent = emoji;
      }

      gameArea.insertBefore(el, gameArea.firstChild);

      state.mushrooms.push({
        el,
        x,
        y: -40,
        type,
        caught: false,
        missed: false,
      });
    }

    function loop(ts) {
      if (!state.running) return;

      const rect = gameArea.getBoundingClientRect();
      const { fallSpeed } = getDiffConfig();
      const groundY = rect.height - CONFIG.catchZoneHeight;
      const basketLeft = state.basketX - CONFIG.basketWidth / 2;
      const basketRight = state.basketX + CONFIG.basketWidth / 2;

      for (let i = state.mushrooms.length - 1; i >= 0; i--) {
        const m = state.mushrooms[i];
        if (m.caught || m.missed) continue;

        m.y += fallSpeed;
        m.el.style.top = m.y + 'px';

        const mCenterX = m.x + 17; // ~half of emoji width
        const mBottom = m.y + 34;

        // catch zone check
        if (mBottom >= groundY && mBottom <= rect.height - 10) {
          if (mCenterX >= basketLeft && mCenterX <= basketRight) {
            // caught!
            m.caught = true;
            m.el.remove();
            state.mushrooms.splice(i, 1);

            if (m.type === 'poison') {
              // caught poison = lose life
              loseLife(m.x, m.y);
            } else {
              const pts = m.type === 'gold' ? CONFIG.goldScore : CONFIG.normalScore;
              state.score += pts;
              scoreEl.textContent = state.score;
              showFlash('+' + pts, m.x, groundY - 30, m.type === 'gold' ? '#f9c74f' : '#90be6d');
            }
            continue;
          }
        }

        // missed (fell below ground)
        if (m.y > rect.height + 10) {
          m.missed = true;
          m.el.remove();
          state.mushrooms.splice(i, 1);

          if (m.type !== 'poison') {
            // missed a good/gold mushroom — no penalty (poison missing is ok)
          }
        }
      }

      state.animFrame = requestAnimationFrame(loop);
    }

    function loseLife(x, y) {
      state.lives--;
      updateHUD();
      // flash screen
      gameArea.classList.add('flash-danger');
      setTimeout(() => gameArea.classList.remove('flash-danger'), 300);
      showFlash('☠️', x, y, '#e63946');

      if (state.lives <= 0) {
        endGame();
      }
    }

    function showFlash(text, x, y, color) {
      const el = document.createElement('div');
      el.className = 'catch-flash';
      el.textContent = text;
      el.style.left = Math.max(0, x) + 'px';
      el.style.top  = Math.max(0, y) + 'px';
      el.style.color = color || '#fff';
      gameArea.appendChild(el);
      setTimeout(() => el.remove(), 700);
    }

    function updateHUD() {
      scoreEl.textContent = state.score;
      // hearts
      let hearts = '';
      for (let i = 0; i < CONFIG.maxLives; i++) {
        hearts += i < state.lives ? '❤️' : '🖤';
      }
      livesEl.textContent = hearts;
      timeEl.textContent = state.timeLeft;
    }

    function endGame() {
      state.running = false;
      clearInterval(state.timerInterval);
      clearTimeout(state.spawnTimeout);
      cancelAnimationFrame(state.animFrame);

      // remove remaining mushrooms
      document.querySelectorAll('.mushroom').forEach(el => el.remove());
      state.mushrooms = [];

      // best score
      const bestKey = 'mushroom-pick_best';
      const prev = parseInt(localStorage.getItem(bestKey) || '0', 10);
      let newBest = false;
      if (state.score > prev) {
        localStorage.setItem(bestKey, state.score);
        newBest = true;
      }
      const best = Math.max(state.score, prev);

      finalScoreEl.textContent = state.score;

      // result message
      let msg = '';
      if (state.score >= 150)      msg = '완전 최고야! 🏆';
      else if (state.score >= 100) msg = '정말 잘했어요! 🎉';
      else if (state.score >= 60)  msg = '잘했어요! 😊';
      else if (state.score >= 30)  msg = '좋아요! 다시 도전해봐요!';
      else                          msg = '아이고! 독버섯 조심해요! 💪';
      resultMsgEl.textContent = msg;
      bestMsgEl.textContent = newBest
        ? '🌟 새 최고 기록! ' + best + '점'
        : '최고 기록: ' + best + '점';

      endOverlay.classList.remove('hidden');
    }

    // initial basket placement on load
    window.addEventListener('load', () => {
      const rect = gameArea.getBoundingClientRect();
      state.basketX = rect.width / 2;
      basket.style.left = state.basketX + 'px';
    });

  })();
  </script>
</body>
</html>
