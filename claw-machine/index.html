<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>🎁 인형뽑기</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100vh; height: 100dvh;
      overflow: hidden;
      touch-action: manipulation;
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: #1a0a2e;
    }
    :root {
      --bg: #1a0a2e;
      --machine-bg: #2d1b69;
      --glass: rgba(180,220,255,0.13);
      --accent: #ff6fcf;
      --accent2: #ffe66d;
      --text: #ffffff;
      --btn: #ff4da0;
      --success: #4dff91;
    }
    .wrap {
      width: 100%; max-width: 480px;
      height: 100vh; height: 100dvh;
      display: flex; flex-direction: column;
      padding: 10px 12px 8px; gap: 6px;
      margin: 0 auto;
      position: relative;
    }
    h1 {
      text-align: center;
      font-size: clamp(20px, 5.5vw, 28px);
      color: var(--accent2);
      text-shadow: 0 0 12px #ffe66d88;
      letter-spacing: 1px;
      flex-shrink: 0;
    }
    .hud {
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 6px 14px;
      flex-shrink: 0;
    }
    .hud-item {
      display: flex; flex-direction: column; align-items: center;
      gap: 2px;
    }
    .hud-label { font-size: 11px; color: rgba(255,255,255,0.55); }
    .hud-value { font-size: 22px; font-weight: 900; color: var(--accent2); }
    .hud-value.score { color: #4dffee; }
    #gameArea {
      flex: 1;
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      background: #0f0a1e;
    }
    canvas {
      display: block;
      width: 100%; height: 100%;
      touch-action: none;
    }
    footer {
      display: flex; justify-content: space-between; align-items: center;
      flex-shrink: 0; padding: 2px 4px;
    }
    footer small { font-size: 12px; color: rgba(255,255,255,0.4); }
    .home-link {
      font-size: 13px; color: rgba(255,255,255,0.55);
      text-decoration: none;
      padding: 6px 10px;
      background: rgba(255,255,255,0.08);
      border-radius: 8px;
    }

    /* ── Overlay ── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.78);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
      backdrop-filter: blur(4px);
    }
    .overlay.hidden { display: none; }
    .overlay-card {
      background: linear-gradient(145deg, #2d1b69, #1a0a2e);
      border: 2px solid var(--accent);
      border-radius: 24px;
      padding: 28px 24px 24px;
      text-align: center;
      max-width: 320px; width: 90%;
      box-shadow: 0 0 40px #ff6fcf44;
    }
    .overlay-card h2 { font-size: 26px; color: var(--accent2); margin-bottom: 12px; }
    .overlay-card p  { font-size: 15px; color: rgba(255,255,255,0.8); line-height: 1.6; margin-bottom: 20px; }
    .btn-start {
      background: linear-gradient(135deg, #ff4da0, #ff6fcf);
      color: #fff; border: none; border-radius: 14px;
      font-size: 20px; font-weight: 900;
      padding: 14px 36px; cursor: pointer;
      min-height: 52px;
      box-shadow: 0 4px 20px #ff4da066;
      transition: transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-start:active { transform: scale(0.95); }

    /* 뽑은 인형 트로피 */
    .prize-tray {
      position: absolute; bottom: 6px; left: 50%;
      transform: translateX(-50%);
      display: flex; gap: 4px; flex-wrap: wrap;
      justify-content: center;
      pointer-events: none;
      max-width: 90%;
    }
    .prize-emoji {
      font-size: 22px;
      animation: popIn 0.35s cubic-bezier(.36,2,.54,.96) forwards;
    }
    @keyframes popIn {
      from { transform: scale(0) rotate(-20deg); opacity: 0; }
      to   { transform: scale(1) rotate(0deg);   opacity: 1; }
    }
  </style>
</head>
<body>
<div class="wrap">
  <h1>🎁 인형뽑기</h1>
  <div class="hud">
    <div class="hud-item">
      <span class="hud-label">뽑은 인형</span>
      <span class="hud-value score" id="scoreDisplay">0</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">최고기록</span>
      <span class="hud-value" id="bestDisplay">0</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">남은 기회</span>
      <span class="hud-value" id="livesDisplay">5</span>
    </div>
  </div>
  <div id="gameArea">
    <canvas id="cv"></canvas>
    <div class="prize-tray" id="prizeTray"></div>
  </div>
  <footer>
    <small>👆 탭해서 집게 내리기!</small>
    <a class="home-link" href="../index.html">← 홈으로</a>
  </footer>
</div>

<!-- 시작 오버레이 -->
<div class="overlay" id="startOverlay">
  <div class="overlay-card">
    <h2>🎁 인형뽑기</h2>
    <p>집게가 좌우로 움직여요!<br>
       딱 맞을 때 <strong>탭</strong>해서<br>
       인형 위로 내려보세요 🐻</p>
    <button class="btn-start" id="startBtn">시작!</button>
  </div>
</div>

<!-- 결과 오버레이 -->
<div class="overlay hidden" id="endOverlay">
  <div class="overlay-card">
    <h2 id="endTitle">🎉 게임 종료!</h2>
    <div class="hud-value score" style="font-size:48px;margin:8px 0" id="finalScore">0</div>
    <p id="resultMsg">마리</p>
    <button class="btn-start" id="restartBtn">다시 하기</button>
  </div>
</div>

<script>
(function () {
  'use strict';

  /* ── CONFIG ── */
  const CONFIG = {
    TOTAL_TURNS   : 5,       // 기회 횟수
    CLAW_SPEED_MIN: 1.2,     // 집게 이동 최소속도(px/frame)
    CLAW_SPEED_MAX: 2.8,     // 집게 이동 최대속도(px/frame)
    CLAW_W        : 54,      // 집게 그리기 너비
    CLAW_H        : 36,      // 집게 그리기 높이
    PRIZE_ROW     : 2,       // 인형 행 수
    PRIZE_COLS    : 4,       // 인형 열 수
    DROP_SPEED    : 10,      // 집게 하강 속도
    RISE_SPEED    : 8,       // 집게 상승 속도
    CATCH_MARGIN  : 28,      // 집게 중심과 인형 중심 허용 거리 (px)
    PRIZE_EMOJIS  : ['🐻','🐼','🐱','🐶','🐰','🦊','🐸','🐧','🦁','🐯','🐮','🐷'],
  };

  /* ── STATE ── */
  const cv  = document.getElementById('cv');
  const ctx = cv.getContext('2d');
  let W = 0, H = 0;

  let state = {
    phase    : 'idle',   // idle | moving | dropping | rising | caught | missed
    clawX    : 0,
    clawY    : 0,
    clawDir  : 1,
    clawSpeed: CONFIG.CLAW_SPEED_MIN,
    wireLen  : 0,        // 현재 내려간 길이
    targetY  : 0,        // 인형 위치 Y (drop target)
    score    : 0,
    lives    : CONFIG.TOTAL_TURNS,
    prizes   : [],       // {x,y,emoji,caught}
    caughtIdx: -1,
    level    : 1,
    shakeT   : 0,        // miss 흔들기 타이머
    particles: [],
  };
  let bestScore = parseInt(localStorage.getItem('claw-machine_best') || '0', 10);
  let raf = null;

  /* ── UI refs ── */
  const scoreDisplay = document.getElementById('scoreDisplay');
  const bestDisplay  = document.getElementById('bestDisplay');
  const livesDisplay = document.getElementById('livesDisplay');
  const endOverlay   = document.getElementById('endOverlay');
  const startOverlay = document.getElementById('startOverlay');
  const prizeTray    = document.getElementById('prizeTray');

  /* ── resize ── */
  function resize() {
    const rect = document.getElementById('gameArea').getBoundingClientRect();
    W = rect.width  | 0;
    H = rect.height | 0;
    cv.width  = W;
    cv.height = H;
    if (state.prizes.length) layoutPrizes();
  }

  /* ── Prize layout ── */
  function layoutPrizes() {
    const cols    = CONFIG.PRIZE_COLS;
    const rows    = CONFIG.PRIZE_ROW;
    const cellW   = W / cols;
    const startY  = H * 0.52;
    const spacingY= H * 0.14;
    state.prizes = [];
    const emojiPool = [...CONFIG.PRIZE_EMOJIS];
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const idx = Math.floor(Math.random() * emojiPool.length);
        state.prizes.push({
          x     : cellW * c + cellW / 2,
          y     : startY + r * spacingY,
          emoji : emojiPool[idx],
          caught: false,
        });
      }
    }
  }

  /* ── Init game ── */
  function initGame() {
    prizeTray.innerHTML = '';
    state.phase     = 'moving';
    state.clawX     = W / 2;
    state.clawY     = H * 0.12;
    state.clawDir   = 1;
    state.clawSpeed = CONFIG.CLAW_SPEED_MIN + (state.level - 1) * 0.3;
    state.wireLen   = 0;
    state.score     = 0;
    state.lives     = CONFIG.TOTAL_TURNS;
    state.caughtIdx = -1;
    state.shakeT    = 0;
    state.particles = [];
    layoutPrizes();
    updateHUD();
  }

  function updateHUD() {
    scoreDisplay.textContent = state.score;
    bestDisplay.textContent  = bestScore;
    livesDisplay.textContent = state.lives;
  }

  /* ── Particles ── */
  function spawnParticles(x, y, color) {
    for (let i = 0; i < 14; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 2 + Math.random() * 4;
      state.particles.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - 2,
        alpha: 1,
        r: 4 + Math.random() * 5,
        color,
      });
    }
  }

  function updateParticles() {
    state.particles = state.particles.filter(p => p.alpha > 0.05);
    state.particles.forEach(p => {
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.18;
      p.alpha -= 0.03;
    });
  }

  /* ── WebAudio tiny sounds ── */
  let audioCtx = null;
  function getAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }
  function playTone(freq, type, dur, vol) {
    try {
      const ac  = getAudio();
      const osc = ac.createOscillator();
      const gain= ac.createGain();
      osc.connect(gain); gain.connect(ac.destination);
      osc.type = type;
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(vol, ac.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + dur);
      osc.start(); osc.stop(ac.currentTime + dur);
    } catch(e) { /* silent */ }
  }
  function soundDrop()   { playTone(320, 'sine',   0.12, 0.18); }
  function soundCatch()  {
    playTone(660, 'triangle', 0.15, 0.25);
    setTimeout(() => playTone(880, 'triangle', 0.15, 0.25), 120);
    setTimeout(() => playTone(1100,'triangle', 0.2,  0.3),  240);
  }
  function soundMiss()   { playTone(160, 'sawtooth', 0.22, 0.15); }
  function soundEnd()    {
    [520,600,720,860].forEach((f,i) =>
      setTimeout(() => playTone(f, 'triangle', 0.3, 0.25), i * 120)
    );
  }

  /* ── Draw helpers ── */
  function drawMachineBg() {
    // 뽑기 기계 외각
    const r = 12;
    ctx.save();
    ctx.fillStyle = '#2d1b69';
    ctx.beginPath();
    ctx.roundRect(4, 4, W - 8, H - 8, r);
    ctx.fill();

    // 유리 느낌 상단
    ctx.fillStyle = 'rgba(120,200,255,0.07)';
    ctx.beginPath();
    ctx.roundRect(4, 4, W - 8, H * 0.45, r);
    ctx.fill();

    // 테두리 빛
    ctx.strokeStyle = '#7c3aed';
    ctx.lineWidth   = 3;
    ctx.beginPath();
    ctx.roundRect(4, 4, W - 8, H - 8, r);
    ctx.stroke();

    // 집게 레일
    ctx.strokeStyle = 'rgba(200,180,255,0.25)';
    ctx.lineWidth   = 2;
    ctx.setLineDash([6, 4]);
    ctx.beginPath();
    ctx.moveTo(CONFIG.CLAW_W / 2 + 4, state.clawY - 2);
    ctx.lineTo(W - CONFIG.CLAW_W / 2 - 4, state.clawY - 2);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();

    // 바닥 선 (인형 경계)
    ctx.save();
    ctx.strokeStyle = 'rgba(255,111,207,0.3)';
    ctx.lineWidth   = 1.5;
    ctx.setLineDash([8, 6]);
    ctx.beginPath();
    ctx.moveTo(10, H * 0.48);
    ctx.lineTo(W - 10, H * 0.48);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
  }

  function drawWire() {
    const cx = state.clawX + (state.shakeT > 0 ? Math.sin(state.shakeT * 1.5) * 5 : 0);
    const wireTopY = state.clawY - 2;
    const wireEndY = wireTopY + state.wireLen;
    ctx.save();
    ctx.strokeStyle = 'rgba(200,200,255,0.7)';
    ctx.lineWidth   = 2.5;
    ctx.shadowColor = '#aad4ff';
    ctx.shadowBlur  = 4;
    ctx.beginPath();
    ctx.moveTo(cx, wireTopY);
    ctx.lineTo(cx, wireEndY);
    ctx.stroke();
    ctx.restore();
  }

  function drawClaw(x, y, open) {
    const shake = state.shakeT > 0 ? Math.sin(state.shakeT * 1.5) * 5 : 0;
    const cx = x + shake;
    const halfOpen = open ? 18 : 6;
    ctx.save();
    ctx.translate(cx, y + state.wireLen);

    // 집게 몸통
    ctx.fillStyle = '#c084fc';
    ctx.shadowColor = '#c084fc';
    ctx.shadowBlur  = 8;
    ctx.beginPath();
    ctx.roundRect(-10, -10, 20, 14, 4);
    ctx.fill();

    // 집게 좌
    ctx.strokeStyle = '#e879f9';
    ctx.lineWidth   = 4;
    ctx.lineCap     = 'round';
    ctx.beginPath();
    ctx.moveTo(-5, 4);
    ctx.lineTo(-halfOpen, 22);
    ctx.stroke();

    // 집게 우
    ctx.beginPath();
    ctx.moveTo(5, 4);
    ctx.lineTo(halfOpen, 22);
    ctx.stroke();

    ctx.restore();
  }

  function drawPrizes() {
    const baseFontSize = Math.min(W, H) * 0.09;
    ctx.save();
    state.prizes.forEach((p, i) => {
      if (p.caught) return;
      // 잡힌 인형이면 따라 올라옴
      if (state.caughtIdx === i && state.phase === 'rising') {
        ctx.globalAlpha = 1;
        ctx.font = `${baseFontSize}px serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(p.emoji, state.clawX, state.clawY + state.wireLen + 22);
      } else {
        const bounce = Math.sin(Date.now() / 700 + i) * 2.5;
        ctx.globalAlpha = 1;
        ctx.font = `${baseFontSize}px serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(p.emoji, p.x, p.y + bounce);
      }
    });
    ctx.restore();
  }

  function drawParticles() {
    state.particles.forEach(p => {
      ctx.save();
      ctx.globalAlpha = p.alpha;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    });
  }

  /* ── Game loop ── */
  function loop() {
    ctx.clearRect(0, 0, W, H);
    drawMachineBg();
    updateParticles();
    drawParticles();

    if (state.shakeT > 0) state.shakeT -= 0.15;

    switch (state.phase) {
      case 'moving':
        moveHorizontal();
        drawWire();
        drawClaw(state.clawX, state.clawY, true);
        drawPrizes();
        break;
      case 'dropping':
        dropClaw();
        drawWire();
        drawClaw(state.clawX, state.clawY, false);
        drawPrizes();
        break;
      case 'rising':
        riseClaw();
        drawWire();
        drawClaw(state.clawX, state.clawY, false);
        drawPrizes();
        break;
      case 'caught':
      case 'missed':
        drawWire();
        drawClaw(state.clawX, state.clawY, true);
        drawPrizes();
        break;
    }

    raf = requestAnimationFrame(loop);
  }

  function moveHorizontal() {
    state.clawX += state.clawSpeed * state.clawDir;
    const minX = CONFIG.CLAW_W / 2 + 8;
    const maxX = W - CONFIG.CLAW_W / 2 - 8;
    if (state.clawX >= maxX) { state.clawX = maxX; state.clawDir = -1; }
    if (state.clawX <= minX) { state.clawX = minX; state.clawDir =  1; }
  }

  function dropClaw() {
    state.wireLen += CONFIG.DROP_SPEED;
    const wireTopY = state.clawY - 2;
    const clawTipY = wireTopY + state.wireLen + 22;

    // 인형에 닿았는지 체크
    for (let i = 0; i < state.prizes.length; i++) {
      const p = state.prizes[i];
      if (p.caught) continue;
      const dx = Math.abs(state.clawX - p.x);
      const dy = Math.abs(clawTipY - p.y);
      if (dx < CONFIG.CATCH_MARGIN && dy < CONFIG.CATCH_MARGIN) {
        // 잡음
        state.caughtIdx = i;
        state.phase     = 'rising';
        soundCatch();
        spawnParticles(p.x, p.y, '#ffe66d');
        return;
      }
    }
    // 최하단 도달 → 놓침
    if (clawTipY > H - 20) {
      state.phase  = 'rising';
      state.shakeT = 3;
      soundMiss();
    }
  }

  function riseClaw() {
    state.wireLen -= CONFIG.RISE_SPEED;
    if (state.wireLen <= 0) {
      state.wireLen = 0;
      if (state.caughtIdx >= 0) {
        // 성공 → 인형 획득
        const p = state.prizes[state.caughtIdx];
        p.caught = true;
        state.score++;
        updateHUD();
        addPrizeToTray(p.emoji);
        state.caughtIdx = -1;
        spawnParticles(state.clawX, state.clawY, '#c084fc');
      }
      // 다음 턴
      state.lives--;
      updateHUD();
      if (state.lives <= 0 || state.prizes.every(p => p.caught)) {
        endGame();
        return;
      }
      // 속도 살짝 올리기
      state.clawSpeed = CONFIG.CLAW_SPEED_MIN
        + (CONFIG.TOTAL_TURNS - state.lives) * 0.18
        + (state.level - 1) * 0.3;
      state.phase = 'moving';
    }
  }

  function addPrizeToTray(emoji) {
    const el = document.createElement('span');
    el.className = 'prize-emoji';
    el.textContent = emoji;
    prizeTray.appendChild(el);
  }

  function endGame() {
    cancelAnimationFrame(raf);
    if (state.score > bestScore) {
      bestScore = state.score;
      localStorage.setItem('claw-machine_best', bestScore);
    }
    soundEnd();
    document.getElementById('finalScore').textContent = state.score;

    const msgs = [
      ['한 마리도 못 뽑았어요 😅', '다시 도전!'],
      ['아쉽지만 조금 더 연습해요!', '잘 했어요!'],
      ['잘 했어요! 🎉', '훌륭해요!'],
      ['대박! 거의 다 뽑았어요! ✨', '최고!'],
      ['완벽! 전부 다 뽑았어요! 🏆', '👑 챔피언!'],
    ];
    const msgIdx = Math.min(Math.floor(state.score / 2), msgs.length - 1);
    const [msg, title] = msgs[msgIdx];
    document.getElementById('resultMsg').textContent = `인형 ${state.score}마리! ${msg}`;
    document.getElementById('endTitle').textContent  = title;
    endOverlay.classList.remove('hidden');
    state.level = state.score >= CONFIG.TOTAL_TURNS - 1 ? state.level + 1 : Math.max(1, state.level - 1);
  }

  /* ── Input ── */
  function handleTap() {
    if (state.phase === 'moving') {
      soundDrop();
      state.phase = 'dropping';
    }
  }
  cv.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    handleTap();
  });

  document.getElementById('startBtn').addEventListener('pointerdown', (e) => {
    e.preventDefault();
    startOverlay.classList.add('hidden');
    initGame();
    loop();
  });
  document.getElementById('restartBtn').addEventListener('pointerdown', (e) => {
    e.preventDefault();
    endOverlay.classList.add('hidden');
    cancelAnimationFrame(raf);
    initGame();
    loop();
  });

  /* ── Boot ── */
  bestDisplay.textContent = bestScore;
  window.addEventListener('resize', () => {
    resize();
    if (state.phase !== 'idle') {
      state.clawX = Math.max(CONFIG.CLAW_W/2+8, Math.min(W - CONFIG.CLAW_W/2-8, state.clawX));
    }
  });
  resize();
  // 첫 시작 오버레이만 표시 (loop는 startBtn 누를 때 시작)
})();
</script>
</body>
</html>
