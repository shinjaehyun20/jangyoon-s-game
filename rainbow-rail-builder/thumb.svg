<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" role="img" aria-labelledby="title desc">
  <title id="title">무지개 레일 빌더</title>
  <desc id="desc">무지개 레일을 돌려 기차가 선물역까지 가는 퍼즐 게임 썸네일</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#14213d"/>
      <stop offset="0.52" stop-color="#35246f"/>
      <stop offset="1" stop-color="#7b2cbf"/>
    </linearGradient>
    <linearGradient id="rail" x1="0" x2="1">
      <stop offset="0" stop-color="#ff5b8f"/>
      <stop offset="0.25" stop-color="#ffd166"/>
      <stop offset="0.52" stop-color="#95f985"/>
      <stop offset="0.76" stop-color="#4cc9f0"/>
      <stop offset="1" stop-color="#b77cff"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="7" stdDeviation="5" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="320" height="180" rx="22" fill="url(#bg)"/>
  <circle cx="46" cy="36" r="44" fill="#ffd166" opacity="0.22"/>
  <circle cx="276" cy="44" r="56" fill="#4cc9f0" opacity="0.2"/>
  <circle cx="250" cy="150" r="52" fill="#ff6bcb" opacity="0.16"/>

  <g filter="url(#shadow)" transform="translate(24 20)">
    <rect x="0" y="0" width="146" height="118" rx="22" fill="rgba(0,0,0,0.23)" stroke="rgba(255,255,255,0.22)"/>
    <g transform="translate(12 12)">
      <g>
        <rect x="0" y="0" width="34" height="34" rx="10" fill="#fff4c7"/>
        <path d="M7 17H27" stroke="url(#rail)" stroke-width="8" stroke-linecap="round"/>
      </g>
      <g transform="translate(44 0)">
        <rect x="0" y="0" width="34" height="34" rx="10" fill="#fff4c7"/>
        <path d="M17 7V27" stroke="url(#rail)" stroke-width="8" stroke-linecap="round"/>
      </g>
      <g transform="translate(88 0)">
        <rect x="0" y="0" width="34" height="34" rx="10" fill="#ffe1f4"/>
        <text x="17" y="24" text-anchor="middle" font-size="21">🎁</text>
      </g>
      <g transform="translate(0 44)">
        <rect x="0" y="0" width="34" height="34" rx="10" fill="#baffc9"/>
        <text x="17" y="24" text-anchor="middle" font-size="20">🚉</text>
      </g>
      <g transform="translate(44 44)">
        <rect x="0" y="0" width="34" height="34" rx="10" fill="#fff4c7"/>
        <path d="M8 27Q8 8 27 8" fill="none" stroke="url(#rail)" stroke-width="8" stroke-linecap="round"/>
      </g>
      <g transform="translate(88 44)">
        <rect x="0" y="0" width="34" height="34" rx="10" fill="#fff4c7"/>
        <path d="M7 17H27" stroke="url(#rail)" stroke-width="8" stroke-linecap="round"/>
        <path d="M17 7V27" stroke="url(#rail)" stroke-width="8" stroke-linecap="round" opacity="0.9"/>
      </g>
    </g>
  </g>

  <g filter="url(#shadow)">
    <ellipse cx="214" cy="126" rx="54" ry="15" fill="#000" opacity="0.28"/>
    <text x="213" y="115" text-anchor="middle" font-size="58">🚂</text>
    <path d="M173 78C191 47 232 46 252 76" fill="none" stroke="url(#rail)" stroke-width="13" stroke-linecap="round" opacity="0.9"/>
    <circle cx="173" cy="78" r="8" fill="#95f985"/>
    <circle cx="252" cy="76" r="8" fill="#ff6bcb"/>
  </g>

  <g font-family="'Pretendard','Noto Sans KR',sans-serif">
    <text x="296" y="148" text-anchor="end" font-size="22" font-weight="900" fill="#ffd166">무지개 레일</text>
    <text x="296" y="166" text-anchor="end" font-size="10" font-weight="700" fill="rgba(255,255,255,0.64)" letter-spacing="2">RAIL BUILDER</text>
  </g>
  <rect x="0.5" y="0.5" width="319" height="179" rx="22" fill="none" stroke="rgba(255,255,255,0.08)"/>
