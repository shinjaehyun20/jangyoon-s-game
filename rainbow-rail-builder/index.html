<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>🌈 무지개 레일 공방</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg1:#101a3d; --bg2:#3b1c71; --panel:rgba(255,255,255,.14); --line:rgba(255,255,255,.22);
      --text:#fff8e8; --accent:#ffd166; --good:#95f985; --bad:#ff7c9e; --blue:#4cc9f0; --pink:#ff6bcb;
      --cell:rgba(255,255,255,.11); --cell2:rgba(255,255,255,.18);
    }
    html, body {
      width:100%; height:100vh; height:100dvh; overflow:hidden; touch-action:none;
      font-family:"Pretendard","Noto Sans KR","Apple SD Gothic Neo",system-ui,sans-serif;
      color:var(--text); background:radial-gradient(circle at 14% 13%, rgba(255,209,102,.28), transparent 27%),radial-gradient(circle at 86% 18%, rgba(76,201,240,.23), transparent 28%),linear-gradient(160deg,var(--bg1),var(--bg2));
    }
    .wrap { width:100%; max-width:480px; height:100vh; height:100dvh; margin:0 auto; padding:10px 12px 8px; display:flex; flex-direction:column; gap:8px; position:relative; }
    .wrap::before { content:""; position:absolute; inset:62px 0 42px; pointer-events:none; background-image:linear-gradient(rgba(255,255,255,.055) 1px, transparent 1px),linear-gradient(90deg,rgba(255,255,255,.045) 1px,transparent 1px); background-size:28px 28px; transform:perspective(600px) rotateX(57deg) translateY(58px); transform-origin:bottom; opacity:.7; }
    header { display:flex; justify-content:space-between; align-items:center; gap:8px; z-index:1; }
    h1 { font-size:clamp(20px,5.6vw,28px); line-height:1; letter-spacing:-.04em; text-shadow:0 4px 0 rgba(0,0,0,.18); }
    .badge { border:1px solid var(--line); background:rgba(0,0,0,.24); border-radius:999px; padding:7px 10px; font-size:12px; font-weight:1000; white-space:nowrap; }
    .hud { display:grid; grid-template-columns:repeat(4,1fr); gap:6px; z-index:1; }
    .hud-card { min-height:46px; border:1px solid var(--line); background:linear-gradient(180deg,rgba(255,255,255,.18),rgba(255,255,255,.08)); border-radius:16px; display:flex; flex-direction:column; align-items:center; justify-content:center; box-shadow:inset 0 1px 0 rgba(255,255,255,.25),0 9px 18px rgba(0,0,0,.15); }
    .hud-card span { font-size:10px; font-weight:900; opacity:.82; } .hud-card strong { font-size:16px; color:var(--accent); }
    .stage { flex:1; min-height:0; z-index:1; border:1px solid rgba(255,255,255,.23); border-radius:25px; padding:9px; display:flex; flex-direction:column; gap:7px; background:linear-gradient(180deg,rgba(255,255,255,.14),rgba(255,255,255,.055)); box-shadow:inset 0 1px 0 rgba(255,255,255,.25),0 18px 34px rgba(0,0,0,.22); overflow:hidden; perspective:900px; }
    .mission { display:grid; grid-template-columns:1fr auto; gap:8px; align-items:center; min-height:48px; padding:8px 10px; border-radius:17px; background:rgba(0,0,0,.22); border:1px solid rgba(255,255,255,.14); }
    .mission-title { font-size:13px; font-weight:1000; color:#fff4bf; } .mission small { display:block; margin-top:2px; font-size:10px; opacity:.82; font-weight:800; }
    .ticket { display:flex; gap:4px; font-size:22px; filter:drop-shadow(0 3px 4px rgba(0,0,0,.25)); }
    .board-wrap { flex:1; min-height:0; display:grid; place-items:center; position:relative; }
    .board { width:min(100%,calc(100dvh - 260px)); max-width:420px; aspect-ratio:1; display:grid; grid-template-columns:repeat(5,1fr); grid-template-rows:repeat(5,1fr); gap:6px; padding:8px; border-radius:24px; background:rgba(0,0,0,.22); border:1px solid rgba(255,255,255,.2); box-shadow:inset 0 0 38px rgba(0,0,0,.28),0 18px 28px rgba(0,0,0,.2); touch-action:none; }
    .cell { position:relative; border:0; border-radius:16px; background:linear-gradient(180deg,var(--cell2),var(--cell)); box-shadow:inset 0 1px 0 rgba(255,255,255,.18); overflow:hidden; touch-action:none; }
    .cell::before { content:""; position:absolute; inset:50% auto auto 50%; width:20%; height:20%; border-radius:999px; transform:translate(-50%,-50%); background:rgba(255,255,255,.18); }
    .cell.drawn { background:linear-gradient(145deg,#fff3c6,#f9c96d 58%,#b97837); box-shadow:0 6px 0 #8f5a2d,0 10px 15px rgba(0,0,0,.22),inset 0 2px 0 rgba(255,255,255,.8); transform:translateY(-2px) rotateX(4deg); }
    .cell.drawn::before { width:88%; height:20%; background:linear-gradient(90deg,#ff5b8f,#ffd166,#95f985,#4cc9f0,#b77cff); box-shadow:0 2px 0 rgba(0,0,0,.2); }
    .cell.turn::before { width:58%; height:58%; background:none; border:10px solid transparent; border-top-color:#ffd166; border-right-color:#4cc9f0; }
    .cell.start { background:linear-gradient(145deg,#baffc9,#45ce82); } .cell.goal { background:linear-gradient(145deg,#ffe1f4,#ff76c6); }
    .cell.station { background:linear-gradient(145deg,#e6f7ff,#83e7ff); }
    .icon { position:absolute; inset:0; display:grid; place-items:center; font-size:clamp(20px,7vw,32px); z-index:3; filter:drop-shadow(0 3px 3px rgba(0,0,0,.25)); }
    .ghost { position:absolute; pointer-events:none; width:13%; aspect-ratio:1; border-radius:18px; display:grid; place-items:center; font-size:clamp(22px,8vw,38px); z-index:9; transform:translate(-50%,-50%); filter:drop-shadow(0 12px 10px rgba(0,0,0,.35)); transition:left .22s ease,top .22s ease,transform .22s ease; }
    .ghost.run { animation:bob .28s ease-in-out infinite alternate; }
    .message { min-height:28px; display:grid; place-items:center; text-align:center; font-size:13px; font-weight:1000; color:#fff4bf; text-shadow:0 2px 5px rgba(0,0,0,.25); }
    .controls { display:grid; grid-template-columns:1fr 1fr 1fr; gap:7px; }
    .action { min-height:48px; border:0; border-radius:17px; font-size:14px; font-weight:1000; color:#30204e; background:linear-gradient(180deg,#fff7cc,#ffd166); box-shadow:0 6px 0 #b97837,0 11px 16px rgba(0,0,0,.22); touch-action:manipulation; }
    .action.blue { background:linear-gradient(180deg,#d8fbff,#73e0ff); box-shadow:0 6px 0 #2387a8,0 11px 16px rgba(0,0,0,.2); } .action.pink { background:linear-gradient(180deg,#ffe1f4,#ff83cd); box-shadow:0 6px 0 #a5347d,0 11px 16px rgba(0,0,0,.2); }
    .action:active { transform:translateY(4px); box-shadow:0 2px 0 #76502a,0 7px 10px rgba(0,0,0,.22); }
    footer { min-height:31px; display:flex; justify-content:space-between; align-items:center; gap:8px; font-size:11px; opacity:.9; z-index:1; }
    .home-link { color:#fff; text-decoration:none; font-weight:900; padding:7px 10px; border-radius:999px; background:rgba(255,255,255,.14); border:1px solid rgba(255,255,255,.2); white-space:nowrap; }
    .overlay { position:fixed; inset:0; z-index:30; display:grid; place-items:center; padding:18px; background:radial-gradient(circle at 50% 32%,rgba(255,255,255,.22),rgba(5,12,33,.75)); backdrop-filter:blur(8px); }
    .overlay.hidden { display:none; }
    .overlay-card { width:min(100%,420px); border-radius:30px; border:1px solid rgba(255,255,255,.28); background:linear-gradient(180deg,rgba(255,255,255,.23),rgba(255,255,255,.1)),linear-gradient(145deg,#203f88,#672d94); box-shadow:0 24px 50px rgba(0,0,0,.34),inset 0 1px 0 rgba(255,255,255,.3); padding:24px 18px; text-align:center; display:grid; gap:14px; }
    .overlay-card h2 { font-size:clamp(25px,8vw,36px); text-shadow:0 4px 0 rgba(0,0,0,.2); } .overlay-card p { line-height:1.55; font-weight:850; opacity:.95; }
    .big-score { font-size:42px; font-weight:1000; color:var(--accent); text-shadow:0 4px 0 rgba(0,0,0,.2); }
    .btn-start { border:0; min-height:56px; border-radius:19px; background:linear-gradient(180deg,#a7ff83,#38d66b); color:#14351f; font-size:20px; font-weight:1000; box-shadow:0 8px 0 #1d8b47,0 15px 25px rgba(0,0,0,.24); }
    .spark { position:absolute; width:9px; height:18px; border-radius:6px; pointer-events:none; animation:pop .85s ease-out forwards; z-index:20; }
    @keyframes pop { to { opacity:0; transform:translate(var(--x),var(--y)) rotate(300deg); } } @keyframes bob { to { margin-top:-7px; transform:translate(-50%,-50%) rotate(2deg) scale(1.04); } }
    @media (max-height:640px){ .hud-card{min-height:40px}.mission{min-height:42px}.controls .action{min-height:42px} footer{display:none}.board{gap:5px} }
    @media (prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.001ms!important;transition-duration:.001ms!important}}
  </style>
</head>
<body>
  <div class="wrap">
    <header><h1>🌈 무지개 레일 공방</h1><div class="badge">BEST <span id="bestScore">0</span></div></header>
    <div class="hud" aria-label="게임 상태">
      <div class="hud-card"><span>레벨</span><strong id="levelText">1</strong></div><div class="hud-card"><span>점수</span><strong id="scoreText">0</strong></div><div class="hud-card"><span>길이</span><strong id="pathText">0</strong></div><div class="hud-card"><span>통과</span><strong id="passText">0/0</strong></div>
    </div>
    <section class="stage" id="gameArea">
      <div class="mission"><div><div class="mission-title" id="missionTitle">미션</div><small>출발역에서 시작해 미션 스티커를 순서대로 지나 선물역까지 직접 그려요.</small></div><div class="ticket" id="ticket"></div></div>
      <div class="board-wrap"><div class="board" id="board" aria-label="5×5 직접 그리는 레일판"></div><div class="ghost" id="train" aria-hidden="true">🚂</div></div>
      <div class="message" id="message">출발역을 누른 채로 손가락을 움직여 레일을 그려 보세요!</div>
      <div class="controls"><button class="action" id="runBtn" type="button">🚂 출발</button><button class="action blue" id="undoBtn" type="button">↩ 한칸</button><button class="action pink" id="resetBtn" type="button">✏️ 새로</button></div>
    </section>
    <footer><small>차이점: 5×5 회전 퍼즐이 아니라 손가락으로 레일을 직접 그립니다.</small><a class="home-link" href="../index.html">← 홈으로</a></footer>
  </div>
  <div class="overlay" id="startOverlay"><div class="overlay-card"><h2>🌈 무지개 레일 공방</h2><p>빈 판 위에 손가락으로 레일을 직접 그려요. 미션 스티커를 순서대로 지나 🚂 기차를 🎁 선물역까지 보내면 성공!</p><p>기존 회전 퍼즐이 아니라 <b>드래그로 길을 만드는</b> 새 방식이에요.</p><button class="btn-start" id="startBtn" type="button">시작!</button></div></div>
  <div class="overlay hidden" id="endOverlay"><div class="overlay-card"><h2 id="endTitle">🎉 완성!</h2><div class="big-score" id="finalScore">0</div><p id="resultMsg">무지개 레일 완성!</p><button class="btn-start" id="restartBtn" type="button">다시 하기</button></div></div>
  <script>
  (function(){
    'use strict';
    const SIZE=5, STORAGE_KEY='rainbow-rail-builder_best';
    const LEVELS=[
      {name:'딸기역을 지나 선물역으로!', start:[4,0], goal:[0,4], stops:[{pos:[2,1],icon:'🍓'}]},
      {name:'별역 → 풍선역 순서로 배달!', start:[0,0], goal:[4,4], stops:[{pos:[1,3],icon:'⭐'},{pos:[3,2],icon:'🎈'}]},
      {name:'공룡역 → 달역 → 케이크역!', start:[4,4], goal:[0,0], stops:[{pos:[3,1],icon:'🦕'},{pos:[1,1],icon:'🌙'},{pos:[1,3],icon:'🎂'}]},
      {name:'빙글 우주 배달길!', start:[2,0], goal:[2,4], stops:[{pos:[0,2],icon:'🚀'},{pos:[4,2],icon:'💎'}]},
      {name:'장윤이 무지개 기사 최종 미션!', start:[4,2], goal:[0,2], stops:[{pos:[3,0],icon:'🐻'},{pos:[1,0],icon:'🍯'},{pos:[1,4],icon:'🧸'},{pos:[3,4],icon:'🌟'}]}
    ];
    const $=id=>document.getElementById(id); const board=$('board'), train=$('train'), message=$('message');
    const state={level:0, score:0, path:[], drawing:false, passed:[]};
    function key(r,c){return r+','+c} function same(a,b){return a&&b&&a[0]===b[0]&&a[1]===b[1]} function lv(){return LEVELS[state.level]}
    function loadBest(){ $('bestScore').textContent=String(Number(localStorage.getItem(STORAGE_KEY)||0)); }
    function cellCenter(r,c){ const rect=board.getBoundingClientRect(), gap=6, pad=8, size=(rect.width-pad*2-gap*4)/5; return {left:pad+c*(size+gap)+size/2, top:pad+r*(size+gap)+size/2}; }
    function setTrain(pos){ const p=cellCenter(pos[0],pos[1]); train.style.left=p.left+'px'; train.style.top=p.top+'px'; }
    function updateHud(){ $('levelText').textContent=String(state.level+1); $('scoreText').textContent=String(state.score); $('pathText').textContent=String(state.path.length); $('passText').textContent=state.passed.length+'/'+lv().stops.length; }
    function render(){ const level=lv(); board.innerHTML=''; $('missionTitle').textContent=level.name; $('ticket').innerHTML=level.stops.map((s,i)=>`<span style="opacity:${state.passed[i]?1:.38}">${s.icon}</span>`).join('')+'<span>🎁</span>'; const pathSet=new Map(state.path.map((p,i)=>[key(p[0],p[1]),i]));
      for(let r=0;r<SIZE;r++){ for(let c=0;c<SIZE;c++){ const cell=document.createElement('button'); cell.type='button'; cell.className='cell'; cell.dataset.r=r; cell.dataset.c=c; cell.setAttribute('aria-label',`${r+1}행 ${c+1}열`); const idx=pathSet.get(key(r,c)); if(idx!==undefined){ cell.classList.add('drawn'); if(idx>0&&idx<state.path.length-1){ const a=state.path[idx-1], b=state.path[idx+1]; if(a[0]!==b[0]&&a[1]!==b[1]) cell.classList.add('turn'); }}
        if(same([r,c],level.start)){cell.classList.add('start'); cell.innerHTML='<span class="icon">🚉</span>';} else if(same([r,c],level.goal)){cell.classList.add('goal'); cell.innerHTML='<span class="icon">🎁</span>';} else { const stop=level.stops.find(s=>same([r,c],s.pos)); if(stop){cell.classList.add('station'); cell.innerHTML='<span class="icon">'+stop.icon+'</span>';}}
        cell.addEventListener('pointerdown', onPointerDown); board.appendChild(cell); }}
      updateHud(); setTrain(state.path[0]||level.start); }
    function resetPath(){ state.path=[lv().start.slice()]; state.passed=[]; message.textContent='출발역을 누른 채로 손가락을 움직여 레일을 그려 보세요!'; render(); }
    function startLevel(n){ state.level=n; resetPath(); }
    function onPointerDown(e){ e.preventDefault(); const r=Number(e.currentTarget.dataset.r), c=Number(e.currentTarget.dataset.c); if(!same([r,c], state.path[state.path.length-1])) { if(same([r,c], lv().start)) resetPath(); else return; } state.drawing=true; window.addEventListener('pointermove', onPointerMove); window.addEventListener('pointerup', onPointerUp, {once:true}); }
    function onPointerMove(e){ if(!state.drawing) return; e.preventDefault(); const el=document.elementFromPoint(e.clientX,e.clientY); const cell=el && el.closest && el.closest('.cell'); if(!cell) return; addCell(Number(cell.dataset.r), Number(cell.dataset.c)); }
    function onPointerUp(){ state.drawing=false; window.removeEventListener('pointermove', onPointerMove); }
    function addCell(r,c){ const last=state.path[state.path.length-1]; if(!last) return; const dist=Math.abs(last[0]-r)+Math.abs(last[1]-c); if(dist!==1) return; const existing=state.path.findIndex(p=>same(p,[r,c])); if(existing>=0){ state.path=state.path.slice(0, existing+1); recomputeStops(); message.textContent='되돌아가며 길을 고쳤어요.'; render(); return; } state.path.push([r,c]); recomputeStops(); render(); }
    function recomputeStops(){ state.passed=[]; const stops=lv().stops; for(const p of state.path){ const next=stops[state.passed.length]; if(next&&same(p,next.pos)) state.passed.push(true); } }
    function validate(){ const level=lv(), last=state.path[state.path.length-1]; if(!same(state.path[0], level.start)) return {ok:false,msg:'출발역에서 시작해야 해요.'}; if(!same(last, level.goal)) return {ok:false,msg:'아직 선물역까지 도착하지 않았어요.'}; if(state.passed.length!==level.stops.length) return {ok:false,msg:'미션 스티커를 순서대로 모두 지나야 해요.'}; return {ok:true,msg:'완벽한 직접 그린 레일이에요!'}; }
    function runTrain(){ const res=validate(); if(!res.ok){ message.textContent='앗! '+res.msg; board.animate([{transform:'translateX(0)'},{transform:'translateX(-8px)'},{transform:'translateX(8px)'},{transform:'translateX(0)'}],{duration:260}); return; } message.textContent='출발! 내가 그린 레일 위를 기차가 달려요!'; train.classList.add('run'); animatePath(0); }
    function animatePath(i){ setTrain(state.path[i]); if(i<state.path.length-1) setTimeout(()=>animatePath(i+1),210); else setTimeout(clearLevel,420); }
    function clearLevel(){ train.classList.remove('run'); const efficiency=Math.max(0, 34-state.path.length)*3; const stopBonus=lv().stops.length*35; state.score+=100+efficiency+stopBonus+state.level*25; burst(); if(state.level>=LEVELS.length-1) finish(); else { message.textContent=`레벨 ${state.level+1} 성공! 다음 미션으로 갑니다.`; setTimeout(()=>startLevel(state.level+1),900); } updateHud(); }
    function finish(){ const best=Number(localStorage.getItem(STORAGE_KEY)||0); if(state.score>best) localStorage.setItem(STORAGE_KEY,String(state.score)); loadBest(); $('finalScore').textContent=String(state.score); $('endTitle').textContent='🎉 무지개 레일 기사!'; $('resultMsg').textContent=state.score>best?'새 최고기록! 손으로 직접 만든 레일이 최고예요.':'손으로 직접 만든 레일이 선물을 모두 배달했어요.'; setTimeout(()=>$('endOverlay').classList.remove('hidden'),800); }
    function undo(){ if(state.path.length>1){ state.path.pop(); recomputeStops(); message.textContent='한 칸 되돌렸어요.'; render(); }}
    function burst(){ const rect=board.getBoundingClientRect(); for(let i=0;i<26;i++){ const p=document.createElement('span'); p.className='spark'; p.style.left=(rect.left+rect.width/2)+'px'; p.style.top=(rect.top+rect.height/2)+'px'; p.style.background=['#ffd166','#ff6bcb','#4cc9f0','#95f985','#b77cff'][i%5]; p.style.setProperty('--x',Math.cos(i/26*Math.PI*2)*(70+i*2)+'px'); p.style.setProperty('--y',Math.sin(i/26*Math.PI*2)*(70+i*2)+'px'); document.body.appendChild(p); p.addEventListener('animationend',()=>p.remove(),{once:true}); }}
    $('startBtn').addEventListener('pointerdown',e=>{e.preventDefault(); $('startOverlay').classList.add('hidden'); state.score=0; startLevel(0);});
    $('restartBtn').addEventListener('pointerdown',e=>{e.preventDefault(); $('endOverlay').classList.add('hidden'); state.score=0; startLevel(0);});
    $('runBtn').addEventListener('pointerdown',e=>{e.preventDefault(); runTrain();}); $('undoBtn').addEventListener('pointerdown',e=>{e.preventDefault(); undo();}); $('resetBtn').addEventListener('pointerdown',e=>{e.preventDefault(); resetPath();});
    window.addEventListener('resize',()=>setTrain(state.path[0]||lv().start)); loadBest(); startLevel(0);
  })();
  </script>
</body>
</html>
