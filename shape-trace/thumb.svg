<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- 배경 -->
  <rect width="120" height="120" rx="20" fill="#FFF8F0"/>

  <!-- 점선 별 -->
  <polygon
    points="60,14 66,42 94,42 72,58 80,86 60,70 40,86 48,58 26,42 54,42"
    fill="none"
    stroke="#FFD166"
    stroke-width="4"
    stroke-dasharray="8 5"
    stroke-linejoin="round"
    opacity="0.7"
  />

  <!-- 색칠된 별 (50% 채움) -->
  <polygon
    points="60,14 66,42 94,42 72,58 80,86 60,70 40,86 48,58 26,42 54,42"
    fill="#FFD166"
    opacity="0.28"
  />

  <!-- 손가락 선 -->
  <polyline
    points="40,86 48,58 26,42 54,42 60,14 66,42"
    fill="none"
    stroke="#FFD166"
    stroke-width="5"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.9"
  />

  <!-- 시작점 -->
  <circle cx="40" cy="86" r="5" fill="#FFD166"/>

  <!-- 반짝임 파티클 -->
  <circle cx="95" cy="22" r="4" fill="#06D6A0" opacity="0.8"/>
  <circle cx="18" cy="30" r="3" fill="#EF476F" opacity="0.7"/>
  <circle cx="104" cy="70" r="3" fill="#118AB2" opacity="0.7"/>
  <circle cx="12" cy="80" r="2.5" fill="#FFD166" opacity="0.8"/>
</svg>
