<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
  <!-- 배경 -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a2e"/>
      <stop offset="100%" stop-color="#1a1a5e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe66d"/>
      <stop offset="100%" stop-color="#ffb347"/>
    </linearGradient>
  </defs>
  <rect width="320" height="180" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="319" height="179" fill="none" stroke="rgba(255,255,255,0.08)"/>

  <!-- 배경 별 장식 -->
  <text x="14" y="30" font-size="10" opacity="0.25">✦</text>
  <text x="50" y="18" font-size="8" opacity="0.2">✦</text>
  <text x="90" y="28" font-size="12" opacity="0.18">✦</text>
  <text x="130" y="14" font-size="9" opacity="0.22">✦</text>
  <text x="200" y="22" font-size="7" opacity="0.2">✦</text>
  <text x="250" y="12" font-size="11" opacity="0.18">✦</text>
  <text x="18" y="155" font-size="8" opacity="0.2">✦</text>
  <text x="60" y="165" font-size="10" opacity="0.18">✦</text>

  <!-- 그룹 A 별들 -->
  <text x="20" y="62" font-size="26">⭐</text>
  <text x="54" y="62" font-size="26">⭐</text>
  <text x="88" y="62" font-size="26">⭐</text>

  <!-- + 기호 -->
  <text x="118" y="60" font-size="28" font-weight="900" fill="#ffe66d">+</text>

  <!-- 그룹 B 별들 -->
  <text x="148" y="62" font-size="26">🌟</text>
  <text x="182" y="62" font-size="26">🌟</text>

  <!-- = 기호 -->
  <text x="214" y="60" font-size="28" font-weight="900" fill="#ffe66d">=</text>

  <!-- 물음표 -->
  <text x="247" y="65" font-size="34" font-weight="900" fill="url(#glow)">5</text>

  <!-- 바구니 아이콘 -->
  <text x="20" y="120" font-size="40">🧺</text>

  <!-- 바구니 안 별들 -->
  <text x="72" y="112" font-size="22">⭐</text>
  <text x="100" y="112" font-size="22">⭐</text>
  <text x="128" y="112" font-size="22">⭐</text>
  <text x="72" y="136" font-size="22">🌟</text>
  <text x="100" y="136" font-size="22">🌟</text>

  <!-- 타이틀 (우하단) -->
  <g font-family="'Pretendard','Noto Sans KR',sans-serif">
    <text x="296" y="152" text-anchor="end" font-size="22" font-weight="900" fill="#ffe66d">별 더하기</text>
    <text x="296" y="168" text-anchor="end" font-size="10" font-weight="500" fill="rgba(255,255,255,0.5)" letter-spacing="2">STAR ADDER</text>
  </g>
</svg>
