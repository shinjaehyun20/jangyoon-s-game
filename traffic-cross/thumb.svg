<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
  <defs>
    <linearGradient id="bgGrass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4ade80"/>
      <stop offset="1" stop-color="#166534"/>
    </linearGradient>
  </defs>
  <!-- 배경: 풀 -->
  <rect width="320" height="180" fill="url(#bgGrass)"/>
  <rect x="0.5" y="0.5" width="319" height="179" fill="none" stroke="rgba(255,255,255,0.08)"/>

  <!-- 도착 안전지대 (상단) -->
  <rect x="0" y="0" width="320" height="22" fill="#fbbf24"/>
  <text x="160" y="15" text-anchor="middle" font-size="11" font-weight="900" fill="#78350f" letter-spacing="3" font-family="'Pretendard','Noto Sans KR',sans-serif">★ 도착 ★</text>

  <!-- 도로 1 -->
  <rect x="0" y="32" width="320" height="32" fill="#3a3f50"/>
  <g stroke="#facc15" stroke-width="3" stroke-dasharray="14,18" opacity="0.85">
    <line x1="0" y1="48" x2="320" y2="48"/>
  </g>
  <!-- 도로 2 -->
  <rect x="0" y="72" width="320" height="32" fill="#3a3f50"/>
  <g stroke="#facc15" stroke-width="3" stroke-dasharray="14,18" opacity="0.85">
    <line x1="0" y1="88" x2="320" y2="88"/>
  </g>
  <!-- 도로 3 -->
  <rect x="0" y="112" width="320" height="32" fill="#3a3f50"/>
  <g stroke="#facc15" stroke-width="3" stroke-dasharray="14,18" opacity="0.85">
    <line x1="0" y1="128" x2="320" y2="128"/>
  </g>

  <!-- 차량들 -->
  <text x="46" y="58"  font-size="26" text-anchor="middle">🚗</text>
  <text x="180" y="58" font-size="26" text-anchor="middle">🚕</text>
  <text x="270" y="58" font-size="26" text-anchor="middle">🚙</text>

  <text x="80" y="98"  font-size="26" text-anchor="middle" transform="rotate(180,80,90)">🚌</text>
  <text x="210" y="98" font-size="26" text-anchor="middle" transform="rotate(180,210,90)">🚓</text>

  <text x="40" y="138"  font-size="26" text-anchor="middle">🚙</text>
  <text x="156" y="138" font-size="26" text-anchor="middle">🚗</text>
  <text x="250" y="138" font-size="26" text-anchor="middle">🚌</text>

  <!-- 플레이어 동물 (출발 안전지대 위 약간 진입) -->
  <text x="110" y="112" font-size="30" text-anchor="middle">🐰</text>

  <!-- 타이틀 -->
  <g font-family="'Pretendard','Noto Sans KR',sans-serif">
    <text x="296" y="162" text-anchor="end" font-size="20" font-weight="900" fill="#fbbf24" stroke="#78350f" stroke-width="0.5">길 건너기</text>
    <text x="296" y="176" text-anchor="end" font-size="9" font-weight="500" fill="rgba(255,255,255,0.65)" letter-spacing="2">TRAFFIC CROSS</text>
  </g>
</svg>
