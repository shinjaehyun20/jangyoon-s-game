<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#2a2a5a"/>
    </linearGradient>
    <linearGradient id="road" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2d2d44;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:0.9"/>
    </linearGradient>
  </defs>
  <!-- 배경 -->
  <rect width="320" height="180" fill="url(#bg)"/>
  <!-- 내부 경계선 -->
  <rect x="0.5" y="0.5" width="319" height="179" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- 도로 -->
  <rect x="60" y="0" width="200" height="180" fill="url(#road)" rx="4"/>

  <!-- 차선 구분선 -->
  <line x1="127" y1="0" x2="127" y2="180" stroke="#f0c040" stroke-width="3" stroke-dasharray="20,16" opacity="0.5"/>
  <line x1="194" y1="0" x2="194" y2="180" stroke="#f0c040" stroke-width="3" stroke-dasharray="20,16" opacity="0.5"/>

  <!-- 적 차량들 (위에서 내려오는) -->
  <text x="96" y="55" font-size="36" text-anchor="middle">🚕</text>
  <text x="163" y="30" font-size="36" text-anchor="middle">🚌</text>
  <text x="229" y="65" font-size="36" text-anchor="middle">🚙</text>

  <!-- 플레이어 차 (아래) -->
  <text x="163" y="148" font-size="40" text-anchor="middle">🚗</text>

  <!-- 코인 -->
  <text x="96" y="110" font-size="22" text-anchor="middle">🪙</text>

  <!-- 속도감 라인 -->
  <line x1="62" y1="70" x2="62" y2="120" stroke="#ff6b35" stroke-width="2" opacity="0.4"/>
  <line x1="258" y1="50" x2="258" y2="110" stroke="#ff6b35" stroke-width="2" opacity="0.4"/>

  <!-- 우하단 타이틀 -->
  <g font-family="'Pretendard','Noto Sans KR',sans-serif">
    <text x="296" y="148" text-anchor="end" font-size="22" font-weight="900" fill="#ff6b35">자동차 경주</text>
    <text x="296" y="166" text-anchor="end" font-size="10" font-weight="500" fill="rgba(255,255,255,0.5)" letter-spacing="2">CAR RACE</text>
  </g>
</svg>
