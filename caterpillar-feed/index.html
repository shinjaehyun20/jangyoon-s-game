<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>🐛 애벌레 먹이주기</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100vh; height: 100dvh;
      overflow: hidden;
      touch-action: manipulation;
      font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
      background: linear-gradient(160deg, #0d2b1a 0%, #1a4a2e 60%, #0d3321 100%);
      user-select: none; -webkit-user-select: none;
    }
    .wrap {
      width: 100%; max-width: 480px;
      height: 100vh; height: 100dvh;
      display: flex; flex-direction: column;
      padding: 10px 12px 8px; gap: 8px;
      margin: 0 auto;
      position: relative;
    }
    h1 {
      font-size: clamp(18px, 5vw, 26px);
      color: #a8f0a0;
      text-align: center;
      letter-spacing: -0.5px;
    }
    .hud {
      display: flex; gap: 6px;
      background: rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 8px 14px;
      color: #fff;
      font-size: clamp(13px, 3.5vw, 16px);
      font-weight: 700;
      align-items: center;
    }
    .hud > span { flex: 1; text-align: center; }
    /* 진행 바 */
    .progress-wrap {
      background: rgba(0,0,0,0.3);
      border-radius: 8px;
      height: 12px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #4dcc66, #ffe066);
      border-radius: 8px;
      transition: width 0.3s;
    }
    #gameArea {
      flex: 1;
      position: relative;
      overflow: hidden;
      border-radius: 16px;
      background: rgba(255,255,255,0.04);
    }
    /* 나뭇잎 */
    .leaf {
      position: absolute;
      font-size: clamp(36px, 10vw, 52px);
      cursor: pointer;
      transition: transform 0.15s;
      animation: sway linear infinite alternate;
      filter: drop-shadow(0 4px 6px rgba(0,0,0,0.4));
      line-height: 1;
    }
    .leaf:active { transform: scale(1.15) rotate(5deg); }
    .leaf.target {
      animation: sway linear infinite alternate, glowLeaf 0.8s ease infinite alternate;
    }
    @keyframes sway {
      from { transform: rotate(-6deg); }
      to   { transform: rotate(6deg); }
    }
    @keyframes glowLeaf {
      from { filter: drop-shadow(0 0 8px #4dcc66) drop-shadow(0 4px 6px rgba(0,0,0,0.4)); }
      to   { filter: drop-shadow(0 0 18px #a0ff80) drop-shadow(0 4px 6px rgba(0,0,0,0.4)); }
    }
    /* 애벌레 (드래그 가능) */
    #caterpillar {
      position: absolute;
      font-size: clamp(44px, 12vw, 60px);
      cursor: grab;
      transition: filter 0.15s;
      touch-action: none;
      filter: drop-shadow(0 4px 10px rgba(0,0,0,0.5));
      z-index: 10;
      line-height: 1;
    }
    #caterpillar:active { cursor: grabbing; }
    #caterpillar.happy {
      animation: happyJump 0.5s ease;
    }
    @keyframes happyJump {
      0%   { transform: scale(1) rotate(0deg); }
      30%  { transform: scale(1.3) rotate(-15deg); }
      60%  { transform: scale(1.2) rotate(10deg); }
      100% { transform: scale(1) rotate(0deg); }
    }
    /* 먹기 이펙트 */
    .eat-effect {
      position: absolute;
      font-size: clamp(24px, 7vw, 36px);
      pointer-events: none;
      animation: eatPop 0.7s ease-out forwards;
      z-index: 20;
    }
    @keyframes eatPop {
      0%   { transform: scale(0.5) translateY(0); opacity: 1; }
      60%  { transform: scale(1.4) translateY(-30px); opacity: 1; }
      100% { transform: scale(1) translateY(-60px); opacity: 0; }
    }
    /* 오답 이펙트 */
    .wrong-effect {
      position: absolute;
      font-size: clamp(20px, 6vw, 30px);
      pointer-events: none;
      animation: eatPop 0.7s ease-out forwards;
      z-index: 20;
      color: #ff6666;
    }
    /* 레벨 클리어 */
    .level-banner {
      position: absolute;
      inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.55);
      z-index: 50;
      pointer-events: none;
      animation: bannerFade 1.4s ease-out forwards;
    }
    .level-banner span {
      font-size: clamp(26px, 8vw, 40px);
      font-weight: 900;
      color: #fff;
      text-shadow: 0 0 20px #4dcc66, 0 4px 16px rgba(0,0,0,0.8);
      background: rgba(0,80,0,0.5);
      border-radius: 16px;
      padding: 14px 28px;
    }
    @keyframes bannerFade {
      0%   { opacity: 0; } 20% { opacity: 1; }
      70%  { opacity: 1; } 100% { opacity: 0; }
    }
    /* 오버레이 */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.75);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
    }
    .overlay.hidden { display: none; }
    .modal {
      background: linear-gradient(135deg, #1a4a2e, #0d2b1a);
      border-radius: 24px;
      padding: 32px 28px;
      text-align: center;
      color: #fff;
      max-width: 340px; width: 90%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      border: 2px solid rgba(77,204,102,0.3);
    }
    .modal h2 { font-size: clamp(24px, 7vw, 32px); margin-bottom: 12px; }
    .modal p  { font-size: clamp(14px, 4vw, 18px); margin-bottom: 8px; color: #a8f0a0; }
    .modal .big-score {
      font-size: clamp(40px, 12vw, 64px);
      font-weight: 900; color: #ffe066;
      margin: 16px 0;
      text-shadow: 0 4px 16px rgba(255,200,0,0.5);
    }
    .btn {
      display: block; width: 100%; padding: 16px 36px;
      background: linear-gradient(135deg, #4dcc66, #27a844);
      color: #fff; font-size: clamp(16px, 4.5vw, 20px);
      font-weight: 700; border: none; border-radius: 50px;
      cursor: pointer; margin-top: 16px;
      box-shadow: 0 6px 20px rgba(77,204,102,0.4);
      min-height: 56px; text-align: center;
      box-sizing: border-box;
    }
    .btn:active { transform: scale(0.96); }
    .btn-home {
      display: block; width: 100%; padding: 16px;
      background: #374151;
      color: #fff; font-size: clamp(15px, 4vw, 18px);
      font-weight: 700; border: none; border-radius: 50px;
      cursor: pointer; margin-top: 10px;
      min-height: 56px; text-align: center;
      text-decoration: none; box-sizing: border-box;
      line-height: 1.4;
    }
    .btn-home:active { transform: scale(0.96); }

    /* 시작 화면 */
    #startOverlay { display: flex; }
    #startOverlay .modal p { color: #c8f0c0; }
    .rule-list {
      list-style: none;
      text-align: left;
      margin: 14px 0;
      font-size: clamp(13px, 3.8vw, 16px);
      color: #c8f0c0;
    }
    .rule-list li { margin-bottom: 8px; }
    .rule-list li::before { content: '🌿 '; }
  </style>
</head>
<body>
<div class="wrap">
  <h1>🐛 애벌레 먹이주기</h1>
  <div class="hud">
    <span>⭐ <span id="scoreEl">0</span></span>
    <span>❤️ <span id="livesEl">●●●</span></span>
    <span>🌿 레벨 <span id="levelEl">1</span></span>
  </div>
  <div class="progress-wrap">
    <div class="progress-bar" id="progressBar" style="width:0%"></div>
  </div>
  <div id="gameArea"></div>
</div>

<!-- 시작 화면 -->
<div class="overlay" id="startOverlay">
  <div class="modal">
    <h2>🐛 애벌레 먹이주기</h2>
    <ul class="rule-list">
      <li>반짝이는 나뭇잎이 정답이에요!</li>
      <li>🐛 애벌레를 끌어서 갖다 대요</li>
      <li>다른 잎을 먹으면 ❤️ 하나 잃어요</li>
      <li>레벨이 오를수록 잎이 많아져요</li>
    </ul>
    <button class="btn" id="btnStart">시작하기 🍃</button>
  </div>
</div>

<!-- 게임 오버 -->
<div class="overlay hidden" id="overlayEnd">
  <div class="modal">
    <h2>🦋 나비가 됐어요!</h2>
    <p>도달한 레벨</p>
    <div class="big-score" id="endLevel">1</div>
    <p>획득한 별</p>
    <div class="big-score" id="endScore">0</div>
    <button class="btn" id="btnRestart">🔄 다시 하기</button>
    <a class="btn-home" href="../index.html">🏠 게임 목록으로</a>
  </div>
</div>

<script>
(function() {
  'use strict';

  // ── 나뭇잎 종류 ──
  const LEAVES = ['🍃', '🌿', '🍀', '🍁', '🌱', '🌾', '🪴', '🌵'];
  // 맞는 잎만 정답 (첫 번째 그룹)
  const CORRECT_LEAF = '🍃';
  // 오답 잎
  const WRONG_LEAVES = ['🌸', '🌻', '🌷', '🌹', '🌺', '💐', '🍄', '🫐', '🍓', '🍊'];

  let score = 0;
  let lives = 3;
  let level = 1;
  let targetLeafIdx = 0; // 현재 정답 나뭇잎 인덱스
  let leaves = [];       // { el, isTarget, x, y }
  let catEl = null;
  let isDragging = false;
  let dragOffX = 0, dragOffY = 0;
  let catX = 0, catY = 0;
  let catSize = 52;
  let levelProgress = 0; // 이 레벨에서 맞춘 개수
  let levelGoal = 3;     // 레벨 클리어 조건
  let gameRunning = false;

  const gameArea   = document.getElementById('gameArea');
  const scoreEl    = document.getElementById('scoreEl');
  const livesEl    = document.getElementById('livesEl');
  const levelEl    = document.getElementById('levelEl');
  const progressBar= document.getElementById('progressBar');
  const overlayEnd = document.getElementById('overlayEnd');
  const startOverlay=document.getElementById('startOverlay');
  const endLevel   = document.getElementById('endLevel');
  const endScore   = document.getElementById('endScore');
  const btnRestart = document.getElementById('btnRestart');
  const btnStart   = document.getElementById('btnStart');

  function randInt(a, b) { return Math.floor(Math.random() * (b - a + 1)) + a; }
  function rand(a, b)    { return Math.random() * (b - a) + a; }

  function updateHUD() {
    scoreEl.textContent = score;
    livesEl.textContent = '●'.repeat(lives) + '○'.repeat(3 - lives);
    levelEl.textContent = level;
    const pct = Math.min(100, Math.round((levelProgress / levelGoal) * 100));
    progressBar.style.width = pct + '%';
  }

  // ── 잎 배치 ──
  function spawnLeaves() {
    // 기존 잎 제거
    leaves.forEach(l => l.el.remove());
    leaves = [];

    const areaW = gameArea.offsetWidth;
    const areaH = gameArea.offsetHeight;
    const leafSize = 52;
    const margin = 60;

    // 레벨에 따라 총 잎 개수 결정 (3~8개)
    const totalLeaves = Math.min(3 + level, 8);
    const wrongCount  = totalLeaves - 1; // 오답 잎 개수

    // 정답 잎 1개 배치
    const targetEl = document.createElement('div');
    targetEl.className = 'leaf target';

    // 정답 잎: 레벨마다 다른 종류 사용
    const correctEmoji = LEAVES[Math.min(level - 1, LEAVES.length - 1)];
    targetEl.textContent = correctEmoji;
    const tx = randInt(margin, areaW - margin);
    const ty = randInt(margin, areaH - margin * 1.5);
    targetEl.style.left = tx + 'px';
    targetEl.style.top  = ty + 'px';
    targetEl.style.animationDuration = rand(2, 4) + 's';
    targetEl.style.animationDelay = '-' + rand(0, 2) + 's';
    gameArea.appendChild(targetEl);
    leaves.push({ el: targetEl, isTarget: true, x: tx, y: ty, size: leafSize, emoji: correctEmoji });

    // 오답 잎 배치 (정답과 다른 이모지)
    const wrongPool = WRONG_LEAVES.slice(0, Math.max(3, wrongCount + 1));
    for (let i = 0; i < wrongCount; i++) {
      const wrongEl = document.createElement('div');
      wrongEl.className = 'leaf';
      const wrongEmoji = wrongPool[i % wrongPool.length];
      wrongEl.textContent = wrongEmoji;
      // 충돌 최소화를 위해 간단 배치
      let wx, wy, tries = 0;
      do {
        wx = randInt(margin / 2, areaW - margin / 2);
        wy = randInt(margin / 2, areaH - margin);
        tries++;
      } while (tries < 20 && dist(wx, wy, tx, ty) < 80);
      wrongEl.style.left = wx + 'px';
      wrongEl.style.top  = wy + 'px';
      wrongEl.style.animationDuration = rand(2.5, 5) + 's';
      wrongEl.style.animationDelay = '-' + rand(0, 3) + 's';
      gameArea.appendChild(wrongEl);
      leaves.push({ el: wrongEl, isTarget: false, x: wx, y: wy, size: leafSize, emoji: wrongEmoji });
    }

    // 힌트 텍스트를 정답 잎 위에
    showHint(correctEmoji, level);
  }

  function dist(ax, ay, bx, by) {
    return Math.sqrt((ax-bx)**2 + (ay-by)**2);
  }

  function showHint(emoji, lv) {
    // gameArea 상단에 힌트 레이블
    const old = gameArea.querySelector('.hint-label');
    if (old) old.remove();
    const hint = document.createElement('div');
    hint.className = 'hint-label';
    hint.style.cssText = `
      position:absolute; top:8px; left:50%; transform:translateX(-50%);
      background:rgba(0,0,0,0.5); border-radius:20px;
      padding:5px 16px; color:#a8f0a0;
      font-size:clamp(13px,3.5vw,16px); font-weight:700;
      white-space:nowrap; z-index:5; pointer-events:none;
    `;
    hint.textContent = `${emoji} 반짝이는 잎을 먹어요!`;
    gameArea.appendChild(hint);
  }

  // ── 애벌레 생성 ──
  function spawnCaterpillar() {
    if (catEl) catEl.remove();
    catEl = document.createElement('div');
    catEl.id = 'caterpillar';
    catEl.textContent = '🐛';
    catSize = Math.max(44, 60 - level * 2);
    catEl.style.fontSize = catSize + 'px';
    catX = gameArea.offsetWidth / 2 - catSize / 2;
    catY = gameArea.offsetHeight - catSize - 20;
    catEl.style.left = catX + 'px';
    catEl.style.top  = catY + 'px';
    gameArea.appendChild(catEl);
    bindDrag();
  }

  function bindDrag() {
    catEl.addEventListener('pointerdown', onDragStart, { passive: false });
  }

  function onDragStart(e) {
    if (!gameRunning) return;
    e.preventDefault();
    isDragging = true;
    const rect = gameArea.getBoundingClientRect();
    dragOffX = e.clientX - rect.left - catX;
    dragOffY = e.clientY - rect.top  - catY;
    catEl.setPointerCapture(e.pointerId);
    catEl.addEventListener('pointermove', onDragMove, { passive: false });
    catEl.addEventListener('pointerup', onDragEnd);
    catEl.addEventListener('pointercancel', onDragEnd);
  }

  function onDragMove(e) {
    if (!isDragging) return;
    e.preventDefault();
    const rect = gameArea.getBoundingClientRect();
    catX = e.clientX - rect.left - dragOffX;
    catY = e.clientY - rect.top  - dragOffY;
    // 경계 클램프
    catX = Math.max(0, Math.min(gameArea.offsetWidth  - catSize, catX));
    catY = Math.max(0, Math.min(gameArea.offsetHeight - catSize, catY));
    catEl.style.left = catX + 'px';
    catEl.style.top  = catY + 'px';
    // 충돌 감지
    checkCollision();
  }

  function onDragEnd(e) {
    if (!isDragging) return;
    isDragging = false;
    catEl.removeEventListener('pointermove', onDragMove);
    catEl.removeEventListener('pointerup', onDragEnd);
    catEl.removeEventListener('pointercancel', onDragEnd);
  }

  // ── 충돌 감지 ──
  function checkCollision() {
    const cx = catX + catSize / 2;
    const cy = catY + catSize / 2;
    leaves.forEach((leaf) => {
      if (leaf.eaten) return;
      const lx = leaf.x + leaf.size / 2;
      const ly = leaf.y + leaf.size / 2;
      if (dist(cx, cy, lx, ly) < (catSize / 2 + leaf.size / 2) * 0.7) {
        leaf.eaten = true;
        if (leaf.isTarget) {
          eatCorrect(leaf);
        } else {
          eatWrong(leaf);
        }
      }
    });
  }

  function eatCorrect(leaf) {
    leaf.el.remove();
    spawnEatEffect(leaf.x + leaf.size/2, leaf.y, '😋 +10');
    catEl.classList.add('happy');
    catEl.addEventListener('animationend', () => catEl.classList.remove('happy'), { once: true });
    score += 10;
    levelProgress++;
    updateHUD();

    // 레벨 클리어?
    if (levelProgress >= levelGoal) {
      levelUp();
    } else {
      // 잎 재배치
      setTimeout(spawnLeaves, 400);
    }
  }

  function eatWrong(leaf) {
    leaf.el.remove();
    spawnWrongEffect(catX + catSize/2, catY, '🤢 앗!');
    lives = Math.max(0, lives - 1);
    updateHUD();
    // 진동 이펙트
    catEl.style.transition = 'left 0.05s';
    const origX = catX;
    catEl.style.left = (catX - 12) + 'px';
    setTimeout(() => { catEl.style.left = (catX + 12) + 'px'; }, 60);
    setTimeout(() => { catEl.style.left = origX + 'px'; catEl.style.transition = ''; }, 120);

    if (lives === 0) {
      gameRunning = false;
      setTimeout(endGame, 500);
    } else {
      setTimeout(spawnLeaves, 400);
    }
  }

  function levelUp() {
    level++;
    levelProgress = 0;
    levelGoal = 3 + Math.floor(level / 2); // 레벨마다 목표 증가
    score += 30; // 레벨 클리어 보너스
    updateHUD();
    // 레벨 배너
    const banner = document.createElement('div');
    banner.className = 'level-banner';
    banner.innerHTML = `<span>🎉 레벨 ${level} 돌입! +30 ⭐</span>`;
    gameArea.appendChild(banner);
    banner.addEventListener('animationend', () => banner.remove());
    setTimeout(() => {
      spawnCaterpillar();
      spawnLeaves();
    }, 1400);
  }

  function spawnEatEffect(x, y, text) {
    const el = document.createElement('div');
    el.className = 'eat-effect';
    el.textContent = text;
    el.style.left = (x - 30) + 'px';
    el.style.top  = y + 'px';
    el.style.color = '#ffe066';
    el.style.fontWeight = '900';
    gameArea.appendChild(el);
    el.addEventListener('animationend', () => el.remove());
  }

  function spawnWrongEffect(x, y, text) {
    const el = document.createElement('div');
    el.className = 'wrong-effect';
    el.textContent = text;
    el.style.left = (x - 30) + 'px';
    el.style.top  = y + 'px';
    gameArea.appendChild(el);
    el.addEventListener('animationend', () => el.remove());
  }

  function endGame() {
    endLevel.textContent = level;
    endScore.textContent = score;
    overlayEnd.classList.remove('hidden');
  }

  function resetGame() {
    score = 0; lives = 3; level = 1;
    levelProgress = 0; levelGoal = 3;
    gameRunning = true;
    updateHUD();
    overlayEnd.classList.add('hidden');
    startOverlay.classList.add('hidden');
    spawnCaterpillar();
    spawnLeaves();
  }

  // 모바일에서 click 이벤트가 지연될 수 있어 pointerdown + touchstart 이중 바인딩
  function bindStart(el, fn) {
    var fired = false;
    function handler(e) {
      e.preventDefault();
      if (fired) return;
      fired = true;
      fn();
      // 300ms 후 중복 방지 플래그 리셋 (다음 게임 시작을 위해)
      setTimeout(function() { fired = false; }, 300);
    }
    el.addEventListener('pointerdown', handler);
    el.addEventListener('click', function(e) { e.preventDefault(); }); // click 기본동작 차단
  }

  bindStart(btnStart, resetGame);
  bindStart(btnRestart, resetGame);
})();
</script>
</body>
</html>
