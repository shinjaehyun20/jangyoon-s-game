<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>⭐ 별 쌓기 밤하늘 탑</title>
  <style>
    :root {
      --bg-top: #05050f;
      --bg-bot: #0d0d2b;
      --accent: #ffe066;
      --text: #ffffff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100vh; height: 100dvh;
      overflow: hidden;
      touch-action: manipulation;
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: linear-gradient(180deg, var(--bg-top), var(--bg-bot));
      color: var(--text);
    }
    .wrap {
      width: 100%; max-width: 480px;
      height: 100vh; height: 100dvh;
      display: flex; flex-direction: column;
      padding: 10px 12px 6px;
      margin: 0 auto;
      gap: 6px;
    }
    h1 {
      font-size: clamp(18px, 5vw, 26px);
      text-align: center;
      color: var(--accent);
      text-shadow: 0 0 12px rgba(255,224,102,0.6);
      flex-shrink: 0;
    }
    .hud {
      display: flex; gap: 8px;
      background: rgba(255,255,255,0.07);
      border-radius: 12px;
      padding: 7px 14px;
      flex-shrink: 0;
    }
    .hud-item { flex: 1; text-align: center; }
    .hud-label { font-size: 11px; opacity: 0.55; display: block; }
    .hud-value { font-size: 22px; font-weight: 900; color: var(--accent); }
    #gameArea {
      flex: 1;
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      background: linear-gradient(180deg, #05050f 0%, #0b0b22 50%, #10103a 100%);
      cursor: pointer;
      user-select: none;
      touch-action: none;
    }
    canvas {
      width: 100%; height: 100%;
      display: block;
    }
    #overlay {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: rgba(5,5,15,0.82);
      gap: 18px;
      z-index: 10;
    }
    #overlay .big { font-size: clamp(28px, 9vw, 52px); }
    #overlay .msg { font-size: clamp(14px, 4vw, 20px); opacity: 0.8; text-align: center; padding: 0 24px; }
    #overlay .score-line { font-size: clamp(18px, 5vw, 28px); color: var(--accent); font-weight: 900; }
    .btn {
      padding: 16px 48px;
      font-size: clamp(18px, 5vw, 26px);
      font-weight: 900;
      border: none; border-radius: 50px;
      background: linear-gradient(135deg, #ffe066, #ffaa00);
      color: #1a0a00;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(255,200,0,0.5);
      min-width: 180px;
      min-height: 60px;
      transition: transform 0.1s;
    }
    .btn:active { transform: scale(0.95); }
  </style>
</head>
<body>
<div class="wrap">
  <h1>⭐ 별 쌓기 밤하늘 탑</h1>
  <div class="hud">
    <div class="hud-item">
      <span class="hud-label">높이</span>
      <span class="hud-value" id="hScore">0</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">최고</span>
      <span class="hud-value" id="hBest">0</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">별 수</span>
      <span class="hud-value" id="hCount">0</span>
    </div>
  </div>
  <div id="gameArea">
    <canvas id="c"></canvas>
    <div id="overlay">
      <div class="big">⭐</div>
      <div class="msg">좌우로 움직이는 별을<br>탭해서 밤하늘 탑을 쌓아요!</div>
      <button class="btn" id="startBtn">시작!</button>
    </div>
  </div>
</div>

<script>
/* ===== 별 쌓기 밤하늘 탑 ===== */
(function() {
  'use strict';

  /* --- DOM --- */
  const area   = document.getElementById('gameArea');
  const canvas = document.getElementById('c');
  const ctx    = canvas.getContext('2d');
  const overlay   = document.getElementById('overlay');
  const startBtn  = document.getElementById('startBtn');
  const hScore    = document.getElementById('hScore');
  const hBest     = document.getElementById('hBest');
  const hCount    = document.getElementById('hCount');

  /* --- 상수 --- */
  const STAR_SIZE   = 52;  // 별 반지름(px) — 터치 영역
  const MOVE_SPEED_INIT = 2.2;
  const GRAVITY     = 0.38;
  const FRICTION    = 0.82;
  const FLOOR_Y_RAT = 0.88; // 바닥 위치(캔버스 높이 비율)
  const MISS_SHAKE  = 12;   // miss 시 흔들림 px
  const TRAIL_MAX   = 8;

  /* --- 상태 --- */
  let W, H, floorY;
  let state = 'idle'; // idle | playing | gameover
  let score = 0, bestScore = 0, starCount = 0;

  let mover = null;   // 위에서 움직이는 별
  let stack = [];     // 쌓인 별 배열
  let particles = []; // 반짝 파티클
  let bgStars = [];   // 배경 별
  let shakeTick = 0;
  let raf;

  /* --- WebAudio --- */
  let audioCtx = null;
  function getAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }
  function playTone(freq, type, dur, vol) {
    try {
      const ac = getAudio();
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.connect(gain); gain.connect(ac.destination);
      osc.type = type || 'sine';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(vol || 0.18, ac.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
      osc.start(); osc.stop(ac.currentTime + dur);
    } catch(e) {}
  }
  function playStack() {
    playTone(660, 'sine', 0.15, 0.22);
    setTimeout(() => playTone(880, 'sine', 0.12, 0.15), 60);
  }
  function playMiss() {
    playTone(220, 'sawtooth', 0.18, 0.12);
  }
  function playStart() {
    [440,554,660].forEach((f,i) => setTimeout(() => playTone(f,'sine',0.2,0.18), i*80));
  }

  /* --- 캔버스 리사이즈 --- */
  function resize() {
    const r = area.getBoundingClientRect();
    W = canvas.width  = r.width;
    H = canvas.height = r.height;
    floorY = H * FLOOR_Y_RAT;
    if (state === 'idle' || state === 'gameover') drawStatic();
  }

  /* --- 배경 별 생성 --- */
  function initBgStars() {
    bgStars = [];
    for (let i = 0; i < 60; i++) {
      bgStars.push({
        x: Math.random() * (W || 400),
        y: Math.random() * ((H || 700) * 0.9),
        r: Math.random() * 1.4 + 0.4,
        a: Math.random(),
        da: (Math.random() * 0.015 + 0.005) * (Math.random() < 0.5 ? 1 : -1)
      });
    }
  }

  /* --- 별 모양 그리기 --- */
  function starPath(cx, cy, r, spikes, inner) {
    const step = Math.PI / spikes;
    ctx.beginPath();
    for (let i = 0; i < spikes * 2; i++) {
      const ang = i * step - Math.PI / 2;
      const rad = i % 2 === 0 ? r : inner;
      if (i === 0) ctx.moveTo(cx + Math.cos(ang)*rad, cy + Math.sin(ang)*rad);
      else ctx.lineTo(cx + Math.cos(ang)*rad, cy + Math.sin(ang)*rad);
    }
    ctx.closePath();
  }

  function drawStar(cx, cy, r, color, glow, alpha) {
    ctx.save();
    ctx.globalAlpha = alpha !== undefined ? alpha : 1;
    if (glow) {
      ctx.shadowColor = color;
      ctx.shadowBlur  = 18;
    }
    starPath(cx, cy, r, 5, r * 0.42);
    ctx.fillStyle = color;
    ctx.fill();
    // 하이라이트
    ctx.globalAlpha = (alpha !== undefined ? alpha : 1) * 0.55;
    starPath(cx, cy - r*0.12, r*0.5, 5, r*0.22);
    ctx.fillStyle = '#fff';
    ctx.fill();
    ctx.restore();
  }

  /* --- 파티클 생성 --- */
  function spawnParticles(cx, cy, color) {
    for (let i = 0; i < 14; i++) {
      const ang = Math.random() * Math.PI * 2;
      const spd = Math.random() * 4 + 1.5;
      particles.push({
        x: cx, y: cy,
        vx: Math.cos(ang)*spd, vy: Math.sin(ang)*spd - 2,
        r: Math.random()*4+2,
        color: color,
        life: 1, decay: Math.random()*0.04+0.03
      });
    }
  }

  /* --- 무버(움직이는 별) 초기화 --- */
  function STAR_COLORS() {
    return ['#ffe066','#ffaa33','#ff66cc','#66ddff','#99ff66','#ff9966','#ccaaff'];
  }
  function spawnMover() {
    const colors = STAR_COLORS();
    const color  = colors[Math.floor(Math.random() * colors.length)];
    const level  = Math.min(score, 20);
    const speed  = (MOVE_SPEED_INIT + level * 0.18) * (Math.random() < 0.5 ? 1 : -1);
    mover = {
      x: W / 2,
      y: STAR_SIZE * 1.2,
      vx: speed,
      vy: 0,
      falling: false,
      landed:  false,
      color:   color,
      trail:   [],
      twinkle: 0,
      size: STAR_SIZE
    };
  }

  /* --- 쌓기 로직 --- */
  function landStar(star) {
    let targetY;
    const topStar = stack.length > 0 ? stack[stack.length - 1] : null;

    if (topStar) {
      // 이전 별 위에 착지
      const dx = Math.abs(star.x - topStar.x);
      if (dx < STAR_SIZE * 0.9) {
        // 잘 맞음 — 겹쳐 쌓기
        targetY = topStar.y - STAR_SIZE * 1.05;
        score++;
      } else {
        // 약간 빗나감 — 살짝 흔들리되 그냥 쌓임 (너무 가혹하지 않게)
        targetY = topStar.y - STAR_SIZE * 0.85;
        shakeTick = MISS_SHAKE;
        playMiss();
        // 별은 그냥 놓임 (game over X)
      }
    } else {
      targetY = floorY - STAR_SIZE * 0.6;
    }

    star.y      = targetY;
    star.vy     = 0;
    star.vx     = 0;
    star.falling = false;
    star.landed  = true;
    star.twinkle = 1;

    stack.push(star);
    starCount++;

    spawnParticles(star.x, star.y, star.color);
    playStack();

    // HUD 갱신
    hScore.textContent  = score;
    hCount.textContent  = starCount;
    if (score > bestScore) {
      bestScore = score;
      hBest.textContent = bestScore;
    }

    // 0.5초 후 다음 무버
    setTimeout(spawnMover, 500);
  }

  /* --- 탭/클릭 처리 --- */
  function handleTap(ex, ey) {
    if (state !== 'playing') return;
    if (!mover || mover.falling || mover.landed) return;

    // 터치 영역 확장 — 넓게 (7세 배려)
    const hitR = STAR_SIZE * 1.6;
    const dx   = ex - mover.x;
    const dy   = ey - mover.y;
    if (Math.sqrt(dx*dx + dy*dy) < hitR) {
      mover.falling = true;
      mover.vy = 1.5;
    }
    // 빗나간 경우에도 별을 떨어뜨려 줌 (인식 실패 방지)
    else {
      mover.falling = true;
      mover.vy = 1.5;
    }
  }

  canvas.addEventListener('pointerdown', e => {
    e.preventDefault();
    const r = canvas.getBoundingClientRect();
    const sx = W / r.width;
    const sy = H / r.height;
    handleTap((e.clientX - r.left) * sx, (e.clientY - r.top) * sy);
  });

  /* --- 게임 루프 --- */
  function update() {
    /* 배경 별 반짝 */
    bgStars.forEach(s => {
      s.a += s.da;
      if (s.a > 1 || s.a < 0) s.da *= -1;
    });

    if (state !== 'playing') return;

    /* 무버 이동 */
    if (mover && !mover.falling && !mover.landed) {
      mover.x += mover.vx;
      mover.trail.unshift({x: mover.x, y: mover.y});
      if (mover.trail.length > TRAIL_MAX) mover.trail.pop();
      if (mover.x < STAR_SIZE || mover.x > W - STAR_SIZE) mover.vx *= -1;
    }

    /* 무버 낙하 */
    if (mover && mover.falling && !mover.landed) {
      mover.vy += GRAVITY;
      mover.y  += mover.vy;
      mover.vx *= FRICTION;

      // 착지 체크
      const topStar = stack.length > 0 ? stack[stack.length - 1] : null;
      const landY   = topStar ? topStar.y - STAR_SIZE * 0.9 : floorY - STAR_SIZE * 0.5;

      if (mover.y >= landY) {
        mover.y = landY;
        landStar(mover);
      }
    }

    /* 파티클 */
    particles = particles.filter(p => p.life > 0);
    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      p.vy += 0.12;
      p.life -= p.decay;
    });

    /* 흔들림 */
    if (shakeTick > 0) shakeTick--;

    /* 쌓인 별 반짝 감쇠 */
    stack.forEach(s => {
      if (s.twinkle > 0) s.twinkle -= 0.03;
    });
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);

    /* 배경 배경별 */
    bgStars.forEach(s => {
      ctx.save();
      ctx.globalAlpha = s.a * 0.8 + 0.1;
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    });

    /* 흔들림 오프셋 */
    let shakeX = 0;
    if (shakeTick > 0) shakeX = (Math.random()-0.5) * shakeTick * 1.5;

    ctx.save();
    ctx.translate(shakeX, 0);

    /* 바닥 */
    const grad = ctx.createLinearGradient(0, floorY - 4, 0, H);
    grad.addColorStop(0, 'rgba(100,80,200,0.6)');
    grad.addColorStop(1, 'rgba(30,20,80,0.9)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.roundRect ? ctx.roundRect(8, floorY - 4, W - 16, H - floorY + 4, 8)
                  : ctx.rect(8, floorY - 4, W - 16, H - floorY + 4);
    ctx.fill();

    /* 쌓인 별 */
    stack.forEach(s => {
      const glow  = s.twinkle > 0.1;
      const alpha = 0.75 + s.twinkle * 0.25;
      drawStar(s.x, s.y, s.size * 0.9, s.color, glow, alpha);
    });

    /* 무버 별 트레일 */
    if (mover) {
      mover.trail.forEach((pt, i) => {
        const a = (1 - i / TRAIL_MAX) * 0.25;
        drawStar(pt.x, pt.y, mover.size * 0.75, mover.color, false, a);
      });
      /* 무버 본체 */
      drawStar(mover.x, mover.y, mover.size, mover.color, true, 1);

      /* 탭 가이드 라인 (떨어지기 전) */
      if (!mover.falling && !mover.landed && state === 'playing') {
        const topStar = stack.length > 0 ? stack[stack.length - 1] : null;
        const endY    = topStar ? topStar.y - STAR_SIZE * 0.9 : floorY - STAR_SIZE * 0.5;
        ctx.save();
        ctx.strokeStyle = 'rgba(255,255,200,0.12)';
        ctx.setLineDash([6,8]);
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(mover.x, mover.y + mover.size);
        ctx.lineTo(mover.x, endY);
        ctx.stroke();
        ctx.restore();
      }
    }

    /* 파티클 */
    particles.forEach(p => {
      ctx.save();
      ctx.globalAlpha = p.life;
      ctx.fillStyle   = p.color;
      ctx.shadowColor = p.color;
      ctx.shadowBlur  = 8;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    });

    ctx.restore(); // 흔들림 복구

    /* 탑 높이 막대 (우측) */
    if (state === 'playing' && stack.length > 0) {
      const topY  = stack[stack.length-1].y;
      const barH  = Math.max(0, floorY - topY);
      const barX  = W - 16;
      const ratio = Math.min(barH / (H * 0.75), 1);
      ctx.save();
      ctx.globalAlpha = 0.4;
      ctx.fillStyle = '#222244';
      ctx.beginPath();
      if (ctx.roundRect) ctx.roundRect(barX, H * 0.05, 8, H * 0.8, 4);
      else ctx.rect(barX, H * 0.05, 8, H * 0.8);
      ctx.fill();
      const barFill = ctx.createLinearGradient(0, floorY, 0, floorY - barH);
      barFill.addColorStop(0, '#ffe066');
      barFill.addColorStop(1, '#cc88ff');
      ctx.globalAlpha = 0.85;
      ctx.fillStyle = barFill;
      ctx.beginPath();
      if (ctx.roundRect) ctx.roundRect(barX, floorY - H * 0.8 * ratio, 8, H * 0.8 * ratio, 4);
      else ctx.rect(barX, floorY - H * 0.8 * ratio, 8, H * 0.8 * ratio);
      ctx.fill();
      ctx.restore();
    }
  }

  function loop() {
    update();
    draw();
    raf = requestAnimationFrame(loop);
  }

  /* --- 게임 시작 --- */
  function startGame() {
    cancelAnimationFrame(raf);
    state     = 'playing';
    score     = 0;
    starCount = 0;
    stack     = [];
    particles = [];
    shakeTick = 0;
    mover     = null;
    hScore.textContent = 0;
    hCount.textContent = 0;

    overlay.style.display = 'none';
    playStart();
    spawnMover();
    loop();
  }

  /* --- 정적 화면(idle/gameover) --- */
  function drawStatic() {
    if (!W) return;
    ctx.clearRect(0, 0, W, H);
    bgStars.forEach(s => {
      ctx.save();
      ctx.globalAlpha = 0.6;
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    });
  }

  /* --- 오버레이 갱신 (게임오버는 없으므로 start/idle 두 상태만) --- */
  function showStart() {
    overlay.innerHTML = `
      <div class="big">⭐</div>
      <div class="msg">좌우로 움직이는 별을<br>탭해서 밤하늘 탑을 쌓아요!</div>
      <button class="btn" id="startBtn">시작!</button>
    `;
    overlay.style.display = 'flex';
    document.getElementById('startBtn').addEventListener('click', startGame);
  }

  /* --- 초기화 --- */
  startBtn.addEventListener('click', startGame);

  const ro = new ResizeObserver(resize);
  ro.observe(area);
  resize();
  initBgStars();
  drawStatic();

  // 배경 별 애니메이션(idle 상태)
  (function idleLoop() {
    if (state !== 'playing') {
      bgStars.forEach(s => { s.a += s.da; if (s.a > 1 || s.a < 0) s.da *= -1; });
      drawStatic();
    }
    requestAnimationFrame(idleLoop);
  })();

})();
</script>
</body>
</html>
