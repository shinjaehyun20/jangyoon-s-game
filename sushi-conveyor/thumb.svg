<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" width="320" height="180">
  <defs>
    <linearGradient id="scBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4a2f1e"/>
      <stop offset="1" stop-color="#2b1a12"/>
    </linearGradient>
  </defs>
  <rect width="320" height="180" fill="url(#scBg)"/>
  <rect x="0.5" y="0.5" width="319" height="179" fill="none" stroke="rgba(255,255,255,0.08)"/>

  <!-- conveyor belt -->
  <rect x="0" y="74" width="320" height="52" fill="#3b6ea5"/>
  <g fill="#345f8f">
    <rect x="0" y="74" width="26" height="52"/>
    <rect x="52" y="74" width="26" height="52"/>
    <rect x="104" y="74" width="26" height="52"/>
    <rect x="156" y="74" width="26" height="52"/>
    <rect x="208" y="74" width="26" height="52"/>
    <rect x="260" y="74" width="26" height="52"/>
    <rect x="312" y="74" width="26" height="52"/>
  </g>
  <rect x="0" y="72" width="320" height="4" fill="#2a4d72"/>
  <rect x="0" y="124" width="320" height="4" fill="#2a4d72"/>

  <!-- plates -->
  <g>
    <circle cx="46" cy="100" r="26" fill="#eef3f7" stroke="#fff" stroke-width="3"/>
    <text x="46" y="110" text-anchor="middle" font-size="26">🍣</text>
    <circle cx="120" cy="100" r="26" fill="#eef3f7" stroke="#fff" stroke-width="3"/>
    <text x="120" y="110" text-anchor="middle" font-size="26">🍤</text>
    <circle cx="194" cy="100" r="26" fill="#eef3f7" stroke="#fff" stroke-width="3"/>
    <text x="194" y="110" text-anchor="middle" font-size="26">🍙</text>
  </g>

  <!-- customer + order -->
  <text x="34" y="46" font-size="30">🧒</text>
  <text x="74" y="46" font-size="26">🍣</text>

  <!-- title -->
  <g font-family="'Pretendard','Noto Sans KR',sans-serif">
    <text x="296" y="152" text-anchor="end" font-size="22" font-weight="900" fill="#ffcf4d">회전초밥</text>
    <text x="296" y="170" text-anchor="end" font-size="10" font-weight="500" fill="rgba(255,255,255,0.5)" letter-spacing="2">SUSHI CONVEYOR</text>
  </g>
</svg>
