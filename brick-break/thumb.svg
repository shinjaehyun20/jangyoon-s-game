<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d0d2b"/>
      <stop offset="100%" stop-color="#1a1a3e"/>
    </linearGradient>
    <linearGradient id="paddleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a0f5ef"/>
      <stop offset="100%" stop-color="#5ee7df"/>
    </linearGradient>
    <radialGradient id="ballGrad" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ffb3b3"/>
      <stop offset="100%" stop-color="#ff6b6b"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 배경 -->
  <rect width="320" height="180" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="319" height="179" fill="none" stroke="rgba(255,255,255,0.08)" rx="3"/>

  <!-- 벽돌 격자 (상단 왼쪽 영역) -->
  <!-- 행 1: 빨강 -->
  <rect x="16" y="22" width="38" height="16" rx="3" fill="#ff6b6b" opacity="0.9" filter="url(#glow)"/>
  <rect x="58" y="22" width="38" height="16" rx="3" fill="#ff6b6b" opacity="0.9"/>
  <rect x="100" y="22" width="38" height="16" rx="3" fill="#ff6b6b" opacity="0.9"/>
  <!-- 행 2: 주황 -->
  <rect x="16" y="42" width="38" height="16" rx="3" fill="#ff8e53" opacity="0.85"/>
  <rect x="58" y="42" width="38" height="16" rx="3" fill="#ff8e53" opacity="0.85"/>
  <rect x="100" y="42" width="38" height="16" rx="3" fill="#ff8e53" opacity="0.85"/>
  <!-- 행 3: 노랑 -->
  <rect x="16" y="62" width="38" height="16" rx="3" fill="#ffd93d" opacity="0.8"/>
  <rect x="58" y="62" width="38" height="16" rx="3" fill="#ffd93d" opacity="0.8"/>
  <rect x="100" y="62" width="38" height="16" rx="3" fill="#ffd93d" opacity="0.8"/>
  <!-- 행 4: 초록 -->
  <rect x="16" y="82" width="38" height="16" rx="3" fill="#6bcb77" opacity="0.75"/>
  <rect x="58" y="82" width="38" height="16" rx="3" fill="#6bcb77" opacity="0.75"/>
  <!-- 일부 벽돌 빠진 것 (깨진 효과) -->

  <!-- 공 궤적 (점선) -->
  <line x1="140" y1="95" x2="82" y2="55" stroke="rgba(255,107,107,0.25)" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- 공 -->
  <circle cx="140" cy="95" r="10" fill="url(#ballGrad)" filter="url(#glow)"/>
  <circle cx="137" cy="92" r="3.5" fill="rgba(255,255,255,0.45)"/>

  <!-- 폭발/파티클 (벽돌 깨진 자리) -->
  <text x="150" y="47" font-size="16" fill="#ffd93d" opacity="0.9">✨</text>
  <text x="66" y="30" font-size="9" fill="#ff6b6b" opacity="0.8">💥</text>

  <!-- 패들 -->
  <rect x="86" y="152" width="70" height="11" rx="5.5" fill="url(#paddleGrad)" filter="url(#glow)"/>

  <!-- 우하단 타이틀 -->
  <g font-family="'Pretendard','Noto Sans KR','Apple SD Gothic Neo',sans-serif">
    <text x="296" y="148" text-anchor="end" font-size="22" font-weight="900" fill="#f7c948">벽돌 깨기</text>
    <text x="296" y="166" text-anchor="end" font-size="10" font-weight="500" fill="rgba(255,255,255,0.5)" letter-spacing="2">BRICK BREAK</text>
  </g>

  <!-- 레벨 뱃지 -->
  <rect x="200" y="22" width="100" height="22" rx="6" fill="rgba(247,201,72,0.15)" stroke="#f7c948" stroke-width="1" opacity="0.8"/>
  <text x="250" y="37" text-anchor="middle" font-size="11" font-weight="700" fill="#f7c948" font-family="sans-serif">4 LEVELS 🏆</text>

  <!-- 목숨 표시 -->
  <text x="200" y="68" font-size="13" fill="rgba(255,255,255,0.7)" font-family="sans-serif">❤️❤️❤️</text>
</svg>
