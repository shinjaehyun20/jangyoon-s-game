<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0d2b"/>
      <stop offset="100%" stop-color="#1a1a4e"/>
    </linearGradient>
  </defs>
  <rect width="320" height="180" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="319" height="179" fill="none" stroke="rgba(255,255,255,0.08)"/>

  <!-- 별들 그룹 -->
  <text x="30"  y="55"  font-size="28">⭐</text>
  <text x="72"  y="48"  font-size="26">⭐</text>
  <text x="112" y="55"  font-size="28">⭐</text>
  <text x="30"  y="98"  font-size="26">⭐</text>
  <text x="72"  y="91"  font-size="28">⭐</text>
  <text x="112" y="98"  font-size="26">⭐</text>
  <text x="50"  y="141" font-size="26">⭐</text>
  <text x="92"  y="134" font-size="28">⭐</text>

  <!-- 숫자 답 버튼들 -->
  <rect x="168" y="30" width="44" height="44" rx="10" fill="#ff6b6bcc"/>
  <text x="190" y="61" text-anchor="middle" font-size="26" font-weight="900" fill="#fff" font-family="sans-serif">6</text>

  <rect x="222" y="30" width="44" height="44" rx="10" fill="#a29bfecc"/>
  <text x="244" y="61" text-anchor="middle" font-size="26" font-weight="900" fill="#fff" font-family="sans-serif">7</text>

  <!-- 정답 강조 -->
  <rect x="168" y="84" width="44" height="44" rx="10" fill="#ffd700"/>
  <rect x="168" y="84" width="44" height="44" rx="10" fill="none" stroke="#fff" stroke-width="2.5"/>
  <text x="190" y="115" text-anchor="middle" font-size="26" font-weight="900" fill="#1a1a2e" font-family="sans-serif">8</text>

  <rect x="222" y="84" width="44" height="44" rx="10" fill="#26de81cc"/>
  <text x="244" y="115" text-anchor="middle" font-size="26" font-weight="900" fill="#fff" font-family="sans-serif">9</text>

  <!-- 체크 이펙트 -->
  <text x="190" y="75" text-anchor="middle" font-size="14">✨</text>

  <!-- 타이틀 -->
  <g font-family="'Pretendard','Noto Sans KR',sans-serif">
    <text x="296" y="148" text-anchor="end" font-size="22" font-weight="900" fill="#ffd700">별 세기 숫자 놀이</text>
    <text x="296" y="166" text-anchor="end" font-size="10" font-weight="500" fill="rgba(255,255,255,0.5)" letter-spacing="2">STAR COUNTING</text>
  </g>
</svg>
