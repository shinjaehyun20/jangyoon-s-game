<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>🔫 물총 싸움</title>
  <style>
    :root {
      --bg-top: #0097a7;
      --bg-bot: #00bcd4;
      --accent: #fff176;
      --text: #fff;
      --hit: #ff8f00;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100vh; height: 100dvh;
      overflow: hidden;
      touch-action: manipulation;
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bot) 100%);
      user-select: none;
      -webkit-user-select: none;
    }
    .wrap {
      width: 100%; max-width: 480px;
      height: 100vh; height: 100dvh;
      display: flex; flex-direction: column;
      margin: 0 auto;
      padding: 8px 12px 6px;
      gap: 6px;
    }
    h1 {
      text-align: center;
      font-size: clamp(18px, 5vw, 26px);
      font-weight: 900;
      color: var(--text);
      text-shadow: 0 2px 4px rgba(0,0,0,0.3);
      flex-shrink: 0;
    }
    .hud {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(0,0,0,0.2);
      border-radius: 12px;
      padding: 6px 14px;
      flex-shrink: 0;
    }
    .hud-item {
      font-size: clamp(13px, 3.5vw, 17px);
      font-weight: 800;
      color: var(--text);
    }
    /* 게임 캔버스 */
    canvas {
      flex: 1;
      display: block;
      border-radius: 16px;
      background: rgba(0,0,0,0.15);
      width: 100%;
      touch-action: none;
    }
    footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    footer small {
      font-size: 11px;
      color: rgba(255,255,255,0.7);
    }
    .home-link {
      font-size: 13px;
      color: var(--text);
      text-decoration: none;
      font-weight: 700;
      padding: 4px 8px;
      border-radius: 8px;
      background: rgba(0,0,0,0.2);
    }
    /* 오버레이 */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,30,60,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .overlay.hidden { display: none; }
    .overlay-card {
      background: #fff;
      border-radius: 20px;
      padding: 28px 24px;
      text-align: center;
      max-width: 320px;
      width: 90%;
      box-shadow: 0 8px 30px rgba(0,0,80,0.3);
    }
    .overlay-card h2 {
      font-size: clamp(20px, 6vw, 28px);
      font-weight: 900;
      margin-bottom: 10px;
      color: #00838f;
    }
    .overlay-card p {
      font-size: clamp(13px, 3.5vw, 16px);
      color: #555;
      margin-bottom: 6px;
      line-height: 1.5;
    }
    .result-score {
      font-size: clamp(36px, 11vw, 56px);
      font-weight: 900;
      color: #ff8f00;
      margin: 8px 0;
    }
    .btn-start {
      background: linear-gradient(135deg, #00bcd4, #0097a7);
      color: #fff;
      border: none;
      border-radius: 14px;
      padding: 12px 32px;
      font-size: clamp(16px, 4.5vw, 20px);
      font-weight: 900;
      cursor: pointer;
      width: 100%;
      min-height: 48px;
      margin-top: 10px;
    }
    .big-emoji {
      font-size: 56px;
      display: block;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>🔫 물총 싸움</h1>

    <div class="hud">
      <span class="hud-item">💧 <span id="scoreEl">0</span>점</span>
      <span class="hud-item">⏱️ <span id="timerEl">30</span>초</span>
      <span class="hud-item">💦 최고: <span id="bestEl">0</span></span>
    </div>

    <canvas id="gameCanvas"></canvas>

    <footer>
      <small>적 캐릭터를 탭해서 물총 발사!</small>
      <a class="home-link" href="../index.html">← 홈으로</a>
    </footer>
  </div>

  <!-- 시작 오버레이 -->
  <div class="overlay" id="startOverlay">
    <div class="overlay-card">
      <span class="big-emoji">🔫</span>
      <h2>물총 싸움</h2>
      <p>화면에 나타나는 적 캐릭터를 탭해서 물총을 쏘세요!<br>30초 동안 최대한 많이 맞춰요! 💦</p>
      <button class="btn-start" id="startBtn">시작!</button>
    </div>
  </div>

  <!-- 결과 오버레이 -->
  <div class="overlay hidden" id="endOverlay">
    <div class="overlay-card">
      <span class="big-emoji">🏆</span>
      <h2>물총 싸움 끝!</h2>
      <div class="result-score" id="finalScore">0</div>
      <p id="resultMsg">점</p>
      <button class="btn-start" id="restartBtn">다시 하기</button>
    </div>
  </div>

  <script>
  (function () {
    'use strict';

    const CONFIG = {
      GAME_TIME: 30,
      BEST_KEY: 'water-gun_best',
      ENEMY_EMOJIS: ['🐸', '🐼', '🐻', '🐯', '🦊', '🐨', '🐹', '🐸', '🦁', '🐮'],
      ENEMY_COUNT_MIN: 2,
      ENEMY_COUNT_MAX: 4,
      ENEMY_SIZE_BASE: 52,    // px (canvas 기준)
      ENEMY_APPEAR_MS: 900,   // 적 재등장 주기
      HIT_SCORE: 10,
      MISS_ANIM_MS: 400,
    };

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('scoreEl');
    const timerEl = document.getElementById('timerEl');
    const bestEl  = document.getElementById('bestEl');
    const startOverlay  = document.getElementById('startOverlay');
    const endOverlay    = document.getElementById('endOverlay');
    const startBtn      = document.getElementById('startBtn');
    const restartBtn    = document.getElementById('restartBtn');
    const finalScoreEl  = document.getElementById('finalScore');
    const resultMsgEl   = document.getElementById('resultMsg');

    const state = {
      running: false,
      score: 0,
      timeLeft: CONFIG.GAME_TIME,
      enemies: [],
      particles: [],
      splashes: [],
      timerInterval: null,
      enemyInterval: null,
      animFrame: null,
    };

    /* 캔버스 크기 동기 */
    function resizeCanvas() {
      const rect = canvas.getBoundingClientRect();
      canvas.width  = rect.width;
      canvas.height = rect.height;
    }

    /* 최고기록 */
    function loadBest() {
      const b = localStorage.getItem(CONFIG.BEST_KEY) || 0;
      bestEl.textContent = b;
      return parseInt(b);
    }
    function saveBest(s) {
      const prev = parseInt(localStorage.getItem(CONFIG.BEST_KEY) || 0);
      if (s > prev) {
        localStorage.setItem(CONFIG.BEST_KEY, s);
        bestEl.textContent = s;
      }
    }

    /* 적 생성 */
    function spawnEnemies() {
      const count = CONFIG.ENEMY_COUNT_MIN + Math.floor(Math.random() * (CONFIG.ENEMY_COUNT_MAX - CONFIG.ENEMY_COUNT_MIN + 1));
      state.enemies = [];
      const sizeRatio = Math.min(canvas.width, canvas.height) / 400;
      const size = Math.round(CONFIG.ENEMY_SIZE_BASE * Math.max(0.8, sizeRatio));
      const margin = size * 0.6;

      for (let i = 0; i < count; i++) {
        const emoji = CONFIG.ENEMY_EMOJIS[Math.floor(Math.random() * CONFIG.ENEMY_EMOJIS.length)];
        let x, y, tries = 0;
        do {
          x = margin + Math.random() * (canvas.width  - margin * 2);
          y = margin + Math.random() * (canvas.height - margin * 2);
          tries++;
        } while (tries < 20 && state.enemies.some(e => Math.hypot(e.x - x, e.y - y) < size * 1.4));

        state.enemies.push({
          emoji, x, y, size,
          hp: 1,
          scale: 1,
          opacity: 1,
          hit: false,
          scaleAnim: 0,   // 0: 등장, 1: 스탠바이
          appear: performance.now(),
        });
      }
    }

    /* 물방울 파티클 */
    function createSplash(x, y) {
      for (let i = 0; i < 8; i++) {
        const angle = (Math.PI * 2 / 8) * i + (Math.random() - 0.5) * 0.3;
        const speed = 2 + Math.random() * 3;
        state.splashes.push({
          x, y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          radius: 4 + Math.random() * 4,
          alpha: 1,
          color: Math.random() > 0.5 ? '#80deea' : '#b3e5fc',
        });
      }
    }

    /* 텍스트 파티클 */
    function createHitText(x, y, text) {
      state.particles.push({ x, y, text, vy: -2, alpha: 1, timer: 0 });
    }

    /* 게임 루프 */
    function loop(now) {
      if (!state.running) return;
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      /* 배경 물결 */
      drawBackground(now);

      /* 적 */
      state.enemies.forEach(e => {
        const age = now - e.appear;
        // 등장 애니메이션
        if (age < 300) {
          e.scale = age / 300;
        } else if (e.hit) {
          e.scale = Math.max(0, e.scale - 0.08);
          e.opacity = Math.max(0, e.opacity - 0.06);
        } else {
          e.scale = 1 + Math.sin(now / 500 + e.x) * 0.05;
        }

        ctx.save();
        ctx.globalAlpha = e.opacity;
        ctx.translate(e.x, e.y);
        ctx.scale(e.scale, e.scale);
        ctx.font = `${e.size}px serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(e.emoji, 0, 0);
        ctx.restore();

        // 조준 링
        if (!e.hit) {
          ctx.save();
          ctx.globalAlpha = 0.3;
          ctx.strokeStyle = '#fff176';
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(e.x, e.y, e.size * 0.55 + Math.sin(now / 300) * 3, 0, Math.PI * 2);
          ctx.stroke();
          ctx.restore();
        }
      });

      /* 물방울 파티클 */
      state.splashes = state.splashes.filter(p => {
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.2;
        p.alpha -= 0.04;
        ctx.save();
        ctx.globalAlpha = Math.max(0, p.alpha);
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
        return p.alpha > 0;
      });

      /* 텍스트 파티클 */
      state.particles = state.particles.filter(p => {
        p.y += p.vy;
        p.alpha -= 0.025;
        p.timer++;
        ctx.save();
        ctx.globalAlpha = Math.max(0, p.alpha);
        ctx.font = 'bold 22px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillStyle = '#fff176';
        ctx.strokeStyle = '#00838f';
        ctx.lineWidth = 3;
        ctx.strokeText(p.text, p.x, p.y);
        ctx.fillText(p.text, p.x, p.y);
        ctx.restore();
        return p.alpha > 0;
      });

      // 사라진 적 제거
      state.enemies = state.enemies.filter(e => e.opacity > 0);

      state.animFrame = requestAnimationFrame(loop);
    }

    function drawBackground(now) {
      // 물결 라인
      ctx.save();
      ctx.globalAlpha = 0.08;
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      for (let i = 0; i < 4; i++) {
        ctx.beginPath();
        const y = (canvas.height / 4) * (i + 0.5);
        for (let x = 0; x <= canvas.width; x += 5) {
          const waveY = y + Math.sin((x / 60) + now / 1000 + i) * 8;
          if (x === 0) ctx.moveTo(x, waveY);
          else ctx.lineTo(x, waveY);
        }
        ctx.stroke();
      }
      ctx.restore();
    }

    /* 타이머 */
    function startTimer() {
      state.timerInterval = setInterval(() => {
        state.timeLeft--;
        timerEl.textContent = state.timeLeft;
        if (state.timeLeft <= 0) {
          clearInterval(state.timerInterval);
          endGame();
        }
      }, 1000);
    }

    /* 터치/클릭 핸들러 */
    function handleTap(e) {
      if (!state.running) return;
      e.preventDefault();

      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width  / rect.width;
      const scaleY = canvas.height / rect.height;

      let tapX, tapY;
      if (e.touches) {
        const t = e.changedTouches[0];
        tapX = (t.clientX - rect.left) * scaleX;
        tapY = (t.clientY - rect.top)  * scaleY;
      } else {
        tapX = (e.clientX - rect.left) * scaleX;
        tapY = (e.clientY - rect.top)  * scaleY;
      }

      let hit = false;
      state.enemies.forEach(enemy => {
        if (enemy.hit) return;
        const dist = Math.hypot(tapX - enemy.x, tapY - enemy.y);
        if (dist <= enemy.size * 0.7) {
          enemy.hit = true;
          state.score += CONFIG.HIT_SCORE;
          scoreEl.textContent = state.score;
          createSplash(enemy.x, enemy.y);
          createHitText(enemy.x, enemy.y - 30, `+${CONFIG.HIT_SCORE}`);
          hit = true;
        }
      });

      // 빗나감 효과
      if (!hit) {
        createSplash(tapX, tapY);
      }
    }

    /* 적 관리 루프 */
    function startEnemyLoop() {
      spawnEnemies();
      state.enemyInterval = setInterval(() => {
        // 살아있는 적이 없으면 바로 보충
        const alive = state.enemies.filter(e => !e.hit);
        if (alive.length === 0) {
          spawnEnemies();
        }
      }, CONFIG.ENEMY_APPEAR_MS);
    }

    /* 게임 시작 */
    function startGame() {
      state.running = true;
      state.score = 0;
      state.timeLeft = CONFIG.GAME_TIME;
      state.enemies = [];
      state.particles = [];
      state.splashes = [];

      scoreEl.textContent = '0';
      timerEl.textContent = CONFIG.GAME_TIME;

      resizeCanvas();
      startTimer();
      startEnemyLoop();
      requestAnimationFrame(loop);
    }

    /* 게임 종료 */
    function endGame() {
      state.running = false;
      cancelAnimationFrame(state.animFrame);
      clearInterval(state.enemyInterval);

      saveBest(state.score);
      finalScoreEl.textContent = state.score;

      const best = loadBest();
      const msg = state.score >= best
        ? '🎉 새 최고기록이에요!'
        : `최고기록: ${best}점`;
      resultMsgEl.textContent = msg;

      endOverlay.classList.remove('hidden');
    }

    /* 이벤트 */
    startBtn.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      startOverlay.classList.add('hidden');
      startGame();
    });
    restartBtn.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      endOverlay.classList.add('hidden');
      startGame();
    });

    canvas.addEventListener('pointerdown', handleTap);

    window.addEventListener('resize', () => {
      if (state.running) resizeCanvas();
    });

    /* 초기 */
    loadBest();
    resizeCanvas();
  })();
  </script>
</body>
</html>
