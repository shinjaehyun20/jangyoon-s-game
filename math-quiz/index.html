<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>숫자 퀴즈</title>
  <style>
    :root {
      --bg: #1a1a2e;
      --card: #16213e;
      --accent: #e94560;
      --accent2: #0f3460;
      --green: #4caf50;
      --yellow: #ffd700;
      --text: #ffffff;
      --btn-shadow: 0 4px 15px rgba(233,69,96,0.4);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100vh; height: 100dvh;
      overflow: hidden;
      touch-action: manipulation;
      font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .wrap {
      width: 100%; max-width: 480px;
      height: 100vh; height: 100dvh;
      display: flex; flex-direction: column;
      padding: 12px 16px 10px;
      gap: 10px;
      margin: 0 auto;
    }
    h1 {
      text-align: center;
      font-size: clamp(20px, 5.5vw, 28px);
      font-weight: 900;
      letter-spacing: -0.5px;
    }
    /* HUD */
    .hud {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 8px 16px;
    }
    .hud-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }
    .hud-label {
      font-size: 10px;
      opacity: 0.6;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .hud-value {
      font-size: clamp(18px, 4.5vw, 24px);
      font-weight: 900;
      color: var(--yellow);
    }
    /* 게임 영역 */
    #gameArea {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }
    /* 진행 바 */
    .progress-bar {
      width: 100%;
      height: 8px;
      background: rgba(255,255,255,0.15);
      border-radius: 4px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--yellow));
      border-radius: 4px;
      transition: width 0.3s ease;
    }
    /* 문제 카드 */
    .question-card {
      background: var(--card);
      border-radius: 24px;
      padding: 24px 32px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      width: 100%;
      border: 2px solid rgba(255,255,255,0.08);
    }
    .question-level {
      font-size: 11px;
      opacity: 0.5;
      letter-spacing: 2px;
      margin-bottom: 8px;
    }
    .question-text {
      font-size: clamp(32px, 9vw, 52px);
      font-weight: 900;
      letter-spacing: 4px;
      line-height: 1.2;
    }
    .question-text .op-plus { color: #4fc3f7; }
    .question-text .op-minus { color: #ef9a9a; }
    /* 피드백 영역 */
    .feedback-area {
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .feedback-text {
      font-size: clamp(20px, 5vw, 28px);
      font-weight: 900;
      transition: opacity 0.2s;
    }
    .feedback-text.correct { color: var(--green); }
    .feedback-text.wrong { color: var(--accent); }
    .feedback-text.hidden { opacity: 0; }
    /* 보기 버튼 그리드 */
    .choices {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      width: 100%;
    }
    .choice-btn {
      background: var(--accent2);
      border: 2px solid rgba(255,255,255,0.1);
      border-radius: 18px;
      color: var(--text);
      font-size: clamp(22px, 6vw, 32px);
      font-weight: 900;
      min-height: 64px;
      cursor: pointer;
      transition: transform 0.1s, background 0.15s, border-color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .choice-btn:active { transform: scale(0.94); }
    .choice-btn.correct {
      background: #2e7d32;
      border-color: var(--green);
    }
    .choice-btn.wrong {
      background: #b71c1c;
      border-color: var(--accent);
    }
    .choice-btn:disabled { pointer-events: none; }
    /* Footer */
    footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 4px;
    }
    footer small { font-size: 11px; opacity: 0.4; }
    .home-link {
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      text-decoration: none;
      padding: 6px 10px;
    }
    /* 오버레이 */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 20px;
    }
    .overlay.hidden { display: none; }
    .overlay-card {
      background: var(--card);
      border-radius: 28px;
      padding: 32px 28px;
      text-align: center;
      max-width: 360px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.1);
    }
    .overlay-card h2 {
      font-size: clamp(22px, 6vw, 30px);
      font-weight: 900;
      margin-bottom: 12px;
    }
    .overlay-card p {
      font-size: clamp(13px, 3.5vw, 16px);
      opacity: 0.75;
      line-height: 1.6;
      margin-bottom: 8px;
    }
    .result-score {
      font-size: clamp(48px, 12vw, 72px);
      font-weight: 900;
      color: var(--yellow);
      margin: 16px 0;
      line-height: 1;
    }
    .result-stars {
      font-size: 28px;
      margin-bottom: 8px;
    }
    .best-badge {
      background: var(--accent);
      color: white;
      font-size: 12px;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 20px;
      display: inline-block;
      margin-bottom: 12px;
    }
    .btn-start {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 16px;
      font-size: clamp(16px, 4.5vw, 20px);
      font-weight: 900;
      padding: 14px 36px;
      cursor: pointer;
      min-height: 52px;
      min-width: 160px;
      box-shadow: var(--btn-shadow);
      transition: transform 0.1s;
      margin-top: 8px;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-start:active { transform: scale(0.95); }
    .level-select {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin: 14px 0 10px;
    }
    .level-btn {
      background: rgba(255,255,255,0.1);
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 12px;
      color: var(--text);
      font-size: 14px;
      font-weight: 700;
      padding: 8px 16px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .level-btn.active {
      background: var(--accent);
      border-color: var(--accent);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>🔢 숫자 퀴즈</h1>

    <div class="hud">
      <div class="hud-item">
        <span class="hud-label">점수</span>
        <span class="hud-value" id="score">0</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">문제</span>
        <span class="hud-value" id="questionNum">0/10</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">최고</span>
        <span class="hud-value" id="bestScore">0</span>
      </div>
    </div>

    <div id="gameArea">
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
      <div class="question-card">
        <div class="question-level" id="questionLevel">LEVEL 1</div>
        <div class="question-text" id="questionText">? + ? = ?</div>
      </div>
      <div class="feedback-area">
        <div class="feedback-text hidden" id="feedbackText">✅ 정답!</div>
      </div>
      <div class="choices" id="choicesArea"></div>
    </div>

    <footer>
      <small>보기를 눌러서 답을 맞혀봐요</small>
      <a class="home-link" href="../index.html">← 홈으로</a>
    </footer>
  </div>

  <!-- 시작 오버레이 -->
  <div class="overlay" id="startOverlay">
    <div class="overlay-card">
      <h2>🔢 숫자 퀴즈</h2>
      <p>덧셈·뺄셈 문제가 나와요!<br>맞는 답을 골라봐요 😊</p>
      <div class="level-select">
        <button class="level-btn active" data-level="1">쉬움<br><small>1~5</small></button>
        <button class="level-btn" data-level="2">보통<br><small>1~10</small></button>
        <button class="level-btn" data-level="3">어려움<br><small>1~20</small></button>
      </div>
      <button class="btn-start" id="startBtn">시작!</button>
    </div>
  </div>

  <!-- 결과 오버레이 -->
  <div class="overlay hidden" id="endOverlay">
    <div class="overlay-card">
      <h2>🎉 퀴즈 완료!</h2>
      <div class="result-stars" id="resultStars">⭐⭐⭐</div>
      <div class="result-score" id="finalScore">0</div>
      <p id="resultMsg">잘했어요!</p>
      <div id="bestBadge"></div>
      <button class="btn-start" id="restartBtn">다시 하기</button>
    </div>
  </div>

  <script>
  (function () {
    'use strict';

    const CONFIG = {
      TOTAL_QUESTIONS: 10,
      CHOICE_COUNT: 4,
      FEEDBACK_DURATION: 600,
      NEXT_DELAY: 700,
      STORAGE_KEY: 'math-quiz_best',
      LEVELS: {
        1: { max: 5,  ops: ['+'] },
        2: { max: 10, ops: ['+', '-'] },
        3: { max: 20, ops: ['+', '-'] },
      }
    };

    const state = {
      score: 0,
      questionIndex: 0,
      currentAnswer: 0,
      answered: false,
      level: 1,
    };

    const $ = id => document.getElementById(id);

    function getBest() {
      return parseInt(localStorage.getItem(CONFIG.STORAGE_KEY) || '0', 10);
    }
    function saveBest(val) {
      const prev = getBest();
      if (val > prev) localStorage.setItem(CONFIG.STORAGE_KEY, String(val));
    }

    function updateHUD() {
      $('score').textContent = state.score;
      $('questionNum').textContent = `${state.questionIndex}/${CONFIG.TOTAL_QUESTIONS}`;
      $('bestScore').textContent = getBest();
      const pct = (state.questionIndex / CONFIG.TOTAL_QUESTIONS) * 100;
      $('progressFill').style.width = pct + '%';
    }

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function makeQuestion() {
      const cfg = CONFIG.LEVELS[state.level];
      const ops = cfg.ops;
      const op = ops[Math.floor(Math.random() * ops.length)];
      let a, b, answer;
      if (op === '+') {
        a = Math.floor(Math.random() * cfg.max) + 1;
        b = Math.floor(Math.random() * cfg.max) + 1;
        answer = a + b;
      } else {
        // 뺄셈: 항상 양수 결과
        a = Math.floor(Math.random() * cfg.max) + 2;
        b = Math.floor(Math.random() * (a - 1)) + 1;
        answer = a - b;
      }
      return { a, b, op, answer };
    }

    function makeChoices(answer, levelMax) {
      const wrongSet = new Set();
      wrongSet.add(answer);
      const range = Math.max(levelMax * 2, 10);
      while (wrongSet.size < CONFIG.CHOICE_COUNT) {
        const w = Math.floor(Math.random() * range) + 1;
        wrongSet.add(w);
      }
      // ensure no negatives or zeroes
      const choices = Array.from(wrongSet).filter(v => v > 0);
      while (choices.length < CONFIG.CHOICE_COUNT) {
        choices.push(answer + choices.length + 1);
      }
      return shuffle(choices.slice(0, CONFIG.CHOICE_COUNT));
    }

    function showQuestion() {
      if (state.questionIndex >= CONFIG.TOTAL_QUESTIONS) {
        endGame();
        return;
      }
      const q = makeQuestion();
      state.currentAnswer = q.answer;
      state.answered = false;

      const levelLabel = ['', '쉬움', '보통', '어려움'][state.level];
      $('questionLevel').textContent = `LEVEL ${state.level} · ${levelLabel}`;

      const opSpan = q.op === '+'
        ? `<span class="op-plus">+</span>`
        : `<span class="op-minus">-</span>`;
      $('questionText').innerHTML = `${q.a} ${opSpan} ${q.b} = ?`;

      const feedbackEl = $('feedbackText');
      feedbackEl.classList.add('hidden');

      const cfg = CONFIG.LEVELS[state.level];
      const choices = makeChoices(q.answer, cfg.max);
      const area = $('choicesArea');
      area.innerHTML = '';
      choices.forEach(val => {
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.textContent = val;
        btn.addEventListener('pointerdown', () => handleChoice(btn, val));
        area.appendChild(btn);
      });

      updateHUD();
    }

    function handleChoice(btn, val) {
      if (state.answered) return;
      state.answered = true;

      const allBtns = document.querySelectorAll('.choice-btn');
      allBtns.forEach(b => b.disabled = true);

      const feedbackEl = $('feedbackText');
      feedbackEl.classList.remove('hidden', 'correct', 'wrong');

      if (val === state.currentAnswer) {
        state.score += 10;
        btn.classList.add('correct');
        feedbackEl.textContent = '✅ 정답!';
        feedbackEl.classList.add('correct');
      } else {
        btn.classList.add('wrong');
        feedbackEl.textContent = `❌ 정답은 ${state.currentAnswer}!`;
        feedbackEl.classList.add('wrong');
        // 정답 버튼 강조
        allBtns.forEach(b => {
          if (parseInt(b.textContent) === state.currentAnswer) {
            b.classList.add('correct');
          }
        });
      }

      state.questionIndex++;
      updateHUD();

      setTimeout(showQuestion, CONFIG.NEXT_DELAY);
    }

    function getStars(score) {
      if (score >= 90) return '⭐⭐⭐';
      if (score >= 60) return '⭐⭐';
      return '⭐';
    }

    function endGame() {
      saveBest(state.score);
      $('finalScore').textContent = state.score;
      $('resultStars').textContent = getStars(state.score);
      const msgs = [
        [100, '완벽해요! 천재 수학자! 🎉'],
        [80, '정말 잘했어요! 대단해요! 👏'],
        [60, '잘했어요! 조금만 더 연습해봐요! 😊'],
        [0, '괜찮아요! 다시 도전해봐요! 💪'],
      ];
      const msg = msgs.find(([min]) => state.score >= min);
      $('resultMsg').textContent = msg ? msg[1] : '';

      const best = getBest();
      const badgeEl = $('bestBadge');
      if (state.score >= best) {
        badgeEl.innerHTML = '<div class="best-badge">🏆 새 최고 기록!</div>';
      } else {
        badgeEl.innerHTML = `<p style="font-size:13px;opacity:0.5">최고: ${best}점</p>`;
      }

      $('endOverlay').classList.remove('hidden');
    }

    function startGame() {
      state.score = 0;
      state.questionIndex = 0;
      state.answered = false;
      $('startOverlay').classList.add('hidden');
      $('endOverlay').classList.add('hidden');
      updateHUD();
      showQuestion();
    }

    // 레벨 버튼
    document.querySelectorAll('.level-btn').forEach(btn => {
      btn.addEventListener('pointerdown', () => {
        document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        state.level = parseInt(btn.dataset.level);
      });
    });

    $('startBtn').addEventListener('pointerdown', startGame);
    $('restartBtn').addEventListener('pointerdown', () => {
      $('endOverlay').classList.add('hidden');
      $('startOverlay').classList.remove('hidden');
    });

    // 초기 최고 기록 표시
    $('bestScore').textContent = getBest();

  })();
  </script>
</body>
</html>
