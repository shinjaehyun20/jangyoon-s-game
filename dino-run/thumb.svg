<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b3e5fc"/>
      <stop offset="100%" stop-color="#e8f5e9"/>
    </linearGradient>
  </defs>
  <!-- 하늘 배경 -->
  <rect width="320" height="180" fill="url(#sky)"/>
  <!-- 경계선 -->
  <rect x="0.5" y="0.5" width="319" height="179" fill="none" stroke="rgba(255,255,255,0.08)"/>
  <!-- 구름 -->
  <text x="40" y="42" font-size="28" opacity="0.7">☁️</text>
  <text x="160" y="32" font-size="22" opacity="0.6">☁️</text>
  <!-- 지면 -->
  <rect x="0" y="140" width="320" height="40" fill="#8bc34a"/>
  <rect x="0" y="140" width="320" height="6" fill="#7cb342"/>
  <rect x="0" y="146" width="320" height="34" fill="#6d4c41"/>
  <!-- 공룡 -->
  <text x="52" y="140" font-size="52" text-anchor="middle">🦕</text>
  <!-- 장애물 -->
  <text x="210" y="140" font-size="38">🌵</text>
  <text x="255" y="100" font-size="30">🦅</text>
  <!-- 점선 궤적 -->
  <path d="M88 130 Q120 80 155 110 Q185 135 220 100" stroke="rgba(255,255,255,0.4)" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
  <!-- 타이틀 -->
  <g font-family="'Pretendard','Noto Sans KR',sans-serif">
    <text x="296" y="148" text-anchor="end" font-size="22" font-weight="900" fill="#43a047">공룡 달리기</text>
    <text x="296" y="166" text-anchor="end" font-size="10" font-weight="500" fill="rgba(255,255,255,0.6)" letter-spacing="2">DINO RUN</text>
  </g>
</svg>
