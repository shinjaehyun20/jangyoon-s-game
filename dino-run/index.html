<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>🦕 공룡 달리기</title>
  <style>
    :root {
      --bg: #e8f5e9;
      --sky: #b3e5fc;
      --ground: #6d4c41;
      --accent: #43a047;
      --text: #1b5e20;
      --dino: #388e3c;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100vh; height: 100dvh;
      overflow: hidden;
      touch-action: manipulation;
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: var(--sky);
      user-select: none;
    }
    .wrap {
      width: 100%; max-width: 480px;
      height: 100vh; height: 100dvh;
      display: flex; flex-direction: column;
      margin: 0 auto;
      position: relative;
    }
    h1 {
      font-size: clamp(18px, 5vw, 26px);
      text-align: center;
      padding: 8px 0 4px;
      color: var(--text);
      text-shadow: 0 1px 2px rgba(0,0,0,0.1);
    }
    .hud {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 16px;
      background: rgba(255,255,255,0.5);
      border-radius: 20px;
      margin: 0 12px 4px;
      font-size: clamp(13px, 3.5vw, 16px);
      color: var(--text);
      font-weight: 700;
    }
    #gameArea {
      flex: 1;
      position: relative;
      overflow: hidden;
      margin: 0 0;
      cursor: pointer;
    }
    /* 배경 구름 */
    .cloud {
      position: absolute;
      font-size: 28px;
      opacity: 0.7;
    }
    /* 지면 */
    #ground {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 60px;
      background: linear-gradient(to bottom, #8bc34a, #6d4c41 30%);
      border-top: 4px solid #7cb342;
    }
    /* 공룡 */
    #dino {
      position: absolute;
      bottom: 60px;
      left: 40px;
      width: 52px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 44px;
      transition: none;
      filter: drop-shadow(2px 3px 3px rgba(0,0,0,0.25));
    }
    /* 장애물 */
    .obstacle {
      position: absolute;
      bottom: 60px;
      font-size: 40px;
      display: flex;
      align-items: flex-end;
    }
    .obstacle-sky {
      font-size: 34px;
      bottom: auto;
    }
    /* 파티클 */
    .particle {
      position: absolute;
      pointer-events: none;
      font-size: 18px;
      animation: particleFly 0.6s ease-out forwards;
    }
    @keyframes particleFly {
      0% { transform: translate(0,0) scale(1); opacity: 1; }
      100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
    }
    footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 16px 8px;
      font-size: 12px;
      color: var(--text);
    }
    .home-link {
      color: var(--text);
      text-decoration: none;
      font-weight: 700;
      background: rgba(255,255,255,0.5);
      padding: 4px 12px;
      border-radius: 12px;
    }
    /* 오버레이 */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.55);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .overlay.hidden { display: none; }
    .overlay-card {
      background: #fff;
      border-radius: 24px;
      padding: 32px 28px;
      text-align: center;
      max-width: 320px;
      width: 88%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }
    .overlay-card h2 { font-size: 26px; margin-bottom: 10px; }
    .overlay-card p { font-size: 15px; color: #555; margin-bottom: 18px; line-height: 1.5; }
    .result-score { font-size: 48px; font-weight: 900; color: var(--accent); margin: 8px 0; }
    .btn-start {
      display: block; width: 100%;
      background: var(--accent);
      color: #fff;
      border: none; border-radius: 16px;
      padding: 14px;
      font-size: 20px; font-weight: 800;
      cursor: pointer;
      min-height: 52px;
      margin-top: 6px;
    }
    .btn-start:active { transform: scale(0.97); }
    #bestDisplay { font-size: 13px; color: #888; margin-top: 8px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>🦕 공룡 달리기</h1>
    <div class="hud">
      <span>거리: <b id="scoreDisplay">0</b>m</span>
      <span>🏆 <b id="bestDisplay">0</b>m</span>
      <span>❤️ <b id="livesDisplay">3</b></span>
    </div>
    <div id="gameArea">
      <!-- 구름 -->
      <div class="cloud" id="cloud1" style="top:15%;left:20%">☁️</div>
      <div class="cloud" id="cloud2" style="top:25%;left:65%">☁️</div>
      <div id="dino">🦕</div>
      <div id="ground"></div>
    </div>
    <footer>
      <small>탭해서 점프! 장애물을 피하세요</small>
      <a class="home-link" href="../index.html">← 홈으로</a>
    </footer>
  </div>

  <!-- 시작 오버레이 -->
  <div class="overlay" id="startOverlay">
    <div class="overlay-card">
      <h2>🦕 공룡 달리기</h2>
      <p>화면을 탭하면 공룡이 점프해요!<br>
         선인장 🌵 과 새 🦅 를 피해서<br>
         멀리멀리 달려봐요!</p>
      <button class="btn-start" id="startBtn">달리기 시작!</button>
    </div>
  </div>

  <!-- 종료 오버레이 -->
  <div class="overlay hidden" id="endOverlay">
    <div class="overlay-card">
      <h2>🎉 게임 종료!</h2>
      <div class="result-score" id="finalScore">0m</div>
      <p id="resultMsg"></p>
      <button class="btn-start" id="restartBtn">다시 달리기!</button>
    </div>
  </div>

  <script>
  (function () {
    'use strict';

    const CONFIG = {
      gravity: 0.55,
      jumpForce: -13,
      groundY: 60,        // 지면 높이 (px, 아래서)
      dinoLeft: 40,
      dinoSize: 52,
      baseSpeed: 4.5,
      speedIncrement: 0.002,
      obstacleMinGap: 260,
      obstacleMaxGap: 480,
      skyObstacleY: 120,  // 지면에서 위로
      startLives: 3,
      invincibleTime: 1200, // ms
      storageKey: 'dino-run_best',
    };

    // 상태
    let state = {};
    let raf = null;
    let obstacles = [];
    let clouds = [];
    let particles = [];
    let lastTime = 0;

    // DOM
    const gameArea = document.getElementById('gameArea');
    const dinoEl = document.getElementById('dino');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const bestDisplay = document.getElementById('bestDisplay');
    const livesDisplay = document.getElementById('livesDisplay');
    const startOverlay = document.getElementById('startOverlay');
    const endOverlay = document.getElementById('endOverlay');
    const finalScore = document.getElementById('finalScore');
    const resultMsg = document.getElementById('resultMsg');
    const startBtn = document.getElementById('startBtn');
    const restartBtn = document.getElementById('restartBtn');

    // 최고 기록
    let best = parseInt(localStorage.getItem(CONFIG.storageKey) || '0');
    bestDisplay.textContent = best;

    function getAreaHeight() {
      return gameArea.offsetHeight;
    }

    function initState() {
      state = {
        dinoY: 0,       // 지면에서 위 (px)
        dinoVY: 0,
        score: 0,
        lives: CONFIG.startLives,
        speed: CONFIG.baseSpeed,
        running: false,
        jumping: false,
        invincible: false,
        invincibleTimer: 0,
        nextObstacleIn: 200, // px 주행 후 장애물
        totalPx: 0,
        cloudX1: 20,
        cloudX2: 65,
        groundX: 0,
      };
      obstacles = [];
      particles = [];
      updateHUD();
    }

    function updateHUD() {
      scoreDisplay.textContent = state.score;
      livesDisplay.textContent = state.lives;
    }

    // 공룡 위치 반영
    function renderDino() {
      const groundPx = CONFIG.groundY;
      const bottom = groundPx + state.dinoY;
      dinoEl.style.bottom = bottom + 'px';
      if (state.invincible) {
        dinoEl.style.opacity = Math.sin(Date.now() / 80) > 0 ? '0.4' : '1';
      } else {
        dinoEl.style.opacity = '1';
      }
    }

    // 장애물 생성
    function spawnObstacle() {
      const areaH = getAreaHeight();
      const isSky = (state.score > 20) && (Math.random() < 0.3);
      const el = document.createElement('div');
      el.classList.add('obstacle');
      let topPx, bottomPx;
      if (isSky) {
        el.classList.add('obstacle-sky');
        el.textContent = '🦅';
        // 지면에서 CONFIG.skyObstacleY ~ CONFIG.skyObstacleY+60px 위치
        const skyOffset = CONFIG.groundY + CONFIG.skyObstacleY + Math.random() * 60;
        bottomPx = skyOffset;
        topPx = areaH - skyOffset - 34;
        el.style.bottom = bottomPx + 'px';
        el.style.fontSize = '32px';
      } else {
        const types = ['🌵','🌵🌵','🌾','🪨'];
        el.textContent = types[Math.floor(Math.random() * types.length)];
        bottomPx = CONFIG.groundY;
        el.style.bottom = bottomPx + 'px';
      }
      el.style.right = '-60px';
      el.style.position = 'absolute';
      gameArea.appendChild(el);
      const rect = el.getBoundingClientRect();
      obstacles.push({
        el,
        x: gameArea.offsetWidth + 60,
        bottomPx,
        isSky,
        w: 44,
        h: isSky ? 34 : 44,
      });
    }

    // 충돌 검사 (AABB, 여유 10px)
    function checkCollision(obs) {
      const margin = 10;
      const dinoLeft = CONFIG.dinoLeft + margin;
      const dinoRight = CONFIG.dinoLeft + CONFIG.dinoSize - margin;
      const dinoBottom = CONFIG.groundY + state.dinoY + margin;
      const dinoTop = dinoBottom + CONFIG.dinoSize - margin;

      const obsRight = obs.x + obs.w - margin;
      const obsLeft = obs.x + margin;
      const obsBottom = obs.bottomPx + margin;
      const obsTop = obs.bottomPx + obs.h - margin;

      return dinoRight > obsLeft && dinoLeft < obsRight
          && dinoTop > obsBottom && dinoBottom < obsTop;
    }

    function emitParticle(x, y) {
      const emojis = ['⭐','✨','💫'];
      for (let i = 0; i < 4; i++) {
        const p = document.createElement('div');
        p.classList.add('particle');
        p.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        const dx = (Math.random() - 0.5) * 60;
        const dy = -30 - Math.random() * 50;
        p.style.setProperty('--dx', dx + 'px');
        p.style.setProperty('--dy', dy + 'px');
        p.style.left = x + 'px';
        p.style.top = y + 'px';
        gameArea.appendChild(p);
        particles.push(p);
        setTimeout(() => { p.remove(); }, 700);
      }
    }

    function jump() {
      if (!state.running) return;
      if (state.dinoY <= 1) {
        state.dinoVY = CONFIG.jumpForce;
        state.jumping = true;
      }
    }

    function loop(timestamp) {
      if (!state.running) return;
      const dt = Math.min(timestamp - lastTime, 50);
      lastTime = timestamp;

      // 속도 증가
      state.speed = CONFIG.baseSpeed + state.score * CONFIG.speedIncrement;

      // 점수 (픽셀 기반)
      state.totalPx += state.speed;
      state.score = Math.floor(state.totalPx / 10);
      scoreDisplay.textContent = state.score;

      // 무적 타이머
      if (state.invincible) {
        state.invincibleTimer -= dt;
        if (state.invincibleTimer <= 0) {
          state.invincible = false;
          dinoEl.style.opacity = '1';
        }
      }

      // 공룡 물리
      state.dinoVY += CONFIG.gravity;
      state.dinoY -= state.dinoVY;
      if (state.dinoY <= 0) {
        state.dinoY = 0;
        state.dinoVY = 0;
        state.jumping = false;
      }
      renderDino();

      // 구름 이동
      state.cloudX1 -= state.speed * 0.3;
      state.cloudX2 -= state.speed * 0.25;
      if (state.cloudX1 < -10) state.cloudX1 = 110;
      if (state.cloudX2 < -10) state.cloudX2 = 115;
      document.getElementById('cloud1').style.left = state.cloudX1 + '%';
      document.getElementById('cloud2').style.left = state.cloudX2 + '%';

      // 장애물 생성
      state.nextObstacleIn -= state.speed;
      if (state.nextObstacleIn <= 0) {
        spawnObstacle();
        state.nextObstacleIn = CONFIG.obstacleMinGap
          + Math.random() * (CONFIG.obstacleMaxGap - CONFIG.obstacleMinGap);
      }

      // 장애물 이동 + 충돌
      obstacles = obstacles.filter(obs => {
        obs.x -= state.speed;
        obs.el.style.right = (gameArea.offsetWidth - obs.x - obs.w) + 'px';

        if (!state.invincible && checkCollision(obs)) {
          state.lives--;
          state.invincible = true;
          state.invincibleTimer = CONFIG.invincibleTime;
          livesDisplay.textContent = state.lives;
          emitParticle(obs.x, getAreaHeight() - obs.bottomPx - obs.h - 20);
          if (state.lives <= 0) {
            endGame();
            return false;
          }
        }
        if (obs.x < -80) {
          obs.el.remove();
          return false;
        }
        return true;
      });

      if (state.running) {
        raf = requestAnimationFrame(loop);
      }
    }

    function startGame() {
      startOverlay.classList.add('hidden');
      endOverlay.classList.add('hidden');
      initState();
      state.running = true;
      lastTime = performance.now();
      raf = requestAnimationFrame(loop);
    }

    function endGame() {
      state.running = false;
      cancelAnimationFrame(raf);
      // 장애물 정리
      obstacles.forEach(o => o.el.remove());
      obstacles = [];

      if (state.score > best) {
        best = state.score;
        localStorage.setItem(CONFIG.storageKey, best);
        bestDisplay.textContent = best;
      }
      finalScore.textContent = state.score + 'm';
      const msgs = [
        '정말 잘 달렸어요! 🦕',
        '멋진 달리기였어요! ⭐',
        '다음엔 더 멀리 달려봐요! 💪',
        '최선을 다했어요! 🎉'
      ];
      resultMsg.textContent = state.score >= best
        ? '🏆 최고 기록 달성! 대단해요!'
        : msgs[Math.floor(Math.random() * msgs.length)];
      endOverlay.classList.remove('hidden');
    }

    // 이벤트
    gameArea.addEventListener('pointerdown', jump);
    startBtn.addEventListener('pointerdown', startGame);
    restartBtn.addEventListener('pointerdown', startGame);

    // 초기 베스트 표시
    bestDisplay.textContent = best;
  })();
  </script>
</body>
</html>
