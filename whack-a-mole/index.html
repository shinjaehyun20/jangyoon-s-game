<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>두더지 잡기</title>
  <style>
    :root {
      --bg: #4caf50;
      --dirt: #8b5e3c;
      --hole: #3e2006;
      --accent: #ffeb3b;
      --text: #fff;
      --btn: #ff9800;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100vh; height: 100dvh;
      overflow: hidden;
      font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
      background: linear-gradient(180deg, #81c784 0%, #388e3c 100%);
      color: var(--text);
      display: flex; align-items: center; justify-content: center;
      touch-action: manipulation;
    }
    .wrap {
      width: 100%; max-width: 480px;
      height: 100vh; height: 100dvh;
      display: flex; flex-direction: column;
      padding: 10px 12px 8px;
      gap: 8px;
    }
    h1 { font-size: clamp(22px, 6vw, 32px); text-align: center; text-shadow: 2px 3px 0 rgba(0,0,0,0.25); }
    .hud {
      display: flex; justify-content: space-between; align-items: center;
      background: rgba(0,0,0,0.2); border-radius: 12px; padding: 8px 14px;
      flex-shrink: 0;
    }
    .hud-item { text-align: center; }
    .hud-label { font-size: 11px; opacity: 0.85; letter-spacing: 1px; text-transform: uppercase; }
    .hud-value { font-size: 24px; font-weight: 900; line-height: 1.1; }
    #timerBar {
      height: 8px; background: rgba(0,0,0,0.2); border-radius: 4px; overflow: hidden;
      flex-shrink: 0;
    }
    #timerFill {
      height: 100%; background: var(--accent);
      border-radius: 4px; width: 100%;
      transition: width 0.1s linear, background-color 0.5s;
    }
    /* 게임 그리드 */
    .grid {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: clamp(8px, 2.5vw, 16px);
      align-content: center;
    }
    .hole-wrap {
      position: relative;
      display: flex; align-items: flex-end; justify-content: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .hole-bg {
      width: 100%; padding-top: 90%;
      background: radial-gradient(ellipse 80% 60% at 50% 60%, #3e2006, #1a0800);
      border-radius: 50%;
      box-shadow: 0 8px 0 rgba(0,0,0,0.3), inset 0 4px 12px rgba(0,0,0,0.5);
    }
    .mole {
      position: absolute;
      bottom: 10%;
      left: 50%; transform: translateX(-50%) translateY(100%);
      font-size: clamp(36px, 10vw, 60px);
      line-height: 1;
      transition: transform 0.12s cubic-bezier(0.34, 1.56, 0.64, 1);
      pointer-events: none;
      filter: drop-shadow(0 -4px 4px rgba(0,0,0,0.3));
    }
    .hole-wrap.up .mole {
      transform: translateX(-50%) translateY(0);
    }
    .hole-wrap.hit .mole {
      transform: translateX(-50%) translateY(0) scale(0.7) rotate(20deg);
      filter: drop-shadow(0 0 12px #ff0) brightness(1.5);
    }
    /* 점수 팝업 */
    .pop {
      position: absolute;
      bottom: 60%;
      left: 50%; transform: translateX(-50%);
      font-size: 22px; font-weight: 900; color: var(--accent);
      text-shadow: 1px 1px 0 #000;
      pointer-events: none;
      animation: pop-up 0.7s ease-out forwards;
    }
    @keyframes pop-up {
      0%   { opacity: 1; transform: translateX(-50%) translateY(0); }
      100% { opacity: 0; transform: translateX(-50%) translateY(-50px); }
    }
    /* 시작/종료 오버레이 */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.55);
      display: flex; align-items: center; justify-content: center;
      z-index: 10;
    }
    .overlay.hidden { display: none; }
    .overlay-card {
      background: #2e7d32; border-radius: 20px; padding: 28px 24px;
      text-align: center; width: min(340px, 90vw);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .overlay-card h2 { font-size: 28px; margin-bottom: 10px; }
    .overlay-card p { font-size: 15px; opacity: 0.9; margin-bottom: 20px; line-height: 1.6; }
    .result-score { font-size: 48px; font-weight: 900; color: var(--accent); margin: 8px 0; }
    .btn-start {
      background: var(--btn); border: none;
      color: #fff; font-size: 20px; font-weight: 900;
      padding: 14px 36px; border-radius: 14px;
      cursor: pointer; touch-action: manipulation;
      box-shadow: 0 4px 0 rgba(0,0,0,0.25);
      letter-spacing: 1px;
    }
    .btn-start:active { transform: translateY(2px); box-shadow: 0 2px 0 rgba(0,0,0,0.25); }
    footer {
      display: flex; justify-content: space-between; align-items: center;
      flex-shrink: 0;
    }
    footer small { font-size: 11px; opacity: 0.7; }
    .home-link {
      padding: 6px 14px; border-radius: 8px;
      background: rgba(0,0,0,0.15); color: #fff;
      text-decoration: none; font-size: 12px; font-weight: 600;
    }
    .btn-home {
      display: block; margin-top: 10px;
      background: #374151;
      color: #fff;
      border: none; border-radius: 14px;
      font-size: 17px; font-weight: 700;
      padding: 14px 20px;
      cursor: pointer;
      min-height: 56px;
      width: 100%;
      text-decoration: none;
      text-align: center;
      box-sizing: border-box;
    }
    .btn-home:active { transform: scale(0.97); }
  </style>
</head>
<body>
<div class="wrap">
  <h1>🔨 두더지 잡기</h1>

  <div class="hud">
    <div class="hud-item">
      <div class="hud-label">점수</div>
      <div class="hud-value" id="scoreEl">0</div>
    </div>
    <div class="hud-item">
      <div class="hud-label">연속</div>
      <div class="hud-value" id="comboEl">0</div>
    </div>
    <div class="hud-item">
      <div class="hud-label">남은시간</div>
      <div class="hud-value" id="timeEl">30</div>
    </div>
  </div>

  <div id="timerBar"><div id="timerFill"></div></div>

  <div class="grid" id="grid"></div>

  <footer>
    <small>터치해서 두더지를 잡아요!</small>
    <a class="home-link" href="../index.html">🏠 게임 목록으로</a>
  </footer>
</div>

<!-- 시작 오버레이 -->
<div class="overlay" id="startOverlay">
  <div class="overlay-card">
    <h2>🔨 두더지 잡기</h2>
    <p>올라오는 두더지를<br>빠르게 탭해서 잡아요!<br>연속으로 잡으면 보너스!</p>
    <button class="btn-start" id="startBtn">시작!</button>
  </div>
</div>

<!-- 결과 오버레이 -->
<div class="overlay hidden" id="endOverlay">
  <div class="overlay-card">
    <h2>🎉 게임 종료!</h2>
    <div class="result-score" id="finalScore">0</div>
    <p id="resultMsg"></p>
    <button class="btn-start" id="restartBtn">다시 하기</button>
    <a class="btn-home" href="../index.html">🏠 게임 목록으로</a>
  </div>
</div>

<script>
(function () {
  'use strict';

  const CONFIG = {
    TOTAL_TIME: 30,
    HOLES: 9,
    // 레벨별 두더지 노출 시간(ms)
    SHOW_TIME_START: 1100,
    SHOW_TIME_MIN: 550,
    // 레벨업 간격(초)
    LEVEL_INTERVAL: 8,
    // 점수
    BASE_SCORE: 10,
    COMBO_BONUS: 5,
    COMBO_TIMEOUT: 1200, // ms
    MOLES: ['🐹','🦔','🐭','🐮','🐷','🐸'], // 종류별 이모지
  };

  // DOM
  const grid      = document.getElementById('grid');
  const scoreEl   = document.getElementById('scoreEl');
  const comboEl   = document.getElementById('comboEl');
  const timeEl    = document.getElementById('timeEl');
  const timerFill = document.getElementById('timerFill');
  const startOverlay = document.getElementById('startOverlay');
  const endOverlay   = document.getElementById('endOverlay');
  const finalScore   = document.getElementById('finalScore');
  const resultMsg    = document.getElementById('resultMsg');

  // 상태
  const state = {
    score: 0, combo: 0, timeLeft: 0,
    active: false,
    holes: [], // { el, moleEl, timeout, up, emoji }
    gameTimer: null,
    spawnTimer: null,
    comboTimer: null,
  };

  // 구멍 9개 생성
  function buildGrid() {
    grid.innerHTML = '';
    state.holes = [];
    for (let i = 0; i < CONFIG.HOLES; i++) {
      const wrap = document.createElement('div');
      wrap.className = 'hole-wrap';
      const bg = document.createElement('div');
      bg.className = 'hole-bg';
      const mole = document.createElement('div');
      mole.className = 'mole';
      mole.textContent = '🐹';
      wrap.appendChild(bg);
      wrap.appendChild(mole);
      wrap.addEventListener('pointerdown', () => onHit(i));
      grid.appendChild(wrap);
      state.holes.push({ el: wrap, moleEl: mole, timeout: null, up: false, emoji: '🐹' });
    }
  }

  function onHit(i) {
    const hole = state.holes[i];
    if (!state.active || !hole.up || hole.el.classList.contains('hit')) return;
    hole.el.classList.add('hit');
    clearTimeout(hole.timeout);
    // 콤보
    state.combo++;
    clearTimeout(state.comboTimer);
    state.comboTimer = setTimeout(resetCombo, CONFIG.COMBO_TIMEOUT);
    // 점수
    const earned = CONFIG.BASE_SCORE + (state.combo - 1) * CONFIG.COMBO_BONUS;
    state.score += earned;
    updateHUD();
    showPop(hole.el, `+${earned}${state.combo > 1 ? ' 🔥' : ''}`);
    setTimeout(() => hideMole(i), 200);
  }

  function resetCombo() {
    state.combo = 0;
    comboEl.textContent = '0';
  }

  function showMole(i) {
    const hole = state.holes[i];
    if (hole.up) return;
    const elapsed = CONFIG.TOTAL_TIME - state.timeLeft;
    const level = Math.floor(elapsed / CONFIG.LEVEL_INTERVAL);
    const showTime = Math.max(
      CONFIG.SHOW_TIME_MIN,
      CONFIG.SHOW_TIME_START - level * 80
    );
    hole.emoji = CONFIG.MOLES[Math.floor(Math.random() * CONFIG.MOLES.length)];
    hole.moleEl.textContent = hole.emoji;
    hole.up = true;
    hole.el.classList.remove('hit');
    hole.el.classList.add('up');
    hole.timeout = setTimeout(() => hideMole(i), showTime);
  }

  function hideMole(i) {
    const hole = state.holes[i];
    hole.up = false;
    hole.el.classList.remove('up', 'hit');
  }

  function showPop(parentEl, text) {
    const p = document.createElement('div');
    p.className = 'pop';
    p.textContent = text;
    parentEl.appendChild(p);
    p.addEventListener('animationend', () => p.remove());
  }

  function updateHUD() {
    scoreEl.textContent = state.score;
    comboEl.textContent = state.combo;
  }

  function spawnRandom() {
    // 올라와 있지 않은 구멍들 중 무작위 선택
    const available = state.holes
      .map((h, i) => !h.up ? i : -1)
      .filter(i => i >= 0);
    if (available.length === 0) return;
    const i = available[Math.floor(Math.random() * available.length)];
    showMole(i);
  }

  function getSpawnInterval() {
    const elapsed = CONFIG.TOTAL_TIME - state.timeLeft;
    const level = Math.floor(elapsed / CONFIG.LEVEL_INTERVAL);
    return Math.max(400, 900 - level * 80);
  }

  function scheduleNextSpawn() {
    if (!state.active) return;
    state.spawnTimer = setTimeout(() => {
      spawnRandom();
      scheduleNextSpawn();
    }, getSpawnInterval());
  }

  function startGame() {
    startOverlay.classList.add('hidden');
    endOverlay.classList.add('hidden');
    state.score = 0;
    state.combo = 0;
    state.timeLeft = CONFIG.TOTAL_TIME;
    state.active = true;
    buildGrid();
    updateHUD();
    timeEl.textContent = state.timeLeft;
    timerFill.style.width = '100%';
    timerFill.style.backgroundColor = '#ffeb3b';

    state.gameTimer = setInterval(() => {
      state.timeLeft--;
      timeEl.textContent = state.timeLeft;
      const pct = (state.timeLeft / CONFIG.TOTAL_TIME) * 100;
      timerFill.style.width = pct + '%';
      if (state.timeLeft <= 8) timerFill.style.backgroundColor = '#f44336';
      else if (state.timeLeft <= 15) timerFill.style.backgroundColor = '#ff9800';
      if (state.timeLeft <= 0) endGame();
    }, 1000);

    scheduleNextSpawn();
  }

  function endGame() {
    state.active = false;
    clearInterval(state.gameTimer);
    clearTimeout(state.spawnTimer);
    clearTimeout(state.comboTimer);
    state.holes.forEach((_, i) => hideMole(i));

    finalScore.textContent = state.score;
    const best = parseInt(localStorage.getItem('wam_best') || '0', 10);
    if (state.score > best) {
      localStorage.setItem('wam_best', state.score);
      resultMsg.textContent = `🏆 최고 기록 갱신! (이전: ${best}점)`;
    } else {
      resultMsg.textContent = `최고 기록: ${Math.max(best, state.score)}점 | 도전해봐요!`;
    }
    endOverlay.classList.remove('hidden');
  }

  document.getElementById('startBtn').addEventListener('click', startGame);
  document.getElementById('restartBtn').addEventListener('click', startGame);
  buildGrid(); // 초기 구멍 표시
})();
</script>
</body>
</html>
