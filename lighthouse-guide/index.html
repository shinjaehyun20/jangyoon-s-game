<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>등대 불빛</title>
  <style>
    :root {
      --bg-deep:   #0a1628;
      --bg-sea:    #0d2240;
      --accent:    #ffe066;
      --accent2:   #ffb347;
      --safe:      #4fc3f7;
      --danger:    #ef5350;
      --text:      #e0f7fa;
      --overlay-bg: rgba(5, 15, 35, 0.92);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100vh; height: 100dvh;
      overflow: hidden;
      touch-action: manipulation;
      font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
      background: var(--bg-deep);
      color: var(--text);
    }
    .wrap {
      width: 100%; max-width: 480px;
      height: 100vh; height: 100dvh;
      display: flex; flex-direction: column;
      padding: 8px 10px 6px;
      gap: 6px;
      margin: 0 auto;
    }
    h1 {
      font-size: clamp(18px, 5vw, 24px);
      text-align: center;
      letter-spacing: 2px;
      color: var(--accent);
      text-shadow: 0 0 16px var(--accent);
      flex-shrink: 0;
    }
    .hud {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 6px 14px;
      font-size: clamp(13px, 3.5vw, 16px);
      flex-shrink: 0;
    }
    .hud span { color: var(--accent); font-weight: 700; }
    #gameCanvas {
      flex: 1;
      width: 100%;
      border-radius: 14px;
      display: block;
      touch-action: none;
      cursor: grab;
    }
    footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
      padding: 0 4px;
    }
    footer small {
      font-size: clamp(11px, 2.8vw, 13px);
      color: rgba(224,247,250,0.55);
    }
    .home-link {
      font-size: clamp(12px, 3vw, 14px);
      color: var(--safe);
      text-decoration: none;
      padding: 6px 12px;
      border-radius: 8px;
      background: rgba(79,195,247,0.12);
    }
    /* ── Overlay ── */
    .overlay {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: var(--overlay-bg);
      z-index: 100;
    }
    .overlay.hidden { display: none; }
    .overlay-card {
      background: rgba(13,34,64,0.97);
      border: 1.5px solid rgba(255,224,102,0.35);
      border-radius: 20px;
      padding: 28px 28px 24px;
      text-align: center;
      max-width: 320px;
      width: 90%;
    }
    .overlay-card h2 {
      font-size: clamp(20px, 6vw, 26px);
      color: var(--accent);
      text-shadow: 0 0 12px var(--accent);
      margin-bottom: 10px;
    }
    .overlay-card p {
      font-size: clamp(13px, 3.5vw, 15px);
      color: var(--text);
      line-height: 1.6;
      margin-bottom: 20px;
    }
    .result-score {
      font-size: clamp(42px, 13vw, 56px);
      font-weight: 900;
      color: var(--accent);
      text-shadow: 0 0 20px var(--accent);
      margin: 8px 0;
    }
    .result-best {
      font-size: clamp(13px, 3.5vw, 15px);
      color: var(--safe);
      margin-bottom: 6px;
    }
    #resultMsg {
      font-size: clamp(13px, 3.5vw, 15px);
      color: var(--text);
      margin-bottom: 20px;
    }
    .btn-start {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #0a1628;
      border: none;
      border-radius: 14px;
      font-size: clamp(16px, 4.5vw, 20px);
      font-weight: 800;
      min-height: 50px;
      padding: 0 32px;
      cursor: pointer;
      box-shadow: 0 0 20px rgba(255,224,102,0.45);
      letter-spacing: 1px;
    }
    .btn-start:active { transform: scale(0.96); }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>🔦 등대 불빛</h1>
    <div class="hud">
      <div>점수: <span id="scoreVal">0</span></div>
      <div>최고: <span id="bestVal">0</span></div>
      <div>목숨: <span id="livesVal">3</span></div>
    </div>
    <canvas id="gameCanvas"></canvas>
    <footer>
      <small>드래그로 불빛을 돌려 배를 안내!</small>
      <a class="home-link" href="../index.html">← 홈으로</a>
    </footer>
  </div>

  <!-- 시작 오버레이 -->
  <div class="overlay" id="startOverlay">
    <div class="overlay-card">
      <h2>🔦 등대 불빛</h2>
      <p>
        등대를 터치·드래그로 회전해서<br>
        밤바다 배들을 항구로 안내해요!<br>
        <br>
        불빛 경로 위 배는 안전하게 도착 🚢<br>
        바위에 부딪히면 목숨이 줄어요 🪨
      </p>
      <button class="btn-start" id="startBtn">시작!</button>
    </div>
  </div>

  <!-- 결과 오버레이 -->
  <div class="overlay hidden" id="endOverlay">
    <div class="overlay-card">
      <h2>🎉 게임 종료!</h2>
      <div class="result-score" id="finalScore">0</div>
      <p class="result-best" id="bestMsg"></p>
      <p id="resultMsg"></p>
      <button class="btn-start" id="restartBtn">다시 하기</button>
    </div>
  </div>

  <script>
  (function () {
    'use strict';

    /* ── CONFIG ── */
    const CONFIG = {
      BEST_KEY:         'lighthouse-guide_best',
      SHIP_SPAWN_MS:    3200,    // 배 등장 간격(ms)
      SHIP_SPEED_BASE:  0.55,    // 기본 배 이동 속도 (px/frame)
      SHIP_SPEED_INC:   0.06,    // 매 점수 5점마다 속도 증가량
      ROCK_COUNT:       5,       // 바위 개수
      BEAM_HALF:        28,      // 불빛 반각 (deg)
      BEAM_LEN_RATIO:   0.78,    // 불빛 길이 / min(w,h)
      LIVES_START:      3,
      GUIDE_DIST:       22,      // 배가 빔 경로 내로 판정되는 거리(px)
      DOCK_RADIUS:      32,      // 항구 인식 반경
      ROCK_RADIUS:      18,      // 바위 충돌 반경
    };

    /* ── DOM ── */
    const canvas       = document.getElementById('gameCanvas');
    const ctx          = canvas.getContext('2d');
    const scoreEl      = document.getElementById('scoreVal');
    const bestEl       = document.getElementById('bestVal');
    const livesEl      = document.getElementById('livesVal');
    const startOverlay = document.getElementById('startOverlay');
    const endOverlay   = document.getElementById('endOverlay');
    const finalScoreEl = document.getElementById('finalScore');
    const bestMsgEl    = document.getElementById('bestMsg');
    const resultMsgEl  = document.getElementById('resultMsg');

    /* ── STATE ── */
    let state = {};
    let raf   = null;
    let spawnTimer = null;

    function loadBest() {
      return parseInt(localStorage.getItem(CONFIG.BEST_KEY) || '0', 10);
    }
    function saveBest(v) {
      localStorage.setItem(CONFIG.BEST_KEY, String(v));
    }

    /* ── RESIZE ── */
    function resizeCanvas() {
      const rect = canvas.getBoundingClientRect();
      canvas.width  = rect.width;
      canvas.height = rect.height;
    }
    window.addEventListener('resize', () => {
      resizeCanvas();
      if (state.running) buildLevel();
    });

    /* ── LEVEL GEOMETRY ── */
    function buildLevel() {
      const W = canvas.width, H = canvas.height;
      const cx = W * 0.5, cy = H * 0.52;

      // 항구: 화면 오른쪽 중앙
      state.dock = { x: W * 0.88, y: H * 0.45 };

      // 바위: 랜덤 배치 (항구·등대 근처 제외)
      state.rocks = [];
      const minDist = 80;
      let tries = 0;
      while (state.rocks.length < CONFIG.ROCK_COUNT && tries < 300) {
        tries++;
        const rx = W * 0.12 + Math.random() * W * 0.74;
        const ry = H * 0.12 + Math.random() * H * 0.76;
        const dLh = Math.hypot(rx - cx, ry - cy);
        const dDk = Math.hypot(rx - state.dock.x, ry - state.dock.y);
        if (dLh > minDist && dDk > minDist) {
          state.rocks.push({ x: rx, y: ry, r: CONFIG.ROCK_RADIUS });
        }
      }

      state.lh = { x: cx, y: cy };   // 등대 위치
    }

    /* ── INIT ── */
    function initGame() {
      resizeCanvas();
      state = {
        running:   true,
        score:     0,
        lives:     CONFIG.LIVES_START,
        beamAngle: -Math.PI * 0.5,   // 위쪽 방향으로 시작
        ships:     [],
        particles: [],
        lh:        { x: 0, y: 0 },
        dock:      { x: 0, y: 0 },
        rocks:     [],
        drag:      false,
        best:      loadBest(),
      };
      buildLevel();
      updateHUD();
      scheduleSpawn();
    }

    function updateHUD() {
      scoreEl.textContent = state.score;
      bestEl.textContent  = state.best;
      livesEl.textContent = state.lives;
    }

    /* ── SPAWN ── */
    function spawnShip() {
      if (!state.running) return;
      const W = canvas.width, H = canvas.height;
      // 배는 화면 왼쪽·위·아래 가장자리에서 등장
      const edges = [
        { x: 0,   y: H * (0.15 + Math.random() * 0.7) },
        { x: W * (0.05 + Math.random() * 0.4), y: 0 },
        { x: W * (0.05 + Math.random() * 0.4), y: H },
      ];
      const spawn = edges[Math.floor(Math.random() * edges.length)];
      const spd = CONFIG.SHIP_SPEED_BASE + (Math.floor(state.score / 5)) * CONFIG.SHIP_SPEED_INC;
      const dx = state.dock.x - spawn.x;
      const dy = state.dock.y - spawn.y;
      const len = Math.hypot(dx, dy);
      state.ships.push({
        x: spawn.x, y: spawn.y,
        vx: (dx / len) * spd,
        vy: (dy / len) * spd,
        guided: false,
        flash: 0,
      });
    }

    function scheduleSpawn() {
      if (spawnTimer) clearInterval(spawnTimer);
      spawnTimer = setInterval(() => {
        if (state.running) spawnShip();
      }, CONFIG.SHIP_SPAWN_MS);
    }

    /* ── BEAM GEOMETRY ── */
    function isInBeam(sx, sy) {
      const { lh, beamAngle } = state;
      const dx = sx - lh.x, dy = sy - lh.y;
      const dist = Math.hypot(dx, dy);
      const maxLen = Math.min(canvas.width, canvas.height) * CONFIG.BEAM_LEN_RATIO;
      if (dist > maxLen) return false;

      const ang   = Math.atan2(dy, dx);
      let   diff  = ang - beamAngle;
      // 정규화
      while (diff >  Math.PI) diff -= Math.PI * 2;
      while (diff < -Math.PI) diff += Math.PI * 2;
      const halfRad = (CONFIG.BEAM_HALF * Math.PI) / 180;
      return Math.abs(diff) <= halfRad;
    }

    /* ── PARTICLES ── */
    function emitParticles(x, y, color, count) {
      for (let i = 0; i < count; i++) {
        const ang = Math.random() * Math.PI * 2;
        const spd = 1.5 + Math.random() * 3;
        state.particles.push({
          x, y,
          vx: Math.cos(ang) * spd,
          vy: Math.sin(ang) * spd,
          life: 1,
          color,
          r: 3 + Math.random() * 4,
        });
      }
    }

    /* ── COLLISION ── */
    function checkCollisions() {
      const toRemove = [];
      state.ships.forEach((ship, i) => {
        // 항구 도착
        const dDock = Math.hypot(ship.x - state.dock.x, ship.y - state.dock.y);
        if (dDock < CONFIG.DOCK_RADIUS) {
          if (ship.guided) {
            state.score++;
            emitParticles(ship.x, ship.y, '#ffe066', 18);
          } else {
            emitParticles(ship.x, ship.y, '#90caf9', 10);
          }
          toRemove.push(i);
          return;
        }
        // 바위 충돌
        for (const rock of state.rocks) {
          if (Math.hypot(ship.x - rock.x, ship.y - rock.y) < CONFIG.ROCK_RADIUS + 10) {
            emitParticles(ship.x, ship.y, '#ef5350', 14);
            state.lives--;
            toRemove.push(i);
            if (state.lives <= 0) endGame();
            return;
          }
        }
        // 화면 밖
        const W = canvas.width, H = canvas.height;
        if (ship.x < -40 || ship.x > W + 40 || ship.y < -40 || ship.y > H + 40) {
          toRemove.push(i);
        }
      });
      // 역순 제거
      for (let i = toRemove.length - 1; i >= 0; i--) {
        state.ships.splice(toRemove[i], 1);
      }
    }

    /* ── END ── */
    function endGame() {
      state.running = false;
      if (spawnTimer) clearInterval(spawnTimer);
      const best = loadBest();
      const newBest = state.score > best;
      if (newBest) saveBest(state.score);
      state.best = newBest ? state.score : best;
      updateHUD();

      finalScoreEl.textContent = state.score;
      bestMsgEl.textContent    = newBest ? '🏆 새 최고 기록!' : `최고 기록: ${state.best}점`;
      const msgs = [
        '잘했어요! 배들이 무사히 도착했어요 🚢',
        '대단해요! 등대지기 장윤이! 🌟',
        '멋져요! 불빛이 바다를 밝혔어요 🔦',
        '훌륭해요! 항해사 장윤이! ⚓',
      ];
      resultMsgEl.textContent = msgs[Math.floor(Math.random() * msgs.length)];
      endOverlay.classList.remove('hidden');
    }

    /* ── DRAW ── */
    function drawSea(W, H) {
      // 그라디언트 배경
      const grad = ctx.createLinearGradient(0, 0, 0, H);
      grad.addColorStop(0,   '#050e1e');
      grad.addColorStop(0.4, '#0a1628');
      grad.addColorStop(1,   '#0d2240');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, W, H);

      // 별
      ctx.fillStyle = 'rgba(255,255,255,0.55)';
      const starSeeds = [
        [0.08,0.06],[0.2,0.09],[0.35,0.04],[0.5,0.08],[0.65,0.05],
        [0.78,0.1],[0.91,0.07],[0.15,0.18],[0.45,0.15],[0.7,0.13],
        [0.88,0.19],[0.03,0.22],[0.58,0.22],[0.82,0.24],[0.29,0.02],
      ];
      starSeeds.forEach(([sx, sy]) => {
        ctx.beginPath();
        ctx.arc(sx * W, sy * H, 1.5, 0, Math.PI * 2);
        ctx.fill();
      });

      // 잔잔한 파도 힌트
      ctx.strokeStyle = 'rgba(79,195,247,0.08)';
      ctx.lineWidth = 1;
      for (let row = 0; row < 6; row++) {
        const y = H * 0.3 + row * H * 0.12;
        ctx.beginPath();
        for (let x = 0; x <= W; x += 40) {
          const wave = Math.sin((x / W) * Math.PI * 3 + row) * 3;
          if (x === 0) ctx.moveTo(x, y + wave);
          else ctx.lineTo(x, y + wave);
        }
        ctx.stroke();
      }
    }

    function drawBeam(W, H) {
      const { lh, beamAngle } = state;
      const maxLen = Math.min(W, H) * CONFIG.BEAM_LEN_RATIO;
      const halfRad = (CONFIG.BEAM_HALF * Math.PI) / 180;

      // 빔 코어 (밝은 부분)
      const grad = ctx.createConicalGradient
        ? null  // 표준 API 없음
        : null;

      ctx.save();
      ctx.beginPath();
      ctx.moveTo(lh.x, lh.y);
      ctx.arc(lh.x, lh.y, maxLen, beamAngle - halfRad, beamAngle + halfRad);
      ctx.closePath();
      const radGrad = ctx.createRadialGradient(lh.x, lh.y, 0, lh.x, lh.y, maxLen);
      radGrad.addColorStop(0,    'rgba(255,240,150,0.95)');
      radGrad.addColorStop(0.18, 'rgba(255,228,80,0.55)');
      radGrad.addColorStop(0.55, 'rgba(255,200,50,0.25)');
      radGrad.addColorStop(1,    'rgba(255,180,30,0.0)');
      ctx.fillStyle = radGrad;
      ctx.fill();
      ctx.restore();
    }

    function drawLighthouse(lh) {
      const x = lh.x, y = lh.y;
      // 기단
      ctx.fillStyle = '#c8d8e8';
      ctx.beginPath();
      ctx.roundRect(x - 10, y - 4, 20, 28, 4);
      ctx.fill();
      // 줄무늬
      ctx.fillStyle = '#e53935';
      ctx.beginPath();
      ctx.roundRect(x - 10, y + 4, 20, 8, 0);
      ctx.fill();
      // 등탑
      ctx.fillStyle = '#e0e8f0';
      ctx.beginPath();
      ctx.roundRect(x - 7, y - 24, 14, 22, 3);
      ctx.fill();
      // 등 (빛나는 원)
      ctx.fillStyle = '#ffe066';
      ctx.shadowColor = '#ffe066';
      ctx.shadowBlur  = 18;
      ctx.beginPath();
      ctx.arc(x, y - 24, 7, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
      // 꼭대기
      ctx.fillStyle = '#b0bec5';
      ctx.beginPath();
      ctx.moveTo(x - 7, y - 24);
      ctx.lineTo(x + 7, y - 24);
      ctx.lineTo(x, y - 34);
      ctx.closePath();
      ctx.fill();
    }

    function drawDock(dock) {
      ctx.fillStyle = '#4fc3f7';
      ctx.shadowColor = '#4fc3f7';
      ctx.shadowBlur  = 12;
      ctx.beginPath();
      ctx.arc(dock.x, dock.y, CONFIG.DOCK_RADIUS * 0.7, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 20px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('⚓', dock.x, dock.y);
    }

    function drawRocks(rocks) {
      rocks.forEach(r => {
        ctx.fillStyle = '#546e7a';
        ctx.shadowColor = '#263238';
        ctx.shadowBlur = 6;
        ctx.beginPath();
        ctx.arc(r.x, r.y, r.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.fillStyle = '#607d8b';
        ctx.beginPath();
        ctx.arc(r.x - 3, r.y - 3, r.r * 0.45, 0, Math.PI * 2);
        ctx.fill();
        // 경고 이모지
        ctx.font = '13px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('🪨', r.x, r.y);
      });
    }

    function drawShips(ships) {
      ships.forEach(ship => {
        const guided = isInBeam(ship.x, ship.y);
        ship.guided = guided;

        if (guided) {
          // 가이드 광채
          ctx.save();
          ctx.globalAlpha = 0.35;
          ctx.fillStyle = '#ffe066';
          ctx.beginPath();
          ctx.arc(ship.x, ship.y, 20, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }

        // 배 이모지
        ctx.font = '22px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('🚢', ship.x, ship.y);

        if (guided) {
          // 빛 반짝임
          ctx.font = '12px sans-serif';
          ctx.fillText('✨', ship.x + 14, ship.y - 12);
        }
      });
    }

    function drawParticles() {
      state.particles.forEach(p => {
        ctx.save();
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      });
    }

    function drawLives(W, H) {
      // 좌상단 하트 표시는 HUD가 담당 — 여기서는 canvas 내 시각적 피드백용 위험 표시
      if (state.lives === 1) {
        ctx.save();
        ctx.globalAlpha = 0.08 + 0.06 * Math.sin(Date.now() / 200);
        ctx.fillStyle = '#ef5350';
        ctx.fillRect(0, 0, W, H);
        ctx.restore();
      }
    }

    /* ── GAME LOOP ── */
    function update() {
      if (!state.running) return;
      // 배 이동
      state.ships.forEach(ship => {
        if (isInBeam(ship.x, ship.y)) {
          // 불빛 안 → 항구 방향으로 유도
          const dx = state.dock.x - ship.x;
          const dy = state.dock.y - ship.y;
          const len = Math.hypot(dx, dy) || 1;
          const spd = Math.hypot(ship.vx, ship.vy);
          ship.vx = (dx / len) * spd;
          ship.vy = (dy / len) * spd;
        }
        ship.x += ship.vx;
        ship.y += ship.vy;
      });
      // 파티클 업데이트
      state.particles = state.particles.filter(p => p.life > 0.02);
      state.particles.forEach(p => {
        p.x += p.vx;
        p.y += p.vy;
        p.vx *= 0.93;
        p.vy *= 0.93;
        p.life -= 0.028;
      });
      checkCollisions();
      updateHUD();
    }

    function draw() {
      const W = canvas.width, H = canvas.height;
      ctx.clearRect(0, 0, W, H);
      drawSea(W, H);
      drawBeam(W, H);
      drawDock(state.dock);
      drawRocks(state.rocks);
      drawShips(state.ships);
      drawParticles();
      drawLighthouse(state.lh);
      drawLives(W, H);
    }

    function loop() {
      update();
      draw();
      raf = requestAnimationFrame(loop);
    }

    /* ── POINTER (드래그로 등대 회전) ── */
    let dragActive = false;

    canvas.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      dragActive = true;
      canvas.setPointerCapture(e.pointerId);
      rotateBeam(e);
    });
    window.addEventListener('pointermove', (e) => {
      if (!dragActive || !state.running) return;
      rotateBeam(e);
    });
    window.addEventListener('pointerup', () => {
      dragActive = false;
    });

    function rotateBeam(e) {
      if (!state.running) return;
      const rect = canvas.getBoundingClientRect();
      const mx = e.clientX - rect.left;
      const my = e.clientY - rect.top;
      const dx = mx - state.lh.x;
      const dy = my - state.lh.y;
      state.beamAngle = Math.atan2(dy, dx);
    }

    /* ── BUTTONS ── */
    document.getElementById('startBtn').addEventListener('pointerdown', (e) => {
      e.preventDefault();
      startOverlay.classList.add('hidden');
      initGame();
      spawnShip(); // 첫 배 즉시 등장
      loop();
    });

    document.getElementById('restartBtn').addEventListener('pointerdown', (e) => {
      e.preventDefault();
      endOverlay.classList.add('hidden');
      if (raf) cancelAnimationFrame(raf);
      if (spawnTimer) clearInterval(spawnTimer);
      initGame();
      spawnShip();
      loop();
    });

    /* ── INIT BEST DISPLAY ── */
    bestEl.textContent = loadBest();

  })();
  </script>
</body>
</html>
