<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
  <!-- 배경 그라디언트 -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050e1e"/>
      <stop offset="55%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#0d2240"/>
    </linearGradient>
    <radialGradient id="beam" cx="38%" cy="55%" r="62%">
      <stop offset="0%"   stop-color="#ffe066" stop-opacity="0.92"/>
      <stop offset="30%"  stop-color="#ffcc00" stop-opacity="0.42"/>
      <stop offset="70%"  stop-color="#ffb300" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#ff8f00" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#ffe066" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ffe066" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 배경 -->
  <rect width="320" height="180" fill="url(#sky)"/>

  <!-- 별 -->
  <circle cx="20"  cy="12" r="1.3" fill="rgba(255,255,255,0.7)"/>
  <circle cx="55"  cy="8"  r="1"   fill="rgba(255,255,255,0.6)"/>
  <circle cx="100" cy="14" r="1.4" fill="rgba(255,255,255,0.65)"/>
  <circle cx="145" cy="6"  r="1"   fill="rgba(255,255,255,0.55)"/>
  <circle cx="185" cy="11" r="1.2" fill="rgba(255,255,255,0.6)"/>
  <circle cx="230" cy="7"  r="1"   fill="rgba(255,255,255,0.7)"/>
  <circle cx="275" cy="13" r="1.3" fill="rgba(255,255,255,0.6)"/>
  <circle cx="305" cy="9"  r="1"   fill="rgba(255,255,255,0.5)"/>
  <circle cx="42"  cy="30" r="1"   fill="rgba(255,255,255,0.45)"/>
  <circle cx="120" cy="22" r="1.1" fill="rgba(255,255,255,0.5)"/>
  <circle cx="200" cy="25" r="1"   fill="rgba(255,255,255,0.45)"/>
  <circle cx="260" cy="20" r="1.2" fill="rgba(255,255,255,0.5)"/>

  <!-- 불빛 扇形 -->
  <path d="M110,95 L280,42 L290,160 Z" fill="url(#beam)" opacity="0.75"/>

  <!-- 파도 힌트 -->
  <path d="M0,115 Q40,110 80,118 Q120,125 160,115 Q200,105 240,115 Q280,125 320,112"
        fill="none" stroke="rgba(79,195,247,0.12)" stroke-width="1.2"/>
  <path d="M0,130 Q35,125 70,133 Q110,140 150,130 Q190,120 230,130 Q270,140 320,128"
        fill="none" stroke="rgba(79,195,247,0.09)" stroke-width="1"/>
  <path d="M0,148 Q50,142 100,150 Q150,157 200,148 Q250,138 320,146"
        fill="none" stroke="rgba(79,195,247,0.07)" stroke-width="0.8"/>

  <!-- 바위 -->
  <circle cx="195" cy="130" r="10" fill="#37474f"/>
  <circle cx="190" cy="126" r="5"  fill="#455a64"/>
  <circle cx="242" cy="148" r="8"  fill="#37474f"/>

  <!-- 항구 표시 (닻 아이콘 스타일) -->
  <circle cx="270" cy="90"  r="14" fill="rgba(79,195,247,0.22)" stroke="#4fc3f7" stroke-width="1.5"/>
  <text x="270" y="95" text-anchor="middle" font-size="14" font-family="sans-serif">⚓</text>

  <!-- 배 -->
  <text x="210" y="108" font-size="16" font-family="sans-serif" opacity="0.9">🚢</text>

  <!-- 등대 본체 -->
  <!-- 기단 -->
  <rect x="100" y="88" width="20" height="26" rx="4" fill="#c8d8e8"/>
  <!-- 줄무늬 -->
  <rect x="100" y="96" width="20" height="8" fill="#e53935"/>
  <!-- 등탑 -->
  <rect x="103" y="66" width="14" height="24" rx="3" fill="#e0e8f0"/>
  <!-- 등불 -->
  <circle cx="110" cy="64" r="7"  fill="#ffe066"/>
  <circle cx="110" cy="64" r="12" fill="url(#glow)" opacity="0.6"/>
  <!-- 꼭대기 -->
  <polygon points="103,64 117,64 110,54" fill="#b0bec5"/>
  <!-- 깃발 -->
  <line x1="110" y1="54" x2="110" y2="44" stroke="#b0bec5" stroke-width="1.5"/>
  <polygon points="110,44 122,48 110,52" fill="#ffe066" opacity="0.9"/>

  <!-- 내부 경계선 -->
  <rect x="0.5" y="0.5" width="319" height="179" fill="none" stroke="rgba(255,255,255,0.08)"/>

  <!-- 우하단 타이틀 -->
  <g font-family="'Pretendard','Noto Sans KR',sans-serif">
    <text x="296" y="148" text-anchor="end" font-size="22" font-weight="900" fill="#ffe066">등대 불빛</text>
    <text x="296" y="166" text-anchor="end" font-size="10" font-weight="500" fill="rgba(255,255,255,0.5)" letter-spacing="2">LIGHTHOUSE GUIDE</text>
  </g>
</svg>
