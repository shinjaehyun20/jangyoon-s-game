<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#1b2838"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 배경 -->
  <rect width="320" height="180" fill="url(#bg2)"/>

  <!-- 바구니 4개 (2x2) -->
  <!-- 왼위: 원 -->
  <rect x="14" y="96" width="134" height="66" rx="14" fill="rgba(229,57,53,0.15)" stroke="rgba(229,57,53,0.4)" stroke-width="1.5"/>
  <text x="81" y="120" text-anchor="middle" font-size="22">⭕</text>
  <text x="81" y="152" text-anchor="middle" font-size="12" font-weight="700" fill="rgba(255,255,255,0.7)" font-family="sans-serif">원</text>

  <!-- 오른위: 사각형 -->
  <rect x="172" y="96" width="134" height="66" rx="14" fill="rgba(33,150,243,0.15)" stroke="rgba(33,150,243,0.4)" stroke-width="1.5"/>
  <text x="239" y="120" text-anchor="middle" font-size="22">🟦</text>
  <text x="239" y="152" text-anchor="middle" font-size="12" font-weight="700" fill="rgba(255,255,255,0.7)" font-family="sans-serif">사각형</text>

  <!-- 중앙 낙하 도형 (별) — 큰 것 -->
  <text x="160" y="75" text-anchor="middle" font-size="46" filter="url(#glow2)">⭐</text>

  <!-- 힌트 화살표 -->
  <text x="160" y="95" text-anchor="middle" font-size="14" fill="rgba(255,255,255,0.5)">↓ 어디에?</text>

  <!-- 왼아래: 세모 -->
  <rect x="14" y="130" width="60" height="32" rx="8" fill="rgba(67,160,71,0.12)" stroke="rgba(67,160,71,0.35)" stroke-width="1"/>
  <text x="44" y="151" text-anchor="middle" font-size="14">🔺</text>

  <!-- 오른아래: 별 -->
  <rect x="246" y="130" width="60" height="32" rx="8" fill="rgba(255,193,7,0.15)" stroke="rgba(255,193,7,0.4)" stroke-width="1" filter="url(#glow2)"/>
  <text x="276" y="151" text-anchor="middle" font-size="14">⭐</text>

  <!-- 상단 장식 도형들 -->
  <text x="22" y="45" font-size="20" opacity="0.35">🔷</text>
  <text x="56" y="38" font-size="16" opacity="0.25">❤️</text>
  <text x="260" y="50" font-size="18" opacity="0.30">🟥</text>
  <text x="290" y="36" font-size="14" opacity="0.20">🟢</text>

  <!-- 타이틀 (우하단) -->
  <rect x="0" y="155" width="320" height="25" fill="rgba(0,0,0,0.45)"/>
  <text x="312" y="171" text-anchor="end" font-size="13" font-weight="700" fill="#ffffff" font-family="Pretendard, sans-serif" letter-spacing="-0.3">모양 분류 놀이</text>
  <text x="312" y="178" text-anchor="end" font-size="8" fill="rgba(255,255,255,0.55)" font-family="sans-serif" letter-spacing="1.5">SHAPE SORT</text>

  <!-- 프레임 -->
  <rect x="0.5" y="0.5" width="319" height="179" rx="0" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
</svg>
