<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>❄️ 눈덩이 피하기</title>
  <style>
    :root {
      --bg-top: #1a237e;
      --bg-bot: #283593;
      --accent: #4fc3f7;
      --text: #ffffff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100vh; height: 100dvh;
      overflow: hidden;
      touch-action: manipulation;
      font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bot) 100%);
      user-select: none;
    }
    .wrap {
      width: 100%; max-width: 480px;
      height: 100vh; height: 100dvh;
      display: flex; flex-direction: column;
      padding: 8px 12px 6px;
      gap: 6px;
      margin: 0 auto;
      position: relative;
    }
    h1 {
      font-size: clamp(18px, 5vw, 26px);
      color: var(--text);
      text-align: center;
      font-weight: 900;
      text-shadow: 0 2px 8px rgba(79,195,247,0.5);
    }
    .hud {
      display: flex; flex-direction: row;
      justify-content: space-between; align-items: center;
      background: rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 6px 14px;
      font-size: 15px; font-weight: 700; color: var(--text);
    }
    #gameCanvas {
      flex: 1;
      border-radius: 16px;
      background: transparent;
      display: block;
      touch-action: none;
    }
    footer {
      display: flex; flex-direction: row;
      justify-content: space-between; align-items: center;
      font-size: 12px; color: rgba(255,255,255,0.7);
    }
    .home-link {
      color: var(--text); text-decoration: none;
      font-weight: 600; font-size: 13px;
      background: rgba(255,255,255,0.15);
      padding: 4px 10px; border-radius: 8px;
    }

    .overlay {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.55);
      z-index: 100;
    }
    .overlay.hidden { display: none; }
    .overlay-card {
      background: linear-gradient(135deg, #1a237e, #283593);
      border: 2px solid rgba(79,195,247,0.4);
      border-radius: 20px;
      padding: 28px 26px;
      text-align: center;
      max-width: 320px; width: 90%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      color: #fff;
    }
    .overlay-card h2 { font-size: 26px; margin-bottom: 10px; }
    .overlay-card p { font-size: 14px; color: rgba(255,255,255,0.8); margin-bottom: 18px; line-height: 1.55; }
    .btn-start {
      background: linear-gradient(135deg, #4fc3f7, #0288d1);
      color: #fff; border: none; border-radius: 14px;
      font-size: 18px; font-weight: 900;
      padding: 12px 36px; cursor: pointer;
      min-height: 48px; width: 100%;
      box-shadow: 0 4px 14px rgba(79,195,247,0.4);
    }
    .result-score {
      font-size: 52px; font-weight: 900;
      color: #4fc3f7; margin: 8px 0;
    }
    .best-label { font-size: 13px; color: rgba(255,255,255,0.6); margin-bottom: 14px; }
    .lives-display { display: flex; gap: 6px; align-items: center; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>❄️ 눈덩이 피하기</h1>
    <div class="hud">
      <div class="lives-display" id="livesDisp">❤️❤️❤️</div>
      <span>⏱ <b id="timeDisp">30</b>초</span>
      <span>🏆 <b id="bestDisp">0</b></span>
    </div>
    <canvas id="gameCanvas"></canvas>
    <footer>
      <small>좌우로 이동해 눈덩이를 피해요!</small>
      <a class="home-link" href="../index.html">← 홈으로</a>
    </footer>
  </div>

  <div class="overlay" id="startOverlay">
    <div class="overlay-card">
      <h2>❄️ 눈덩이 피하기</h2>
      <p>하늘에서 눈덩이가 떨어져요!<br>화면 좌우를 터치하거나 드래그해서<br>눈덩이를 피하세요!<br>30초 동안 버티면 승리! ❄️⭐</p>
      <button class="btn-start" id="startBtn">시작!</button>
    </div>
  </div>

  <div class="overlay hidden" id="endOverlay">
    <div class="overlay-card">
      <h2 id="endTitle">🎉 게임 종료!</h2>
      <div class="result-score" id="finalScore">30</div>
      <div class="best-label" id="bestLabel"></div>
      <p id="resultMsg"></p>
      <button class="btn-start" id="restartBtn">다시 하기</button>
    </div>
  </div>

  <script>
  (function () {
    'use strict';

    const CONFIG = {
      GAME_TIME: 30,
      PLAYER_SPEED: 8,
      PLAYER_W: 40,
      PLAYER_H: 50,
      SNOW_SPAWN_BASE: 80,
      SNOW_SPAWN_MIN: 25,
      SNOW_SPEED_BASE: 2.5,
      SNOW_SPEED_INC: 0.05,
      SNOW_SIZES: [14, 18, 24, 30],
      LIVES: 3,
      STORAGE_KEY: 'snow-dodge_best',
    };

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const timeDisp = document.getElementById('timeDisp');
    const bestDisp = document.getElementById('bestDisp');
    const livesDisp = document.getElementById('livesDisp');
    const startOverlay = document.getElementById('startOverlay');
    const endOverlay = document.getElementById('endOverlay');
    const finalScore = document.getElementById('finalScore');
    const bestLabel = document.getElementById('bestLabel');
    const resultMsg = document.getElementById('resultMsg');
    const endTitle = document.getElementById('endTitle');

    let state, animId, timerIntervalId;

    function getBest() {
      return parseInt(localStorage.getItem(CONFIG.STORAGE_KEY) || '0', 10);
    }
    function saveBest(s) {
      const prev = getBest();
      if (s > prev) localStorage.setItem(CONFIG.STORAGE_KEY, String(s));
      return Math.max(s, prev);
    }

    function resizeCanvas() {
      const rect = canvas.getBoundingClientRect();
      canvas.width = rect.width;
      canvas.height = rect.height;
    }

    function initState() {
      resizeCanvas();
      const W = canvas.width, H = canvas.height;
      return {
        running: false,
        lives: CONFIG.LIVES,
        timeLeft: CONFIG.GAME_TIME,
        survivedTime: 0,
        player: { x: W / 2, y: H - 70, targetX: W / 2, hitFlash: 0 },
        snowballs: [],
        particles: [],
        snowflakes: [],
        frame: 0,
        dragActive: false,
        dragStartX: 0,
        dragPlayerStartX: 0,
        difficulty: 1,
      };
    }

    function spawnSnowball(W) {
      const sizes = CONFIG.SNOW_SIZES;
      const r = sizes[Math.floor(Math.random() * sizes.length)];
      return {
        x: r + Math.random() * (W - r * 2),
        y: -r,
        r,
        vy: CONFIG.SNOW_SPEED_BASE + state.difficulty * CONFIG.SNOW_SPEED_INC + Math.random() * 1.2,
        vx: (Math.random() - 0.5) * 1.5,
        spin: (Math.random() - 0.5) * 0.06,
        angle: 0,
      };
    }

    function spawnSnowflake(W) {
      return {
        x: Math.random() * W,
        y: -10,
        vy: 0.6 + Math.random() * 0.8,
        vx: (Math.random() - 0.5) * 0.5,
        r: 1 + Math.random() * 2.5,
        alpha: 0.4 + Math.random() * 0.5,
      };
    }

    function spawnParticle(x, y) {
      for (let i = 0; i < 8; i++) {
        const angle = (Math.PI * 2 * i) / 8;
        state.particles.push({
          x, y,
          vx: Math.cos(angle) * (1.5 + Math.random() * 2.5),
          vy: Math.sin(angle) * (1.5 + Math.random() * 2.5),
          life: 1, r: 4 + Math.random() * 5,
          color: Math.random() < 0.5 ? '#b3e5fc' : '#ffffff',
        });
      }
    }

    function updateLivesDisplay() {
      const hearts = ['❤️', '🤍', '🤍'];
      const full = '❤️'.repeat(state.lives);
      const empty = '🤍'.repeat(CONFIG.LIVES - state.lives);
      livesDisp.textContent = full + empty;
    }

    function drawBackground(W, H) {
      const grad = ctx.createLinearGradient(0, 0, 0, H);
      grad.addColorStop(0, '#0d1b6e');
      grad.addColorStop(1, '#1a3a7a');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, W, H);

      // 눈 쌓인 바닥
      ctx.fillStyle = '#e3f2fd';
      ctx.beginPath();
      ctx.ellipse(W / 2, H - 10, W * 0.6, 22, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.fillRect(0, H - 12, W, 12);
    }

    function drawPlayer(player) {
      const px = player.x, py = player.y;
      const flash = player.hitFlash > 0;

      // 눈사람 형태 플레이어
      ctx.save();
      ctx.translate(px, py);

      // 글로우 (피격 시 빨간색)
      if (flash) {
        ctx.shadowColor = '#ff1744';
        ctx.shadowBlur = 20;
      }

      // 몸통 (아래)
      ctx.beginPath();
      ctx.ellipse(0, 15, 20, 22, 0, 0, Math.PI * 2);
      ctx.fillStyle = flash ? '#ffcdd2' : '#ffffff';
      ctx.fill();
      ctx.strokeStyle = flash ? '#ff1744' : '#90caf9';
      ctx.lineWidth = 2;
      ctx.stroke();

      // 머리 (위)
      ctx.beginPath();
      ctx.arc(0, -12, 14, 0, Math.PI * 2);
      ctx.fillStyle = flash ? '#ffcdd2' : '#ffffff';
      ctx.fill();
      ctx.stroke();

      // 눈
      ctx.fillStyle = '#1a237e';
      ctx.beginPath(); ctx.arc(-5, -14, 2.5, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(5, -14, 2.5, 0, Math.PI * 2); ctx.fill();

      // 코 (당근)
      ctx.fillStyle = '#ff6b35';
      ctx.beginPath();
      ctx.moveTo(0, -11); ctx.lineTo(8, -11); ctx.lineTo(0, -9);
      ctx.closePath(); ctx.fill();

      // 목도리
      ctx.beginPath();
      ctx.ellipse(0, -2, 16, 5, 0, 0, Math.PI * 2);
      ctx.fillStyle = '#ef5350';
      ctx.fill();

      ctx.restore();
      if (player.hitFlash > 0) player.hitFlash--;
    }

    function drawSnowball(s) {
      ctx.save();
      ctx.translate(s.x, s.y);
      ctx.rotate(s.angle);

      // 눈덩이 본체
      ctx.beginPath();
      ctx.arc(0, 0, s.r, 0, Math.PI * 2);
      ctx.fillStyle = '#e3f2fd';
      ctx.fill();

      // 눈덩이 질감
      ctx.beginPath();
      ctx.arc(-s.r * 0.2, -s.r * 0.2, s.r * 0.35, 0, Math.PI * 2);
      ctx.fillStyle = '#ffffff';
      ctx.fill();
      ctx.beginPath();
      ctx.arc(s.r * 0.25, s.r * 0.2, s.r * 0.22, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.7)';
      ctx.fill();

      ctx.strokeStyle = '#90caf9';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(0, 0, s.r, 0, Math.PI * 2);
      ctx.stroke();

      ctx.restore();
    }

    function drawSnowflakes() {
      state.snowflakes.forEach(f => {
        ctx.save();
        ctx.globalAlpha = f.alpha;
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      });
    }

    function drawParticles() {
      state.particles.forEach(p => {
        ctx.save();
        ctx.globalAlpha = p.life;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
        ctx.fillStyle = p.color;
        ctx.fill();
        ctx.restore();
      });
    }

    function checkCollision(player, snow) {
      const pw = CONFIG.PLAYER_W / 2;
      const ph = CONFIG.PLAYER_H / 2;
      const dx = Math.abs(player.x - snow.x);
      const dy = Math.abs(player.y - snow.y);
      return dx < (pw + snow.r * 0.7) && dy < (ph + snow.r * 0.7);
    }

    function update() {
      const W = canvas.width, H = canvas.height;
      state.frame++;
      state.difficulty = 1 + (CONFIG.GAME_TIME - state.timeLeft) * 0.08;

      // 플레이어 이동
      const player = state.player;
      player.x += (player.targetX - player.x) * 0.18;
      player.x = Math.max(CONFIG.PLAYER_W / 2, Math.min(W - CONFIG.PLAYER_W / 2, player.x));

      // 눈송이 스폰
      if (state.frame % 3 === 0) {
        state.snowflakes.push(spawnSnowflake(W));
      }

      // 눈덩이 스폰 (시간이 지날수록 빠르게)
      const spawnInterval = Math.max(CONFIG.SNOW_SPAWN_MIN, CONFIG.SNOW_SPAWN_BASE - (CONFIG.GAME_TIME - state.timeLeft) * 2);
      if (state.frame % Math.floor(spawnInterval) === 0) {
        state.snowballs.push(spawnSnowball(W));
        // 고레벨엔 동시 2개 가끔
        if (state.difficulty > 1.5 && Math.random() < 0.3) {
          state.snowballs.push(spawnSnowball(W));
        }
      }

      // 눈덩이 이동 & 충돌
      state.snowballs = state.snowballs.filter(s => {
        s.x += s.vx;
        s.y += s.vy;
        s.angle += s.spin;

        if (checkCollision(player, s)) {
          state.lives--;
          player.hitFlash = 20;
          spawnParticle(player.x, player.y);
          updateLivesDisplay();
          if (state.lives <= 0) endGame(false);
          return false;
        }
        return s.y < H + s.r;
      });

      // 눈송이 이동
      state.snowflakes = state.snowflakes.filter(f => {
        f.x += f.vx; f.y += f.vy;
        return f.y < H + 10;
      });

      // 파티클
      state.particles = state.particles.filter(p => {
        p.x += p.vx; p.y += p.vy;
        p.vy += 0.08;
        p.life -= 0.035;
        return p.life > 0;
      });
    }

    function draw() {
      const W = canvas.width, H = canvas.height;
      ctx.clearRect(0, 0, W, H);
      drawBackground(W, H);
      drawSnowflakes();
      state.snowballs.forEach(drawSnowball);
      drawParticles();
      drawPlayer(state.player);
    }

    function loop() {
      if (!state.running) return;
      update();
      draw();
      animId = requestAnimationFrame(loop);
    }

    function endGame(survived) {
      state.running = false;
      cancelAnimationFrame(animId);
      clearInterval(timerIntervalId);

      const score = state.timeLeft <= 0 ? CONFIG.GAME_TIME : CONFIG.GAME_TIME - state.timeLeft;
      const best = saveBest(score);
      finalScore.textContent = score + '초';
      bestLabel.textContent = `최고 기록: ${best}초`;
      endTitle.textContent = state.timeLeft <= 0 ? '🎉 대성공!' : '💥 맞았다!';
      resultMsg.textContent = state.timeLeft <= 0
        ? '30초 완주! 눈덩이 피하기 왕이에요! 👑'
        : `${score}초 버텼어요! 다시 도전해봐요! ⛄`;
      bestDisp.textContent = best;
      endOverlay.classList.remove('hidden');
    }

    function startGame() {
      if (animId) cancelAnimationFrame(animId);
      if (timerIntervalId) clearInterval(timerIntervalId);
      state = initState();
      state.running = true;
      updateLivesDisplay();
      bestDisp.textContent = getBest();
      startOverlay.classList.add('hidden');
      endOverlay.classList.add('hidden');

      timerIntervalId = setInterval(() => {
        if (!state.running) return;
        state.timeLeft--;
        state.survivedTime++;
        timeDisp.textContent = state.timeLeft;
        if (state.timeLeft <= 0) endGame(true);
      }, 1000);

      loop();
    }

    // 포인터 이벤트 (드래그 또는 탭)
    canvas.addEventListener('pointerdown', e => {
      e.preventDefault();
      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      state.dragActive = true;
      state.dragStartX = x;
      state.dragPlayerStartX = state.player.x;
      state.player.targetX = x;
    });
    window.addEventListener('pointermove', e => {
      if (!state || !state.dragActive) return;
      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const delta = x - state.dragStartX;
      state.player.targetX = state.dragPlayerStartX + delta;
    });
    window.addEventListener('pointerup', () => {
      if (state) state.dragActive = false;
    });

    document.getElementById('startBtn').addEventListener('click', startGame);
    document.getElementById('restartBtn').addEventListener('click', startGame);

    window.addEventListener('resize', () => { if (state) resizeCanvas(); });
    state = initState();
    bestDisp.textContent = getBest();

  })();
  </script>
</body>
</html>
