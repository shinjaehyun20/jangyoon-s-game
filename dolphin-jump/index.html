<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>돌고래 점프</title>
  <style>
    :root {
      --bg: #0a3d6e;
      --water: #1a6fa8;
      --wave: #2196f3;
      --accent: #00e5ff;
      --ring: #ffeb3b;
      --ring-glow: #ff9800;
      --dolphin: #4dd0e1;
      --text: #ffffff;
      --sky: linear-gradient(180deg, #0d1b4b 0%, #1565c0 55%, #1a6fa8 100%);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100vh; height: 100dvh;
      overflow: hidden;
      touch-action: manipulation;
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: var(--bg);
    }
    .wrap {
      width: 100%; max-width: 480px;
      height: 100vh; height: 100dvh;
      display: flex; flex-direction: column;
      margin: 0 auto;
      position: relative;
      overflow: hidden;
    }
    /* HUD */
    .hud {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 14px 6px;
      background: rgba(0,0,0,0.3);
      border-bottom: 1px solid rgba(255,255,255,0.1);
      z-index: 10;
      flex-shrink: 0;
    }
    .hud-item {
      display: flex; flex-direction: column; align-items: center;
    }
    .hud-label {
      font-size: 10px; color: rgba(255,255,255,0.6); letter-spacing: 1px;
    }
    .hud-val {
      font-size: clamp(18px, 5vw, 24px);
      font-weight: 900; color: var(--accent);
    }
    #livesDisplay { font-size: clamp(18px, 5vw, 24px); }
    /* 게임 영역 */
    #gameArea {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    #gameCanvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    /* footer */
    footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 14px 8px;
      background: rgba(0,0,0,0.3);
      flex-shrink: 0;
      z-index: 10;
    }
    footer small { font-size: 11px; color: rgba(255,255,255,0.5); }
    .home-link {
      font-size: 13px; color: rgba(255,255,255,0.7);
      text-decoration: none; padding: 4px 10px;
      border: 1px solid rgba(255,255,255,0.3); border-radius: 20px;
    }
    /* 오버레이 */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,20,60,0.88);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
    }
    .overlay.hidden { display: none; }
    .overlay-card {
      background: rgba(0,50,120,0.95);
      border: 2px solid var(--accent);
      border-radius: 24px;
      padding: 30px 28px;
      text-align: center;
      max-width: 340px; width: 90%;
      box-shadow: 0 0 40px rgba(0,229,255,0.3);
    }
    .overlay-card h2 {
      font-size: clamp(22px, 6vw, 30px);
      color: var(--accent); margin-bottom: 12px;
    }
    .overlay-card p {
      font-size: 14px; color: rgba(255,255,255,0.85);
      line-height: 1.7; margin-bottom: 20px;
    }
    .result-score {
      font-size: 52px; font-weight: 900;
      color: var(--ring); margin: 12px 0 6px;
    }
    .result-best {
      font-size: 13px; color: rgba(255,255,255,0.6); margin-bottom: 16px;
    }
    .btn-start {
      background: linear-gradient(135deg, #00e5ff, #0091ea);
      border: none; border-radius: 50px;
      color: #fff; font-size: 20px; font-weight: 900;
      min-height: 54px; padding: 0 36px;
      cursor: pointer; width: 100%;
      box-shadow: 0 4px 18px rgba(0,229,255,0.4);
      touch-action: manipulation;
    }
    .btn-start:active { transform: scale(0.96); }
    /* 점프 파티클 */
    .particle {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      animation: particleFade 0.6s ease-out forwards;
    }
    @keyframes particleFade {
      0% { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(0.2) translateY(-30px); }
    }
  </style>
</head>
<body>
<div class="wrap">
  <!-- HUD -->
  <div class="hud">
    <div class="hud-item">
      <span class="hud-label">점수</span>
      <span class="hud-val" id="scoreDisplay">0</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">🐬</span>
      <span id="livesDisplay">❤️❤️❤️</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">최고</span>
      <span class="hud-val" id="bestDisplay">0</span>
    </div>
  </div>

  <!-- 게임 캔버스 -->
  <div id="gameArea">
    <canvas id="gameCanvas"></canvas>
  </div>

  <!-- footer -->
  <footer>
    <small>탭해서 점프! 링을 통과해요</small>
    <a class="home-link" href="../index.html">← 홈으로</a>
  </footer>
</div>

<!-- 시작 오버레이 -->
<div class="overlay" id="startOverlay">
  <div class="overlay-card">
    <h2>🐬 돌고래 점프</h2>
    <p>화면을 <strong>탭해서 점프!</strong><br>
       공중에 떠 있는 <strong>노란 링</strong>을 통과하면 점수<br>
       링을 놓치면 목숨이 줄어요</p>
    <button class="btn-start" id="startBtn">시작!</button>
  </div>
</div>

<!-- 결과 오버레이 -->
<div class="overlay hidden" id="endOverlay">
  <div class="overlay-card">
    <h2>🎉 게임 종료!</h2>
    <div class="result-score" id="finalScore">0</div>
    <div class="result-best" id="resultBest"></div>
    <p id="resultMsg"></p>
    <button class="btn-start" id="restartBtn">다시 하기</button>
  </div>
</div>

<script>
(function () {
  'use strict';

  /* ── CONFIG ── */
  const CONFIG = {
    GRAVITY:        0.32,
    JUMP_FORCE:    -8.5,
    DOLPHIN_X:     0.22,   // 캔버스 폭 비율
    DOLPHIN_R:     22,     // 반지름(px)
    WATER_H:       0.42,   // 수면 높이 비율
    RING_W:        48,
    RING_H:        48,
    RING_GAP:      200,    // 링 세로 중심 ± 범위(px)
    RING_SPEED:    3.0,
    RING_MIN_Y:    0.12,   // 링 최소 Y 비율
    RING_MAX_Y:    0.75,
    LIVES:         3,
    WAVE_SPEED:    1.5,
    SPARKLE_N:     8,
    BEST_KEY:      'dolphin-jump_best',
  };

  /* ── STATE ── */
  const state = {
    running:   false,
    score:     0,
    lives:     CONFIG.LIVES,
    best:      parseInt(localStorage.getItem(CONFIG.BEST_KEY) || '0', 10),
    dy:        0,
    y:         0,           // 돌고래 Y (캔버스 좌표)
    waterY:    0,           // 수면 Y (캔버스 좌표)
    inWater:   true,        // 수면 아래 여부
    rings:     [],
    waveOff:   0,
    frame:     0,
    hitCooldown: 0,         // 피격 후 무적 프레임
    splashParts: [],        // 물튀김 파티클
    ringPassed: false,      // 현재 프레임 통과 여부
  };

  /* ── DOM ── */
  const canvas      = document.getElementById('gameCanvas');
  const ctx         = canvas.getContext('2d');
  const gameArea    = document.getElementById('gameArea');
  const scoreEl     = document.getElementById('scoreDisplay');
  const bestEl      = document.getElementById('bestDisplay');
  const livesEl     = document.getElementById('livesDisplay');
  const startOverlay= document.getElementById('startOverlay');
  const endOverlay  = document.getElementById('endOverlay');
  const finalScoreEl= document.getElementById('finalScore');
  const resultBestEl= document.getElementById('resultBest');
  const resultMsgEl = document.getElementById('resultMsg');
  const startBtn    = document.getElementById('startBtn');
  const restartBtn  = document.getElementById('restartBtn');

  /* ── RESIZE ── */
  function resize() {
    canvas.width  = gameArea.clientWidth;
    canvas.height = gameArea.clientHeight;
    state.waterY  = canvas.height * CONFIG.WATER_H;
    if (!state.running) {
      state.y = state.waterY - CONFIG.DOLPHIN_R;
    }
  }
  window.addEventListener('resize', () => { resize(); });
  resize();

  bestEl.textContent = state.best;

  /* ── RING 생성 ── */
  function spawnRing() {
    const minY = canvas.height * CONFIG.RING_MIN_Y;
    const maxY = canvas.height * CONFIG.RING_MAX_Y;
    const cy   = minY + Math.random() * (maxY - minY);
    state.rings.push({
      x:       canvas.width + CONFIG.RING_W,
      y:       cy,
      scored:  false,
      missed:  false,
      flash:   0,
    });
  }

  /* ── INIT ── */
  function initGame() {
    state.score      = 0;
    state.lives      = CONFIG.LIVES;
    state.dy         = 0;
    state.y          = state.waterY - CONFIG.DOLPHIN_R;
    state.inWater    = true;
    state.rings      = [];
    state.frame      = 0;
    state.hitCooldown= 0;
    state.splashParts= [];
    state.waveOff    = 0;
    updateHUD();
    spawnRing();
    spawnRing();
  }

  function updateHUD() {
    scoreEl.textContent = state.score;
    bestEl.textContent  = state.best;
    let h = '';
    for (let i = 0; i < state.lives; i++) h += '❤️';
    for (let i = state.lives; i < CONFIG.LIVES; i++) h += '🖤';
    livesEl.textContent = h;
  }

  /* ── 점프 ── */
  function jump() {
    if (!state.running) return;
    if (state.inWater || state.y >= state.waterY - CONFIG.DOLPHIN_R) {
      state.dy = CONFIG.JUMP_FORCE;
      addSplash();
    } else {
      // 공중 재탭 약한 부스트
      if (state.dy > -2) {
        state.dy = CONFIG.JUMP_FORCE * 0.55;
      }
    }
  }

  /* ── 물튀김 파티클 ── */
  function addSplash() {
    const cx = canvas.width * CONFIG.DOLPHIN_X;
    for (let i = 0; i < 8; i++) {
      const angle = (Math.PI * 0.9) + Math.random() * Math.PI * 0.2;
      const speed = 2 + Math.random() * 4;
      state.splashParts.push({
        x: cx, y: state.waterY,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - 3,
        life: 1, r: 3 + Math.random() * 4,
      });
    }
  }

  /* ── LOOP ── */
  let rafId = null;
  function loop() {
    if (!state.running) return;
    state.frame++;
    update();
    draw();
    rafId = requestAnimationFrame(loop);
  }

  function update() {
    const cx = canvas.width * CONFIG.DOLPHIN_X;
    /* 중력 */
    state.dy += CONFIG.GRAVITY;
    state.y  += state.dy;

    /* 수면 복귀 */
    if (state.y >= state.waterY - CONFIG.DOLPHIN_R) {
      state.y = state.waterY - CONFIG.DOLPHIN_R;
      state.dy = 0;
      state.inWater = true;
    } else {
      state.inWater = false;
    }

    /* 천장 */
    if (state.y - CONFIG.DOLPHIN_R < 0) {
      state.y = CONFIG.DOLPHIN_R;
      state.dy = Math.abs(state.dy) * 0.5;
    }

    /* 파도 */
    state.waveOff += CONFIG.WAVE_SPEED;

    /* 링 이동 */
    if (state.hitCooldown > 0) state.hitCooldown--;

    for (let i = state.rings.length - 1; i >= 0; i--) {
      const r = state.rings[i];
      r.x -= CONFIG.RING_SPEED;
      if (r.flash > 0) r.flash--;

      const hw = CONFIG.RING_W * 0.5;
      const hh = CONFIG.RING_H * 0.5;
      const holeH = 18; // 링 구멍 세로 크기

      /* 통과 판정 (돌고래 중심이 링 중심 ±holeH 안에 있을 때 x가 겹치면 통과) */
      if (!r.scored && !r.missed) {
        const inX = Math.abs(cx - r.x) < hw + CONFIG.DOLPHIN_R * 0.5;
        const inY = Math.abs(state.y - r.y) < holeH + CONFIG.DOLPHIN_R * 0.4;
        if (inX) {
          if (inY) {
            // 통과!
            r.scored = true;
            r.flash  = 20;
            state.score++;
            updateHUD();
            if (state.score > state.best) {
              state.best = state.score;
              localStorage.setItem(CONFIG.BEST_KEY, state.best);
            }
          } else {
            // 링에 부딪힘 (구멍 밖)
            if (!r.missed && state.hitCooldown === 0) {
              r.missed = true;
              state.lives--;
              state.hitCooldown = 60;
              updateHUD();
              if (state.lives <= 0) {
                endGame(); return;
              }
            }
          }
        }
      }

      /* 화면 밖 → 놓침 처리 */
      if (r.x < -CONFIG.RING_W * 2) {
        if (!r.scored && !r.missed) {
          r.missed = true;
          state.lives--;
          state.hitCooldown = 40;
          updateHUD();
          if (state.lives <= 0) {
            endGame(); return;
          }
        }
        state.rings.splice(i, 1);
      }
    }

    /* 링 자동 생성 */
    const last = state.rings[state.rings.length - 1];
    if (!last || last.x < canvas.width * 0.55) {
      spawnRing();
    }

    /* 파티클 */
    for (let i = state.splashParts.length - 1; i >= 0; i--) {
      const p = state.splashParts[i];
      p.x += p.vx; p.y += p.vy;
      p.vy += 0.25;
      p.life -= 0.06;
      if (p.life <= 0) state.splashParts.splice(i, 1);
    }
  }

  function draw() {
    const W = canvas.width, H = canvas.height;
    const cx = W * CONFIG.DOLPHIN_X;

    /* 배경 하늘 */
    const sky = ctx.createLinearGradient(0, 0, 0, state.waterY);
    sky.addColorStop(0, '#0d1b4b');
    sky.addColorStop(1, '#1565c0');
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, W, state.waterY + 10);

    /* 별 (짝수 프레임) */
    if (state.frame % 2 === 0) {
      ctx.fillStyle = 'rgba(255,255,255,0.7)';
      for (let s = 0; s < 18; s++) {
        const sx = ((s * 137 + state.frame * 0.05) % 1) * W;
        const sy = ((s * 73) % 1) * state.waterY * 0.85;
        const sr = 0.8 + (s % 3) * 0.4;
        ctx.beginPath();
        ctx.arc(sx, sy, sr, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    /* 파도 표면 */
    ctx.beginPath();
    ctx.moveTo(0, state.waterY);
    for (let x = 0; x <= W; x += 6) {
      const wY = state.waterY + Math.sin((x * 0.04) + state.waveOff * 0.05) * 4
                              + Math.sin((x * 0.02) + state.waveOff * 0.03) * 3;
      ctx.lineTo(x, wY);
    }
    ctx.lineTo(W, H); ctx.lineTo(0, H); ctx.closePath();
    const waterGrad = ctx.createLinearGradient(0, state.waterY, 0, H);
    waterGrad.addColorStop(0, '#1a6fa8');
    waterGrad.addColorStop(1, '#0a3d6e');
    ctx.fillStyle = waterGrad;
    ctx.fill();

    /* 수면 광택 */
    ctx.beginPath();
    ctx.moveTo(0, state.waterY);
    for (let x = 0; x <= W; x += 6) {
      const wY = state.waterY + Math.sin((x * 0.04) + state.waveOff * 0.05) * 4
                              + Math.sin((x * 0.02) + state.waveOff * 0.03) * 3;
      ctx.lineTo(x, wY);
    }
    ctx.strokeStyle = 'rgba(0,229,255,0.5)';
    ctx.lineWidth = 2.5;
    ctx.stroke();

    /* 파티클 */
    for (const p of state.splashParts) {
      ctx.globalAlpha = p.life;
      ctx.fillStyle = '#80deea';
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    /* 링 */
    for (const r of state.rings) {
      drawRing(r);
    }

    /* 돌고래 */
    drawDolphin(cx, state.y, state.inWater, state.hitCooldown);
  }

  function drawRing(r) {
    const hw = CONFIG.RING_W * 0.5;
    const hh = CONFIG.RING_H * 0.5;
    const holeH = 18;

    ctx.save();
    ctx.translate(r.x, r.y);

    // 글로우
    const glow = r.flash > 0 ? 24 : 10;
    ctx.shadowColor = r.flash > 0 ? '#fff176' : '#ffeb3b';
    ctx.shadowBlur  = glow;

    // 링 외곽 (토러스 느낌 — 위 아치 + 아래 아치)
    const ringColor = r.flash > 0 ? '#fff176' : '#ffeb3b';
    ctx.strokeStyle = ringColor;
    ctx.lineWidth   = 8;
    ctx.lineCap     = 'round';

    // 위쪽 바
    ctx.beginPath();
    ctx.moveTo(-hw, -holeH - 2);
    ctx.lineTo(-hw,  -hh);
    ctx.arcTo(-hw, -hh, 0, -hh - 4, 6);
    ctx.lineTo(hw, -hh);
    ctx.lineTo(hw, -holeH - 2);
    ctx.stroke();

    // 아래쪽 바
    ctx.beginPath();
    ctx.moveTo(-hw, holeH + 2);
    ctx.lineTo(-hw,  hh);
    ctx.arcTo(-hw, hh, 0, hh + 4, 6);
    ctx.lineTo(hw, hh);
    ctx.lineTo(hw, holeH + 2);
    ctx.stroke();

    ctx.shadowBlur = 0;

    // 구멍 강조선
    ctx.strokeStyle = r.flash > 0 ? 'rgba(255,255,255,0.9)' : 'rgba(255,235,59,0.4)';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.moveTo(-hw, -holeH); ctx.lineTo(hw, -holeH);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(-hw,  holeH); ctx.lineTo(hw,  holeH);
    ctx.stroke();
    ctx.setLineDash([]);

    // 스코어 표시
    if (r.scored) {
      ctx.fillStyle = '#fff176';
      ctx.font = 'bold 20px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('+1', 0, -hh - 14 - (20 - r.flash));
    }

    ctx.restore();
  }

  function drawDolphin(cx, cy, inWater, hitCooldown) {
    ctx.save();
    ctx.translate(cx, cy);

    // 피격 시 깜빡임
    if (hitCooldown > 0 && Math.floor(hitCooldown / 5) % 2 === 0) {
      ctx.globalAlpha = 0.4;
    }

    // 몸통 각도 (속도에 따라 기울기)
    const angle = inWater ? 0 : Math.min(Math.max(state.dy * 0.06, -0.5), 0.5);
    ctx.rotate(angle);

    const R = CONFIG.DOLPHIN_R;

    // 꼬리
    ctx.fillStyle = '#26c6da';
    ctx.beginPath();
    ctx.moveTo(-R * 0.9, 0);
    ctx.lineTo(-R * 1.7, -R * 0.7);
    ctx.lineTo(-R * 1.5, 0);
    ctx.lineTo(-R * 1.7,  R * 0.7);
    ctx.closePath();
    ctx.fill();

    // 몸통
    const bodyGrad = ctx.createRadialGradient(-R * 0.2, -R * 0.3, 2, 0, 0, R * 1.3);
    bodyGrad.addColorStop(0, '#e0f7fa');
    bodyGrad.addColorStop(0.4, '#4dd0e1');
    bodyGrad.addColorStop(1, '#00838f');
    ctx.fillStyle = bodyGrad;
    ctx.beginPath();
    ctx.ellipse(0, 0, R * 1.3, R, 0, 0, Math.PI * 2);
    ctx.fill();

    // 등지느러미
    ctx.fillStyle = '#00838f';
    ctx.beginPath();
    ctx.moveTo(0, -R);
    ctx.lineTo(R * 0.3, -R * 1.7);
    ctx.lineTo(R * 0.7, -R);
    ctx.closePath();
    ctx.fill();

    // 눈
    ctx.fillStyle = '#001a33';
    ctx.beginPath();
    ctx.arc(R * 0.6, -R * 0.2, R * 0.2, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(R * 0.65, -R * 0.25, R * 0.08, 0, Math.PI * 2);
    ctx.fill();

    // 주둥이
    ctx.fillStyle = '#e0f7fa';
    ctx.beginPath();
    ctx.ellipse(R * 1.2, R * 0.1, R * 0.35, R * 0.18, 0.15, 0, Math.PI * 2);
    ctx.fill();

    // 미소
    ctx.strokeStyle = '#00838f';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(R * 1.1, R * 0.15, R * 0.2, 0.2, 1.1);
    ctx.stroke();

    ctx.globalAlpha = 1;
    ctx.restore();
  }

  /* ── 게임 종료 ── */
  function endGame() {
    state.running = false;
    cancelAnimationFrame(rafId);
    finalScoreEl.textContent = state.score;
    if (state.score >= state.best) {
      resultBestEl.textContent = '신기록! 🎊';
      resultMsgEl.textContent  = state.score >= 10 ? '대단해요! 링 통과 고수!' :
                                  state.score >= 5  ? '잘했어요! 다시 도전!' : '연습하면 더 잘할 수 있어요!';
    } else {
      resultBestEl.textContent = `최고 기록: ${state.best}점`;
      resultMsgEl.textContent  = '다시 도전해 보세요!';
    }
    endOverlay.classList.remove('hidden');
  }

  /* ── 이벤트 ── */
  gameArea.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    if (state.running) jump();
  });

  startBtn.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    startOverlay.classList.add('hidden');
    initGame();
    state.running = true;
    loop();
  });

  restartBtn.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    endOverlay.classList.add('hidden');
    initGame();
    state.running = true;
    loop();
  });

  /* ── 초기 캔버스 그리기 (미리보기) ── */
  (function drawPreview() {
    resize();
    const W = canvas.width, H = canvas.height;
    const sky = ctx.createLinearGradient(0, 0, 0, state.waterY);
    sky.addColorStop(0, '#0d1b4b');
    sky.addColorStop(1, '#1565c0');
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, W, state.waterY + 10);
    const waterGrad = ctx.createLinearGradient(0, state.waterY, 0, H);
    waterGrad.addColorStop(0, '#1a6fa8');
    waterGrad.addColorStop(1, '#0a3d6e');
    ctx.fillStyle = waterGrad;
    ctx.fillRect(0, state.waterY, W, H - state.waterY);
    drawDolphin(W * CONFIG.DOLPHIN_X, state.waterY - CONFIG.DOLPHIN_R, true, 0);
  })();
})();
</script>
</body>
</html>
