<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1b4b"/>
      <stop offset="100%" stop-color="#1565c0"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a6fa8"/>
      <stop offset="100%" stop-color="#0a3d6e"/>
    </linearGradient>
    <linearGradient id="dolphinBody" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e0f7fa"/>
      <stop offset="40%" stop-color="#4dd0e1"/>
      <stop offset="100%" stop-color="#00838f"/>
    </linearGradient>
  </defs>
  <!-- 경계 -->
  <rect x="0.5" y="0.5" width="319" height="179" fill="none" stroke="rgba(255,255,255,0.08)"/>
  <!-- 하늘 -->
  <rect width="320" height="110" fill="url(#sky)"/>
  <!-- 별 -->
  <circle cx="30" cy="20" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="80" cy="35" r="1" fill="white" opacity="0.7"/>
  <circle cx="140" cy="15" r="1.5" fill="white" opacity="0.9"/>
  <circle cx="200" cy="30" r="1" fill="white" opacity="0.6"/>
  <circle cx="50" cy="55" r="1" fill="white" opacity="0.7"/>
  <!-- 물 -->
  <path d="M0 105 Q40 100 80 106 Q120 112 160 106 Q200 100 240 107 Q280 113 320 107 L320 180 L0 180 Z" fill="url(#water)"/>
  <path d="M0 105 Q40 100 80 106 Q120 112 160 106 Q200 100 240 107 Q280 113 320 107" fill="none" stroke="#00e5ff" stroke-width="2" opacity="0.6"/>
  <!-- 링 1 -->
  <g transform="translate(210,65)">
    <rect x="-22" y="-28" width="8" height="18" rx="3" fill="none" stroke="#ffeb3b" stroke-width="5"/>
    <rect x="14" y="-28" width="8" height="18" rx="3" fill="none" stroke="#ffeb3b" stroke-width="5"/>
    <rect x="-22" y="10" width="8" height="18" rx="3" fill="none" stroke="#ffeb3b" stroke-width="5"/>
    <rect x="14" y="10" width="8" height="18" rx="3" fill="none" stroke="#ffeb3b" stroke-width="5"/>
    <!-- top bar -->
    <line x1="-18" y1="-28" x2="18" y2="-28" stroke="#ffeb3b" stroke-width="5" stroke-linecap="round"/>
    <line x1="-18" y1="28" x2="18" y2="28" stroke="#ffeb3b" stroke-width="5" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="26" fill="none" stroke="rgba(255,235,59,0.25)" stroke-width="1.5"/>
  </g>
  <!-- 링 2 (작게) -->
  <g transform="translate(280,80)" opacity="0.6">
    <line x1="-16" y1="-20" x2="16" y2="-20" stroke="#ffeb3b" stroke-width="4" stroke-linecap="round"/>
    <line x1="-16" y1="20" x2="16" y2="20" stroke="#ffeb3b" stroke-width="4" stroke-linecap="round"/>
    <line x1="-16" y1="-20" x2="-16" y2="20" stroke="#ffeb3b" stroke-width="4" stroke-linecap="round"/>
    <line x1="16" y1="-20" x2="16" y2="20" stroke="#ffeb3b" stroke-width="4" stroke-linecap="round"/>
  </g>
  <!-- 물튀김 -->
  <ellipse cx="72" cy="105" rx="12" ry="4" fill="#80deea" opacity="0.6"/>
  <line x1="60" y1="103" x2="55" y2="88" stroke="#80deea" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="72" y1="101" x2="70" y2="84" stroke="#80deea" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <line x1="84" y1="103" x2="89" y2="88" stroke="#80deea" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <!-- 돌고래 (점프 중) -->
  <g transform="translate(78,80) rotate(-25)">
    <!-- 꼬리 -->
    <polygon points="-32,0 -48,-14 -40,0 -48,14" fill="#26c6da"/>
    <!-- 몸통 -->
    <ellipse cx="0" cy="0" rx="30" ry="16" fill="url(#dolphinBody)"/>
    <!-- 등지느러미 -->
    <polygon points="6,-16 12,-32 20,-16" fill="#00838f"/>
    <!-- 눈 -->
    <circle cx="22" cy="-4" r="4" fill="#001a33"/>
    <circle cx="23" cy="-5" r="1.5" fill="white"/>
    <!-- 주둥이 -->
    <ellipse cx="34" cy="2" rx="8" ry="4" fill="#e0f7fa"/>
    <!-- 미소 -->
    <path d="M29 3 Q32 7 35 4" fill="none" stroke="#00838f" stroke-width="1.5"/>
    <!-- 반짝이 -->
    <text x="-5" y="-24" font-size="12" text-anchor="middle" opacity="0.9">✨</text>
  </g>
  <!-- 타이틀 -->
  <g font-family="'Pretendard','Noto Sans KR',sans-serif">
    <text x="296" y="148" text-anchor="end" font-size="22" font-weight="900" fill="#00e5ff">돌고래 점프</text>
    <text x="296" y="166" text-anchor="end" font-size="10" font-weight="500" fill="rgba(255,255,255,0.5)" letter-spacing="2">DOLPHIN JUMP</text>
  </g>
</svg>
